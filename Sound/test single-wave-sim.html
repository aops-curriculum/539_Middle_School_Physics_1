<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Displacement v. Time Waveform Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .top-section {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            align-items: start;
            justify-content: center;
        }
        #canvas-container {
            border: 2px solid #333;
            display: inline-block;
            background-color: #0a0a0a;
            width: 380px;
            height: 300px;
            position: relative;
        }
        .graph-container {
            border: 2px solid #333;
            background-color: #0a0a0a;
            width: 380px;
            height: 300px;
            position: relative;
        }
        .graph-container h4 {
            position: absolute;
            top: 10px;
            left: 10px;
            margin: 0;
            color: #4fc3f7;
            font-size: 14px;
            font-weight: normal;
        }
        .controls {
            background-color: #2a2a2a;
            padding: 15px 20px 20px 20px;
            border-radius: 8px;
            max-width: 780px;
            margin: 0 auto;
        }
        .control-group {
            padding: 12px 15px;
            background-color: #333;
            border-radius: 6px;
        }
        .control-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        label {
            width: 75px;
            font-size: 14px;
        }
        input[type="range"] {
            flex: 1;
            height: 6px;
            background: #555;
            outline: none;
            border-radius: 3px;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #4fc3f7;
            cursor: pointer;
            border-radius: 50%;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 5px;
        }
        .value-display {
            width: 50px;
            text-align: right;
            font-family: monospace;
            color: #4fc3f7;
            font-size: 13px;
        }
        #error-display {
            color: #ff6b6b;
            padding: 10px;
            display: none;
            text-align: center;
        }
        #canvas-container input[type="checkbox"] {
            width: 15px;
            height: 15px;
            cursor: pointer;
            margin-right: 5px;
            vertical-align: middle;
        }
        #canvas-container label {
            vertical-align: middle;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="top-section">
        <div id="canvas-container">
            <div style="position: absolute; top: 10px; left: 10px; z-index: 10; background-color: rgba(42, 42, 42, 0.8); padding: 5px 10px; border-radius: 4px;">
                <input type="checkbox" id="showWave" checked>
                <label for="showWave" style="color: #aaa; font-size: 13px; cursor: pointer;">Make Graph</label>
            </div>
        </div>
        <div class="graph-container">
            <canvas id="wave-graph" width="380" height="300"></canvas>
        </div>
    </div>
    
    <div id="error-display"></div>
    
    <div class="controls">
        <div class="control-group">
            <div class="control-row">
                <input type="checkbox" id="enable" checked>
                <label for="enable" style="width: auto;">Enable Motion</label>
            </div>
            <div class="control-row">
                <label for="freq">Frequency:</label>
                <input type="range" id="freq" min="0.1" max="10" step="0.1" value="0.5">
                <span class="value-display" id="freq-value">0.5 Hz</span>
            </div>
            <div class="control-row">
                <label for="amp">Amplitude:</label>
                <input type="range" id="amp" min="0" max="100" step="5" value="50">
                <span class="value-display" id="amp-value">50 px</span>
            </div>
            <div class="control-row">
                <label for="phase">Phase:</label>
                <input type="range" id="phase" min="0" max="360" step="1" value="0">
                <span class="value-display" id="phase-value">0°</span>
            </div>
        </div>
    </div>

    <script>
        // Show errors if any
        function showError(message) {
            const errorDiv = document.getElementById('error-display');
            errorDiv.textContent = 'Error: ' + message;
            errorDiv.style.display = 'block';
        }

        // Graph drawing function
        function drawWaveform() {
            const canvas = document.getElementById('wave-graph');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            const frequency = parseFloat(controls.freq.value);
            const amplitude = parseFloat(controls.amp.value);
            const phase = parseFloat(controls.phase.value) * Math.PI / 180;
            const enabled = controls.enable.checked;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            // Draw grid
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            
            // Horizontal center line
            ctx.beginPath();
            ctx.moveTo(40, height / 2);
            ctx.lineTo(width - 20, height / 2);
            ctx.stroke();
            
            // Vertical lines
            for (let x = 40; x < width - 20; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 40);
                ctx.lineTo(x, height - 30);
                ctx.stroke();
            }
            
            // Draw axis labels
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('Time', width / 2, height - 20);
            
            ctx.save();
            ctx.translate(15, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Displacement', 0, 0);
            ctx.restore();
            
            if (!enabled) return;
            
            // Draw waveform
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            const timeSpan = 3; // Show 3 seconds of waveform
            const centerY = height / 2;
            const scale = (height * 0.35) / 100; // Scale to fit in graph
            
            for (let x = 40; x < width - 20; x++) {
                const t = ((x - 40) / (width - 60)) * timeSpan;
                const y = centerY - amplitude * scale * Math.sin(2 * Math.PI * frequency * t + phase);
                
                if (x === 40) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            
            ctx.stroke();
        }

        // Initialize PIXI
        let app;
        let container;
        let gridContainer;
        let grid;
        let dot;
        let trail;
        let time = 0;
        let controls;
        let gridOffset = 0;
        
        try {
            // Create and configure PIXI Application
            app = new PIXI.Application({
                width: 380,
                height: 300,
                backgroundColor: 0x0a0a0a,
                antialias: true,
                resolution: window.devicePixelRatio || 1,
                autoDensity: true
            });
            
            // Add canvas to DOM
            const canvasContainer = document.getElementById('canvas-container');
            canvasContainer.appendChild(app.view);
            app.view.style.position = 'relative';
            
            // Create main container
            container = new PIXI.Container();
            container.x = app.screen.width / 2;
            container.y = app.screen.height / 2;
            app.stage.addChild(container);
            
            // Create grid container for scrolling grid
            gridContainer = new PIXI.Container();
            container.addChild(gridContainer);
            
            // Create grid graphics
            grid = new PIXI.Graphics();
            gridContainer.addChild(grid);
            
            // Create center line (vertical now)
            const centerLine = new PIXI.Graphics();
            centerLine.lineStyle(2, 0x444444);
            centerLine.moveTo(0, -app.screen.height/2);
            centerLine.lineTo(0, app.screen.height/2);
            container.addChild(centerLine);
            
            const label = new PIXI.Text('Displacement', {
                fontFamily: 'Arial',
                fontSize: 14,
                fill: 0x666666,
                align: 'center'
            });
            label.x = app.screen.width / 2;
            label.y = app.screen.height - 25;
            label.anchor.set(0.5, 0.5);
            app.stage.addChild(label);
            
            // Create amplitude guides (now horizontal)
            const guides = new PIXI.Graphics();
            container.addChild(guides);
            
            // Create trail graphics for the wave
            trail = new PIXI.Graphics();
            container.addChild(trail);
            
            // Create the main dot
            dot = new PIXI.Graphics();
            dot.beginFill(0x4fc3f7);
            dot.drawCircle(0, 0, 8);
            dot.endFill();
            // Add a white center for better visibility
            dot.beginFill(0xffffff);
            dot.drawCircle(0, 0, 3);
            dot.endFill();
            container.addChild(dot);
            
            // Get control elements
            controls = {
                enable: document.getElementById('enable'),
                freq: document.getElementById('freq'),
                amp: document.getElementById('amp'),
                phase: document.getElementById('phase'),
                showWave: document.getElementById('showWave')
            };
            
            // Update value displays and graph
            controls.freq.addEventListener('input', (e) => {
                document.getElementById('freq-value').textContent = `${e.target.value} Hz`;
                drawWaveform();
            });
            controls.amp.addEventListener('input', (e) => {
                document.getElementById('amp-value').textContent = `${e.target.value} px`;
                updateGuides();
                drawWaveform();
            });
            controls.phase.addEventListener('input', (e) => {
                document.getElementById('phase-value').textContent = `${e.target.value}°`;
                drawWaveform();
            });
            
            controls.enable.addEventListener('change', () => {
                updateGuides();
                drawWaveform();
                if (!controls.enable.checked) {
                    trail.clear(); // Clear wave when disabled
                    dot.x = 0; // Reset particle to center
                }
            });
            
            controls.showWave.addEventListener('change', () => {
                if (!controls.showWave.checked) {
                    trail.clear(); // Clear wave trail when unchecked
                }
            });
            
            // Update amplitude guides
            function updateGuides() {
                guides.clear();
                
                if (controls.enable.checked) {
                    const amp = parseFloat(controls.amp.value);
                    guides.lineStyle(1, 0xff00ff, 0.3);
                    // Horizontal guides now
                    guides.moveTo(-amp - 10, 0);
                    guides.lineTo(-amp + 10, 0);
                    guides.moveTo(amp - 10, 0);
                    guides.lineTo(amp + 10, 0);
                }
            }
            
            // Initial setup
            updateGuides();
            drawWaveform();
            
            // Animation function
            function animate(delta) {
                time += delta / 60; // Convert to seconds
                
                // Scroll speed (pixels per frame) - adjusted for smooth motion
                const scrollSpeed = 2;
                
                // Update grid offset
                gridOffset -= scrollSpeed;
                if (gridOffset <= -30) {
                    gridOffset += 30; // Reset when moved one grid unit
                }
                
                // Redraw grid with offset
                grid.clear();
                grid.lineStyle(1, 0x444444, 0.5);
                
                // Vertical lines (static)
                for (let x = -180; x <= 180; x += 30) {
                    grid.moveTo(x, -app.screen.height / 2);
                    grid.lineTo(x, app.screen.height / 2);
                }
                
                // Horizontal lines (moving)
                for (let y = -app.screen.height / 2 - 30; y <= app.screen.height / 2 + 30; y += 30) {
                    const adjustedY = y + gridOffset;
                    grid.moveTo(-180, adjustedY);
                    grid.lineTo(180, adjustedY);
                }
                
                // Draw the continuous wave
                trail.clear();
                if (controls.enable.checked) {
                    const freq = parseFloat(controls.freq.value);
                    const amp = parseFloat(controls.amp.value);
                    const phase = parseFloat(controls.phase.value) * Math.PI / 180;
                    
                    // Only draw the wave trail if showWave is checked
                    if (controls.showWave.checked) {
                        trail.lineStyle(2.5, 0xff00ff, 1);
                        
                        // Draw wave from bottom to top of screen
                        const startY = app.screen.height / 2;
                        const endY = -app.screen.height / 2;
                        const step = 2; // Pixel steps for smooth curve
                        
                        // Calculate how many pixels per second the wave travels
                        const pixelsPerSecond = scrollSpeed * 60;
                        
                        let firstPoint = true;
                        for (let y = startY; y >= endY; y -= step) {
                            // For a point at position y relative to center:
                            // - Positive y (below center) shows the wave at a future time
                            // - Negative y (above center) shows the wave at a past time
                            // Since the wave scrolls upward, a point below will reach center after y/speed seconds
                            const timeOffset = -y / pixelsPerSecond;
                            const x = amp * Math.sin(2 * Math.PI * freq * (time + timeOffset) + phase);
                            
                            if (firstPoint) {
                                trail.moveTo(x, -y);
                                firstPoint = false;
                            } else {
                                trail.lineTo(x, -y);
                            }
                        }
                    }
                    
                    // Calculate particle position (at center) - always update this
                    const particleX = amp * Math.sin(2 * Math.PI * freq * time + phase);
                    dot.x = particleX;
                    dot.y = 0;
                    dot.visible = true;
                } else {
                    // Keep dot at center when disabled
                    dot.x = 0;
                    dot.y = 0;
                    dot.visible = true;
                }
            }
            
            // Start animation
            app.ticker.add(animate);
            
        } catch (error) {
            showError(error.message);
            console.error('PIXI initialization error:', error);
        }
    </script>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
