<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="eigennode-aspect" content="15/11">
<title>S-Wave Shadow Zone</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    user-select: none;
  }
  #stage {
    position: relative;
    aspect-ratio: 15/11;
    height: min(100%, 73.33vw);
    width: auto;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #sliderCol {
    position: absolute; left: 0; top: 0; bottom: 0; width: 38px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; z-index: 2;
  }
  #sliderCol label {
    writing-mode: vertical-rl; transform: rotate(180deg);
    color: #444; font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  }
  #sldCore {
    width: 28px; height: min(220px, 50%);
    writing-mode: vertical-lr; direction: rtl;
    accent-color: #e07020;
  }
  #radiusBlock {
    position: absolute; top: 10px; left: 44px;
    z-index: 2; pointer-events: none; text-align: left;
  }
  #radiusBlock label {
    display: block; color: #666; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  #readout {
    color: #222; font-size: 24px; font-weight: 700; line-height: 1.1;
    white-space: nowrap;
  }
  #shadowBlock {
    position: absolute; top: 10px; right: 12px;
    z-index: 2; pointer-events: none; text-align: right;
  }
  #shadowBlock label {
    display: block; color: #666; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  #shadowVal { color: #8b4513; font-weight: 700; font-size: 18px; line-height: 1.2; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>
  <div id="sliderCol">
    <label for="sldCore">core size</label>
    <input type="range" id="sldCore" min="2500" max="4500" step="10" value="2760">
  </div>
  <div id="radiusBlock">
    <label>Radius</label>
    <span id="readout">2760 km</span>
  </div>
  <div id="shadowBlock">
    <label>S-wave shadow</label>
    <span id="shadowVal">120°</span>
  </div>
</div>

<script>
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 600, H = 440;

const RE_KM = 6371;
const REF_CORE_KM = 3500;          // anchor: 3500 km → 103° critical → 154° shadow
const REF_FRAC = REF_CORE_KM / RE_KM;
const REF_CRIT = 103.0;

const CX = 300, CY = 218, ER = 188;
const EX = CX, EY = CY - ER;

let coreKm = 2760;

const COL = {
  mantle: '#ffe566',
  shadow: '#b8b8b8',
  core:   '#ff9933',
  ray:    'rgb(48, 133, 230)',
  earth:  '#111',
  cmb:    '#111',
  angle:  '#8b4513',
};

document.getElementById('sldCore').addEventListener('input', e => {
  coreKm = +e.target.value;
  document.getElementById('readout').textContent = coreKm + ' km';
  draw();
});

function coreFrac() { return coreKm / RE_KM; }
function corePx()  { return coreFrac() * ER; }

// Critical takeoff angle (°) for a given core radius, calibrated so 3500 km → 103°.
function criticalDeg() {
  const f = coreFrac();
  const t = (1 - f) / (1 - REF_FRAC);
  return REF_CRIT * Math.pow(Math.max(0, t), 2 / 3);
}

function shadowDeg() {
  return 360 - 2 * criticalDeg();
}

function rTurn(deg) {
  const crit = criticalDeg();
  const t = crit > 0 ? deg / crit : 0;
  return ER * (1 - (1 - coreFrac()) * Math.pow(Math.max(0, t), 1.5));
}

function surfPt(deg, r) {
  const th = deg * Math.PI / 180;
  return { x: CX + r * Math.sin(th), y: CY - r * Math.cos(th) };
}

function ang(p) { return Math.atan2(p.y - CY, p.x - CX); }

function bezPt(p0, p1, p2, p3, t) {
  const u = 1 - t;
  return {
    x: u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x,
    y: u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y,
  };
}

function firstCmbCross(p0, p1, p2, p3, rc) {
  let lo = 0, hi = 1;
  for (let i = 0; i <= 80; i++) {
    const t = i / 80;
    const p = bezPt(p0, p1, p2, p3, t);
    const d = Math.hypot(p.x - CX, p.y - CY);
    if (d <= rc + 0.3) return t;
  }
  for (let k = 0; k < 28; k++) {
    const mid = (lo + hi) / 2;
    const p = bezPt(p0, p1, p2, p3, mid);
    if (Math.hypot(p.x - CX, p.y - CY) < rc) hi = mid;
    else lo = mid;
  }
  return (lo + hi) / 2;
}

function rayPath(deg, side) {
  const s = side === 'left' ? -1 : 1;
  const th = deg * Math.PI / 180;
  const rt = rTurn(deg);
  const S  = { x: EX, y: EY };
  const A  = { x: CX + s * ER * Math.sin(th), y: CY - ER * Math.cos(th) };
  const T  = { x: CX + s * rt * Math.sin(th / 2), y: CY - rt * Math.cos(th / 2) };
  const c1 = { x: (4 * T.x - A.x) / 3, y: (4 * T.y - A.y) / 3 };
  const c2 = { x: (4 * T.x - S.x) / 3, y: (4 * T.y - S.y) / 3 };
  return { S, A, c1, c2, rt };
}

function drawBezier(p0, p1, p2, p3, tEnd) {
  ctx.moveTo(p0.x, p0.y);
  if (tEnd >= 1) {
    ctx.bezierCurveTo(p1.x, p1.y, p2.x, p2.y, p3.x, p3.y);
  } else {
    const steps = Math.max(8, Math.round(tEnd * 40));
    for (let i = 1; i <= steps; i++) {
      const p = bezPt(p0, p1, p2, p3, tEnd * i / steps);
      ctx.lineTo(p.x, p.y);
    }
  }
}

function drawEarthLayers(crit) {
  const rc = corePx();

  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, ER, 0, Math.PI * 2);
  ctx.fillStyle = COL.mantle;
  ctx.fill();
  ctx.restore();

  const A103  = surfPt(crit, ER);
  const AL103 = surfPt(-crit, ER);
  const TR103 = surfPt(crit / 2, rc);
  const TL103 = surfPt(-crit / 2, rc);
  const S     = { x: EX, y: EY };

  const c1R = { x: (4 * TR103.x - A103.x) / 3,  y: (4 * TR103.y - A103.y) / 3 };
  const c2R = { x: (4 * TR103.x - S.x) / 3,      y: (4 * TR103.y - S.y) / 3 };
  const c1L = { x: (4 * TL103.x - AL103.x) / 3, y: (4 * TL103.y - AL103.y) / 3 };
  const c2L = { x: (4 * TL103.x - S.x) / 3,     y: (4 * TL103.y - S.y) / 3 };

  const aSurfR = ang(A103);
  const aSurfL = ang(AL103);
  const aCmbR  = ang(TR103);
  const aCmbL  = ang(TL103);

  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, ER, aSurfR, aSurfL, false);
  const rightSteps = 24;
  for (let i = rightSteps; i >= Math.round(rightSteps / 2); i--) {
    const p = bezPt(S, c1R, c2R, A103, i / rightSteps);
    ctx.lineTo(p.x, p.y);
  }
  ctx.arc(CX, CY, rc, aCmbL, aCmbR, true);
  for (let i = Math.round(rightSteps / 2); i <= rightSteps; i++) {
    const p = bezPt(S, c1L, c2L, AL103, i / rightSteps);
    ctx.lineTo(p.x, p.y);
  }
  ctx.closePath();
  ctx.fillStyle = COL.shadow;
  ctx.fill();
  ctx.restore();

  ctx.beginPath();
  ctx.arc(CX, CY, rc, 0, Math.PI * 2);
  ctx.fillStyle = COL.core;
  ctx.fill();
}

function rayAngles(crit) {
  const REF_SURF = [17, 22, 28, 34, 41, 49, 58, 67, 76, 86, 95, REF_CRIT];
  const REF_CORE = [107, 113, 119, 125, 131, 137, 143, 149, 155, 161, 167, 173];
  const scale = crit / REF_CRIT;

  const surfAngles = REF_SURF.map(a =>
    a >= REF_CRIT ? crit : a * scale
  );

  const coreTail = 173 - REF_CRIT;
  const coreAngles = REF_CORE.map(a =>
    crit + (a - REF_CRIT) * (173 - crit) / coreTail
  ).filter(a => a <= 173);

  return { surfAngles, coreAngles };
}

function drawRays(crit) {
  const rc = corePx();
  const { surfAngles, coreAngles } = rayAngles(crit);

  ctx.save();
  ctx.strokeStyle = COL.ray;
  ctx.lineWidth = 1.1;
  ctx.lineCap = 'round';

  function strokeRay(deg, clipCore) {
    ['right', 'left'].forEach(side => {
      const { S, A, c1, c2 } = rayPath(deg, side);
      ctx.beginPath();
      if (clipCore) {
        const tEnd = firstCmbCross(S, c1, c2, A, rc);
        drawBezier(S, c1, c2, A, tEnd);
      } else {
        drawBezier(S, c1, c2, A, 1);
      }
      ctx.stroke();
    });
  }

  surfAngles.forEach(a => strokeRay(a, false));
  coreAngles.forEach(a => strokeRay(a, true));
  ctx.restore();
}

function drawOutlines() {
  const rc = corePx();
  ctx.beginPath();
  ctx.arc(CX, CY, ER, 0, Math.PI * 2);
  ctx.strokeStyle = COL.earth;
  ctx.lineWidth = 2.2;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(CX, CY, rc, 0, Math.PI * 2);
  ctx.strokeStyle = COL.cmb;
  ctx.lineWidth = 1.1;
  ctx.stroke();
}

function drawAngleArc(crit, shadow) {
  const rArc = ER + 8;
  const aR = ang(surfPt(crit, ER));
  const aL = ang(surfPt(-crit, ER));
  const inset = 0.11;
  const arcStart = aR + inset;
  const arcEnd = aL - inset;

  ctx.save();
  ctx.setLineDash([4, 4]);
  ctx.lineCap = 'butt';
  ctx.strokeStyle = COL.angle;
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.arc(CX, CY, rArc, arcStart, arcEnd, false);
  ctx.stroke();
  ctx.setLineDash([]);

  function arrowAt(angle, dir) {
    const px = CX + rArc * Math.cos(angle);
    const py = CY + rArc * Math.sin(angle);
    const tx = -Math.sin(angle) * dir;
    const ty =  Math.cos(angle) * dir;
    const sz = 6;
    ctx.beginPath();
    ctx.moveTo(px + tx * sz, py + ty * sz);
    ctx.lineTo(px - tx * sz * 0.55 - ty * sz * 0.55, py - ty * sz * 0.55 + tx * sz * 0.55);
    ctx.lineTo(px - tx * sz * 0.55 + ty * sz * 0.55, py - ty * sz * 0.55 - tx * sz * 0.55);
    ctx.closePath();
    ctx.fillStyle = COL.angle;
    ctx.fill();
  }
  arrowAt(arcStart, -1);
  arrowAt(arcEnd, 1);

  const midA = (aR + aL) / 2 + (aL < aR ? Math.PI : 0);
  const ax = CX + (rArc + 14) * Math.cos(midA);
  const ay = CY + (rArc + 14) * Math.sin(midA);
  ctx.font = 'bold 15px Segoe UI';
  ctx.fillStyle = COL.angle;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(shadow.toFixed(0) + '°', ax, ay);
  ctx.restore();
}

function drawEpicenter() {
  const r = ER * 0.035;
  ctx.beginPath();
  ctx.arc(EX, EY, r, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = COL.earth;
  ctx.lineWidth = 1.4;
  ctx.stroke();

  const lx = EX;
  const ly = EY - 16;
  ctx.font = '11px Segoe UI';
  ctx.fillStyle = '#111';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('Epicenter', lx, ly);
}

function drawLabels() {
  ctx.font = '12px Segoe UI';
  ctx.fillStyle = '#111';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Liquid Core', CX, CY + 4);
}

function draw() {
  const crit = criticalDeg();
  const shadow = shadowDeg();
  document.getElementById('shadowVal').textContent = shadow.toFixed(0) + '°';

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  drawEarthLayers(crit);
  drawRays(crit);
  drawOutlines();
  drawAngleArc(crit, shadow);
  drawEpicenter();
  drawLabels();
}

function fit() {
  const dpr = window.devicePixelRatio || 1;
  const cw = cv.clientWidth, ch = cv.clientHeight;
  if (!cw || !ch) return;
  cv.width  = Math.round(cw * dpr);
  cv.height = Math.round(ch * dpr);
  ctx.setTransform(cv.width / W, 0, 0, cv.height / H, 0, 0);
  draw();
}
new ResizeObserver(fit).observe(cv);
fit();
</script>
<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    window._userZoom = Z > 1 ? Z : undefined;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + Z + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML     = Z.toFixed(1) + '&#215;';
    rst.style.opacity = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + Z + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
