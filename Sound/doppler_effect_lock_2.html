<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doppler Effect – Moving Observer (Locked)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 600px;
  height: 500px;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  background: #ffffff;
  color: #333333;
  display: flex;
  flex-direction: column;
}

#controls {
  padding: 8px 10px 6px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.row {
  display: flex;
  align-items: center;
  gap: 5px;
  justify-content: center;
}

button {
  padding: 5px 9px;
  border: 1px solid #b0b8c4;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  background: #f0f2f5;
  color: #444;
  transition: all 0.15s;
}
button:hover { background: #dce1e8; border-color: #8894a2; }
button.action {
  background: #2a9d8f;
  border-color: #2a9d8f;
  color: white;
  font-weight: bold;
  padding: 5px 14px;
}
button.action:hover { background: #38b2a3; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.slider-row {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}
.slider-row label {
  font-size: 13px;
  color: #666;
  white-space: nowrap;
}
input[type="range"] {
  width: 180px;
  accent-color: #2563eb;
}
.slider-lbl {
  font-size: 11px;
  color: #aaa;
}
.slider-val {
  font-size: 12px;
  color: #555;
  min-width: 58px;
  font-weight: 600;
}

#info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 8px;
}
#freq-display {
  font-size: 18px;
  font-weight: bold;
  color: #d97706;
  transition: color 0.15s;
  min-width: 190px;
}

canvas { display: block; }
</style>
</head>
<body>

<div id="controls">
  <!-- Row 1: Speed slider -->
  <div class="slider-row">
    <label>Observer speed:</label>
    <input type="range" id="speedSlider" min="0" max="40" value="10" step="1">
    <span class="slider-val" id="speedVal">10 m/s</span>
  </div>

  <!-- Row 2: Frequency readout + action buttons -->
  <div id="info-row">
    <span id="freq-display">Observed f = — Hz</span>
    <div class="row">
      <button class="action" id="startBtn">&#9654; Start</button>
      <button class="action" id="resetBtn">&#x21BA; Reset</button>
    </div>
  </div>
</div>

<canvas id="sim"></canvas>

<script>
// ============================================================
// PHYSICS CONSTANTS
// ============================================================
const WAVE_SPEED      = 120;
const SOURCE_FREQ     = 2;
const SOURCE_PERIOD   = 1 / SOURCE_FREQ;
const MAX_WAVE_RADIUS = 900;

const DISPLAY_SOURCE_FREQ = 622.25;
const BASE_VS_RATIO       = 0.07337;
const BASE_SOURCE_VX      = 60;

const V_SOUND  = 343;
const PX_TO_MS = (BASE_VS_RATIO / BASE_SOURCE_VX) * V_SOUND;

// Source is fixed at center; observer moves across
const SOURCE_Y       = 30;
const SOURCE_X       = 300;
const OBS_START_X    = -60;
const OBS_END_X      = 660;

// ============================================================
// DOM REFERENCES
// ============================================================
const canvas      = document.getElementById('sim');
const ctx         = canvas.getContext('2d');
const freqEl      = document.getElementById('freq-display');
const startBtn    = document.getElementById('startBtn');
const resetBtn    = document.getElementById('resetBtn');
const speedSlider = document.getElementById('speedSlider');
const speedVal    = document.getElementById('speedVal');

// ============================================================
// CANVAS SIZING
// ============================================================
let logW, logH;
function resizeCanvas() {
  const ctrlH = document.getElementById('controls').offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  logW = 600;
  logH = 500 - ctrlH;
  canvas.width  = logW * dpr;
  canvas.height = logH * dpr;
  canvas.style.width  = logW + 'px';
  canvas.style.height = logH + 'px';
  ctx.scale(dpr, dpr);
}
resizeCanvas();

// ============================================================
// SIMULATION STATE
// ============================================================
let simTime        = 0;
let running        = false;
let finished       = false;
let lastTimestamp  = null;
let obsVx          = 10 / PX_TO_MS;   // internal px/s, set from m/s slider
let obsX           = OBS_START_X;
let nextEmitTime   = 0;
let emitFlashTimer = 0;
let waves          = [];

const SMILEY_R = 22;

// ============================================================
// SPEED SLIDER
// ============================================================
speedSlider.addEventListener('input', () => {
  const ms = parseFloat(speedSlider.value);
  obsVx = ms / PX_TO_MS;
  speedVal.textContent = ms.toFixed(0) + ' m/s';
  if (!running && !finished) {
    updateFreqDisplay();
    draw();
  }
});

// ============================================================
// PRE-POPULATE WAVES (all emitted from fixed source)
// ============================================================
function prePopulateWaves() {
  waves = [];
  const maxBackTime = MAX_WAVE_RADIUS / WAVE_SPEED;
  for (let t = -SOURCE_PERIOD; t >= -maxBackTime; t -= SOURCE_PERIOD) {
    const radius = WAVE_SPEED * (0 - t);
    if (radius > MAX_WAVE_RADIUS) break;
    waves.push({ emitTime: t, emitX: SOURCE_X, emitY: SOURCE_Y });
  }
  waves.push({ emitTime: 0, emitX: SOURCE_X, emitY: SOURCE_Y });
  nextEmitTime = SOURCE_PERIOD;
}

// ============================================================
// FREQUENCY CALCULATIONS  (moving observer, stationary source)
// f_obs = f_src * (v_wave + v_obs_toward_src) / v_wave
// ============================================================
function computeObservedFreq() {
  // radial component of observer velocity toward the source
  const dx   = SOURCE_X - obsX;
  const dist = Math.abs(dx);          // dy = 0 (locked)
  if (dist < 1) return SOURCE_FREQ;

  const cosTheta   = dx / dist;       // +1 approaching, -1 receding
  const vObsRadial = obsVx * cosTheta;
  return SOURCE_FREQ * (WAVE_SPEED + vObsRadial) / WAVE_SPEED;
}

function computeDisplayFreq() {
  const dx   = SOURCE_X - obsX;
  const dist = Math.abs(dx);
  if (dist < 1) return DISPLAY_SOURCE_FREQ;

  const cosTheta = dx / dist;
  const voRatio  = BASE_VS_RATIO * (obsVx / BASE_SOURCE_VX);
  return DISPLAY_SOURCE_FREQ * (1 + voRatio * cosTheta);
}

// ============================================================
// START / PAUSE / RESET
// ============================================================
startBtn.addEventListener('click', () => {
  if (finished) return;
  if (running) {
    running = false;
    lastTimestamp = null;
    startBtn.textContent = '\u25B6 Resume';
  } else {
    running = true;
    startBtn.textContent = '\u23F8 Pause';
    speedSlider.disabled = true;
    requestAnimationFrame(gameLoop);
  }
});

resetBtn.addEventListener('click', () => {
  running        = false;
  finished       = false;
  simTime        = 0;
  lastTimestamp  = null;
  obsX           = OBS_START_X;
  emitFlashTimer = 0;

  prePopulateWaves();

  startBtn.textContent = '\u25B6 Start';
  startBtn.disabled    = false;
  speedSlider.disabled = false;

  updateFreqDisplay();
  draw();
});

// ============================================================
// DISPLAY UPDATES
// ============================================================
function updateFreqDisplay() {
  const f = computeDisplayFreq();
  freqEl.textContent = `Observed f\u2080 = ${f.toFixed(0)} Hz`;

  if (f > DISPLAY_SOURCE_FREQ + 2) {
    freqEl.style.color = '#2563eb';
  } else if (f < DISPLAY_SOURCE_FREQ - 2) {
    freqEl.style.color = '#dc2626';
  } else {
    freqEl.style.color = '#d97706';
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (!running) return;

  if (lastTimestamp === null) lastTimestamp = timestamp;
  let dt = (timestamp - lastTimestamp) / 1000;
  dt = Math.min(dt, 0.05);
  lastTimestamp = timestamp;

  simTime        += dt;
  emitFlashTimer  = Math.max(0, emitFlashTimer - dt);

  // Observer moves; source stays fixed
  obsX = OBS_START_X + obsVx * simTime;

  // Emit waves from fixed source position
  while (nextEmitTime <= simTime) {
    waves.push({ emitTime: nextEmitTime, emitX: SOURCE_X, emitY: SOURCE_Y });
    emitFlashTimer = 0.12;
    nextEmitTime  += SOURCE_PERIOD;
  }

  waves = waves.filter(w => WAVE_SPEED * (simTime - w.emitTime) < MAX_WAVE_RADIUS);

  if (obsVx > 0 && obsX > OBS_END_X) {
    running  = false;
    finished = true;
    startBtn.textContent = '\u2713 Done';
    startBtn.disabled    = true;
  }

  updateFreqDisplay();
  draw();

  if (running) requestAnimationFrame(gameLoop);
}

// ============================================================
// DRAWING
// ============================================================
function draw() {
  ctx.clearRect(0, 0, logW, logH);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, logW, logH);

  // Path line
  ctx.beginPath();
  ctx.moveTo(0, SOURCE_Y);
  ctx.lineTo(logW, SOURCE_Y);
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Dashed line from source to observer
  if (obsX > -30 && obsX < logW + 30) {
    ctx.beginPath();
    ctx.moveTo(SOURCE_X, SOURCE_Y);
    ctx.lineTo(obsX, SOURCE_Y);
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Wave fronts (all centered on fixed source)
  for (const w of waves) {
    const radius = WAVE_SPEED * (simTime - w.emitTime);
    if (radius <= 0) continue;
    const alpha = Math.max(0.04, 0.7 - radius / 650);
    ctx.beginPath();
    ctx.arc(w.emitX, w.emitY, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(30,120,220,${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Source (trumpet) — fixed at center
  drawTrumpet(SOURCE_X, SOURCE_Y);

  // Observer (smiley) — moves across the screen
  if (obsX > -50 && obsX < logW + 50) {
    drawSmiley(obsX, SOURCE_Y, SMILEY_R);

    ctx.textAlign = 'center';
    ctx.font = '12px Arial';
    ctx.fillStyle = '#777';
    ctx.fillText('Observer', obsX, SOURCE_Y + SMILEY_R + 14);
  }
}

// ── Trumpet (facing right — bell on right, mouthpiece on left) ─
function drawTrumpet(x, y) {
  const bright = emitFlashTimer > 0;
  ctx.save();
  ctx.translate(x, y);

  const gold  = bright ? '#FFE14D' : '#D4A017';
  const dark  = bright ? '#C8940A' : '#8B6508';
  const shade = '#5a3800';

  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  // ── Body loop ──
  const lx = -3, ly = 14, lrx = 16, lry = 14;

  ctx.beginPath();
  ctx.ellipse(lx, ly, lrx, lry, 0, 0, Math.PI * 2);
  ctx.strokeStyle = dark;
  ctx.lineWidth   = 9.5;
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(lx, ly, lrx, lry, 0, 0, Math.PI * 2);
  ctx.strokeStyle = gold;
  ctx.lineWidth   = 6.5;
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(lx, ly, lrx, lry, 0, Math.PI * 0.65, Math.PI * 1.1);
  ctx.strokeStyle = bright ? 'rgba(255,255,200,0.55)' : 'rgba(255,240,160,0.22)';
  ctx.lineWidth   = 3;
  ctx.stroke();

  // ── Bell (right) ──
  ctx.beginPath();
  ctx.moveTo(10, -4);
  ctx.lineTo(20, -4);
  ctx.lineTo(26, -14);
  ctx.lineTo(32, -14);
  ctx.lineTo(32, 14);
  ctx.lineTo(26, 14);
  ctx.lineTo(20,  4);
  ctx.lineTo(10,  4);
  ctx.closePath();
  ctx.fillStyle   = gold;
  ctx.fill();
  ctx.strokeStyle = dark;
  ctx.lineWidth   = 1.2;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(32, -14);
  ctx.quadraticCurveTo(40, 0, 32, 14);
  ctx.strokeStyle = dark;
  ctx.lineWidth   = 2.5;
  ctx.stroke();

  // ── Main tube ──
  ctx.beginPath();
  ctx.rect(-18, -3.5, 30, 7);
  ctx.fillStyle   = gold;
  ctx.fill();
  ctx.strokeStyle = dark;
  ctx.lineWidth   = 1;
  ctx.stroke();

  // ── 3 valve casings ──
  for (let i = 0; i < 3; i++) {
    const vx = -12 + i * 10;
    ctx.beginPath();
    ctx.rect(vx - 3.5, -15, 7, 13);
    ctx.fillStyle   = dark;
    ctx.fill();
    ctx.strokeStyle = shade;
    ctx.lineWidth   = 0.8;
    ctx.stroke();
    ctx.beginPath();
    ctx.rect(vx - 3, -18, 6, 5);
    ctx.fillStyle   = bright ? '#e8c86a' : '#b8943a';
    ctx.fill();
    ctx.strokeStyle = shade;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(vx, -20, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ccc';
    ctx.fill();
  }

  // ── Leadpipe / mouthpiece ──
  ctx.beginPath();
  ctx.rect(-34, -2.5, 18, 5);
  ctx.fillStyle   = gold;
  ctx.fill();
  ctx.strokeStyle = dark;
  ctx.lineWidth   = 1;
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(-36, 0, 3.5, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle   = bright ? '#ffe97a' : '#c8a020';
  ctx.fill();
  ctx.strokeStyle = dark;
  ctx.lineWidth   = 1;
  ctx.stroke();

  // ── Tube shine ──
  ctx.beginPath();
  ctx.moveTo(-32, -1.5);
  ctx.lineTo(9, -1.5);
  ctx.strokeStyle = bright ? 'rgba(255,255,210,0.70)' : 'rgba(255,240,160,0.28)';
  ctx.lineWidth   = 1.8;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(32, -10);
  ctx.quadraticCurveTo(38, 0, 32, 10);
  ctx.strokeStyle = bright ? 'rgba(255,240,140,0.80)' : 'rgba(255,230,100,0.30)';
  ctx.lineWidth   = 2.5;
  ctx.stroke();

  if (bright) {
    ctx.beginPath();
    ctx.arc(38, 0, 9, -0.7, 0.7);
    ctx.strokeStyle = 'rgba(255,210,80,0.65)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  ctx.restore();
}

// ── Smiley observer ───────────────────────────────────────────
function drawSmiley(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle   = '#f4d35e';
  ctx.fill();
  ctx.strokeStyle = '#c9a227';
  ctx.lineWidth   = 2;
  ctx.stroke();

  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x - 8, y - 6, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 8, y - 6, 3.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x, y + 2, 10, 0.15, Math.PI - 0.15);
  ctx.strokeStyle = '#333';
  ctx.lineWidth   = 2.5;
  ctx.stroke();
}

// ============================================================
// INIT
// ============================================================
prePopulateWaves();
updateFreqDisplay();
draw();
</script>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
</body>
</html>
