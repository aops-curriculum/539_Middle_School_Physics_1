<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ocean Wave Dispersion</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:600px; height:450px; overflow:hidden; background:#061625; font-family:system-ui,sans-serif; }
#wrap { position:relative; width:600px; height:450px; }
canvas { display:block; }

/* ── Control panel ─────────────────────────────── */
#ui {
  position:absolute; bottom:0; left:0; right:0; height:72px;
  background:rgba(3,12,28,.92);
  border-top:1px solid rgba(60,120,180,.38);
  display:flex; align-items:center; gap:18px; padding:0 16px;
}
#btn {
  flex-shrink:0; cursor:pointer;
  background:linear-gradient(155deg,#1870c4,#0c4080);
  color:#fff; border:1px solid rgba(80,165,255,.55);
  border-radius:8px; padding:10px 15px;
  font:600 13px system-ui; white-space:nowrap;
  box-shadow:0 2px 10px rgba(0,0,0,.5);
  transition:filter .15s, transform .1s;
}
#btn:hover:not(:disabled){ filter:brightness(1.25); }
#btn:active:not(:disabled){ transform:scale(.96); }
#btn:disabled{ opacity:.38; cursor:default; }

.sg{ display:flex; flex-direction:column; flex:1; gap:4px; }
.st{ display:flex; justify-content:space-between; align-items:center; }
.sl{ color:#7bc0e8; font:600 10px system-ui; letter-spacing:.7px; text-transform:uppercase; }
.sv{ color:#4de8ff; font:700 11px system-ui; }

input[type=range]{
  width:100%; height:5px; -webkit-appearance:none; appearance:none;
  border-radius:3px; background:#1a4060; cursor:pointer; outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
  background:#40c8f5; border:2px solid #fff;
  box-shadow:0 1px 5px rgba(0,0,0,.5); cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:18px; height:18px; border-radius:50%;
  background:#40c8f5; border:2px solid #fff; border-style:solid;
}
.se{ display:flex; justify-content:space-between; color:rgba(110,170,210,.58); font:9px system-ui; }
</style>
</head>
<body>
<div id="wrap">
<canvas id="c" width="600" height="450"></canvas>
<div id="ui">
  <button id="btn">⚡ Trigger Storm</button>
  <div class="sg">
    <div class="st">
      <span class="sl">Dispersion</span>
      <span class="sv" id="dv">0%</span>
    </div>
    <input type="range" id="ds" min="0" max="100" value="0">
    <div class="se">
      <span>None (all same speed)</span>
      <span>Ocean (long waves faster)</span>
    </div>
  </div>
</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// OCEAN WAVE DISPERSION SIMULATION
//
// Physics model:
//   Each "storm" spawns 6 wave packets, one per wavelength band.
//   Each packet is a Gaussian-windowed sine wave with a fixed envelope width.
//   All packets start at the left edge (xc = 0).
//
//   Packet travel speed:
//     dispersion = 0 →  v = VBASE  (all wavelengths identical, no sorting)
//     dispersion = 1 →  v = VBASE × (λ / λ_mid)^0.9  (long λ faster)
//
//   The exponent 0.9 (instead of the physical 0.5) is intentionally exaggerated
//   so the sorting is clearly visible in the width of a classroom screen.
//
//   Color coding: violet (shortest) → blue → cyan → lime → gold → orange (longest)
// ─────────────────────────────────────────────────────────────────────────────

const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 600, H = 450, CH = 72;
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr; canvas.height = H * dpr;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);
const SY = 195;   // y-coordinate of calm sea level

// Six wave components per storm, ordered short → long wavelength
const DEFS = [
  { lam:15,  sig:28, col:'#9B59FF' },  // violet  — chop
  { lam:30,  sig:33, col:'#4F7EFF' },  // blue
  { lam:50,  sig:40, col:'#3ED0CC' },  // cyan
  { lam:80,  sig:50, col:'#7EDE40' },  // lime
  { lam:130, sig:68, col:'#F0C030' },  // gold
  { lam:190, sig:98, col:'#FF6030' },  // orange  — swell
];
const BASE_AMP = 13;
const VBASE    = 65;                         // px/s when dispersion = 0
const LMID     = Math.sqrt(15 * 190);        // ≈ 53.4 px, geometric mean of range

// Always-present gentle background swell (wrapping sinusoids, no envelope)
const BGW = [
  { lam:350, amp:3.5, spd:24, ph:0.8 },
  { lam:230, amp:2.5, spd:20, ph:2.6 },
  { lam:160, amp:1.8, spd:17, ph:5.1 },
];

let disp = 0;        // 0..1  (controlled by slider)
let storms = [];     // array of storm arrays; each storm = array of 6 components
let elapsed = 0;
let lastTs = null;
let cooldown = 0;
let stormFx = null;  // brief whirlwind icon: { alpha, life }

const canoe = {
  stress:     0,           // accumulated rough-water exposure
  flipAngle:  0,           // 0 = upright, Math.PI = fully capsized
  state:      'upright',   // 'upright' | 'capsizing' | 'capsized' | 'recovering'
  recoverTimer: 0,
};

// ── Physics helpers ───────────────────────────────────────────────────────────

function vspeed(lam) {
  // Returns propagation speed of the envelope center for a given wavelength.
  if (disp < 1e-4) return VBASE;
  return VBASE * Math.pow(lam / LMID, 0.9 * disp);
}

function spawnStorm() {
  if (storms.length >= 5) storms.shift();   // cap simultaneous storms
  storms.push(
    DEFS.map(d => ({
      lam: d.lam,
      sig: d.sig,
      col: d.col,
      amp: BASE_AMP * (0.8 + Math.random() * 0.35),   // slight random variation
      ph:  Math.random() * Math.PI * 2,                 // random initial phase
      xc:  0                                            // start at left edge
    }))
  );
}

function update(dt) {
  elapsed += dt;
  // Advance each component's envelope center
  storms.forEach(s => s.forEach(c => { c.xc += vspeed(c.lam) * dt; }));
  // Remove storms where all components have left the screen
  storms = storms.filter(s => s.some(c => c.xc < W + 300));
  // Decay the whirlwind icon
  if (stormFx) {
    stormFx.life -= dt / 1.4;
    stormFx.alpha = Math.max(0, stormFx.life);
    if (stormFx.life <= 0) stormFx = null;
  }

  // ── Canoe capsize logic ────────────────────────────────────────────────────
  if (canoe.state === 'upright') {
    const roughness = Math.abs(waveDisp(548));
    if (roughness > 7) {
      canoe.stress += dt * (roughness / 10);   // accumulate faster in bigger waves
    } else {
      canoe.stress = Math.max(0, canoe.stress - dt * 0.4);  // calm decay
    }
    if (canoe.stress > 5) {
      canoe.state = 'capsizing';
      canoe.stress = 0;
    }
  } else if (canoe.state === 'capsizing') {
    canoe.flipAngle += dt * Math.PI / 1.1;    // roll over in ~1.1 s
    if (canoe.flipAngle >= Math.PI) {
      canoe.flipAngle = Math.PI;
      canoe.state = 'capsized';
      canoe.recoverTimer = 9;
    }
  } else if (canoe.state === 'capsized') {
    canoe.recoverTimer -= dt;
    if (canoe.recoverTimer <= 0) canoe.state = 'recovering';
  } else if (canoe.state === 'recovering') {
    canoe.flipAngle -= dt * Math.PI / 1.4;    // right itself in ~1.4 s
    if (canoe.flipAngle <= 0) {
      canoe.flipAngle = 0;
      canoe.state = 'upright';
    }
  }
}

function waveDisp(x) {
  // Returns total upward surface displacement at pixel x  (positive = crest)
  let h = 0;
  // Background ambient swell
  BGW.forEach(w => {
    h += w.amp * Math.sin(2 * Math.PI * x / w.lam
                          - 2 * Math.PI * w.spd * elapsed / w.lam + w.ph);
  });
  // Storm wave packets
  storms.forEach(s => s.forEach(c => {
    const dx = x - c.xc;
    const env = Math.exp(-dx * dx / (2 * c.sig * c.sig));
    if (env < 4e-4) return;    // skip negligible contributions (fast path)
    h += c.amp * env * Math.sin(2 * Math.PI * dx / c.lam + c.ph);
  }));
  return h;
}

function drawCanoe(prof) {
  const CX = 548;
  const xi = Math.max(4, Math.min(W - 5, CX));
  const wy = prof[xi];
  const waveAngle = Math.atan2(prof[xi + 12] - prof[xi - 12], 24);

  // ── Floating paddler (visible once canoe has tipped past halfway) ──────────
  if (canoe.flipAngle > Math.PI * 0.45) {
    const alpha = Math.min(1, (canoe.flipAngle - Math.PI * 0.45) / (Math.PI * 0.3));
    cx.save();
    cx.globalAlpha = alpha;
    cx.translate(CX - 34, wy + 4);
    // body
    cx.beginPath(); cx.ellipse(0, 0, 9, 4, 0.15, 0, Math.PI * 2);
    cx.fillStyle = '#2a1a0a'; cx.fill();
    // head
    cx.beginPath(); cx.arc(9, -4, 3.5, 0, Math.PI * 2);
    cx.fill();
    // arms splashing
    cx.beginPath();
    cx.moveTo(-6, -2); cx.lineTo(-14, -7);
    cx.moveTo( 4, -2); cx.lineTo(12,  -7);
    cx.strokeStyle = '#2a1a0a'; cx.lineWidth = 2; cx.stroke();
    cx.restore();
  }

  // ── Canoe hull ─────────────────────────────────────────────────────────────
  cx.save();
  cx.translate(CX, wy);
  cx.rotate(waveAngle + canoe.flipAngle);

  // Hull body — pointed at both ends
  cx.beginPath();
  cx.moveTo(-24, 2);
  cx.bezierCurveTo(-24, -8, -10, -11, 0, -11);
  cx.bezierCurveTo( 10, -11,  24,  -8, 24, 2);
  cx.bezierCurveTo( 17,  6,  -17,   6, -24, 2);
  cx.closePath();
  cx.fillStyle = '#9B6535';
  cx.fill();
  cx.strokeStyle = '#4f2e0e';
  cx.lineWidth = 1.2;
  cx.stroke();

  // Gunwale highlight
  cx.beginPath();
  cx.moveTo(-22, 1);
  cx.bezierCurveTo(-14, -8, 14, -8, 22, 1);
  cx.strokeStyle = 'rgba(220,170,90,.55)';
  cx.lineWidth = 1;
  cx.stroke();

  // Interior shadow (only visible when upright)
  if (canoe.flipAngle < Math.PI * 0.5) {
    cx.beginPath();
    cx.moveTo(-16, 0);
    cx.bezierCurveTo(-10, -7, 10, -7, 16, 0);
    cx.bezierCurveTo( 10,  2, -10,  2, -16, 0);
    cx.fillStyle = 'rgba(40,18,4,.35)';
    cx.fill();
  }

  // Seated paddler (fades out as canoe tips)
  if (canoe.flipAngle < Math.PI * 0.35) {
    const a = 1 - canoe.flipAngle / (Math.PI * 0.35);
    cx.globalAlpha = a;
    cx.fillStyle = '#2a1a0a';
    cx.fillRect(-3, -19, 6, 9);
    cx.beginPath(); cx.arc(0, -22, 4, 0, Math.PI * 2); cx.fill();
    cx.beginPath();
    cx.moveTo(-14, -18); cx.lineTo(14, -18);
    cx.strokeStyle = '#5a3010'; cx.lineWidth = 2; cx.stroke();
    cx.fillStyle = '#7a4820';
    cx.fillRect(-18, -21, 5, 7);
    cx.fillRect( 13, -21, 5, 7);
    cx.globalAlpha = 1;
  }

  cx.restore();
}

// ── Rendering ─────────────────────────────────────────────────────────────────

// Rounded-rectangle path helper (call after cx.beginPath())
function rrect(x, y, w, h, r) {
  cx.moveTo(x+r, y);
  cx.lineTo(x+w-r, y); cx.quadraticCurveTo(x+w, y,   x+w, y+r);
  cx.lineTo(x+w, y+h-r); cx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  cx.lineTo(x+r, y+h); cx.quadraticCurveTo(x,   y+h, x,   y+h-r);
  cx.lineTo(x, y+r); cx.quadraticCurveTo(x,   y,   x+r, y);
  cx.closePath();
}

function render() {
  cx.clearRect(0, 0, W, H);

  // ── Sky ──────────────────────────────────────────────────────────────────
  const skyG = cx.createLinearGradient(0, 0, 0, SY + 45);
  skyG.addColorStop(0,   '#3a6a88');
  skyG.addColorStop(0.5, '#5898b8');
  skyG.addColorStop(1,   '#90c8e0');
  cx.fillStyle = skyG;
  cx.fillRect(0, 0, W, SY + 45);

  // Sun glow
  const sunG = cx.createRadialGradient(72, 44, 5, 72, 44, 60);
  sunG.addColorStop(0, 'rgba(255,242,165,.65)');
  sunG.addColorStop(1, 'rgba(255,242,165,0)');
  cx.beginPath(); cx.arc(72, 44, 60, 0, Math.PI * 2);
  cx.fillStyle = sunG; cx.fill();

  // ── Wave profile (computed pixel by pixel) ────────────────────────────────
  const prof = new Float32Array(W);
  for (let x = 0; x < W; x++) {
    // Clamp so waves don't eat into the sky or the control panel
    prof[x] = Math.max(SY - 65, Math.min(H - CH - 5, SY - waveDisp(x)));
  }

  // ── Ocean fill ────────────────────────────────────────────────────────────
  cx.beginPath();
  cx.moveTo(0, prof[0]);
  for (let x = 1; x < W; x++) cx.lineTo(x, prof[x]);
  cx.lineTo(W, H - CH); cx.lineTo(0, H - CH);
  cx.closePath();

  const oceG = cx.createLinearGradient(0, SY - 10, 0, H - CH);
  oceG.addColorStop(0,    '#2c9ed6');
  oceG.addColorStop(0.05, '#1870a0');
  oceG.addColorStop(0.28, '#0d4668');
  oceG.addColorStop(1,    '#061420');
  cx.fillStyle = oceG; cx.fill();

  // Surface highlight
  cx.beginPath();
  cx.moveTo(0, prof[0]);
  for (let x = 1; x < W; x++) cx.lineTo(x, prof[x]);
  cx.strokeStyle = 'rgba(190,235,255,.5)'; cx.lineWidth = 1.5; cx.stroke();

  // Foam caps on crest peaks
  cx.fillStyle = 'rgba(255,255,255,.28)';
  for (let x = 2; x < W - 2; x++) {
    const elev = SY - prof[x];   // positive when wave is above calm level
    if (elev > 8 && prof[x] < prof[x-1] && prof[x] < prof[x+1]) {
      cx.beginPath();
      cx.ellipse(x, prof[x] - 1, 3 + elev * 0.10, 1.4, 0, 0, Math.PI * 2);
      cx.fill();
    }
  }

  // ── Canoe (rides the wave surface on the far right) ──────────────────────
  drawCanoe(prof);

  // ── Wave-packet tracker dots ──────────────────────────────────────────────
  // Each colored dot rides at the CENTER of its wave-packet envelope.
  // At zero dispersion all dots stay together; at high dispersion they fan out.
  storms.forEach(s => s.forEach(c => {
    const sx = c.xc;
    if (sx < -20 || sx > W + 20) return;
    const xi = Math.max(0, Math.min(W - 1, Math.round(sx)));
    const sy = prof[xi] - 17;

    // Soft glow halo
    const gl = cx.createRadialGradient(sx, sy, 1, sx, sy, 13);
    gl.addColorStop(0, c.col + 'bb');
    gl.addColorStop(1, c.col + '00');
    cx.beginPath(); cx.arc(sx, sy, 13, 0, Math.PI * 2);
    cx.fillStyle = gl; cx.fill();

    // Solid core
    cx.beginPath(); cx.arc(sx, sy, 5.5, 0, Math.PI * 2);
    cx.fillStyle = c.col; cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,.8)'; cx.lineWidth = 1.5; cx.stroke();
  }));

  // ── Legend (top-right, compact & subtle when storms are active) ──────────────
  if (storms.length > 0) {
    const LX = W - 108, LY = 12, LW = 100, LH = DEFS.length * 14 + 10;

    cx.beginPath(); rrect(LX, LY, LW, LH, 6);
    cx.fillStyle = 'rgba(3,12,28,.45)'; cx.fill();
    cx.strokeStyle = 'rgba(60,120,180,.22)'; cx.lineWidth = 1; cx.stroke();

    DEFS.forEach((d, i) => {
      const ry = LY + 7 + i * 14;
      cx.fillStyle = d.col;
      cx.fillRect(LX + 7, ry, 7, 7);
      cx.fillStyle = 'rgba(185,225,252,.65)';
      cx.font = '8px system-ui'; cx.textAlign = 'left';
      const tag = d.lam < 40 ? ' chop' : d.lam > 120 ? ' swell' : '';
      cx.fillText(`λ ${d.lam}px${tag}`, LX + 17, ry + 6.5);
    });
  }

  // ── Storm-origin whirlwind (fades in briefly on click) ────────────────────
  if (stormFx) {
    cx.save();
    cx.globalAlpha = stormFx.alpha * 0.9;
    cx.font = '30px system-ui';
    cx.textAlign = 'center';
    cx.fillText('⛈️', 26, SY - 22);
    cx.restore();
  }
  cx.textAlign = 'center';
  if (storms.length === 0) {
    cx.fillStyle = 'rgba(255,255,255,.42)';
    cx.font = '13px system-ui';
    cx.fillText('Click ⚡ Trigger Storm to launch a wave burst', W / 2, 58);
  } else if (disp < 0.05) {
    cx.fillStyle = 'rgba(210,240,255,.55)';
    cx.font = '12px system-ui';
    cx.fillText('Dispersion OFF — all wavelengths travel together', W / 2, 56);
  }
}

// ── Animation loop ────────────────────────────────────────────────────────────

function frame(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);  // cap at 50 ms (handles tab switch)
  lastTs = ts;

  cooldown = Math.max(0, cooldown - dt);
  document.getElementById('btn').disabled = cooldown > 0;

  update(dt);
  render();
  requestAnimationFrame(frame);
}

// ── Controls ──────────────────────────────────────────────────────────────────

document.getElementById('btn').addEventListener('click', () => {
  if (cooldown > 0) return;
  spawnStorm();
  stormFx = { alpha: 1.0, life: 1.0 };
  cooldown = 0.6;
});

document.getElementById('ds').addEventListener('input', e => {
  disp = e.target.value / 100;
  document.getElementById('dv').textContent = Math.round(disp * 100) + '%';
  // Fill track to show current position
  const pct = Math.round(disp * 100);
  e.target.style.background =
    `linear-gradient(90deg, #2090d8 ${pct}%, #1a4060 ${pct}%)`;
});

// Initialize slider track fill
document.getElementById('ds').style.background =
  'linear-gradient(90deg, #2090d8 0%, #1a4060 0%)';

requestAnimationFrame(frame);
</script>
</body>
</html>
