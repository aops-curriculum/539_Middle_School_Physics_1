<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Standing Waves on a String</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 600px; height: 500px; overflow: hidden;
  font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #dde5ef;
  color: #1a3050;
}
body {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding: 11px 16px 9px;
  gap: 7px;
}
#canvas-string {
  display: block;
  border-radius: 8px;
  border: 1px solid rgba(40,90,150,0.18);
  background: #f2f6fb;
  flex-shrink: 0;
}
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.ctrl-label {
  font-size: 11px;
  color: #5a7a94;
  white-space: nowrap;
  min-width: 62px;
}
input[type=range] {
  flex: 1;
  accent-color: #1e5f96;
  cursor: pointer;
  height: 4px;
  transition: accent-color 0.25s;
}
.ctrl-value {
  font-size: 13px;
  font-weight: 700;
  color: #1e5f96;
  min-width: 58px;
  text-align: right;
  transition: color 0.25s;
}
</style>
</head>
<body>

<canvas id="canvas-string" width="568" height="238"></canvas>
<div class="ctrl-row">
  <span class="ctrl-label">Frequency</span>
  <input type="range" id="freq-slider" min="0" max="5" step="0.02" value="0">
  <span class="ctrl-value" id="freq-val">0.00 Hz</span>
</div>

<script>
// Physics
// L = 2.1 m, v = 4.2 m/s → f_n = n * v / (2L) = n * 1.0 Hz
const L_M   = 2.1;
const V_MS  = 4.2;   // → f_n = n × 1.26 Hz  (1.26, 2.52, 3.78 Hz in slider range)
const N_MAX = 5;
const F_RES = [1, 2, 3, 4, 5].map(n => +(n * V_MS / (2 * L_M)).toFixed(4));
// ≈ [1.26, 2.52, 3.78, 5.04, 6.30] — modes 1–3 fall within the 0–5 Hz slider
const GAMMA  = 0.08;
const AMP_PX = 78;

// Off-resonance noise oscillators
const noiseOscs = Array.from({length: 10}, (_, i) => ({
  n:         6 + i,
  freqDelta: (Math.random() - 0.5) * 0.40,
  phase:     Math.random() * Math.PI * 2,
  relAmp:    (0.5 + Math.random() * 0.7) / Math.sqrt(6 + i)
}));
const NOISE_AMP = 24;

const cvStr = document.getElementById('canvas-string');
const cxStr = cvStr.getContext('2d');
const dpr = window.devicePixelRatio || 1;
const logW = 568, logH = 238;
cvStr.width = logW * dpr; cvStr.height = logH * dpr;
cvStr.style.width = logW + 'px'; cvStr.style.height = logH + 'px';
cxStr.scale(dpr, dpr);
let freq = 0;
let simTime = 0;

function lorentz(f, fn) {
  const d = f - fn;
  return (GAMMA * GAMMA) / (d * d + GAMMA * GAMMA);
}

function modeAmp(f, n) {
  if (f <= 0) return 0;
  return lorentz(f, F_RES[n - 1]) * AMP_PX;
}

// Continuously interpolate between blue (t=0) and amber (t=1).
// t is the raw Lorentzian factor (0..1), so full gold only at exact resonance.
function resonanceColor(t, alpha = 1) {
  const r = Math.round(30  + t * (192 - 30));
  const g = Math.round(95  + t * (120 - 95));
  const b = Math.round(150 + t * (0   - 150));
  return `rgba(${r},${g},${b},${alpha})`;
}

document.getElementById('freq-slider').addEventListener('input', e => {
  freq = parseFloat(e.target.value);
});

// ─── String canvas ────────────────────────────────────────────────────────────
function drawString() {
  const W = logW, H = logH;
  cxStr.clearRect(0, 0, W, H);

  // Light background
  cxStr.fillStyle = '#f2f6fb';
  cxStr.fillRect(0, 0, W, H);

  const CY  = Math.round(H / 2) + 4;
  const PAD = 44;          // extra left pad to give room for the driver graphic
  const SW  = W - PAD - 32;
  const NPTS = 420;

  const amps = F_RES.map((_, i) => modeAmp(freq, i + 1));
  const totalPeak = amps.reduce((s, a) => s + a, 0);

  let domMode = 0, domAmp = 0;
  amps.forEach((a, i) => { if (a > domAmp) { domAmp = a; domMode = i + 1; } });

  const maxRes = domAmp / AMP_PX;                  // 0..1, peaks at 1 only at exact resonance
  const isResonant = maxRes > 0.65;                // strict threshold: node markers etc.
  const color = resonanceColor(maxRes);            // continuously interpolated
  const resonanceFade = Math.pow(Math.max(0, 1 - maxRes * 3.5), 2.2);
  const freqTaper = Math.min(1, freq / 0.7);
  const noiseWeight = resonanceFade * freqTaper;

  // Build points
  const pts    = new Array(NPTS + 1);
  const envPos = new Array(NPTS + 1);
  const envNeg = new Array(NPTS + 1);

  for (let i = 0; i <= NPTS; i++) {
    const xn = i / NPTS;
    let y = 0, env = 0;
    if (freq > 0) {
      for (let n = 1; n <= N_MAX; n++) {
        const a = amps[n - 1];
        const spatial = Math.sin(n * Math.PI * xn);
        y   += a * spatial * Math.sin(2 * Math.PI * freq * simTime);
        env += a * Math.abs(spatial);
      }
      if (noiseWeight > 0.01) {
        for (const osc of noiseOscs) {
          y += osc.relAmp * noiseWeight * NOISE_AMP
             * Math.sin(osc.n * Math.PI * xn)
             * Math.sin(2 * Math.PI * (freq + osc.freqDelta) * simTime + osc.phase);
        }
      }
    }
    const px = PAD + xn * SW;
    pts[i]    = [px, CY - y];
    envPos[i] = [px, CY - env];
    envNeg[i] = [px, CY + env];
  }

  // Equilibrium dashed line
  cxStr.save();
  cxStr.setLineDash([4, 8]);
  cxStr.strokeStyle = 'rgba(40,90,150,0.18)';
  cxStr.lineWidth = 1;
  cxStr.beginPath();
  cxStr.moveTo(PAD, CY);
  cxStr.lineTo(PAD + SW, CY);
  cxStr.stroke();
  cxStr.restore();

  // Envelope fill
  if (totalPeak > 4) {
    const alpha = Math.min(0.18, totalPeak / AMP_PX * 0.22);
    cxStr.save();
    cxStr.globalAlpha = alpha;
    cxStr.beginPath();
    cxStr.moveTo(envPos[0][0], envPos[0][1]);
    for (let i = 1; i <= NPTS; i++) cxStr.lineTo(envPos[i][0], envPos[i][1]);
    for (let i = NPTS; i >= 0; i--) cxStr.lineTo(envNeg[i][0], envNeg[i][1]);
    cxStr.closePath();
    cxStr.fillStyle = color;
    cxStr.fill();
    cxStr.restore();

    if (isResonant) {
      cxStr.save();
      cxStr.globalAlpha = 0.3;
      cxStr.setLineDash([3, 6]);
      cxStr.strokeStyle = color;
      cxStr.lineWidth = 1;
      cxStr.beginPath();
      cxStr.moveTo(envPos[0][0], envPos[0][1]);
      for (let i = 1; i <= NPTS; i++) cxStr.lineTo(envPos[i][0], envPos[i][1]);
      cxStr.stroke();
      cxStr.beginPath();
      cxStr.moveTo(envNeg[0][0], envNeg[0][1]);
      for (let i = 1; i <= NPTS; i++) cxStr.lineTo(envNeg[i][0], envNeg[i][1]);
      cxStr.stroke();
      cxStr.restore();
    }
  }

  // String line
  cxStr.beginPath();
  cxStr.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i <= NPTS; i++) cxStr.lineTo(pts[i][0], pts[i][1]);
  const sg = cxStr.createLinearGradient(PAD, 0, PAD + SW, 0);
  sg.addColorStop(0,    resonanceColor(maxRes, 0));
  sg.addColorStop(0.03, resonanceColor(maxRes, 1));
  sg.addColorStop(0.97, resonanceColor(maxRes, 1));
  sg.addColorStop(1,    resonanceColor(maxRes, 0));
  cxStr.strokeStyle = sg;
  cxStr.lineWidth   = isResonant ? 2.8 : 2.2;
  cxStr.lineJoin    = 'round';
  cxStr.stroke();

  // Node / antinode markers at resonance
  if (isResonant) {
    cxStr.fillStyle = 'rgba(192,120,0,0.8)';
    for (let k = 0; k <= domMode; k++) {
      const nx = PAD + (k / domMode) * SW;
      cxStr.beginPath();
      cxStr.arc(nx, CY, 4, 0, Math.PI * 2);
      cxStr.fill();
    }
  }

  // ── Hand graphic (pivots at left anchor, covering it) ────────────────────
  // Rotates at the driving frequency to show the string is being driven.
  const MAX_ROT = 0.22;  // radians (~12.5°)
  const handAngle = freq > 0
    ? MAX_ROT * Math.sin(2 * Math.PI * freq * simTime)
    : 0;

  const SKIN  = '#f0ad72';
  const SKIN2 = '#b8713a';

  cxStr.save();
  cxStr.globalAlpha = freq > 0 ? 1 : 0.38;
  cxStr.setLineDash([]);
  cxStr.lineCap = 'round';
  cxStr.lineJoin = 'round';

  // Pivot transform: everything drawn in local coords around the anchor point
  cxStr.translate(PAD, CY);
  cxStr.rotate(handAngle);

  // Thumb – protrudes from the bottom-right of the palm toward the anchor
  cxStr.beginPath();
  cxStr.ellipse(-4, 7, 7, 4, 0.3, 0, Math.PI * 2);
  cxStr.fillStyle = SKIN;
  cxStr.fill();
  cxStr.strokeStyle = SKIN2;
  cxStr.lineWidth = 0.9;
  cxStr.stroke();

  // Palm body – right edge sits at x≈0, covering the anchor
  cxStr.beginPath();
  cxStr.roundRect(-23, -7, 22, 17, [3, 6, 6, 3]);
  cxStr.fillStyle = SKIN;
  cxStr.fill();
  cxStr.strokeStyle = SKIN2;
  cxStr.lineWidth = 1;
  cxStr.stroke();

  // Four finger bumps along the top edge
  for (let k = 0; k < 4; k++) {
    const fx = -19.5 + k * 5;
    cxStr.beginPath();
    cxStr.arc(fx, -7, 3.4, 0, Math.PI, true);
    cxStr.closePath();
    cxStr.fillStyle = SKIN;
    cxStr.fill();
    cxStr.beginPath();
    cxStr.arc(fx, -7, 3.4, 0, Math.PI, true);
    cxStr.strokeStyle = SKIN2;
    cxStr.lineWidth = 0.9;
    cxStr.stroke();
  }

  cxStr.restore();

  // Label – drawn in canvas coords so it doesn't rotate with the hand
  cxStr.save();
  cxStr.font = 'bold 9px system-ui';
  cxStr.fillStyle = color;
  cxStr.globalAlpha = freq > 0 ? 0.85 : 0.35;
  cxStr.textAlign = 'center';
  cxStr.fillText('hand', PAD - 12, CY + 26);
  cxStr.restore();

  // Fixed-end wall pins – only the right anchor (left is covered by the hand)
  const pinColor = color;
  for (const ax of [PAD + SW]) {
    cxStr.beginPath();
    cxStr.arc(ax, CY, 5, 0, Math.PI * 2);
    cxStr.fillStyle = pinColor;
    cxStr.fill();
    cxStr.strokeStyle = '#f2f6fb';
    cxStr.lineWidth = 1.5;
    cxStr.stroke();
  }

  // Tick marks at quarter lengths
  cxStr.fillStyle = 'rgba(40,90,150,0.28)';
  for (let t4 = 1; t4 <= 3; t4++) {
    const tx = PAD + (t4 / 4) * SW;
    cxStr.fillRect(tx - 0.5, CY + 12, 1, 5);
  }

  // Length label at canvas bottom
  cxStr.font = '11px system-ui';
  cxStr.fillStyle = 'rgba(40,90,150,0.5)';
  cxStr.textAlign = 'center';
  cxStr.fillText('L = 2.1 m', PAD + SW / 2, H - 6);

  return { domMode, domAmp, isResonant };
}

const sliderEl  = document.getElementById('freq-slider');
const freqValEl = document.getElementById('freq-val');

function updateUI(domMode, domAmp, isResonant) {
  freqValEl.textContent = freq.toFixed(2) + ' Hz';
  const c = resonanceColor(domAmp / AMP_PX);
  sliderEl.style.accentColor = c;
  freqValEl.style.color      = c;
}

function loop(ts) {
  simTime = ts / 1000;
  const { domMode, domAmp, isResonant } = drawString();
  updateUI(domMode, domAmp, isResonant);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
