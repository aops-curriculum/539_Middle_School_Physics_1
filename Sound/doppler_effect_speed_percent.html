<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doppler Effect – Speed %</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 600px;
  height: 500px;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  background: #ffffff;
  color: #333333;
  display: flex;
  flex-direction: column;
}

#controls {
  padding: 8px 10px 6px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.row {
  display: flex;
  align-items: center;
  gap: 5px;
  justify-content: center;
}

button {
  padding: 5px 9px;
  border: 1px solid #b0b8c4;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  background: #f0f2f5;
  color: #444;
  transition: all 0.15s;
}
button:hover { background: #dce1e8; border-color: #8894a2; }
button.action {
  background: #2a9d8f;
  border-color: #2a9d8f;
  color: white;
  font-weight: bold;
  padding: 5px 14px;
}
button.action:hover { background: #38b2a3; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.slider-row {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}
.slider-row label {
  font-size: 13px;
  color: #666;
  white-space: nowrap;
}
input[type="range"] {
  width: 160px;
  accent-color: #2563eb;
}
.slider-lbl {
  font-size: 11px;
  color: #aaa;
}
.slider-val {
  font-size: 12px;
  color: #555;
  min-width: 100px;
  font-weight: 600;
}

#info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 8px;
}
#freq-display {
  font-size: 18px;
  font-weight: bold;
  color: #d97706;
  transition: color 0.15s;
  min-width: 190px;
}

canvas { display: block; }
</style>
</head>
<body>

<div id="controls">
  <!-- Row 1: Speed slider (% of speed of sound) -->
  <div class="slider-row">
    <label>Source speed:</label>
    <span class="slider-lbl">0%</span>
    <input type="range" id="speedSlider" min="0" max="100" value="50" step="5">
    <span class="slider-lbl">100%</span>
    <span class="slider-val" id="speedVal">50% (172 m/s)</span>
  </div>

  <!-- Row 2: Frequency readout + action buttons -->
  <div id="info-row">
    <span id="freq-display">Observed f&#x2080; = 622 Hz</span>
    <div class="row">
      <button class="action" id="startBtn">&#9654; Start</button>
      <button class="action" id="resetBtn">&#x21BA; Reset</button>
    </div>
  </div>
</div>

<canvas id="sim"></canvas>

<script>
// ============================================================
// PHYSICS CONSTANTS
// ============================================================
const WAVE_SPEED      = 120;   // px/s — also the visual "speed of sound"
const SOURCE_FREQ     = 2;
const SOURCE_PERIOD   = 1 / SOURCE_FREQ;
const MAX_WAVE_RADIUS = 900;

const DISPLAY_SOURCE_FREQ = 622.25;  // Hz
const V_SOUND             = 343;     // m/s (real-world)

const SOURCE_Y       = 30;
const SOURCE_START_X = -140;
const SOURCE_END_X   = 660;
// Draw icon left of emission point so Mach-1 stacked fronts sit to the right of the horn.
const SPEAKER_DRAW_OFFSET = 26;

// ============================================================
// DOM REFERENCES
// ============================================================
const canvas      = document.getElementById('sim');
const ctx         = canvas.getContext('2d');
const freqEl      = document.getElementById('freq-display');
const startBtn    = document.getElementById('startBtn');
const resetBtn    = document.getElementById('resetBtn');
const speedSlider = document.getElementById('speedSlider');
const speedVal    = document.getElementById('speedVal');

// ============================================================
// CANVAS SIZING
// ============================================================
let logW, logH;
function resizeCanvas() {
  const ctrlH = document.getElementById('controls').offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  logW = 600;
  logH = 500 - ctrlH;
  canvas.width  = logW * dpr;
  canvas.height = logH * dpr;
  canvas.style.width  = logW + 'px';
  canvas.style.height = logH + 'px';
  ctx.scale(dpr, dpr);
}
resizeCanvas();

// ============================================================
// SIMULATION STATE
// ============================================================
let simTime        = 0;
let running        = false;
let finished       = false;
let lastTimestamp  = null;
let machPercent    = 50;                         // slider value: 0–100
let sourceVx       = (machPercent / 100) * WAVE_SPEED;  // px/s
let sourceX        = SOURCE_START_X;
let nextEmitTime   = 0;
let emitFlashTimer = 0;
let waves          = [];

// Observer – vertical strip (x fixed, y draggable)
const SMILEY_R   = 22;
const OBSERVER_X = 300;
const OBS_MIN_Y  = SOURCE_Y;
function obsMaxY() { return logH - 50; }

let observerY  = logH * 0.60;
let isDragging = false;
let hasDragged = false;

// ============================================================
// SPEED DISPLAY HELPER
// ============================================================
function speedLabel(pct) {
  const vReal = (pct / 100) * V_SOUND;
  return `${pct}% (${vReal.toFixed(0)} m/s)`;
}

// ============================================================
// OBSERVER ZONE HELPERS
// ============================================================
function clampObserver(y) {
  return Math.max(OBS_MIN_Y, Math.min(obsMaxY(), y));
}

// ============================================================
// SPEED SLIDER
// ============================================================
speedSlider.addEventListener('input', () => {
  machPercent = parseFloat(speedSlider.value);
  sourceVx    = (machPercent / 100) * WAVE_SPEED;
  speedVal.textContent = speedLabel(machPercent);
  if (!running && !finished) {
    prePopulateWaves();
    updateFreqDisplay();
    draw();
  }
});

// ============================================================
// OBSERVER DRAG (mouse)
// ============================================================
function hitTestObserver(mx, my) {
  const dx = mx - OBSERVER_X;
  const dy = my - observerY;
  return Math.sqrt(dx * dx + dy * dy) < SMILEY_R + 8;
}

canvas.addEventListener('mousedown', e => {
  if (running) return;
  const r = canvas.getBoundingClientRect();
  if (hitTestObserver((e.clientX - r.left) * canvas.clientWidth / r.width, (e.clientY - r.top) * canvas.clientHeight / r.height)) {
    isDragging = hasDragged = true;
    e.preventDefault();
  }
});

canvas.addEventListener('mousemove', e => {
  const r  = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * canvas.clientWidth / r.width;
  const my = (e.clientY - r.top) * canvas.clientHeight / r.height;
  canvas.style.cursor = (!running && hitTestObserver(mx, my)) ? 'grab' : 'default';
  if (isDragging) canvas.style.cursor = 'grabbing';
  if (!isDragging) return;
  observerY = clampObserver(my);
  updateFreqDisplay();
  if (!running) draw();
});

canvas.addEventListener('mouseup',    () => { isDragging = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; });

// ============================================================
// OBSERVER DRAG (touch)
// ============================================================
canvas.addEventListener('touchstart', e => {
  if (running) return;
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  if (hitTestObserver((t.clientX - r.left) * canvas.clientWidth / r.width, (t.clientY - r.top) * canvas.clientHeight / r.height)) {
    isDragging = hasDragged = true;
    e.preventDefault();
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const r = canvas.getBoundingClientRect();
  observerY = clampObserver((e.touches[0].clientY - r.top) * canvas.clientHeight / r.height);
  updateFreqDisplay();
  if (!running) draw();
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', () => { isDragging = false; });

// ============================================================
// PRE-POPULATE WAVES
// ============================================================
function prePopulateWaves() {
  waves = [];
  const maxBackTime = MAX_WAVE_RADIUS / WAVE_SPEED;
  for (let t = -SOURCE_PERIOD; t >= -maxBackTime; t -= SOURCE_PERIOD) {
    if (WAVE_SPEED * (-t) > MAX_WAVE_RADIUS) break;
    waves.push({ emitTime: t, emitX: SOURCE_START_X + sourceVx * t, emitY: SOURCE_Y });
  }
  waves.push({ emitTime: 0, emitX: SOURCE_START_X, emitY: SOURCE_Y });
  nextEmitTime = SOURCE_PERIOD;
}

// ============================================================
// FREQUENCY CALCULATIONS
// ============================================================
// mach = sourceVx / WAVE_SPEED = machPercent / 100
// This is the exact Mach number, so the display formula is clean:
//   f_obs = f_source / (1 − mach × cos θ)

function computeObservedFreq() {
  const dx   = OBSERVER_X - sourceX;
  const dy   = observerY - SOURCE_Y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 1) return SOURCE_FREQ;
  const vRadial = sourceVx * (dx / dist);
  const denom   = WAVE_SPEED - vRadial;
  if (denom < 5) return SOURCE_FREQ * WAVE_SPEED / 5;
  return SOURCE_FREQ * WAVE_SPEED / denom;
}

function computeDisplayFreq() {
  const dx   = OBSERVER_X - sourceX;
  const dy   = observerY - SOURCE_Y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 1) return DISPLAY_SOURCE_FREQ;
  const cosTheta = dx / dist;
  const mach     = sourceVx / WAVE_SPEED;   // = machPercent / 100
  const denom    = 1 - mach * cosTheta;
  if (denom < 0.01) return DISPLAY_SOURCE_FREQ / 0.01;
  return DISPLAY_SOURCE_FREQ / denom;
}

// ============================================================
// START / PAUSE / RESET
// ============================================================
startBtn.addEventListener('click', () => {
  if (finished) return;
  if (running) {
    running = false;
    lastTimestamp = null;
    startBtn.textContent = '\u25B6 Resume';
  } else {
    running = true;
    startBtn.textContent = '\u23F8 Pause';
    speedSlider.disabled = true;
    requestAnimationFrame(gameLoop);
  }
});

resetBtn.addEventListener('click', () => {
  running        = false;
  finished       = false;
  simTime        = 0;
  lastTimestamp  = null;
  sourceX        = SOURCE_START_X;
  emitFlashTimer = 0;
  prePopulateWaves();
  startBtn.textContent = '\u25B6 Start';
  startBtn.disabled    = false;
  speedSlider.disabled = false;
  updateFreqDisplay();
  draw();
});

// ============================================================
// DISPLAY UPDATES
// ============================================================
function updateFreqDisplay() {
  const f = computeDisplayFreq();
  freqEl.textContent = `Observed f\u2080 = ${f.toFixed(0)} Hz`;
  if (f > DISPLAY_SOURCE_FREQ + 2) {
    freqEl.style.color = '#2563eb';
  } else if (f < DISPLAY_SOURCE_FREQ - 2) {
    freqEl.style.color = '#dc2626';
  } else {
    freqEl.style.color = '#d97706';
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (!running) return;
  if (lastTimestamp === null) lastTimestamp = timestamp;
  let dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
  lastTimestamp  = timestamp;
  simTime       += dt;
  emitFlashTimer = Math.max(0, emitFlashTimer - dt);

  sourceX = SOURCE_START_X + sourceVx * simTime;

  while (nextEmitTime <= simTime) {
    waves.push({
      emitTime: nextEmitTime,
      emitX: SOURCE_START_X + sourceVx * nextEmitTime,
      emitY: SOURCE_Y
    });
    emitFlashTimer = 0.12;
    nextEmitTime  += SOURCE_PERIOD;
  }

  waves = waves.filter(w => WAVE_SPEED * (simTime - w.emitTime) < MAX_WAVE_RADIUS);

  if (machPercent > 0 && sourceX > SOURCE_END_X) {
    running  = false;
    finished = true;
    startBtn.textContent = '\u2713 Done';
    startBtn.disabled    = true;
  }

  updateFreqDisplay();
  draw();
  if (running) requestAnimationFrame(gameLoop);
}

// ============================================================
// DRAWING
// ============================================================
function draw() {
  ctx.clearRect(0, 0, logW, logH);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, logW, logH);

  // Source path line
  ctx.beginPath();
  ctx.moveTo(0, SOURCE_Y);
  ctx.lineTo(logW, SOURCE_Y);
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Dashed line from source to observer
  if (sourceX > -30 && sourceX < logW + 30) {
    ctx.beginPath();
    ctx.moveTo(sourceX, SOURCE_Y);
    ctx.lineTo(OBSERVER_X, observerY);
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Vertical observer track
  ctx.beginPath();
  ctx.moveTo(OBSERVER_X, OBS_MIN_Y);
  ctx.lineTo(OBSERVER_X, obsMaxY());
  ctx.strokeStyle = 'rgba(0,0,0,0.07)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.arc(OBSERVER_X, OBS_MIN_Y,  3, 0, Math.PI * 2);
  ctx.arc(OBSERVER_X, obsMaxY(), 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.fill();

  // Wave fronts
  for (const w of waves) {
    const radius = WAVE_SPEED * (simTime - w.emitTime);
    if (radius <= 0) continue;
    const alpha = Math.max(0.04, 0.7 - radius / 650);
    ctx.beginPath();
    ctx.arc(w.emitX, w.emitY, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(30,120,220,${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Source (speaker) — drawn left of the wave emission point
  const speakerDrawX = sourceX - SPEAKER_DRAW_OFFSET;
  if (speakerDrawX > -30 && speakerDrawX < logW + 30) {
    drawSource(speakerDrawX, SOURCE_Y);
  }

  // Observer (smiley)
  drawSmiley(OBSERVER_X, observerY, SMILEY_R);

  // Labels
  ctx.textAlign = 'center';
  ctx.font = '12px Arial';
  ctx.fillStyle = '#777';
  ctx.fillText('Observer', OBSERVER_X, observerY + SMILEY_R + 14);

  // Drag hint — only when stopped and not yet dragged
  if (!hasDragged && !running) {
    ctx.font = 'italic 11px Arial';
    ctx.fillStyle = '#aaa';
    ctx.fillText('\u2195 drag', OBSERVER_X, observerY + SMILEY_R + 27);
  }
}

// ── Speaker ───────────────────────────────────────────────────
function drawSource(x, y) {
  const bright = emitFlashTimer > 0 ? 1 : 0;

  ctx.fillStyle = bright ? '#ffaa44' : '#d06020';
  ctx.fillRect(x - 10, y - 12, 12, 24);

  ctx.beginPath();
  ctx.moveTo(x + 2, y - 12);
  ctx.lineTo(x + 16, y - 22);
  ctx.lineTo(x + 16, y + 22);
  ctx.lineTo(x + 2, y + 12);
  ctx.closePath();
  ctx.fillStyle = bright ? '#ffc877' : '#e08838';
  ctx.fill();

  if (bright) {
    ctx.beginPath();
    ctx.arc(x + 20, y, 8, -0.6, 0.6);
    ctx.strokeStyle = 'rgba(255, 200, 120, 0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ── Smiley ────────────────────────────────────────────────────
function drawSmiley(x, y, r) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = '#f4d35e'; ctx.fill();
  ctx.strokeStyle = '#c9a227'; ctx.lineWidth = 2; ctx.stroke();

  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(x - 8, y - 6, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 8, y - 6, 3.5, 0, Math.PI * 2); ctx.fill();

  ctx.beginPath(); ctx.arc(x, y + 2, 10, 0.15, Math.PI - 0.15);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5; ctx.stroke();
}

// ============================================================
// INIT
// ============================================================
observerY = clampObserver(observerY);
prePopulateWaves();
updateFreqDisplay();
draw();
</script>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
