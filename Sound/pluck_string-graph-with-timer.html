<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loaded String Simulation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #fff;
      overflow: hidden;
    }
    main {
      width: 600px;
      height: 600px;
      position: relative;
    }
    .controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #333;
      user-select: none;
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .controls input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main id="canvas-container">
    <div class="controls">
      <label>
        <input type="checkbox" id="showGraph"> Show position graph
      </label>
    </div>
  </main>
  <script>
    // ===========================================
    // LOADED STRING SIMULATION
    // Normal Mode Decomposition Approach
    // ===========================================
    
    // URL params: ?showGraph=false &markerMode=separated &numLoads=28
    const _qs = new URLSearchParams(location.search);
    const _showGraphDefault = _qs.get('showGraph') !== 'false';
    const _markerSeparated = _qs.get('markerMode') === 'separated';

    // --- Physical Parameters ---
    const NUM_LOADS = parseInt(_qs.get('numLoads') || '29');
    const STRING_TENSION = 1.0;     // Normalized tension
    const DAMPING = 0.998;          // Per-frame amplitude decay (higher modes decay faster)

    // --- Time Calibration ---
    const TIME_SCALE = 2.0;         // milliseconds per simulation time unit

    // --- Display Parameters ---
    const CANVAS_SIZE = 600;
    // When showGraph=false, string moves to center and gets more amplitude room
    const STRING_Y = _showGraphDefault ? 180 : 300;
    const STRING_LEFT = 50;
    const STRING_RIGHT = CANVAS_SIZE - 50;
    const STRING_LENGTH = STRING_RIGHT - STRING_LEFT;
    const MAX_AMPLITUDE = _showGraphDefault ? 100 : 120;
    const _DT = _showGraphDefault ? 0.44 : 0.22;
    
    // --- Graph Parameters ---
    const GRAPH_LEFT = 80;
    const GRAPH_RIGHT = CANVAS_SIZE - 40;
    const GRAPH_TOP = 340;
    const GRAPH_BOTTOM = 560;
    const GRAPH_WIDTH = GRAPH_RIGHT - GRAPH_LEFT;
    const GRAPH_HEIGHT = GRAPH_BOTTOM - GRAPH_TOP;
    const MAX_HISTORY = 900;                 // Number of data points to store
    
    // --- State Variables ---
    let massPositions = [];         // Current y-displacement of each mass (in pixels)
    let modeAmplitudes = [];        // Amplitude of each normal mode
    let modePhases = [];            // Phase of each normal mode (all start at 0 for pluck)
    let modeFrequencies = [];       // Angular frequency of each mode
    
    let isPlucking = false;         // Is mouse currently dragging?
    let pluckIndex = -1;            // Which mass is being plucked (nearest to mouse)
    let isVibrating = false;        // Is string currently vibrating?
    let time = 0;                   // Simulation time
    
    // --- Graph State ---
    let graphMassIndex = -1;        // Which mass to graph (set when pluck is released)
    let displacementHistory = [];   // Array of {time, displacement} objects
    let showGraphCheckbox;          // Reference to checkbox element
    
    // --- Measurement Markers ---
    let marker1Index = -1;          // Index in displacementHistory for first marker
    let marker2Index = -1;          // Index in displacementHistory for second marker
    
    // --- Precomputed Mode Shapes ---
    // modeShapes[k][j] = sin(k*pi*j/(n+1)) for mode k at mass j
    let modeShapes = [];
    
    function setup() {
      let canvas = createCanvas(CANVAS_SIZE, CANVAS_SIZE);
      canvas.parent('canvas-container');
      
      // Get checkbox reference
      showGraphCheckbox = document.getElementById('showGraph');
      if (!_showGraphDefault) {
        showGraphCheckbox.parentElement.parentElement.style.display = 'none';
      }
      
      // Initialize arrays
      for (let j = 0; j < NUM_LOADS; j++) {
        massPositions[j] = 0;
      }
      
      // Precompute mode shapes and frequencies
      // Mode indices go from 1 to NUM_LOADS (physics convention)
      // Array indices go from 0 to NUM_LOADS-1
      for (let k = 1; k <= NUM_LOADS; k++) {
        modeShapes[k] = [];
        for (let j = 1; j <= NUM_LOADS; j++) {
          // Mode shape: sin(k * pi * j / (n+1))
          modeShapes[k][j] = sin((k * PI * j) / (NUM_LOADS + 1));
        }
        
        // Mode frequency for loaded string (exhibits dispersion)
        // omega_k = 2 * omega_0 * sin(k * pi / (2*(n+1)))
        // We normalize omega_0 = 1 for simplicity
        modeFrequencies[k] = 2 * sin((k * PI) / (2 * (NUM_LOADS + 1)));
        
        // Initialize amplitudes and phases
        modeAmplitudes[k] = 0;
        modePhases[k] = 0;
      }
      
      // Frame rate for smooth animation
      frameRate(60);
    }
    
    function draw() {
      background(255);
      
      // Update physics
      if (isVibrating && !isPlucking) {
        updateVibration();
      }
      
      // Draw the string
      drawString();
      
      // Draw graph if enabled
      if (showGraphCheckbox && showGraphCheckbox.checked) {
        drawGraph();
      }
    }
    
    // --- Physics Update ---
    function updateVibration() {
      // Time step (scaled for visual speed - adjust to taste)
      const dt = _DT;
      time += dt;
      
      // Reconstruct string position from modes
      for (let j = 1; j <= NUM_LOADS; j++) {
        let y = 0;
        for (let k = 1; k <= NUM_LOADS; k++) {
          // y_j(t) = sum over k of: A_k * cos(omega_k * t) * sin(k*pi*j/(n+1))
          y += modeAmplitudes[k] * cos(modeFrequencies[k] * time) * modeShapes[k][j];
        }
        massPositions[j - 1] = y;
      }
      
      // Record displacement for graph
      if (graphMassIndex >= 0 && showGraphCheckbox && showGraphCheckbox.checked) {
        // Only record if we haven't filled the graph yet
        if (displacementHistory.length < MAX_HISTORY) {
          displacementHistory.push({
            time: time,
            displacement: massPositions[graphMassIndex]
          });
        }
      }
      
      // Apply damping to mode amplitudes
      // Higher modes decay faster (realistic for strings)
      for (let k = 1; k <= NUM_LOADS; k++) {
        // Damping increases with mode number
        let dampingFactor = pow(DAMPING, 1 + k * 0.1);
        modeAmplitudes[k] *= dampingFactor;
      }
      
      // Check if vibration has effectively stopped
      let totalEnergy = 0;
      for (let k = 1; k <= NUM_LOADS; k++) {
        totalEnergy += modeAmplitudes[k] * modeAmplitudes[k];
      }
      if (totalEnergy < 0.0001) {
        isVibrating = false;
        time = 0;
      }
    }
    
    // --- Decompose Initial Shape into Normal Modes ---
    function computeModeAmplitudes() {
      // Discrete Sine Transform
      // A_k = (2/(n+1)) * sum over j of: y_j * sin(k*pi*j/(n+1))
      for (let k = 1; k <= NUM_LOADS; k++) {
        let amplitude = 0;
        for (let j = 1; j <= NUM_LOADS; j++) {
          amplitude += massPositions[j - 1] * modeShapes[k][j];
        }
        amplitude *= 2 / (NUM_LOADS + 1);
        modeAmplitudes[k] = amplitude;
        modePhases[k] = 0;  // Starting from rest means all phases are 0
      }
    }
    
    // --- Drawing Functions ---
    function drawString() {
      // Draw dashed midpoint line
      stroke(180);
      strokeWeight(1);
      drawingContext.setLineDash([6, 4]);
      let midX = (STRING_LEFT + STRING_RIGHT) / 2;
      line(midX, STRING_Y - MAX_AMPLITUDE - 20, midX, STRING_Y + MAX_AMPLITUDE + 20);
      drawingContext.setLineDash([]);  // Reset to solid
      
      // Draw the string
      stroke(0);
      strokeWeight(2);
      
      // Get x-positions of each mass
      let massX = [];
      for (let j = 0; j < NUM_LOADS; j++) {
        // Masses are evenly spaced
        massX[j] = STRING_LEFT + ((j + 1) * STRING_LENGTH) / (NUM_LOADS + 1);
      }
      
      // Draw string segments
      // From left fixed point to first mass
      line(STRING_LEFT, STRING_Y, massX[0], STRING_Y - massPositions[0]);
      
      // Between masses
      for (let j = 0; j < NUM_LOADS - 1; j++) {
        line(
          massX[j], STRING_Y - massPositions[j],
          massX[j + 1], STRING_Y - massPositions[j + 1]
        );
      }
      
      // From last mass to right fixed point
      line(massX[NUM_LOADS - 1], STRING_Y - massPositions[NUM_LOADS - 1], STRING_RIGHT, STRING_Y);
      
      // Draw fixed endpoints
      fill(80);
      noStroke();
      circle(STRING_LEFT, STRING_Y, 12);
      circle(STRING_RIGHT, STRING_Y, 12);
      
      // Draw marker on tracked mass if graphing
      if (showGraphCheckbox && showGraphCheckbox.checked) {
        if (!_markerSeparated && isPlucking) {
          // During plucking: follow mouse position along the string
          let mx = constrain(mouseX, STRING_LEFT, STRING_RIGHT);
          let currentIndex = getClosestMassIndex(mx);
          let markerX = STRING_LEFT + ((currentIndex + 1) * STRING_LENGTH) / (NUM_LOADS + 1);
          let markerY = STRING_Y - massPositions[currentIndex];
          fill(0, 120, 200);
          noStroke();
          circle(markerX, markerY, 10);
        } else if (graphMassIndex >= 0) {
          // After release (or Shift+click in separated mode): show on tracked mass
          let markerX = STRING_LEFT + ((graphMassIndex + 1) * STRING_LENGTH) / (NUM_LOADS + 1);
          let markerY = STRING_Y - massPositions[graphMassIndex];
          fill(0, 120, 200);
          noStroke();
          circle(markerX, markerY, 10);
        }
      }
    }
    
    // --- Graph Drawing ---
    function drawGraph() {
      // Draw graph background
      fill(250);
      stroke(200);
      strokeWeight(1);
      rect(GRAPH_LEFT, GRAPH_TOP, GRAPH_WIDTH, GRAPH_HEIGHT);
      
      // Draw axes
      stroke(100);
      strokeWeight(1);
      
      // Y-axis (displacement)
      line(GRAPH_LEFT, GRAPH_TOP, GRAPH_LEFT, GRAPH_BOTTOM);
      
      // X-axis (time) - centered vertically
      let zeroY = GRAPH_TOP + GRAPH_HEIGHT / 2;
      line(GRAPH_LEFT, zeroY, GRAPH_RIGHT, zeroY);
      
      // Draw zero line dashed
      stroke(180);
      drawingContext.setLineDash([4, 4]);
      line(GRAPH_LEFT, zeroY, GRAPH_RIGHT, zeroY);
      drawingContext.setLineDash([]);
      
      // Axis labels
      fill(80);
      noStroke();
      textSize(12);
      textAlign(CENTER, CENTER);
      
      // "time" label
      text("time (ms)", GRAPH_LEFT + GRAPH_WIDTH / 2, GRAPH_BOTTOM + 18);
      
      // "displacement" label (rotated)
      push();
      translate(GRAPH_LEFT - 25, GRAPH_TOP + GRAPH_HEIGHT / 2);
      rotate(-HALF_PI);
      text("position", 0, 0);
      pop();
      
      // Draw the displacement curve
      if (displacementHistory.length > 1) {
        stroke(0, 120, 200);
        strokeWeight(2);
        noFill();
        
        beginShape();
        for (let i = 0; i < displacementHistory.length; i++) {
          // Map index to x position using MAX_HISTORY for consistent positioning
          let x = map(i, 0, MAX_HISTORY - 1, GRAPH_LEFT, GRAPH_RIGHT);
          
          // Map displacement to y position
          // Displacement is in pixels, scale to fit graph
          let y = map(displacementHistory[i].displacement, -MAX_AMPLITUDE, MAX_AMPLITUDE, GRAPH_BOTTOM, GRAPH_TOP);
          
          vertex(x, y);
        }
        endShape();
      }
      
      // Draw +/- labels on y-axis
      fill(120);
      textSize(10);
      textAlign(RIGHT, CENTER);
      text("+", GRAPH_LEFT - 5, GRAPH_TOP + 15);
      text("−", GRAPH_LEFT - 5, GRAPH_BOTTOM - 15);
      
      // Draw measurement markers
      if (displacementHistory.length > 1) {
        // Helper function to draw a marker
        function drawMarker(index, color) {
          if (index < 0 || index >= displacementHistory.length) return;
          
          // Use MAX_HISTORY for consistent x positioning
          let x = map(index, 0, MAX_HISTORY - 1, GRAPH_LEFT, GRAPH_RIGHT);
          let y = map(displacementHistory[index].displacement, -MAX_AMPLITUDE, MAX_AMPLITUDE, GRAPH_BOTTOM, GRAPH_TOP);
          
          // Vertical line
          stroke(color);
          strokeWeight(2);
          drawingContext.setLineDash([]);
          line(x, GRAPH_TOP, x, GRAPH_BOTTOM);
          
          // Circle at intersection with curve
          fill(color);
          noStroke();
          circle(x, y, 8);
        }
        
        // Draw markers in distinct colors
        if (marker1Index >= 0) {
          drawMarker(marker1Index, color(220, 60, 60));  // Red
        }
        if (marker2Index >= 0) {
          drawMarker(marker2Index, color(60, 180, 60));  // Green
        }
        
        // Display Δt if both markers are set
        if (marker1Index >= 0 && marker2Index >= 0) {
          let t1 = displacementHistory[marker1Index].time;
          let t2 = displacementHistory[marker2Index].time;
          let deltaT = abs(t2 - t1) * TIME_SCALE;  // Convert to milliseconds
          
          // Draw Δt label
          fill(50);
          noStroke();
          textSize(14);
          textAlign(RIGHT, TOP);
          text("Δt = " + deltaT.toFixed(1) + " ms", GRAPH_RIGHT - 5, GRAPH_TOP + 5);
          
          // Draw horizontal line between markers at the top
          let x1 = map(marker1Index, 0, MAX_HISTORY - 1, GRAPH_LEFT, GRAPH_RIGHT);
          let x2 = map(marker2Index, 0, MAX_HISTORY - 1, GRAPH_LEFT, GRAPH_RIGHT);
          stroke(100);
          strokeWeight(1);
          let bracketY = GRAPH_TOP + 25;
          line(x1, bracketY, x2, bracketY);
          // End caps
          line(x1, bracketY - 4, x1, bracketY + 4);
          line(x2, bracketY - 4, x2, bracketY + 4);
        }
      }
    }
    
    // --- Mouse Interaction ---
    function mousePressed() {
      // Check if click is in the graph area (for placing markers)
      if (showGraphCheckbox && showGraphCheckbox.checked && 
          mouseX >= GRAPH_LEFT && mouseX <= GRAPH_RIGHT &&
          mouseY >= GRAPH_TOP && mouseY <= GRAPH_BOTTOM &&
          displacementHistory.length > 1) {
        
        // Convert click x-position to history index using MAX_HISTORY
        let clickIndex = Math.round(map(mouseX, GRAPH_LEFT, GRAPH_RIGHT, 0, MAX_HISTORY - 1));
        clickIndex = constrain(clickIndex, 0, displacementHistory.length - 1);
        
        // Place markers: first click sets marker1, second sets marker2, third resets
        if (marker1Index < 0) {
          marker1Index = clickIndex;
        } else if (marker2Index < 0) {
          marker2Index = clickIndex;
        } else {
          // Both markers set, reset and place first marker
          marker1Index = clickIndex;
          marker2Index = -1;
        }
        return;
      }
      
      // Check if mouse is near the string (within interaction zone)
      if (mouseX > STRING_LEFT && mouseX < STRING_RIGHT) {
        if (abs(mouseY - STRING_Y) < MAX_AMPLITUDE + 50) {
          // Shift-click (separated mode): set graph point without plucking
          if (_markerSeparated && keyIsDown(SHIFT) && showGraphCheckbox && showGraphCheckbox.checked) {
            graphMassIndex = getClosestMassIndex(mouseX);
            displacementHistory = [];
            marker1Index = -1;
            marker2Index = -1;
            return;
          }

          // Regular click: start plucking
          isPlucking = true;
          isVibrating = false;
          time = 0;
          
          // Find which mass is closest to mouse x-position
          pluckIndex = getClosestMassIndex(mouseX);
          
          // Update pluck shape
          updatePluckShape(mouseX, mouseY);
        }
      }
    }
    
    function mouseDragged() {
      if (isPlucking) {
        updatePluckShape(mouseX, mouseY);
      }
    }
    
    function mouseReleased() {
      if (isPlucking) {
        isPlucking = false;
        
        // Set the mass to graph based on release position (during mode only)
        if (!_markerSeparated) {
          graphMassIndex = getClosestMassIndex(mouseX);
        }

        // Clear previous history and markers when plucking
        displacementHistory = [];
        marker1Index = -1;
        marker2Index = -1;
        
        // Compute mode amplitudes from current shape
        computeModeAmplitudes();
        
        // Start vibrating
        isVibrating = true;
        time = 0;
      }
    }
    
    // --- Helper Functions ---
    function getClosestMassIndex(mx) {
      let closestDist = Infinity;
      let closestIndex = 0;
      
      for (let j = 0; j < NUM_LOADS; j++) {
        let massX = STRING_LEFT + ((j + 1) * STRING_LENGTH) / (NUM_LOADS + 1);
        let dist = abs(mx - massX);
        if (dist < closestDist) {
          closestDist = dist;
          closestIndex = j;
        }
      }
      return closestIndex;
    }
    
    function updatePluckShape(mx, my) {
      // Clamp mouse x to string bounds
      mx = constrain(mx, STRING_LEFT, STRING_RIGHT);
      
      // Calculate displacement (positive = up in screen coords, so we negate)
      let displacement = STRING_Y - my;
      displacement = constrain(displacement, -MAX_AMPLITUDE, MAX_AMPLITUDE);
      
      // Find the fractional position along the string (0 to 1)
      let pluckFraction = (mx - STRING_LEFT) / STRING_LENGTH;
      
      // Create triangular pluck shape
      // String forms two straight lines: left endpoint to pluck point to right endpoint
      for (let j = 0; j < NUM_LOADS; j++) {
        let massFraction = (j + 1) / (NUM_LOADS + 1);
        
        if (massFraction <= pluckFraction) {
          // Left side of pluck: linear interpolation from 0 to displacement
          massPositions[j] = displacement * (massFraction / pluckFraction);
        } else {
          // Right side of pluck: linear interpolation from displacement to 0
          massPositions[j] = displacement * ((1 - massFraction) / (1 - pluckFraction));
        }
      }
    }
  </script>


<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "showGraph",
        "type": "toggle",
        "default": 1,
        "desc": "Show displacement-time graph"
    },
    {
        "name": "markerMode",
        "type": "select",
        "values": [
            "normal",
            "separated"
        ],
        "default": "normal",
        "desc": "Marker display mode (separated = detached labels)"
    },
    {
        "name": "numLoads",
        "type": "number",
        "min": 1,
        "max": 100,
        "step": 1,
        "default": 29,
        "desc": "Number of string mass segments"
    }
];

  var EMBED_KEYS = ['maxscale', 'maxw', 'h', 'maxh', 'cheat'];

  // Build clean URL (no embed/cheat params) with optional overrides
  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) {
      var v = overrides[k];
      if (v === null || v === '') p.delete(k);
      else p.set(k, v);
    }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null; // set after render

  function updateUrlDisplay(overrides) {
    if (!urlLinkEl) return;
    var u = buildCleanUrl(overrides || {});
    urlLinkEl.href = u;
    urlLinkEl.textContent = u;
  }

  // Resolve the effective current value of a param (may differ from raw URL string)
  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    if (raw === null) return def['default'] !== undefined ? String(def['default']) : '';
    return raw;
  }

  function isTruthy(v) {
    return v !== '0' && v !== 'false' && v !== 'no' && v !== 'off' && v !== '';
  }

  function makeControl(def) {
    var effective = getEffective(def);

    if (def.type === 'toggle') {
      var on = isTruthy(effective);
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' +
        (on ? '#6dca80' : '#e07070') + ';border:1px solid ' +
        (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;' +
        'cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () {
        var updates = {};
        updates[def.name] = on ? '0' : '1';
        window.location.href = buildCheatUrl(updates);
      });
      return btn;
    }

    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (effective === String(v)) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        var updates = {}; updates[def.name] = sel.value;
        window.location.href = buildCheatUrl(updates);
      });
      return sel;
    }

    if (def.type === 'number') {
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.value = effective;
      if (def.min !== undefined) inp.min = String(def.min);
      if (def.max !== undefined) inp.max = String(def.max);
      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
      inp.addEventListener('change', function () {
        var updates = {}; updates[def.name] = inp.value;
        window.location.href = buildCheatUrl(updates);
      });
      return inp;
    }

    // text
    var inp2 = document.createElement('input');
    inp2.type = 'text';
    inp2.value = effective;
    inp2.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
      'border-radius:3px;padding:3px 6px;width:220px;font-size:12px;font-family:inherit';
    inp2.addEventListener('change', function () {
      var updates = {}; updates[def.name] = inp2.value;
      window.location.href = buildCheatUrl(updates);
    });
    return inp2;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      var s = 'number';
      if (def.min !== undefined && def.max !== undefined) s = def.min + '–' + def.max;
      else if (def.min !== undefined) s = '≥' + def.min;
      else if (def.max !== undefined) s = '≤' + def.max;
      return s;
    }
    return 'text';
  }

  function render() {
    // Panel container (fixed at bottom)
    var panel = document.createElement('div');
    panel.id = 'cheat-panel';
    panel.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(12,18,32,0.97)',
      'color:#c8d8e8',
      'font-family:"Segoe UI",system-ui,monospace',
      'font-size:13px',
      'border-top:2px solid #3a7bd5',
      'z-index:2147483647',
      'max-height:48vh',
      'overflow-y:auto',
      'padding:10px 16px 14px',
      'box-sizing:border-box',
      'box-shadow:0 -4px 24px rgba(0,0,0,0.6)'
    ].join(';');

    // Title bar
    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;' +
      'display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.title = 'Close cheat panel (reload to restore)';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;' +
      'cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText);
    title.appendChild(closeBtn);
    panel.appendChild(title);

    // Table
    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead();
    var hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;' +
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' +
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');

      // Name cell
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;' +
        'color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace';
      nc.textContent = def.name;

      // Type cell
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;' +
        'max-width:200px;font-family:monospace';
      tc.textContent = typeLabel(def);

      // Control cell
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(def));

      // Desc cell
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (def.desc || '') + (def['default'] !== undefined
        ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    // URL display
    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;' +
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;' +
      'letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;' +
      'font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = buildCheatUrl({});
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel);
    urlBox.appendChild(urlLinkEl);
    panel.appendChild(urlBox);

    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
</body>
</html>
