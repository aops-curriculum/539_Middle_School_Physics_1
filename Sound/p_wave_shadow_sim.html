<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>P-Wave Shadow Zone</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 600px; height: 440px; overflow: hidden;
    background: #fff;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    position: relative;
  }
  canvas { display: block; position: absolute; top: 0; left: 0; }
  #sliderCol {
    position: absolute; left: 0; top: 0; bottom: 0; width: 38px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; z-index: 2;
  }
  #sliderCol label {
    writing-mode: vertical-rl; transform: rotate(180deg);
    color: #444; font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  }
  #sldInner {
    width: 28px; height: 220px;
    writing-mode: vertical-lr; direction: rtl;
    accent-color: #b82020;
  }
  #radiusBlock {
    position: absolute; top: 10px; left: 44px;
    z-index: 2; pointer-events: none; text-align: left;
  }
  #radiusBlock label {
    display: block; color: #666; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  #readout {
    color: #222; font-size: 24px; font-weight: 700; line-height: 1.1;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="cv" width="600" height="440"></canvas>
<div id="sliderCol">
  <label for="sldInner">inner core size</label>
  <input type="range" id="sldInner" min="0" max="1800" step="10" value="0">
</div>
<div id="radiusBlock">
  <label>Radius</label>
  <span id="readout">0 km</span>
</div>

<script>
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 600, H = 440;

const RE_KM = 6371;
const OUTER_CORE_KM = 3500;
const OUTER_FRAC = OUTER_CORE_KM / RE_KM;
const OUTER_CRIT = 103.0;
const REFRACTED_CORE_ANGLE = 118.0;
const BASE_CORE_ANGLE = 145.0;

const CX = 300, CY = 218, ER = 188;
const EX = CX, EY = CY - ER;

let innerKm = 0;

const COL = {
  mantle:   '#ffe566',
  shadow:   '#c9c9c9',
  outer:    '#ff9933',
  inner:    '#b82020',
  mantleRay:'rgb(48, 133, 230)',
  coreRay:  '#00aa66',
  earth:    '#111',
  angle:    '#008c52',
};

document.getElementById('sldInner').addEventListener('input', e => {
  innerKm = +e.target.value;
  draw();
});

function outerPx() { return OUTER_FRAC * ER; }
function innerPx() { return (innerKm / RE_KM) * ER; }

function surfPt(deg, r) {
  const th = deg * Math.PI / 180;
  return { x: CX + r * Math.sin(th), y: CY - r * Math.cos(th) };
}

function ang(p) { return Math.atan2(p.y - CY, p.x - CX); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

// At 1200 km the innermost P-core branch opens to about 118 degrees.
function coreWaveAngleForKm(km) {
  return 106 + 12 * Math.sqrt(clamp(km / 1200, 0, 1.8));
}

function coreWaveAngle() {
  return coreWaveAngleForKm(innerKm);
}

function rTurn(deg) {
  const t = deg / OUTER_CRIT;
  return ER * (1 - (1 - OUTER_FRAC) * Math.pow(Math.max(0, t), 1.5));
}

function bezPt(p0, p1, p2, p3, t) {
  const u = 1 - t;
  return {
    x: u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x,
    y: u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y,
  };
}

function quadPt(p0, p1, p2, t) {
  const u = 1 - t;
  return {
    x: u*u*p0.x + 2*u*t*p1.x + t*t*p2.x,
    y: u*u*p0.y + 2*u*t*p1.y + t*t*p2.y,
  };
}

function firstCircleCross(p0, p1, p2, p3, r) {
  for (let i = 1; i <= 140; i++) {
    const t = i / 140;
    const p = bezPt(p0, p1, p2, p3, t);
    if (Math.hypot(p.x - CX, p.y - CY) <= r + 0.4) return t;
  }
  return 1;
}

function lineCircleCross(a, b, r) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const ox = a.x - CX;
  const oy = a.y - CY;
  const aa = dx * dx + dy * dy;
  const bb = 2 * (ox * dx + oy * dy);
  const cc = ox * ox + oy * oy - r * r;
  const disc = bb * bb - 4 * aa * cc;
  if (disc < 0) return null;
  const s = Math.sqrt(disc);
  const t1 = (-bb - s) / (2 * aa);
  const t2 = (-bb + s) / (2 * aa);
  const t = [t1, t2].find(v => v > 0.001 && v < 1);
  return t === undefined ? null : { x: a.x + dx * t, y: a.y + dy * t };
}

function firstQuadCircleCross(p0, p1, p2, r) {
  const prev = { inside: false };
  for (let i = 1; i <= 180; i++) {
    const t = i / 180;
    const p = quadPt(p0, p1, p2, t);
    const inside = Math.hypot(p.x - CX, p.y - CY) <= r + 0.25;
    if (inside && !prev.inside) return { point: p, t };
    prev.inside = inside;
  }
  return null;
}

function firstBezierCircleCross(p0, p1, p2, p3, r) {
  const prev = { inside: false };
  for (let i = 1; i <= 220; i++) {
    const t = i / 220;
    const p = bezPt(p0, p1, p2, p3, t);
    const inside = Math.hypot(p.x - CX, p.y - CY) <= r + 0.25;
    if (inside && !prev.inside) return { point: p, t };
    prev.inside = inside;
  }
  return null;
}

function drawQuad(p0, p1, p2, t0 = 0, t1 = 1) {
  const steps = Math.max(6, Math.round((t1 - t0) * 36));
  for (let i = 0; i <= steps; i++) {
    const p = quadPt(p0, p1, p2, lerp(t0, t1, i / steps));
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
}

function topDeg(pt) {
  return Math.atan2(pt.x - CX, CY - pt.y) * 180 / Math.PI;
}

function rayPath(deg, side) {
  const s = side === 'left' ? -1 : 1;
  const th = deg * Math.PI / 180;
  const rt = rTurn(deg);
  const S  = { x: EX, y: EY };
  const A  = { x: CX + s * ER * Math.sin(th), y: CY - ER * Math.cos(th) };
  const T  = { x: CX + s * rt * Math.sin(th / 2), y: CY - rt * Math.cos(th / 2) };
  const c1 = { x: (4 * T.x - A.x) / 3, y: (4 * T.y - A.y) / 3 };
  const c2 = { x: (4 * T.x - S.x) / 3, y: (4 * T.y - S.y) / 3 };
  return { S, A, T, c1, c2, rt, sideSign: s };
}

function drawBezier(p0, p1, p2, p3, t0 = 0, t1 = 1) {
  const steps = Math.max(8, Math.round((t1 - t0) * 44));
  for (let i = 0; i <= steps; i++) {
    const p = bezPt(p0, p1, p2, p3, lerp(t0, t1, i / steps));
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  }
}

function coreCurveControls(sideSign, q, rt, exitAngle) {
  const inwardExitCtrl = Math.min(179, lerp(exitAngle + 4, exitAngle + 1, q));
  return {
    c1: surfPt(sideSign * (95 + 36 * q), Math.max(5, rt)),
    c2: surfPt(sideSign * inwardExitCtrl, ER * 0.72),
  };
}

function drawEarthLayers() {
  const rc = outerPx();
  const ri = innerPx();
  const crit = OUTER_CRIT;

  ctx.beginPath();
  ctx.arc(CX, CY, ER, 0, Math.PI * 2);
  ctx.fillStyle = COL.mantle;
  ctx.fill();

  const shadowEnd = BASE_CORE_ANGLE;
  [-1, 1].forEach(side => {
    const critRay = rayPath(crit, side > 0 ? 'right' : 'left');
    const coreRay = rayPath(107, side > 0 ? 'right' : 'left');
    const tEntry = firstCircleCross(coreRay.S, coreRay.c1, coreRay.c2, coreRay.A, rc);
    const entry = bezPt(coreRay.S, coreRay.c1, coreRay.c2, coreRay.A, tEntry);
    const q = 0;
    const exit = surfPt(side * shadowEnd, ER);
    const coreCtrl = coreCurveControls(side, q, coreRay.rt, shadowEnd);
    const a0 = ang(critRay.A);
    const a1 = ang(exit);

    ctx.beginPath();
    ctx.moveTo(critRay.A.x, critRay.A.y);
    ctx.arc(CX, CY, ER, a0, a1, side < 0);

    for (let i = 1; i <= 24; i++) {
      const p = bezPt(entry, coreCtrl.c1, coreCtrl.c2, exit, 1 - i / 24);
      ctx.lineTo(p.x, p.y);
    }

    ctx.lineTo(critRay.T.x, critRay.T.y);

    for (let i = 1; i <= 24; i++) {
      const p = bezPt(critRay.S, critRay.c1, critRay.c2, critRay.A, 0.5 + i / 48);
      ctx.lineTo(p.x, p.y);
    }

    ctx.closePath();
    ctx.fillStyle = COL.shadow;
    ctx.fill();
  });

  ctx.beginPath();
  ctx.arc(CX, CY, rc, 0, Math.PI * 2);
  ctx.fillStyle = COL.outer;
  ctx.fill();

  if (ri > 0.5) {
    ctx.beginPath();
    ctx.arc(CX, CY, ri, 0, Math.PI * 2);
    ctx.fillStyle = COL.inner;
    ctx.fill();
  }
}

function drawMantleRays() {
  const angles = [17, 22, 28, 34, 41, 49, 58, 67, 76, 86, 95, OUTER_CRIT];
  ctx.save();
  ctx.strokeStyle = COL.mantleRay;
  ctx.lineWidth = 1.05;
  ctx.lineCap = 'round';

  angles.forEach(deg => {
    ['right', 'left'].forEach(side => {
      const { S, A, c1, c2 } = rayPath(deg, side);
      ctx.beginPath();
      ctx.moveTo(S.x, S.y);
      ctx.bezierCurveTo(c1.x, c1.y, c2.x, c2.y, A.x, A.y);
      ctx.stroke();
    });
  });
  ctx.restore();
}

function drawCoreRay(deg, side, index, total) {
  const rc = outerPx();
  const ri = innerPx();
  const p = rayPath(deg, side);
  const tEntry = firstCircleCross(p.S, p.c1, p.c2, p.A, rc);
  const entry = bezPt(p.S, p.c1, p.c2, p.A, tEntry);
  const q = total <= 1 ? 0 : index / (total - 1);
  const fixedOuterRay = index < 5;
  const exitAngle = lerp(BASE_CORE_ANGLE, 180, Math.pow(q, 0.86));
  const exit = surfPt(p.sideSign * exitAngle, ER);
  const coreCtrl = coreCurveControls(p.sideSign, q, p.rt, exitAngle);
  const innerHit = !fixedOuterRay && ri > 4
    ? firstBezierCircleCross(entry, coreCtrl.c1, coreCtrl.c2, exit, ri)
    : null;

  ctx.save();
  ctx.lineWidth = 1.15;
  ctx.lineCap = 'round';

  ctx.beginPath();
  drawBezier(p.S, p.c1, p.c2, p.A, 0, tEntry);
  ctx.strokeStyle = COL.coreRay;
  ctx.stroke();

  if (innerHit) {
    const hitAngle = Math.abs(topDeg(innerHit.point));
    const edgeFactor = clamp(hitAngle / 55, 0, 1);
    const innerExitAngle = lerp(180, 105, Math.pow(edgeFactor, 0.85));
    const innerExit = surfPt(p.sideSign * innerExitAngle, ri);
    const fanExitAngle = lerp(exitAngle, REFRACTED_CORE_ANGLE, Math.pow(edgeFactor, 0.75));
    const fanExit = surfPt(p.sideSign * fanExitAngle, ER);

    ctx.beginPath();
    drawBezier(entry, coreCtrl.c1, coreCtrl.c2, exit, 0, innerHit.t);
    ctx.lineTo(innerExit.x, innerExit.y);
    ctx.lineTo(fanExit.x, fanExit.y);
    ctx.strokeStyle = COL.coreRay;
    ctx.stroke();
  } else {
    ctx.beginPath();
    drawBezier(entry, coreCtrl.c1, coreCtrl.c2, exit);
    ctx.strokeStyle = COL.coreRay;
    ctx.stroke();
  }

  ctx.restore();
}

function drawCoreRays() {
  const angles = [113, 119, 125, 131, 137, 143, 149, 155, 161, 167, 173];
  angles.forEach((a, i) => {
    drawCoreRay(a, 'right', i, angles.length);
    drawCoreRay(a, 'left',  i, angles.length);
  });
}

function drawOutlines() {
  const rc = outerPx();
  const ri = innerPx();

  ctx.beginPath();
  ctx.arc(CX, CY, ER, 0, Math.PI * 2);
  ctx.strokeStyle = COL.earth;
  ctx.lineWidth = 2.2;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(CX, CY, rc, 0, Math.PI * 2);
  ctx.strokeStyle = COL.earth;
  ctx.lineWidth = 1.2;
  ctx.stroke();

  if (ri > 0.5) {
    ctx.beginPath();
    ctx.arc(CX, CY, ri, 0, Math.PI * 2);
    ctx.strokeStyle = COL.earth;
    ctx.lineWidth = 1.1;
    ctx.stroke();
  }
}

function drawAngleMarkers() {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.fillStyle = '#333';
  ctx.lineWidth = 1;
  ctx.font = '10px Segoe UI';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';

  for (let deg = 0; deg <= 180; deg += 15) {
    const p1 = surfPt(deg, ER + 3);
    const p2 = surfPt(deg, ER + 10);
    const label = surfPt(deg, ER + 17);

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();

    ctx.fillText(deg + '°', label.x + 2, label.y);
  }
  ctx.restore();
}

function drawEpicenter() {
  const r = ER * 0.035;
  ctx.beginPath();
  ctx.arc(EX, EY, r, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = COL.earth;
  ctx.lineWidth = 1.4;
  ctx.stroke();

  ctx.font = '11px Segoe UI';
  ctx.fillStyle = '#111';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('Epicenter', EX, EY - 16);
}

function drawLabels() {
  ctx.font = '12px Segoe UI';
  ctx.fillStyle = '#111';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Outer Core', CX, CY + outerPx() * 0.62);
  if (innerKm > 250) {
    ctx.fillText('Inner', CX, CY - 6);
    ctx.fillText('Core', CX, CY + 8);
  }
}

function drawCorrectPhaseCallout() {
  if (innerKm !== 1220) return;

  const tip = surfPt(157, ER + 7);
  const tail = { x: tip.x + 118, y: tip.y };
  const col = '#c018a8';

  ctx.save();
  ctx.strokeStyle = col;
  ctx.fillStyle = col;
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.beginPath();
  ctx.moveTo(tail.x, tail.y);
  ctx.lineTo(tip.x, tip.y);
  ctx.stroke();

  const dx = tip.x - tail.x;
  const dy = tip.y - tail.y;
  const m = Math.hypot(dx, dy) || 1;
  const ux = dx / m;
  const uy = dy / m;
  const px = -uy;
  const py = ux;
  const sz = 18;

  ctx.beginPath();
  ctx.moveTo(tip.x, tip.y);
  ctx.lineTo(tip.x - ux * sz + px * sz * 0.55, tip.y - uy * sz + py * sz * 0.55);
  ctx.lineTo(tip.x - ux * sz - px * sz * 0.55, tip.y - uy * sz - py * sz * 0.55);
  ctx.closePath();
  ctx.fill();

  ctx.font = '900 19px Segoe UI';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('correct phase!', (tail.x + tip.x) / 2, tail.y - 12);
  ctx.restore();
}

function draw() {
  document.getElementById('readout').textContent = innerKm + ' km';

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  drawEarthLayers();
  drawMantleRays();
  drawCoreRays();
  drawOutlines();
  drawAngleMarkers();
  drawEpicenter();
  drawLabels();
  drawCorrectPhaseCallout();
}

draw();
</script>
</body>
</html>
