<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doppler Effect with Separation</title>
<style>
/* ── Reset & Container ────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 600px;
  height: 600px;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  background: #ffffff;
  color: #333333;
  display: flex;
  flex-direction: column;
}

/* ── Control Panel ────────────────────────────────────── */
#controls {
  padding: 8px 10px 6px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.row {
  display: flex;
  align-items: center;
  gap: 5px;
  justify-content: center;
}

/* ── Buttons ──────────────────────────────────────────── */
button {
  padding: 5px 9px;
  border: 1px solid #b0b8c4;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  background: #f0f2f5;
  color: #444;
  transition: all 0.15s;
}
button:hover { background: #dce1e8; border-color: #8894a2; }
button.active {
  background: #2563eb;
  border-color: #2563eb;
  color: white;
}
button.action {
  background: #2a9d8f;
  border-color: #2a9d8f;
  color: white;
  font-weight: bold;
  padding: 5px 14px;
}
button.action:hover { background: #38b2a3; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Slider Row ──────────────────────────────────────── */
.slider-row {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}
.slider-row label {
  font-size: 13px;
  color: #666;
  white-space: nowrap;
}
input[type="range"] {
  width: 180px;
  accent-color: #2563eb;
}
.slider-value {
  font-size: 12px;
  color: #888;
  min-width: 36px;
}

/* ── Info Row ─────────────────────────────────────────── */
#info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 8px;
}
#freq-display {
  font-size: 18px;
  font-weight: bold;
  color: #d97706;
  transition: color 0.15s;
  min-width: 170px;
}
.row label {
  font-size: 13px;
  color: #666;
  margin-right: 2px;
}

/* ── Canvas ───────────────────────────────────────────── */
canvas { display: block; }
</style>
</head>
<body>

<!-- ─────────────────── CONTROL PANEL ─────────────────── -->
<div id="controls">

  <!-- Row 1: Source speed buttons -->
  <div class="row">
    <label>Source speed:</label>
    <button class="vel-btn active" data-vel="60">Slow ➡</button>
    <button class="vel-btn" data-vel="80">Medium ➡</button>
    <button class="vel-btn" data-vel="100">Fast ➡</button>
  </div>

  <!-- Row 2: Observer distance slider -->
  <div class="slider-row">
    <label>Observer distance:</label>
    <span class="slider-value">Close</span>
    <input type="range" id="distSlider" min="0" max="100" value="40">
    <span class="slider-value">Far</span>
  </div>

  <!-- Row 3: Frequency readout + action buttons -->
  <div id="info-row">
    <span id="freq-display">Observed f = 624 Hz</span>
    <div class="row">
      <button class="action" id="startBtn">▶ Start</button>
      <button class="action" id="resetBtn">↺ Reset</button>
    </div>
  </div>
</div>

<!-- ───────────────── SIMULATION CANVAS ───────────────── -->
<canvas id="sim"></canvas>

<script>
// ============================================================
// PHYSICS CONSTANTS
// ============================================================
// The source moves horizontally across the top of the canvas.
// The observer sits below, at horizontal center, with an
// adjustable vertical distance.
//
// The observed frequency depends on the RADIAL component of
// the source velocity — the component along the line from
// source to observer:
//
//   v_radial = v_source × cos(θ)
//
// where θ is the angle between the velocity vector and the
// source→observer vector. The Doppler formula is then:
//
//   f_obs = f_source × v_wave / (v_wave − v_radial)
//
// As the source approaches, v_radial > 0 → higher frequency.
// As it recedes, v_radial < 0 → lower frequency.
// When directly above the observer, v_radial ≈ 0 → f_source.

const WAVE_SPEED    = 120;   // px/s  (visual simulation units)
const SOURCE_FREQ   = 2;     // Hz   (visual simulation units)
const SOURCE_PERIOD = 1 / SOURCE_FREQ;
const MAX_WAVE_RADIUS = 900;

// ── Display-frequency scaling ──────────────────────────
// The visual wave fronts use exaggerated speeds for clarity.
// The DISPLAYED frequency uses realistic Doppler parameters
// so students see physically meaningful Hz values.
//
// At zero observer separation (head-on approach / recede):
//   f_approach = 624 / (1 − 0.07337) ≈ 673 Hz
//   f_recede   = 624 / (1 + 0.07337) ≈ 581 Hz
//
const DISPLAY_SOURCE_FREQ = 623.625;  // Hz (real-world source)
const BASE_VS_RATIO       = 0.07337;  // v_source / v_sound for Slow (60 px/s)
const BASE_SOURCE_VX      = 60;       // reference sim speed for the ratio

const SOURCE_Y      = 30;    // source travels along this y-level
const SOURCE_START_X = -60;  // start off-screen left
const SOURCE_END_X   = 660;  // end off-screen right

// Observer is always at x = 300 (horizontal center).
// Observer y is controlled by the slider.
const OBSERVER_X = 300;

// ============================================================
// DOM REFERENCES
// ============================================================

const canvas    = document.getElementById('sim');
const ctx       = canvas.getContext('2d');
const freqEl    = document.getElementById('freq-display');
const startBtn  = document.getElementById('startBtn');
const resetBtn  = document.getElementById('resetBtn');
const velBtns   = document.querySelectorAll('.vel-btn');
const distSlider = document.getElementById('distSlider');

// ============================================================
// CANVAS SIZING
// ============================================================

let logW, logH;

function resizeCanvas() {
  const ctrlH = document.getElementById('controls').offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  logW = 600;
  logH = 600 - ctrlH;
  canvas.width  = logW * dpr;
  canvas.height = logH * dpr;
  canvas.style.width  = logW + 'px';
  canvas.style.height = logH + 'px';
  ctx.scale(dpr, dpr);
}
resizeCanvas();

// ============================================================
// OBSERVER Y RANGE
// ============================================================
// The slider maps 0–100 to a y-range in the canvas.
// "Close" (slider=0) puts the observer near the source path.
// "Far" (slider=100) puts the observer near the bottom.

const OBS_Y_MIN = SOURCE_Y;                    // zero separation
const OBS_Y_MAX = SOURCE_Y + (logH - 30 - SOURCE_Y) / 2;  // half the old range

function getObserverY() {
  const t = distSlider.value / 100;
  return OBS_Y_MIN + t * (OBS_Y_MAX - OBS_Y_MIN);
}

// ============================================================
// SIMULATION STATE
// ============================================================

let simTime       = 0;
let running       = false;
let finished      = false;
let lastTimestamp  = null;
let sourceVx      = 60;     // px/s — always positive (moves right)
let sourceX       = SOURCE_START_X;
let observerY     = getObserverY();
let nextEmitTime  = 0;
let currentFreq   = SOURCE_FREQ;

// Each wave: { emitTime, emitX, emitY }
// All waves expand as full circles from their emission point.
let waves = [];

let emitFlashTimer  = 0;

// ============================================================
// PRE-POPULATE WAVES
// ============================================================
// Fill the space with concentric waves from the starting
// position so there's no dead time before the first visual.

function prePopulateWaves() {
  waves = [];
  const maxBackTime = MAX_WAVE_RADIUS / WAVE_SPEED;

  for (let t = -SOURCE_PERIOD; t >= -maxBackTime; t -= SOURCE_PERIOD) {
    const radius = WAVE_SPEED * (0 - t);
    if (radius > MAX_WAVE_RADIUS) break;
    waves.push({ emitTime: t, emitX: SOURCE_START_X, emitY: SOURCE_Y });
  }

  waves.push({ emitTime: 0, emitX: SOURCE_START_X, emitY: SOURCE_Y });
  nextEmitTime = SOURCE_PERIOD;
}

// ============================================================
// FREQUENCY CALCULATION
// ============================================================
// Computes the instantaneous observed frequency using the
// radial-velocity form of the Doppler equation.

function computeObservedFreq() {
  const dx = OBSERVER_X - sourceX;
  const dy = observerY - SOURCE_Y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 1) return SOURCE_FREQ;  // avoid division issues

  // Radial component of source velocity toward observer.
  // Source velocity is (sourceVx, 0). Dot with unit vector
  // from source to observer: (dx/dist, dy/dist).
  const vRadial = sourceVx * (dx / dist);

  // Guard against v_radial approaching wave speed
  const denom = WAVE_SPEED - vRadial;
  if (denom < 5) return SOURCE_FREQ * WAVE_SPEED / 5;

  return SOURCE_FREQ * WAVE_SPEED / denom;
}

// ============================================================
// DISPLAY-FREQUENCY CALCULATION
// ============================================================
// Uses the same geometry (cos θ) as the visual simulation but
// plugs it into a realistic Doppler formula so the readout
// shows physically meaningful Hz values.
//
// The v_source/v_sound ratio scales with the speed button so
// faster visual speeds also produce larger displayed shifts.

function computeDisplayFreq() {
  const dx = OBSERVER_X - sourceX;
  const dy = observerY - SOURCE_Y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 1) return DISPLAY_SOURCE_FREQ;

  const cosTheta = dx / dist;   // +1 approaching, −1 receding
  const vsRatio  = BASE_VS_RATIO * (sourceVx / BASE_SOURCE_VX);
  const denom    = 1 - vsRatio * cosTheta;

  if (denom < 0.01) return DISPLAY_SOURCE_FREQ / 0.01;

  return DISPLAY_SOURCE_FREQ / denom;
}

// ============================================================
// VELOCITY BUTTON HANDLING
// ============================================================

velBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (running || finished) return;
    velBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sourceVx = parseFloat(btn.dataset.vel);
    updateFreqDisplay();
  });
});

// ============================================================
// SLIDER HANDLING
// ============================================================

distSlider.addEventListener('input', () => {
  if (running || finished) return;
  observerY = getObserverY();
  updateFreqDisplay();
  draw();
});

// ============================================================
// START / PAUSE / RESET
// ============================================================

startBtn.addEventListener('click', () => {
  if (finished) return;

  if (running) {
    running = false;
    lastTimestamp = null;
    startBtn.textContent = '▶ Resume';
  } else {
    running = true;
    startBtn.textContent = '⏸ Pause';
    velBtns.forEach(b => b.disabled = true);
    distSlider.disabled = true;
    requestAnimationFrame(gameLoop);
  }
});

resetBtn.addEventListener('click', () => {
  running       = false;
  finished      = false;
  simTime       = 0;
  lastTimestamp  = null;
  sourceX       = SOURCE_START_X;
  observerY     = getObserverY();
  prePopulateWaves();
  emitFlashTimer = 0;

  startBtn.textContent = '▶ Start';
  startBtn.disabled = false;
  velBtns.forEach(b => b.disabled = false);
  distSlider.disabled = false;

  updateFreqDisplay();
  draw();
});

// ============================================================
// DISPLAY UPDATES
// ============================================================

function updateFreqDisplay() {
  currentFreq = computeDisplayFreq();
  freqEl.textContent = `Observed f = ${currentFreq.toFixed(0)} Hz`;

  // Color the readout: blue if above source freq, red if below
  if (currentFreq > DISPLAY_SOURCE_FREQ + 2) {
    freqEl.style.color = '#2563eb';  // blue — approaching
  } else if (currentFreq < DISPLAY_SOURCE_FREQ - 2) {
    freqEl.style.color = '#dc2626';  // red — receding
  } else {
    freqEl.style.color = '#d97706';  // amber — near source freq
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================

function gameLoop(timestamp) {
  if (!running) return;

  if (lastTimestamp === null) lastTimestamp = timestamp;
  let dt = (timestamp - lastTimestamp) / 1000;
  dt = Math.min(dt, 0.05);
  lastTimestamp = timestamp;

  simTime += dt;

  emitFlashTimer = Math.max(0, emitFlashTimer - dt);

  // ── Move source ──
  sourceX = SOURCE_START_X + sourceVx * simTime;

  // ── Emit new wave fronts ──
  while (nextEmitTime <= simTime) {
    const ex = SOURCE_START_X + sourceVx * nextEmitTime;
    waves.push({
      emitTime: nextEmitTime,
      emitX: ex,
      emitY: SOURCE_Y
    });
    emitFlashTimer = 0.12;
    nextEmitTime += SOURCE_PERIOD;
  }

  // ── Remove expired waves ──
  waves = waves.filter(w => {
    return WAVE_SPEED * (simTime - w.emitTime) < MAX_WAVE_RADIUS;
  });

  // ── Check for simulation end ──
  if (sourceX > SOURCE_END_X) {
    running  = false;
    finished = true;
    startBtn.textContent = '✓ Done';
    startBtn.disabled = true;
  }

  updateFreqDisplay();
  draw();

  if (running) requestAnimationFrame(gameLoop);
}

// ============================================================
// DRAWING FUNCTIONS
// ============================================================

function draw() {
  ctx.clearRect(0, 0, logW, logH);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, logW, logH);

  // ── Faint source path line ──
  ctx.beginPath();
  ctx.moveTo(0, SOURCE_Y);
  ctx.lineTo(logW, SOURCE_Y);
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // ── Faint line from source to observer ──
  if (sourceX > -30 && sourceX < logW + 30) {
    ctx.beginPath();
    ctx.moveTo(sourceX, SOURCE_Y);
    ctx.lineTo(OBSERVER_X, observerY);
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.06)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Wave fronts ──
  for (const w of waves) {
    const radius = WAVE_SPEED * (simTime - w.emitTime);
    if (radius <= 0) continue;

    const alpha = Math.max(0.04, 0.7 - radius / 650);

    ctx.beginPath();
    ctx.arc(w.emitX, w.emitY, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(30, 120, 220, ${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── Source (speaker icon) ──
  if (sourceX > -30 && sourceX < logW + 30) {
    drawSource(sourceX, SOURCE_Y);
  }

  // ── Observer (smiley face) ──
  drawSmiley(OBSERVER_X, observerY, 22);

  // ── Labels ──
  ctx.textAlign = 'center';
  ctx.font = '12px Arial';
  ctx.fillStyle = '#777';

  if (sourceX > -10 && sourceX < logW + 10) {
    ctx.fillText('Source', sourceX, SOURCE_Y - 18);
  }
  ctx.fillText('Observer', OBSERVER_X, observerY + 40);
}

// ── Draw the wave source as a speaker shape ──────────────
function drawSource(x, y) {
  const bright = emitFlashTimer > 0 ? 1 : 0;

  ctx.fillStyle = bright ? '#ffaa44' : '#d06020';
  ctx.fillRect(x - 10, y - 12, 12, 24);

  ctx.beginPath();
  ctx.moveTo(x + 2, y - 12);
  ctx.lineTo(x + 16, y - 22);
  ctx.lineTo(x + 16, y + 22);
  ctx.lineTo(x + 2, y + 12);
  ctx.closePath();
  ctx.fillStyle = bright ? '#ffc877' : '#e08838';
  ctx.fill();

  if (bright) {
    ctx.beginPath();
    ctx.arc(x + 20, y, 8, -0.6, 0.6);
    ctx.strokeStyle = 'rgba(255, 200, 120, 0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ── Draw the observer as a smiley face ───────────────────
function drawSmiley(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = '#f4d35e';
  ctx.fill();
  ctx.strokeStyle = '#c9a227';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x - 8, y - 6, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 8, y - 6, 3.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x, y + 2, 10, 0.15, Math.PI - 0.15);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2.5;
  ctx.stroke();
}

// ============================================================
// INITIAL RENDER
// ============================================================
prePopulateWaves();
updateFreqDisplay();
draw();
</script>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
