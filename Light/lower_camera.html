<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Cup and Camera</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0f0f0;
  font-family: Arial, sans-serif;
  user-select: none;
  max-width: 600px;
  margin: 0 auto;
}
canvas {
  cursor: grab;
  display: block;
}
canvas.grabbing { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="c" width="600" height="450"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 450;

// Scene geometry
const tableY = 410;
const cupCenterX = 230;
const cupBottomY = tableY;
const cupHalfWidthTop = 80 * 0.7;   // 56
const cupHalfWidthBottom = 70 * 0.7; // 49
const cupHeight = (tableY - 230) * 0.7; // 126
const cupTopY = cupBottomY - cupHeight; // 284
// Penny at bottom center of cup - moved down a little
const penny = { x: cupCenterX, y: cupBottomY - 2, r: 8 };

// Camera
const camLineX = 430;
let camY = 160;
const camMinY = 50;
const camMaxY = 340;
const camW = 60;
const camH = 40;

const rays = [];

const addBtn = { x: 10, y: 10, w: 100, h: 28, label: 'Add Ray' };
const clearBtn = { x: 120, y: 10, w: 100, h: 28, label: 'Clear Rays' };

let dragging = null;

const HANDLE_R = 8;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  let cx, cy;
  if (e.touches && e.touches.length) {
    cx = e.touches[0].clientX;
    cy = e.touches[0].clientY;
  } else {
    cx = e.clientX;
    cy = e.clientY;
  }
  return {
    x: (cx - rect.left) * (canvas.width / rect.width),
    y: (cy - rect.top) * (canvas.height / rect.height)
  };
}

function dist(x1, y1, x2, y2) {
  return Math.hypot(x1 - x2, y1 - y2);
}

function inRect(p, r) {
  return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
}

function hitTest(p) {
  for (let i = rays.length - 1; i >= 0; i--) {
    const r = rays[i];
    if (dist(p.x, p.y, r.x1, r.y1) < HANDLE_R + 4) {
      return { type: 'ray', index: i, end: 1 };
    }
    if (dist(p.x, p.y, r.x2, r.y2) < HANDLE_R + 4) {
      return { type: 'ray', index: i, end: 2 };
    }
  }
  if (p.x > camLineX - camW/2 - 4 && p.x < camLineX + camW/2 + 4 &&
      p.y > camY - camH/2 - 4 && p.y < camY + camH/2 + 4) {
    return { type: 'camera' };
  }
  return null;
}

function addRay() {
  const cy = 120 + rays.length * 15;
  const cx = 200;
  rays.push({
    x1: cx - 60,
    y1: Math.min(cy, cupTopY - 30),
    x2: cx + 60,
    y2: Math.min(cy, cupTopY - 30)
  });
  draw();
}

function onDown(e) {
  e.preventDefault();
  const p = getPos(e);

  if (inRect(p, addBtn)) {
    addRay();
    return;
  }
  if (inRect(p, clearBtn)) {
    rays.length = 0;
    draw();
    return;
  }

  const hit = hitTest(p);
  if (hit) {
    dragging = hit;
    canvas.classList.add('grabbing');
  }
}

function onMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const p = getPos(e);
  if (dragging.type === 'camera') {
    camY = Math.max(camMinY, Math.min(camMaxY, p.y));
  } else if (dragging.type === 'ray') {
    const r = rays[dragging.index];
    const x = Math.max(10, Math.min(W - 10, p.x));
    const y = Math.max(10, Math.min(H - 10, p.y));
    if (dragging.end === 1) {
      r.x1 = x; r.y1 = y;
    } else {
      r.x2 = x; r.y2 = y;
    }
  }
  draw();
}

function onUp(e) {
  dragging = null;
  canvas.classList.remove('grabbing');
}

canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
window.addEventListener('touchmove', onMove, { passive: false });
window.addEventListener('touchend', onUp, { passive: false });

function drawArrow(x1, y1, x2, y2, color) {
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const headLen = 13;
  const headAngle = Math.PI / 6;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(angle - headAngle),
             y2 - headLen * Math.sin(angle - headAngle));
  ctx.lineTo(x2 - headLen * Math.cos(angle + headAngle),
             y2 - headLen * Math.sin(angle + headAngle));
  ctx.closePath();
  ctx.fill();
}

function drawHandle(x, y) {
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x, y, HANDLE_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
}

function drawButton(b) {
  ctx.fillStyle = 'rgba(76, 175, 80, 0.9)';
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 2;
  roundRect(b.x, b.y, b.w, b.h, 4);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2 + 1);
  ctx.textBaseline = 'alphabetic';
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawCoffeeCup() {
  const topL = cupCenterX - cupHalfWidthTop;
  const topR = cupCenterX + cupHalfWidthTop;
  const botL = cupCenterX - cupHalfWidthBottom;
  const botR = cupCenterX + cupHalfWidthBottom;

  // Fill the cup interior (body above table) with white
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(topL, cupTopY);
  ctx.lineTo(botL, cupBottomY);
  ctx.lineTo(botR, cupBottomY);
  ctx.lineTo(topR, cupTopY);
  ctx.closePath();
  ctx.fill();

  // Fill the bottom ellipse of the cup (the part that dips below tableY) with white
  // to cover the brown table showing through. Drawn above the table but beneath
  // the penny and the cup outlines.
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(cupCenterX, cupBottomY, cupHalfWidthBottom, 8 * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Cup sides
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(topL, cupTopY);
  ctx.lineTo(botL, cupBottomY);
  ctx.moveTo(topR, cupTopY);
  ctx.lineTo(botR, cupBottomY);
  ctx.stroke();

  // Top rim ellipse
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cupCenterX, cupTopY, cupHalfWidthTop, 10 * 0.7, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Cup bottom front curve
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.ellipse(cupCenterX, cupBottomY, cupHalfWidthBottom, 8 * 0.7, 0, 0, Math.PI);
  ctx.stroke();

  // Back of bottom (dotted)
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.ellipse(cupCenterX, cupBottomY, cupHalfWidthBottom, 8 * 0.7, 0, Math.PI, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Handle - connects to the right side of the cup
  // Attach at two points on the right cup side
  const handleTopX = topR - 2;
  const handleTopY = cupTopY + 18;
  const handleBotX = topR + (botR - topR) * 0.55;
  const handleBotY = cupTopY + (cupBottomY - cupTopY) * 0.55;
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 3;
  ctx.beginPath();
  // Curve outward from top attachment, around, back to bottom attachment
  const ctrl1X = handleTopX + 38;
  const ctrl1Y = handleTopY + 2;
  const ctrl2X = handleBotX + 38;
  const ctrl2Y = handleBotY - 2;
  ctx.moveTo(handleTopX, handleTopY);
  ctx.bezierCurveTo(ctrl1X, ctrl1Y, ctrl2X, ctrl2Y, handleBotX, handleBotY);
  ctx.stroke();

  // Penny (drawn on top of white fill, so brown table is hidden beneath)
  ctx.fillStyle = '#b87333';
  ctx.strokeStyle = '#7a4a1a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(penny.x, penny.y, penny.r, penny.r * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
}

function drawTable() {
  ctx.fillStyle = '#c19a6b';
  ctx.fillRect(0, tableY, W, 6);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, tableY);
  ctx.lineTo(W, tableY);
  ctx.stroke();
  ctx.fillStyle = '#a37f4e';
  ctx.fillRect(0, tableY + 6, W, H - tableY - 6);
}

function drawCamera() {
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(camLineX, 10);
  ctx.lineTo(camLineX, H - 10);
  ctx.stroke();
  ctx.setLineDash([]);

  const targetX = cupCenterX;
  const targetY = cupTopY + 5;
  const ang = Math.atan2(targetY - camY, targetX - camLineX);

  ctx.save();
  ctx.translate(camLineX, camY);
  ctx.rotate(ang);

  ctx.fillStyle = '#2c3e50';
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.rect(-camW/2, -camH/2, camW, camH);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#34495e';
  ctx.beginPath();
  ctx.rect(-8, -camH/2 - 8, 20, 8);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(camW/2 + 6, 0, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#4a6278';
  ctx.beginPath();
  ctx.arc(camW/2 + 6, 0, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(camW/2 + 4, -2, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(-camW/2 + 10, -camH/2 - 4, 3.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawRays() {
  for (const r of rays) {
    drawArrow(r.x1, r.y1, r.x2, r.y2, '#e74c3c');
    drawHandle(r.x1, r.y1);
    drawHandle(r.x2, r.y2);
  }
}

function draw() {
  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(0, 0, W, H);

  drawTable();
  drawCoffeeCup();
  drawCamera();
  drawRays();

  drawButton(addBtn);
  drawButton(clearBtn);
}

draw();

function reportHeight() {
  window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
}
window.addEventListener('load', reportHeight);
</script>
</body>
</html>
