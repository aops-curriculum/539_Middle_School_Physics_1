<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="eigennode-aspect" content="87/100">
<title>Sun Reflection off Glass Skyscraper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #4A90D9;
  font-family: Arial, sans-serif;
  user-select: none;
  -webkit-user-select: none;
}
canvas { display: block; width: 100%; height: 100%; }
#controls {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: rgba(255,255,255,0.72);
  border-radius: 6px;
  padding: 5px 14px;
  pointer-events: auto;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.slider-row label {
  font-size: 13px;
  color: #444;
  white-space: nowrap;
}
.slider-row input[type="range"] {
  width: 160px;
  accent-color: #f9a825;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="controls">
  <div class="slider-row">
    <label>Sun angle:</label>
    <input type="range" id="angleSlider" min="10" max="80" value="35">
  </div>
  <div class="slider-row" id="curveContainer" style="display:none">
    <label>Curvature:</label>
    <input type="range" id="curveSlider" min="0" max="100" value="40">
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const angleSlider = document.getElementById('angleSlider');
const curveSlider = document.getElementById('curveSlider');

const W = 435, H = 500;

function fit() {
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  if (!cw || !ch) return;
  canvas.width  = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
  draw();
}

const GROUND_Y = 440;
const MAX_BOUNCES = 6;
const RAY_MAX_LEN = 1500;

// URL params
const _Q = new URLSearchParams(location.search);
const mirrorType = _Q.get('mirrorType') || 'flat'; // 'flat' | 'convex' | 'concave'
const isCurved = mirrorType !== 'flat';

// Dynamic title
document.title = mirrorType === 'concave' ? 'Sun Reflection off Concave Glass Skyscraper'
               : mirrorType === 'convex'  ? 'Sun Reflection off Convex Glass Skyscraper'
               : 'Sun Reflection off Glass Skyscraper';

// Show curvature slider for non-flat modes
if (isCurved) {
  document.getElementById('curveContainer').style.display = '';
  curveSlider.addEventListener('input', draw);
}

// Building geometry
const bldgRight   = 510;
const bldgTop     = 60;
const bldgBottom  = GROUND_Y;
const bldgWidth   = 150;
const bldgFlatLeft = bldgRight - bldgWidth; // 360 — left edge at zero curvature

// maxBow: max pixel deviation from flat (for convex: leftward, for concave: rightward)
const maxBow = 80;

// Window layout (purely visual)
const windowRows = 13;
const windowH = (bldgBottom - bldgTop) / windowRows;
const windowProtrusion = 8;

// Car geometry
const carX = 80, carY = GROUND_Y;
const carW = 120, carH = 30;
const carBodyRect  = { x: carX,      y: carY - 15, w: 60, h: 15 };
const carCabinRect = { x: carX + 15, y: carY - 24, w: 28, h:  9 };
const cabinX = carX + 30, cabinY = carY - carH - 18;
const cabinW = 55, cabinH = 18;

// Melt easter egg state
let meltProgress = 0, animFrameId = null;

// ── Curve math (signed bow) ────────────────────────────────────────────────
// bow > 0  → convex: surface bulges LEFT (outward) by bow px at midpoint
// bow < 0  → concave: surface recedes RIGHT (inward) by |bow| px at midpoint
// bow = 0  → flat: vertical wall at bldgFlatLeft
//
// x(y) = bldgFlatLeft - bow*(1-t²), t = (y-midY)/halfH
//   convex  (bow>0): x < bldgFlatLeft at middle  ✓
//   concave (bow<0): x > bldgFlatLeft at middle  ✓
//   flat    (bow=0): x = bldgFlatLeft everywhere ✓

function getCurveX(y, bow) {
  const midY = (bldgTop + bldgBottom) / 2;
  const halfH = (bldgBottom - bldgTop) / 2;
  const t = (y - midY) / halfH;
  return bldgFlatLeft - bow * (1 - t * t);
}

// dx/dy of getCurveX  (same formula works for all bow signs)
function getCurveDxDy(y, bow) {
  const midY = (bldgTop + bldgBottom) / 2;
  const halfH = (bldgBottom - bldgTop) / 2;
  const t = (y - midY) / halfH;
  return 2 * bow * t / halfH;
}

// Outward normal pointing left (away from building interior)
function getCurveNormal(y, bow) {
  const dxdy = getCurveDxDy(y, bow);
  const len = Math.sqrt(1 + dxdy * dxdy);
  return { nx: -1 / len, ny: dxdy / len };
}

// Segment-approximate the curved left face for ray tracing
function getCurveSurfaces(bow) {
  const segments = 40;
  const surfaces = [];
  for (let i = 0; i < segments; i++) {
    const y1 = bldgTop + (bldgBottom - bldgTop) * i / segments;
    const y2 = bldgTop + (bldgBottom - bldgTop) * (i + 1) / segments;
    const x1 = getCurveX(y1, bow);
    const x2 = getCurveX(y2, bow);
    const n  = getCurveNormal((y1 + y2) / 2, bow);
    surfaces.push({ x1, y1, x2, y2, nx: n.nx, ny: n.ny, type: 'glass' });
  }
  // Roof (always blocks incoming rays from above)
  surfaces.push({ x1: getCurveX(bldgTop, bow), y1: bldgTop,
                  x2: bldgRight, y2: bldgTop, nx: 0, ny: -1, type: 'wall' });
  return surfaces;
}

// ── Ray tracing ────────────────────────────────────────────────────────────

function raySegmentIntersect(ox, oy, dx, dy, x1, y1, x2, y2) {
  const ex = x2 - x1, ey = y2 - y1;
  const denom = dx * ey - dy * ex;
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((x1 - ox) * ey - (y1 - oy) * ex) / denom;
  const u = ((x1 - ox) * dy  - (y1 - oy) * dx) / denom;
  if (t > 0.01 && u >= 0 && u <= 1) return { t, x: ox + dx * t, y: oy + dy * t };
  return null;
}

function rayRectIntersect(ox, oy, dx, dy, rect) {
  const sides = [
    { x1: rect.x,          y1: rect.y,          x2: rect.x + rect.w, y2: rect.y,          nx:  0, ny: -1 },
    { x1: rect.x,          y1: rect.y + rect.h,  x2: rect.x + rect.w, y2: rect.y + rect.h, nx:  0, ny:  1 },
    { x1: rect.x,          y1: rect.y,          x2: rect.x,          y2: rect.y + rect.h,  nx: -1, ny:  0 },
    { x1: rect.x + rect.w, y1: rect.y,          x2: rect.x + rect.w, y2: rect.y + rect.h,  nx:  1, ny:  0 },
  ];
  let best = null;
  for (const s of sides) {
    const hit = raySegmentIntersect(ox, oy, dx, dy, s.x1, s.y1, s.x2, s.y2);
    if (hit && (!best || hit.t < best.t)) best = { t: hit.t, x: hit.x, y: hit.y, nx: s.nx, ny: s.ny };
  }
  return best;
}

function traceRay(ox, oy, dx, dy, allSurfaces) {
  const segments = [];
  let hitCar = false;
  let cx = ox, cy = oy, rdx = dx, rdy = dy;

  for (let bounce = 0; bounce <= MAX_BOUNCES; bounce++) {
    let closest = null, hitType = null, hitNx = 0, hitNy = 0;

    for (const surf of allSurfaces) {
      const hit = raySegmentIntersect(cx, cy, rdx, rdy, surf.x1, surf.y1, surf.x2, surf.y2);
      if (hit && (!closest || hit.t < closest.t)) {
        closest = { t: hit.t, x: hit.x, y: hit.y };
        hitNx = surf.nx; hitNy = surf.ny; hitType = surf.type;
      }
    }

    if (rdy > 0) {
      const tg = (GROUND_Y - cy) / rdy;
      if (tg > 0.01 && (!closest || tg < closest.t)) {
        closest = { t: tg, x: cx + rdx * tg, y: GROUND_Y };
        hitNx = 0; hitNy = -1; hitType = 'ground';
      }
    }

    for (const rect of [carBodyRect, carCabinRect]) {
      const hit = rayRectIntersect(cx, cy, rdx, rdy, rect);
      if (hit && (!closest || hit.t < closest.t)) {
        closest = hit; hitNx = hit.nx; hitNy = hit.ny; hitType = 'car';
      }
    }

    if (!closest) {
      segments.push({ x1: cx, y1: cy, x2: cx + rdx * RAY_MAX_LEN, y2: cy + rdy * RAY_MAX_LEN, reflected: bounce > 0 });
      break;
    }

    segments.push({ x1: cx, y1: cy, x2: closest.x, y2: closest.y, reflected: bounce > 0 });

    if (hitType === 'glass') {
      const dot = rdx * hitNx + rdy * hitNy;
      rdx -= 2 * dot * hitNx; rdy -= 2 * dot * hitNy;
      cx = closest.x; cy = closest.y;
    } else {
      if (hitType === 'car' && bounce > 0) hitCar = true;
      break;
    }
  }
  segments.hitCar = hitCar;
  return segments;
}

// ── Scene drawing ──────────────────────────────────────────────────────────

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#4A90D9');
  grad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawGround() {
  ctx.fillStyle = '#555';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  ctx.setLineDash([20, 15]);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 30); ctx.lineTo(W, GROUND_Y + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#888';
  ctx.fillRect(bldgFlatLeft - 25, GROUND_Y, bldgWidth + 50, 8);
}

function drawBuilding(bow) {
  const steps = 60;

  // Main body
  ctx.fillStyle = '#8a8a8a';
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const y = bldgTop + (bldgBottom - bldgTop) * i / steps;
    const x = getCurveX(y, bow);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.lineTo(bldgRight, bldgBottom);
  ctx.lineTo(bldgRight, bldgTop);
  ctx.closePath();
  ctx.fill();

  // Vertical panel lines (only within building body)
  ctx.strokeStyle = '#7a7a7a';
  ctx.lineWidth = 1;
  const panelCount = 6;
  // leftmost x of the curve: at midpoint for convex (bow>0), at endpoints for concave/flat
  const minLeft = bldgFlatLeft - Math.max(0, bow);
  for (let i = 1; i < panelCount; i++) {
    const px = minLeft + i * (bldgRight - minLeft) / panelCount;
    ctx.beginPath();
    let started = false;
    for (let j = 0; j <= steps; j++) {
      const y = bldgTop + (bldgBottom - bldgTop) * j / steps;
      const edgeX = getCurveX(y, bow);
      if (px >= edgeX && !started) { ctx.moveTo(px, y); started = true; }
      if (px <  edgeX &&  started) { ctx.lineTo(px, y); started = false; }
    }
    if (started) ctx.lineTo(px, bldgBottom);
    ctx.stroke();
  }

  // Windows (follow the curve tangent)
  for (let r = 0; r < windowRows; r++) {
    const yCen = bldgTop + (r + 0.5) * windowH;
    const edgeX = getCurveX(yCen, bow);
    const dxdy  = getCurveDxDy(yCen, bow);
    const tanLen = Math.sqrt(dxdy * dxdy + 1);
    const tx = dxdy / tanLen, ty = 1 / tanLen;
    const nx = -ty, ny = tx;
    const halfH = windowH / 2;
    const corners = [
      { x: edgeX + nx * windowProtrusion - tx * halfH, y: yCen + ny * windowProtrusion - ty * halfH },
      { x: edgeX - tx * halfH, y: yCen - ty * halfH },
      { x: edgeX + tx * halfH, y: yCen + ty * halfH },
      { x: edgeX + nx * windowProtrusion + tx * halfH, y: yCen + ny * windowProtrusion + ty * halfH },
    ];

    // Frame
    ctx.fillStyle = '#606060';
    ctx.beginPath();
    ctx.moveTo(corners[0].x - nx, corners[0].y - ny);
    ctx.lineTo(corners[1].x + nx, corners[1].y + ny);
    ctx.lineTo(corners[2].x + nx, corners[2].y + ny);
    ctx.lineTo(corners[3].x - nx, corners[3].y - ny);
    ctx.closePath();
    ctx.fill();

    // Glass face
    ctx.save();
    ctx.beginPath();
    corners.forEach((c, i) => i === 0 ? ctx.moveTo(c.x, c.y) : ctx.lineTo(c.x, c.y));
    ctx.closePath();
    ctx.clip();
    const glassGrad = ctx.createLinearGradient(
      edgeX + nx * windowProtrusion, yCen + ny * windowProtrusion, edgeX, yCen);
    glassGrad.addColorStop(0, '#7ec8e3');
    glassGrad.addColorStop(1, '#5ba3c9');
    ctx.fillStyle = glassGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    ctx.lineTo(corners[3].x, corners[3].y);
    ctx.stroke();
    ctx.restore();

    // Outline
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    corners.forEach((c, i) => i === 0 ? ctx.moveTo(c.x, c.y) : ctx.lineTo(c.x, c.y));
    ctx.closePath();
    ctx.stroke();
  }

  // Building outline
  ctx.strokeStyle = '#456';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const topLeftX = getCurveX(bldgTop, bow);   // = bldgFlatLeft (t=±1 → 1-t²=0)
  const botLeftX = getCurveX(bldgBottom, bow); // = bldgFlatLeft
  ctx.moveTo(topLeftX, bldgTop);
  ctx.lineTo(bldgRight, bldgTop);
  ctx.lineTo(bldgRight, bldgBottom);
  ctx.lineTo(botLeftX, bldgBottom);
  for (let i = steps; i >= 0; i--) {
    const y = bldgTop + (bldgBottom - bldgTop) * i / steps;
    ctx.lineTo(getCurveX(y, bow), y);
  }
  ctx.stroke();

  // Roof accent
  ctx.fillStyle = '#456';
  ctx.fillRect(topLeftX, bldgTop, bldgRight - topLeftX, 4);
}

function drawCar(melt) {
  ctx.save();
  ctx.translate(carX, carY);
  ctx.scale(0.5, 0.5);
  ctx.translate(-carX, -carY);

  // Heat glow
  if (melt > 0.05) {
    const glowSize = 40 + melt * 60;
    const glow = ctx.createRadialGradient(carX + carW / 2, carY - carH / 2, 0,
                                          carX + carW / 2, carY - carH / 2, glowSize);
    glow.addColorStop(0, `rgba(255,${Math.floor(180 - melt * 130)},0,${melt * 0.45})`);
    glow.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(carX + carW / 2, carY - carH / 2, glowSize, 0, Math.PI * 2);
    ctx.fill();
  }

  // Puddle
  if (melt > 0.2) {
    const pp = (melt - 0.2) / 0.8;
    ctx.fillStyle = `rgba(30,8,3,${(0.4 + pp * 0.5).toFixed(2)})`;
    ctx.beginPath();
    ctx.ellipse(carX + carW / 2, carY + 3, carW * 0.3 + pp * carW * 0.6, 2 + pp * 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Deformation
  if (melt > 0) {
    ctx.translate(carX + carW / 2, carY);
    ctx.scale(1 + melt * 0.5, 1 - melt * 0.82);
    ctx.translate(-(carX + carW / 2), -carY);
  }

  // Body color: heats from dark to red-orange
  const br = Math.floor(17 + melt * 190), bg = Math.floor(17 + melt * 40), bb = Math.floor(17 - melt * 17);
  const cr = Math.floor(42 + melt * 170), cg = Math.floor(42 + melt * 20), cb = Math.floor(58 - melt * 58);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(carX + carW / 2, GROUND_Y + 2, carW / 2 + 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = `rgb(${br},${bg},${bb})`;
  ctx.beginPath();
  ctx.moveTo(carX, carY);
  ctx.lineTo(carX, carY - carH);
  ctx.lineTo(carX + 10, carY - carH - 5);
  ctx.lineTo(carX + carW - 10, carY - carH - 5);
  ctx.lineTo(carX + carW, carY - carH);
  ctx.lineTo(carX + carW, carY);
  ctx.closePath();
  ctx.fill();

  // Cabin
  ctx.fillStyle = `rgb(${cr},${cg},${cb})`;
  ctx.beginPath();
  ctx.moveTo(cabinX, cabinY + cabinH);
  ctx.lineTo(cabinX + 8, cabinY);
  ctx.lineTo(cabinX + cabinW - 8, cabinY);
  ctx.lineTo(cabinX + cabinW, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  // Windows (fade as car melts)
  const wa = Math.max(0, 1 - melt * 2.5);
  ctx.fillStyle = `rgba(100,150,200,${(0.30 * wa).toFixed(3)})`;
  ctx.beginPath();
  ctx.moveTo(cabinX + 2, cabinY + cabinH); ctx.lineTo(cabinX + 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + 2); ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + cabinH);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = `rgba(100,150,200,${(0.25 * wa).toFixed(3)})`;
  ctx.beginPath();
  ctx.moveTo(cabinX + cabinW / 2 + 2, cabinY + cabinH); ctx.lineTo(cabinX + cabinW / 2 + 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 10, cabinY + 2); ctx.lineTo(cabinX + cabinW - 2, cabinY + cabinH);
  ctx.closePath(); ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(carX + 25, carY, 10, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(carX + carW - 25, carY, 10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#666';
  ctx.beginPath(); ctx.arc(carX + 25, carY, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(carX + carW - 25, carY, 5, 0, Math.PI * 2); ctx.fill();

  // Lights
  ctx.fillStyle = '#ff6';
  ctx.beginPath(); ctx.ellipse(carX + carW, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e33';
  ctx.beginPath(); ctx.ellipse(carX, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2); ctx.fill();

  // Body line
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(carX + 5, carY - carH / 2); ctx.lineTo(carX + carW - 5, carY - carH / 2);
  ctx.stroke();

  ctx.restore();
}

// ── Ray starts ────────────────────────────────────────────────────────────

function getRayStarts(dx, dy) {
  const perpX = -dy, perpY = dx;
  const spacing = 28;
  const ps = [0, W * perpX, H * perpY, W * perpX + H * perpY];
  const pMin = Math.min(...ps) - spacing;
  const pMax = Math.max(...ps) + spacing;
  const starts = [];
  for (let p = Math.ceil(pMin / spacing) * spacing; p <= pMax; p += spacing) {
    let ex, ey;
    if (dy > 1e-10) {
      const x = -p / dy;
      if (x >= -1 && x <= W + 1) { ex = x; ey = 0; }
    }
    if (ex === undefined && dx > 1e-10) {
      const y = p / dx;
      if (y >= -1 && y <= H + 1) { ex = 0; ey = y; }
    }
    if (ex === undefined) continue;
    if (ey > GROUND_Y) continue; // skip entries below street level
    starts.push([ex - dx * 5, ey - dy * 5]);
  }
  return starts;
}

// ── Ray rendering & glow ──────────────────────────────────────────────────

function drawRays(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad), dy = Math.sin(angleRad);

  const allTraced = [];
  for (const [sx, sy] of getRayStarts(dx, dy))
    allTraced.push(traceRay(sx, sy, dx, dy, allSurfaces));

  ctx.lineWidth = 1.5;
  for (const segs of allTraced)
    for (const seg of segs) {
      if (seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255,235,59,0.55)';
      ctx.beginPath(); ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); ctx.stroke();
    }

  ctx.lineWidth = 2;
  for (const segs of allTraced)
    for (const seg of segs) {
      if (!seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255,245,100,0.8)';
      ctx.beginPath(); ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); ctx.stroke();
    }
}

function drawGlowSpots(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad), dy = Math.sin(angleRad);
  for (const [sx, sy] of getRayStarts(dx, dy)) {
    const segs = traceRay(sx, sy, dx, dy, allSurfaces);
    for (let s = 0; s < segs.length; s++) {
      const seg = segs[s];
      if (!seg.reflected || s !== segs.length - 1) continue;
      const gx = seg.x2, gy = seg.y2;
      if (gx < -10 || gx > W + 10 || gy < -10 || gy > H + 10) continue;
      const glow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 12);
      glow.addColorStop(0, 'rgba(255,255,180,0.5)');
      glow.addColorStop(1, 'rgba(255,255,180,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(gx, gy, 12, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function countCarHits(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad), dy = Math.sin(angleRad);
  let count = 0;
  for (const [sx, sy] of getRayStarts(dx, dy))
    if (traceRay(sx, sy, dx, dy, allSurfaces).hitCar) count++;
  return count;
}

// ── Main draw loop ────────────────────────────────────────────────────────

function getSignedBow() {
  if (!isCurved) return 0;
  const frac = parseFloat(curveSlider.value) / 100;
  return (mirrorType === 'convex' ? 1 : -1) * maxBow * frac;
}

function draw() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }

  const angleDeg = parseFloat(angleSlider.value);
  const bow = getSignedBow();
  const allSurfaces = getCurveSurfaces(bow);

  // Melt transition
  const carHits   = countCarHits(angleDeg, allSurfaces);
  const shouldMelt = carHits >= 10;
  if (shouldMelt && meltProgress < 1) meltProgress = Math.min(1, meltProgress + 0.025);
  else if (!shouldMelt && meltProgress > 0) meltProgress = Math.max(0, meltProgress - 0.025);

  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawGround();
  drawGlowSpots(angleDeg, allSurfaces);
  drawRays(angleDeg, allSurfaces);
  drawBuilding(bow);
  drawCar(meltProgress);

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(angleDeg + '° from horizontal', W - 12, H - 10);
  ctx.textAlign = 'left';

  if ((shouldMelt && meltProgress < 1) || (!shouldMelt && meltProgress > 0))
    animFrameId = requestAnimationFrame(draw);
}

angleSlider.addEventListener('input', draw);
new ResizeObserver(fit).observe(canvas);
fit();

</script>


<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    { name: 'mirrorType', type: 'select', values: ['flat', 'convex', 'concave'], default: 'flat',
      desc: 'Building mirror shape' },
  {name:'zoom', type:'toggle', default:0, desc:'Enable zoom/pan controls'},
  ];

  var EMBED_KEYS = ['cheat'];

  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) { var v = overrides[k]; if (v === null || v === '') p.delete(k); else p.set(k, v); }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }
  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null;
  function updateUrlDisplay() {
    if (!urlLinkEl) return;
    var u = buildCleanUrl({});
    urlLinkEl.href = u; urlLinkEl.textContent = u;
  }

  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    return raw !== null ? raw : (def['default'] !== undefined ? String(def['default']) : '');
  }

  function makeControl(def) {
    var effective = getEffective(def);
    if (def.type === 'toggle') {
      var on = effective !== '0' && effective !== 'false' && effective !== '';
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' + (on ? '#6dca80' : '#e07070') +
        ';border:1px solid ' + (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () { var u = {}; u[def.name] = on ? '0' : '1'; window.location.href = buildCheatUrl(u); });
      return btn;
    }
    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) { var o = document.createElement('option'); o.value = v; o.textContent = v; if (effective === String(v)) o.selected = true; sel.appendChild(o); });
      sel.addEventListener('change', function () { var u = {}; u[def.name] = sel.value; window.location.href = buildCheatUrl(u); });
      return sel;
    }
    var inp = document.createElement('input');
    inp.type = def.type === 'number' ? 'number' : 'text';
    inp.value = effective;
    if (def.min !== undefined) inp.min = String(def.min);
    if (def.max !== undefined) inp.max = String(def.max);
    if (def.step !== undefined) inp.step = String(def.step);
    inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;border-radius:3px;padding:3px 6px;width:' + (def.type === 'text' ? '220' : '90') + 'px;font-size:12px;font-family:inherit';
    inp.addEventListener('change', function () { var u = {}; u[def.name] = inp.value; window.location.href = buildCheatUrl(u); });
    return inp;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      if (def.min !== undefined && def.max !== undefined) return def.min + '–' + def.max;
      if (def.min !== undefined) return '≥' + def.min;
      if (def.max !== undefined) return '≤' + def.max;
      return 'number';
    }
    return 'text';
  }

  function render() {
    var panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:rgba(12,18,32,0.97);color:#c8d8e8;font-family:"Segoe UI",system-ui,monospace;font-size:13px;border-top:2px solid #3a7bd5;z-index:2147483647;max-height:48vh;overflow-y:auto;padding:10px 16px 14px;box-sizing:border-box;box-shadow:0 -4px 24px rgba(0,0,0,0.6)';

    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText); title.appendChild(closeBtn); panel.appendChild(title);

    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead(), hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' + (isSet ? 'background:rgba(58,123,213,0.08)' : '');
      var nc = row.insertCell(); nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace'; nc.textContent = def.name;
      var tc = row.insertCell(); tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;max-width:200px;font-family:monospace'; tc.textContent = typeLabel(def);
      var cc = row.insertCell(); cc.style.cssText = 'padding:4px 10px;white-space:nowrap'; cc.appendChild(makeControl(def));
      var dc = row.insertCell(); dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px'; dc.textContent = (def.desc || '') + (def['default'] !== undefined ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) { e.preventDefault(); window.location.href = buildCheatUrl({}); });
    var copyBtn = document.createElement('button');
    copyBtn.textContent = 'copy';
    copyBtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;border-radius:3px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-left:4px';
    copyBtn.addEventListener('click', function () {
      navigator.clipboard.writeText(urlLinkEl ? urlLinkEl.href : buildCleanUrl({})).then(function () {
        copyBtn.textContent = 'copied!'; copyBtn.style.color = '#6dca80';
        setTimeout(function () { copyBtn.textContent = 'copy'; copyBtn.style.color = '#7ab8f5'; }, 1500);
      }).catch(function () { copyBtn.textContent = 'failed'; setTimeout(function () { copyBtn.textContent = 'copy'; }, 1500); });
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel); urlBox.appendChild(urlLinkEl); urlBox.appendChild(copyBtn);
    panel.appendChild(urlBox);
    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render);
  else render();
})();
</script>

<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
