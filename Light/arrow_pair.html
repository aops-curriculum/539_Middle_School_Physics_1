<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="eigennode-aspect" content="1/1">
    <title>Arrow Pair – Drag &amp; Rotate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;   /* match canvas scene bg so letterbox strips are invisible */
            color: #333;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        /* #stage holds the aspect ratio and is centred by the flex body, so the
           canvas never stretches; overlays positioned within it stay aligned. */
        #stage {
            position: relative;
            aspect-ratio: 1 / 1;
            height: min(100%, 100vw);   /* 100vw = (H/W)*100 for 1:1 */
            width: auto;
        }
        /* Overlay the instructions on the canvas so the body stays a single
           full-bleed canvas (aspect 1/1) — no DOM chrome to throw off sizing. */
        #instructions {
            position: absolute;
            top: 8px; left: 0; right: 0;
            z-index: 1;
            font-size: 14px;
            color: #666;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(255,255,255,0.6);
        }
        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
            background: #ffffff;
        }
        canvas.dragging { cursor: grabbing; }
    </style>
</head>
<body>
    <div id="stage">
        <p id="instructions">Drag to move. Scroll wheel to rotate. Right-click to flip.</p>
        <canvas id="canvas" width="600" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const W = 600, H = 600;   // logical design grid (matches eigennode-aspect 1/1)
        // fit() owns the base transform: backing store = displayed size * dpr
        // (crisp at any size), logical W x H mapped onto it. Re-runs on resize.
        // Never reset this transform to identity in draw(); use save()/restore().
        function fit() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.clientWidth, ch = canvas.clientHeight;
            if (!cw || !ch) return;
            canvas.width = Math.round(cw * dpr);
            canvas.height = Math.round(ch * dpr);
            ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
            draw();
        }

        // ── Arrow shape constants ──
        const AL = 50;      // half-length
        const BH = 16;      // body half-height
        const HH = 28;      // head half-height
        const HS = 15;      // x where head widens

        // Two sprites: each has position, rotation, flip
        const sprites = [
            { x: 200, y: 300, angle: 0, flipY: 1 },
            { x: 400, y: 300, angle: 0, flipY: 1 }
        ];

        let dragging = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        function hitTest(mx, my, sprite) {
            const radius = AL + 10;
            const dx = mx - sprite.x;
            const dy = my - sprite.y;
            return (dx * dx + dy * dy) <= radius * radius;
        }

        function topSpriteAt(mx, my) {
            for (let i = sprites.length - 1; i >= 0; i--) {
                if (hitTest(mx, my, sprites[i])) return i;
            }
            return -1;
        }

        function drawArrow(sp) {
            ctx.save();
            ctx.translate(sp.x, sp.y);
            ctx.rotate(sp.angle);
            ctx.scale(1, sp.flipY);

            // Top half (blue)
            ctx.beginPath();
            ctx.moveTo(-AL, 0);
            ctx.lineTo(-AL, -BH);
            ctx.lineTo(HS, -BH);
            ctx.lineTo(HS, -HH);
            ctx.lineTo(AL, 0);
            ctx.closePath();
            ctx.fillStyle = '#4488ff';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.stroke();

            // Bottom half (red)
            ctx.beginPath();
            ctx.moveTo(-AL, 0);
            ctx.lineTo(-AL, BH);
            ctx.lineTo(HS, BH);
            ctx.lineTo(HS, HH);
            ctx.lineTo(AL, 0);
            ctx.closePath();
            ctx.fillStyle = '#ee3333';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.stroke();

            // Centre divider
            ctx.beginPath();
            ctx.moveTo(-AL, 0);
            ctx.lineTo(AL, 0);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            for (const sp of sprites) {
                drawArrow(sp);
            }
        }

        // --- Pointer helpers ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return {
                x: (touch.clientX - rect.left) * (W / rect.width),
                y: (touch.clientY - rect.top) * (H / rect.height)
            };
        }

        // --- Mouse / touch: drag ---
        function onDown(e) {
            e.preventDefault();
            const pos = getPos(e);
            const idx = topSpriteAt(pos.x, pos.y);
            if (idx >= 0) {
                dragging = idx;
                dragOffsetX = pos.x - sprites[idx].x;
                dragOffsetY = pos.y - sprites[idx].y;
                canvas.classList.add('dragging');

                // Bring to front
                if (idx < sprites.length - 1) {
                    const sp = sprites.splice(idx, 1)[0];
                    sprites.push(sp);
                    dragging = sprites.length - 1;
                }
            }
        }

        function onMove(e) {
            if (dragging === null) return;
            e.preventDefault();
            const pos = getPos(e);
            sprites[dragging].x = pos.x - dragOffsetX;
            sprites[dragging].y = pos.y - dragOffsetY;
            draw();
        }

        function onUp(e) {
            dragging = null;
            canvas.classList.remove('dragging');
        }

        canvas.addEventListener('mousedown', onDown);
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseup', onUp);
        canvas.addEventListener('mouseleave', onUp);

        canvas.addEventListener('touchstart', onDown, { passive: false });
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchend', onUp);

        // --- Scroll wheel: rotate ---
        canvas.addEventListener('wheel', function (e) {
            e.preventDefault();
            const pos = getPos(e);
            const idx = topSpriteAt(pos.x, pos.y);
            if (idx >= 0) {
                sprites[idx].angle += e.deltaY * 0.005;
                draw();
            }
        }, { passive: false });

        // --- Right-click: mirror flip ---
        canvas.addEventListener('contextmenu', function (e) {
            e.preventDefault();
            const pos = getPos(e);
            const idx = topSpriteAt(pos.x, pos.y);
            if (idx >= 0) {
                sprites[idx].flipY *= -1;
                draw();
            }
        });

        // Size to the iframe and redraw on any resize. fit() does the initial draw.
        new ResizeObserver(fit).observe(canvas);
        fit();
    </script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
