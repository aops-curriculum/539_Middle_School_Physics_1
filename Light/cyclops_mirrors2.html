<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyclops Cylindrical Mirror</title>
<meta name="eigennode-aspect" content="1/1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0a0f1e;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    font-family: Arial, sans-serif;
    color: white;
    user-select: none;
  }
  #cwrap { flex: 1 1 auto; min-height: 0; width: 100%; display: flex; align-items: center; justify-content: center; }
  p.instructions { font-size: 14px; color: #aaa; text-align: center; margin-bottom: 6px; }
  canvas { display: block; max-width: 100%; max-height: 100%; cursor: default; }
  #controls {
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    color: #c8d8f0;
  }
  #controls input[type=range] {
    width: 180px;
    accent-color: #4a90d0;
    cursor: pointer;
  }
  #diamLabel { font-weight: bold; min-width: 2em; text-align: right; }
</style>
</head>
<body>
<p class="instructions">Drag the ruler to measure distances. Right-click drag to rotate.</p>
<div id="cwrap"><canvas id="canvas" width="600" height="420"></canvas></div>
<div id="controls">
  <label for="diamSlider">Cylinder diameter:</label>
  <input type="range" id="diamSlider" min="1" max="20" value="12" step="1">
  <span id="diamLabel">12</span> cm
</div>

<script>
'use strict';
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const S = 0.75;
const SCALE = 20 * S; // px per cm

// ── Horizontal layout: shrink to fit content ──────────────────────────────────
const CONTENT_HALF = 9 * SCALE + 20; // cyclops hand radius + padding
const CANVAS_W = Math.ceil(CONTENT_HALF * 2 + 40); // ~330
canvas.width = CANVAS_W;
const W = canvas.width, CX = W / 2;

// ── Cylinder (circular convex) mirror ─────────────────────────────────────────
const FM_Y = 54 * S; // mirror front face y
let CM_R  = 6 * SCALE;
let CM_CY = FM_Y - CM_R;

// ── Cyclops geometry ──────────────────────────────────────────────────────────
const CY_EYE_Y = 310 * S;
const CY_Y     = 316 * S;
const CY_HR    = 36 * S;
const CY_ARM_Y = 322 * S;
const CY_HALF  = 9 * SCALE;

// ── Vertical layout: compute canvas height to fit snugly ──────────────────────
const CYCLOPS_BOTTOM = CY_Y + CY_HR + 42 * S + 6; // "Cyclops" label + padding
const LEGEND_Y = CYCLOPS_BOTTOM + 8;
const LEGEND_BOTTOM = LEGEND_Y + 32 * S + 4;
const CANVAS_H = Math.ceil(LEGEND_BOTTOM + 6);
canvas.height = CANVAS_H;
const H = canvas.height;

// ── DPR fix for sharp rendering on high-DPI screens ──────────────────────────
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr; canvas.height = H * dpr;
ctx.scale(dpr, dpr);

// ── Numerical reflection-point solver ────────────────────────────────────────
function findReflectionPoint(sx, sy, ex, ey, cx, cy, r) {
  function fEval(theta) {
    const mx = cx + r * Math.cos(theta);
    const my = cy + r * Math.sin(theta);
    const nx = Math.cos(theta), ny = Math.sin(theta);
    const ux = mx - sx, uy = my - sy, ul = Math.hypot(ux, uy);
    const vx = ex - mx, vy = ey - my, vl = Math.hypot(vx, vy);
    if (ul < 0.5 || vl < 0.5) return NaN;
    return ((vx/vl) - (ux/ul)) * ny - ((vy/vl) - (uy/ul)) * nx;
  }

  const a0 = Math.PI / 36, a1 = Math.PI - Math.PI / 36;
  const N = 360;
  let prevF = fEval(a0), prevT = a0, result = null;

  for (let i = 1; i <= N; i++) {
    const t = a0 + (a1 - a0) * i / N;
    const curr = fEval(t);
    if (!isNaN(prevF) && !isNaN(curr) && prevF * curr < 0) {
      let lo = prevT, hi = t;
      for (let k = 0; k < 52; k++) {
        const mid = (lo + hi) / 2;
        if (fEval(lo) * fEval(mid) <= 0) hi = mid; else lo = mid;
      }
      const theta = (lo + hi) / 2;
      const mx = cx + r * Math.cos(theta);
      const my = cy + r * Math.sin(theta);
      const ux = mx - sx, uy = my - sy, ul = Math.hypot(ux, uy);
      const dot = (ux / ul) * Math.cos(theta) + (uy / ul) * Math.sin(theta);
      if (dot < -0.01) {
        result = [mx, my];
        break;
      }
    }
    prevF = curr; prevT = t;
  }
  return result;
}

// ── Cylinder-mirror rays ──────────────────────────────────────────────────────
function buildCylinderRays() {
  const ex = CX, ey = CY_EYE_Y;
  const cy0 = CM_CY, r = CM_R;
  const sources = [
    [CX - CY_HALF, CY_ARM_Y],
    [CX + CY_HALF, CY_ARM_Y],
    [CX - 80 * S,  CY_ARM_Y],
    [CX + 80 * S,  CY_ARM_Y],
    [CX,           CY_ARM_Y],
  ];
  return sources.map(([sx, sy]) => {
    const hit = findReflectionPoint(sx, sy, ex, ey, CX, cy0, r);
    if (!hit) return null;
    return { src: [sx, sy], hit, end: [ex, ey] };
  }).filter(Boolean);
}

let cylinderRays = buildCylinderRays();

// ── Helpers ───────────────────────────────────────────────────────────────────
function arrowHead(x1, y1, x2, y2) {
  const a = Math.atan2(y2 - y1, x2 - x1), L = 9 * S, hw = 0.45;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - L * Math.cos(a - hw), y2 - L * Math.sin(a - hw));
  ctx.lineTo(x2 - L * Math.cos(a + hw), y2 - L * Math.sin(a + hw));
  ctx.closePath(); ctx.fill();
}
function midPt(A, B, t = 0.55) {
  return [A[0] + (B[0] - A[0]) * t, A[1] + (B[1] - A[1]) * t];
}

const INC = 'rgba(255,200,50,0.90)';
const REF = 'rgba(70,200,255,0.90)';

function drawSeg(x1, y1, x2, y2, col, lw) {
  ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

function drawRay(ray) {
  const { src, hit, end } = ray;
  const mi = midPt(src, hit), mr = midPt(hit, end);
  drawSeg(src[0], src[1], hit[0], hit[1], INC, 1.5);
  ctx.fillStyle = INC; arrowHead(src[0], src[1], mi[0], mi[1]);
  drawSeg(hit[0], hit[1], end[0], end[1], REF, 1.5);
  ctx.fillStyle = REF; arrowHead(hit[0], hit[1], mr[0], mr[1]);
}

// ── Cyclops ───────────────────────────────────────────────────────────────────
function drawCyclops() {
  const cx = CX, hy = CY_Y, hr = CY_HR, ay = CY_ARM_Y, hs = CY_HALF;

  // Body
  ctx.fillStyle = '#1a2a5a';
  ctx.beginPath(); ctx.roundRect(cx - 17 * S, hy + hr - 4 * S, 34 * S, 40 * S, 6 * S); ctx.fill();

  // Arms
  ctx.strokeStyle = '#3a70c8'; ctx.lineWidth = 7 * S; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - hr + 4 * S, ay); ctx.lineTo(cx - hs, ay); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + hr - 4 * S, ay); ctx.lineTo(cx + hs, ay); ctx.stroke();

  // Hands with fingers
  ctx.fillStyle = '#3a70c8';
  [cx - hs, cx + hs].forEach(hx => {
    const palmW = 20 * S, palmH = 11 * S;
    const palmY = ay - palmH / 2;
    // Four fingers extending upward
    const nf = 4, fw = 4 * S, fh = 9 * S, fgap = 1 * S;
    const totalFW = nf * fw + (nf - 1) * fgap;
    const fStartX = hx - totalFW / 2;
    for (let f = 0; f < nf; f++) {
      const fx = fStartX + f * (fw + fgap);
      ctx.beginPath(); ctx.roundRect(fx, palmY - fh, fw, fh + 3 * S, 2 * S); ctx.fill();
    }
    // Palm
    ctx.beginPath(); ctx.roundRect(hx - palmW / 2, palmY, palmW, palmH, 4 * S); ctx.fill();
  });

  // Head
  const hg = ctx.createRadialGradient(cx - 8 * S, hy - 10 * S, 4 * S, cx, hy, hr);
  hg.addColorStop(0, '#88c4f8'); hg.addColorStop(1, '#2858b0');
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(cx, hy, hr, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1848a0'; ctx.lineWidth = 1.5 * S;
  ctx.beginPath(); ctx.arc(cx, hy, hr, 0, Math.PI * 2); ctx.stroke();

  ctx.strokeStyle = '#1040a0'; ctx.lineWidth = 2 * S;
  ctx.beginPath(); ctx.arc(cx, CY_EYE_Y + 5 * S, 18 * S, Math.PI * 1.1, Math.PI * 1.9); ctx.stroke();

  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.arc(cx, CY_EYE_Y, 14 * S, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3060c0';
  ctx.beginPath(); ctx.arc(cx, CY_EYE_Y, 10 * S, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#080818';
  ctx.beginPath(); ctx.arc(cx, CY_EYE_Y, 5 * S, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(cx + 3 * S, CY_EYE_Y - 3 * S, 2.5 * S, 0, Math.PI * 2); ctx.fill();

  // 18 cm dimension
  const dy = CY_ARM_Y + 22 * S;
  ctx.strokeStyle = '#8898b0'; ctx.lineWidth = 1; ctx.lineCap = 'butt';
  ctx.beginPath();
  ctx.moveTo(cx - hs, CY_ARM_Y + 12 * S); ctx.lineTo(cx - hs, dy);
  ctx.moveTo(cx + hs, CY_ARM_Y + 12 * S); ctx.lineTo(cx + hs, dy);
  ctx.moveTo(cx - hs, dy); ctx.lineTo(cx + hs, dy);
  ctx.moveTo(cx - hs, dy); ctx.lineTo(cx - hs + 7 * S, dy - 4 * S);
  ctx.moveTo(cx - hs, dy); ctx.lineTo(cx - hs + 7 * S, dy + 4 * S);
  ctx.moveTo(cx + hs, dy); ctx.lineTo(cx + hs - 7 * S, dy - 4 * S);
  ctx.moveTo(cx + hs, dy); ctx.lineTo(cx + hs - 7 * S, dy + 4 * S);
  ctx.stroke();
  ctx.fillStyle = '#aabbd0'; ctx.font = (13 * S) + 'px Arial'; ctx.textAlign = 'center';
  ctx.fillText('18 cm', cx, dy + 15 * S);

  ctx.fillStyle = '#c8d8f0'; ctx.font = 'bold ' + (14 * S) + 'px Arial';
  ctx.fillText('Cyclops', cx, CY_Y + hr + 42 * S);
}

// ── Cylinder mirror ───────────────────────────────────────────────────────────
function drawCylinderMirror() {
  const cx = CX, cy0 = CM_CY, r = CM_R;

  // Wall above the circle — clamp to canvas width
  const wallL = Math.max(0, cx - r - 8 * S);
  const wallR = Math.min(W, cx + r + 8 * S);
  ctx.fillStyle = '#232d44';
  ctx.fillRect(wallL, 0, wallR - wallL, FM_Y + 4 * S);

  // Backing fill
  const bg = ctx.createRadialGradient(cx, cy0, r * 0.15, cx, cy0, r);
  bg.addColorStop(0, '#3a4a6a');
  bg.addColorStop(1, '#1e2840');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(cx, cy0, r, 0, Math.PI * 2); ctx.fill();

  // Reflective outer rim
  const sg = ctx.createLinearGradient(cx - r, cy0, cx + r, cy0);
  sg.addColorStop(0,    '#8898b8');
  sg.addColorStop(0.25, '#ddeeff');
  sg.addColorStop(0.5,  '#f0f6ff');
  sg.addColorStop(0.75, '#ddeeff');
  sg.addColorStop(1,    '#8898b8');
  ctx.strokeStyle = sg;
  ctx.lineWidth = 9 * S;
  ctx.beginPath(); ctx.arc(cx, cy0, r, 0, Math.PI * 2); ctx.stroke();

  // Inner highlight ring
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2 * S;
  ctx.beginPath(); ctx.arc(cx, cy0, r - 4 * S, 0, Math.PI * 2); ctx.stroke();

  // Label — drawn above the wall
  ctx.fillStyle = '#c8d8f0'; ctx.font = 'bold ' + (15 * S) + 'px Arial'; ctx.textAlign = 'center';
  ctx.fillText('Cylindrical Mirror', cx, FM_Y - 28 * S);
}

// ── Ruler ─────────────────────────────────────────────────────────────────────
const RL = 20 * SCALE, RH = 36 * S;
// Default position: above cyclops, centered
let ruler = { x: CX - RL / 2, y: CY_EYE_Y - 60, a: 0 };
let drag = false, dox = 0, doy = 0;
let rot  = false, rot0 = 0, ra0 = 0;

function drawRuler() {
  ctx.save();
  ctx.translate(ruler.x, ruler.y);
  ctx.rotate(ruler.a);

  ctx.fillStyle = 'rgba(240, 220, 150, 0.88)';
  ctx.strokeStyle = 'rgba(140, 110, 40, 0.95)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(0, 0, RL, RH, 3);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle   = 'rgba(20, 10, 0, 1.0)';
  ctx.strokeStyle = 'rgba(20, 10, 0, 0.95)';
  ctx.font = (17 * S) + 'px Arial'; ctx.textAlign = 'center';

  for (let i = 0; i <= 40; i++) {
    const x   = i * SCALE / 2;
    const cm  = (i % 2 === 0);
    const maj = (i % 10 === 0);
    const th  = maj ? RH * 0.55 : cm ? RH * 0.40 : RH * 0.24;
    ctx.lineWidth = maj ? 1.3 : 0.8;
    ctx.beginPath(); ctx.moveTo(x, 0);  ctx.lineTo(x, th);      ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, RH); ctx.lineTo(x, RH - th); ctx.stroke();
    if (cm && i > 0 && i < 40) ctx.fillText(String(i / 2), x, RH * 0.72);
  }
  ctx.font = (18 * S) + 'px Arial'; ctx.textAlign = 'left';
  ctx.fillText('cm', RL - 17 * S, RH * 0.72);

  ctx.restore();
}

function rulerHit(mx, my) {
  const dx = mx - ruler.x, dy = my - ruler.y;
  const c = Math.cos(-ruler.a), s = Math.sin(-ruler.a);
  const lx = dx * c - dy * s, ly = dx * s + dy * c;
  return lx >= -4 && lx <= RL + 4 && ly >= -4 && ly <= RH + 4;
}

// ── Main draw ─────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0f1e'; ctx.fillRect(0, 0, W, H);

  cylinderRays.forEach(drawRay);
  drawCylinderMirror();
  drawCyclops();

  // Legend — positioned just below the Cyclops label
  const ly = LEGEND_Y;
  const lx = CX - 60;
  drawSeg(lx, ly,      lx + 24 * S, ly,      INC, 2 * S);
  ctx.fillStyle = '#d8e4f0'; ctx.font = (12 * S) + 'px Arial'; ctx.textAlign = 'left';
  ctx.fillText('incident ray', lx + 30 * S, ly + 4 * S);
  drawSeg(lx, ly + 16 * S, lx + 24 * S, ly + 16 * S, REF, 2 * S);
  ctx.fillStyle = '#d8e4f0';
  ctx.fillText('reflected ray', lx + 30 * S, ly + 4 * S + 16 * S);

  drawRuler();
}

// ── Slider ────────────────────────────────────────────────────────────────────
const slider    = document.getElementById('diamSlider');
const diamLabel = document.getElementById('diamLabel');

slider.addEventListener('input', () => {
  const diam = parseFloat(slider.value);
  diamLabel.textContent = diam;
  CM_R  = diam / 2 * SCALE;
  CM_CY = FM_Y - CM_R;
  cylinderRays = buildCylinderRays();
  draw();
});

// ── Canvas events ─────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * W / r.width, my = (e.clientY - r.top) * H / r.height;
  if (!rulerHit(mx, my)) return;
  if (e.button === 2) {
    rot = true; rot0 = Math.atan2(my - ruler.y, mx - ruler.x); ra0 = ruler.a;
  } else {
    drag = true; dox = mx - ruler.x; doy = my - ruler.y;
  }
});
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * W / r.width, my = (e.clientY - r.top) * H / r.height;
  if (drag) { ruler.x = mx - dox; ruler.y = my - doy; draw(); }
  else if (rot) { ruler.a = ra0 + Math.atan2(my - ruler.y, mx - ruler.x) - rot0; draw(); }
  else canvas.style.cursor = rulerHit(mx, my) ? 'grab' : 'default';
});
canvas.addEventListener('mouseup',    () => { drag = rot = false; });
canvas.addEventListener('mouseleave', () => { drag = rot = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0], r = canvas.getBoundingClientRect();
  const mx = (t.clientX - r.left) * W / r.width, my = (t.clientY - r.top) * H / r.height;
  if (rulerHit(mx, my)) { drag = true; dox = mx - ruler.x; doy = my - ruler.y; }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault(); if (!drag) return;
  const t = e.touches[0], r = canvas.getBoundingClientRect();
  ruler.x = (t.clientX - r.left) * W / r.width - dox; ruler.y = (t.clientY - r.top) * H / r.height - doy; draw();
}, { passive: false });
canvas.addEventListener('touchend', () => { drag = false; });

draw();
</script>
<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
