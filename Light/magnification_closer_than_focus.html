<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concave Mirror – Draggable Cone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      user-select: none;
    }
    p.instructions {
      font-size: 14px;
      color: #aaa;
      text-align: center;
      padding: 12px 8px 6px;
    }
    canvas {
      display: block;
      border: 1px solid #333;
      border-radius: 6px;
      touch-action: none;
      cursor: default;
    }
  </style>
</head>
<body>
<p class="instructions">Drag the ice-cream cone toward or away from the concave mirror to see how the image changes.</p>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = 600;
const H = 360;
canvas.width = W;
canvas.height = H;

// ── Physics constants (cm) ───────────────────────────────────────────
const F_CM     = 12;        // focal length
const H_OBJ_CM = 12;       // object cone height in cm
const MIN_O    = 0.5;       // minimum object distance (just off the mirror)
const MAX_O    = 60;        // max drag distance

// ── State ────────────────────────────────────────────────────────────
let objDist = 36;           // current object distance in cm
let dragging = false;
let dragStartMouseX = 0;
let dragStartObjDist = 0;

// ── Layout ───────────────────────────────────────────────────────────
const S = 0.75;             // global scale factor
const SCALE   = (W * 0.65) / MAX_O * S;
const mirrorX = W - 150;    // shifted 100px left from original W-50
const axisY   = H * 0.45;

// ── Optics ───────────────────────────────────────────────────────────
function imageDistance(o) {
  if (Math.abs(o - F_CM) < 0.01) return Infinity;
  return (o * F_CM) / (o - F_CM);
}
function magnification(o) {
  const i = imageDistance(o);
  if (!isFinite(i)) return Infinity;
  return -i / o;
}

// cm from mirror → canvas x
function cmToX(d) { return mirrorX - d * SCALE; }

// ── Drawing helpers ──────────────────────────────────────────────────
function arrowHead(x, y, angle) {
  const L = 9, A = Math.PI / 6;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - L * Math.cos(angle - A), y - L * Math.sin(angle - A));
  ctx.moveTo(x, y);
  ctx.lineTo(x - L * Math.cos(angle + A), y - L * Math.sin(angle + A));
  ctx.stroke();
}

function drawOpticalAxis() {
  ctx.save();
  ctx.strokeStyle = 'rgba(180,180,160,0.35)';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([6, 5]);
  ctx.beginPath();
  ctx.moveTo(0, axisY);
  ctx.lineTo(W, axisY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawMirror() {
  const R_CM     = 2 * F_CM;
  const mirrorR  = R_CM * SCALE;
  const mirrorCX = mirrorX - mirrorR;

  const maxHPx = H_OBJ_CM * SCALE * 2.5;
  const halfAngle = (Math.asin(Math.min(maxHPx / mirrorR, 0.55)) + 0.04) * 2;

  // Reflecting surface
  ctx.save();
  ctx.beginPath();
  ctx.arc(mirrorCX, axisY, mirrorR, -halfAngle, halfAngle);
  const grd = ctx.createLinearGradient(mirrorX - 5, 0, mirrorX + 5, 0);
  grd.addColorStop(0, '#888');
  grd.addColorStop(0.4, '#fff');
  grd.addColorStop(0.7, '#ccc');
  grd.addColorStop(1, '#666');
  ctx.strokeStyle = grd;
  ctx.lineWidth   = 4;
  ctx.stroke();

  // Hatching on back
  const N = 12;
  ctx.strokeStyle = '#556';
  ctx.lineWidth   = 1;
  for (let k = 0; k <= N; k++) {
    const a  = -halfAngle + 2 * halfAngle * k / N;
    const sx = mirrorCX + mirrorR * Math.cos(a);
    const sy = axisY    + mirrorR * Math.sin(a);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(a) * 6, sy + Math.sin(a) * 6);
    ctx.stroke();
  }
  ctx.restore();
}

// ── Ice-cream cone ───────────────────────────────────────────────────
function drawConeAt(tipX, tipY, h, inverted, alpha) {
  const dir = inverted ? 1 : -1;
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;

  const cW  = h * 0.24;
  const cH  = h * 0.40;
  const coneTopY = tipY + dir * cH;

  // Cone triangle
  ctx.fillStyle   = '#C68642';
  ctx.strokeStyle = '#A0522D';
  ctx.lineWidth   = Math.max(1, h * 0.015);
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - cW, coneTopY);
  ctx.lineTo(tipX + cW, coneTopY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Waffle lines
  if (h > 21) {
    ctx.strokeStyle = 'rgba(120,60,10,0.35)';
    ctx.lineWidth   = 0.7;
    for (let j = 1; j < 4; j++) {
      const fy = tipY + dir * cH * j / 4;
      const hw = cW * j / 4;
      ctx.beginPath();
      ctx.moveTo(tipX - hw, fy);
      ctx.lineTo(tipX + hw, fy);
      ctx.stroke();
    }
  }

  // Bottom scoop (vanilla)
  const s1Y = tipY + dir * h * 0.52;
  const s1R = h * 0.22;
  ctx.fillStyle   = '#FFF8DC';
  ctx.strokeStyle = '#D4C07A';
  ctx.lineWidth   = Math.max(1, h * 0.012);
  ctx.beginPath();
  ctx.arc(tipX, s1Y, s1R, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Top scoop (strawberry)
  const s2Y = tipY + dir * h * 0.76;
  const s2R = h * 0.19;
  ctx.fillStyle   = '#FFB6C1';
  ctx.strokeStyle = '#E07088';
  ctx.lineWidth   = Math.max(1, h * 0.012);
  ctx.beginPath();
  ctx.arc(tipX, s2Y, s2R, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Highlight on top scoop
  if (h > 19) {
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.arc(tipX - s2R * 0.38, s2Y - dir * s2R * 0.38, s2R * 0.36, 0, Math.PI * 2);
    ctx.fill();
  }

  // Cherry
  const cR = Math.max(2, h * 0.07);
  const cY = tipY + dir * h;
  ctx.fillStyle   = '#CC0022';
  ctx.strokeStyle = '#880011';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.arc(tipX, cY, cR, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Cherry stem
  if (h > 15) {
    ctx.strokeStyle = '#228833';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo(tipX, cY - dir * cR);
    ctx.quadraticCurveTo(tipX + cR * 2, cY - dir * cR * 3, tipX + cR * 1.3, cY - dir * cR * 5);
    ctx.stroke();
  }

  ctx.restore();
}

// ── Ray-circle intersection helper ───────────────────────────────────
function rayMirrorHit(px, py, dx, dy, cx, cy, r) {
  const ax = px - cx, ay = py - cy;
  const A = dx * dx + dy * dy;
  const B = 2 * (ax * dx + ay * dy);
  const C = ax * ax + ay * ay - r * r;
  const disc = B * B - 4 * A * C;
  if (disc < 0) return null;
  const sq = Math.sqrt(disc);
  const t1 = (-B - sq) / (2 * A);
  const t2 = (-B + sq) / (2 * A);
  const pick = t2 > 0 ? t2 : t1;
  if (pick <= 0) return null;
  return { x: px + pick * dx, y: py + pick * dy };
}

// ── Rays ─────────────────────────────────────────────────────────────
function drawRays() {
  const o = objDist;
  const i = imageDistance(o);
  const m = magnification(o);
  const hObj = H_OBJ_CM * SCALE;
  const objX = cmToX(o);
  const objTopY = axisY - hObj;
  const focusX  = cmToX(F_CM);

  const R_CM     = 2 * F_CM;
  const mirrorR  = R_CM * SCALE;
  const mirrorCX = mirrorX - mirrorR;

  const isVirtual = o < F_CM;
  const isAtFocus = Math.abs(o - F_CM) < 0.3;

  // ── CASE 1: Object beyond focal point → real, inverted image ──────
  if (!isVirtual && !isAtFocus) {
    const hImg = Math.abs(m) * H_OBJ_CM * SCALE;
    const imgX = cmToX(i);
    const imgTopY = axisY + hImg;

    // Ray 1 (gold): through focus to mirror, reflects horizontally
    const dir1x = focusX - objX;
    const dir1y = axisY  - objTopY;
    const hit1 = rayMirrorHit(objX, objTopY, dir1x, dir1y, mirrorCX, axisY, mirrorR);

    if (hit1) {
      ctx.save();
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth   = 1.5;

      // Incoming
      ctx.beginPath();
      ctx.moveTo(objX, objTopY);
      ctx.lineTo(hit1.x, hit1.y);
      ctx.stroke();
      arrowHead((objX + hit1.x) / 2, (objTopY + hit1.y) / 2,
                Math.atan2(hit1.y - objTopY, hit1.x - objX));

      // Reflected horizontally
      const ray1EndX = Math.max(imgX - 22, 15);
      ctx.beginPath();
      ctx.moveTo(hit1.x, hit1.y);
      ctx.lineTo(ray1EndX, hit1.y);
      ctx.stroke();
      arrowHead(Math.min(Math.max((hit1.x + ray1EndX) / 2, 22), hit1.x - 22),
                hit1.y, Math.PI);
      ctx.restore();
    }

    // Ray 2 (cyan): to vertex, reflects symmetrically
    ctx.save();
    ctx.strokeStyle = '#00BFFF';
    ctx.lineWidth   = 1.5;

    ctx.beginPath();
    ctx.moveTo(objX, objTopY);
    ctx.lineTo(mirrorX, axisY);
    ctx.stroke();
    arrowHead((objX + mirrorX) / 2, (objTopY + axisY) / 2,
              Math.atan2(axisY - objTopY, mirrorX - objX));

    const slope2 = (imgTopY - axisY) / (imgX - mirrorX);
    let ray2EndX = Math.max(imgX - 22, 15);
    let ray2EndY = axisY + slope2 * (ray2EndX - mirrorX);
    if (ray2EndY > H - 15) {
      ray2EndY = H - 15;
      ray2EndX = mirrorX + (ray2EndY - axisY) / slope2;
    }
    ctx.beginPath();
    ctx.moveTo(mirrorX, axisY);
    ctx.lineTo(ray2EndX, ray2EndY);
    ctx.stroke();
    arrowHead(Math.min(Math.max((mirrorX + ray2EndX) / 2, 22), mirrorX - 30),
              axisY + slope2 * (Math.min(Math.max((mirrorX + ray2EndX) / 2, 22), mirrorX - 30) - mirrorX),
              Math.atan2(ray2EndY - axisY, ray2EndX - mirrorX));
    ctx.restore();
  }

  // ── CASE 2: At focal point → reflected rays diverge, no image ─────
  else if (isAtFocus) {
    // Ray 1 (gold): parallel to axis → mirror → reflects through F
    const hit1 = rayMirrorHit(objX, objTopY, 1, 0, mirrorCX, axisY, mirrorR);
    if (hit1) {
      ctx.save();
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      ctx.moveTo(objX, objTopY);
      ctx.lineTo(hit1.x, hit1.y);
      ctx.stroke();
      arrowHead((objX + hit1.x) / 2, objTopY, 0);

      const rAngle = Math.atan2(axisY - hit1.y, focusX - hit1.x);
      const ray1EndX = 15;
      const ray1EndY = hit1.y + (ray1EndX - hit1.x) * Math.tan(rAngle);
      ctx.beginPath();
      ctx.moveTo(hit1.x, hit1.y);
      ctx.lineTo(ray1EndX, ray1EndY);
      ctx.stroke();
      arrowHead((hit1.x + ray1EndX) / 2, (hit1.y + ray1EndY) / 2, rAngle + Math.PI);
      ctx.restore();
    }

    // Ray 2 (cyan): to vertex, reflects symmetrically below axis
    ctx.save();
    ctx.strokeStyle = '#00BFFF';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(objX, objTopY);
    ctx.lineTo(mirrorX, axisY);
    ctx.stroke();
    arrowHead((objX + mirrorX) / 2, (objTopY + axisY) / 2,
              Math.atan2(axisY - objTopY, mirrorX - objX));

    const refDy = (objTopY - axisY);
    let ray2EndX = 15;
    let ray2EndY = axisY + (-refDy / (mirrorX - objX)) * (ray2EndX - mirrorX);
    if (ray2EndY > H - 15) {
      ray2EndY = H - 15;
      ray2EndX = mirrorX + (ray2EndY - axisY) / ((-refDy) / (mirrorX - objX));
    }
    ctx.beginPath();
    ctx.moveTo(mirrorX, axisY);
    ctx.lineTo(ray2EndX, ray2EndY);
    ctx.stroke();
    arrowHead((mirrorX + ray2EndX) / 2, (axisY + ray2EndY) / 2,
              Math.atan2(ray2EndY - axisY, ray2EndX - mirrorX));
    ctx.restore();
  }

  // ── CASE 3: Object inside focal point → virtual, upright image ────
  else if (isVirtual) {
    const absI = Math.abs(i);
    const absM = Math.abs(m);
    const hImg = absM * H_OBJ_CM * SCALE;

    // Virtual image position: behind the mirror
    const imgX = mirrorX + absI * SCALE;
    const imgTopY = axisY - hImg;

    // Ray 1 (gold): parallel to axis → mirror → reflects through F
    const hit1 = rayMirrorHit(objX, objTopY, 1, 0, mirrorCX, axisY, mirrorR);
    if (hit1) {
      ctx.save();
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth   = 1.5;

      // Incoming: horizontal
      ctx.beginPath();
      ctx.moveTo(objX, objTopY);
      ctx.lineTo(hit1.x, hit1.y);
      ctx.stroke();
      arrowHead((objX + hit1.x) / 2, objTopY, 0);

      // Reflected: through focus, going left
      const rAngle = Math.atan2(axisY - hit1.y, focusX - hit1.x);
      const rDx = Math.cos(rAngle);
      const rDy = Math.sin(rAngle);
      const t_left = (15 - hit1.x) / rDx;
      const ray1EndX = 15;
      const ray1EndY = hit1.y + t_left * rDy;
      ctx.beginPath();
      ctx.moveTo(hit1.x, hit1.y);
      ctx.lineTo(ray1EndX, Math.min(ray1EndY, H - 8));
      ctx.stroke();
      arrowHead(Math.max((hit1.x + ray1EndX) / 2, 30),
                (hit1.y + Math.min(ray1EndY, H - 8)) / 2,
                Math.atan2(Math.min(ray1EndY, H - 8) - hit1.y, ray1EndX - hit1.x));

      // Dashed extension: backward from hit point toward virtual image
      ctx.setLineDash([4, 4]);
      ctx.globalAlpha = 0.5;
      const extEndX = Math.min(imgX, W - 8);
      const extEndY = hit1.y + (-rDy / -rDx) * (extEndX - hit1.x);
      ctx.beginPath();
      ctx.moveTo(hit1.x, hit1.y);
      ctx.lineTo(extEndX, extEndY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1.0;

      ctx.restore();
    }

    // Ray 2 (cyan): to vertex, reflects symmetrically
    ctx.save();
    ctx.strokeStyle = '#00BFFF';
    ctx.lineWidth   = 1.5;

    // Incoming: object top → vertex
    ctx.beginPath();
    ctx.moveTo(objX, objTopY);
    ctx.lineTo(mirrorX, axisY);
    ctx.stroke();
    arrowHead((objX + mirrorX) / 2, (objTopY + axisY) / 2,
              Math.atan2(axisY - objTopY, mirrorX - objX));

    // Reflected: symmetric about axis
    const dy_in = objTopY - axisY;
    const dx_in = mirrorX - objX;
    const reflSlope = -dy_in / dx_in;
    let ray2EndX = 15;
    let ray2EndY = axisY + reflSlope * (ray2EndX - mirrorX);
    if (ray2EndY > H - 15) {
      ray2EndY = H - 15;
      ray2EndX = mirrorX + (ray2EndY - axisY) / reflSlope;
    }
    ctx.beginPath();
    ctx.moveTo(mirrorX, axisY);
    ctx.lineTo(ray2EndX, ray2EndY);
    ctx.stroke();
    arrowHead((mirrorX + ray2EndX) / 2, (axisY + ray2EndY) / 2,
              Math.atan2(ray2EndY - axisY, ray2EndX - mirrorX));

    // Dashed extension: from vertex backward through virtual image
    ctx.setLineDash([4, 4]);
    ctx.globalAlpha = 0.5;
    const extX = Math.min(imgX, W - 8);
    const extSlope = (imgTopY - axisY) / (imgX - mirrorX);
    const extY = axisY + extSlope * (extX - mirrorX);
    ctx.beginPath();
    ctx.moveTo(mirrorX, axisY);
    ctx.lineTo(extX, extY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1.0;

    ctx.restore();
  }
}

// ── Labels ───────────────────────────────────────────────────────────
function drawLabels() {
  const o    = objDist;
  const i    = imageDistance(o);
  const m    = magnification(o);
  const objX = cmToX(o);
  const hObj = H_OBJ_CM * SCALE;

  const isVirtual = o < F_CM;
  const isAtFocus = Math.abs(o - F_CM) < 0.3;

  ctx.save();

  // ── Focus dot and label ────────────────────────────────────────────
  const focusX = cmToX(F_CM);
  ctx.fillStyle = 'rgba(255,200,50,0.7)';
  ctx.beginPath();
  ctx.arc(focusX, axisY, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(220,220,200,0.6)';
  ctx.font = '10px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('F', focusX, axisY - 6);

  // ── Center of curvature ────────────────────────────────────────────
  const ccX = cmToX(2 * F_CM);
  ctx.fillStyle = 'rgba(200,150,50,0.5)';
  ctx.beginPath();
  ctx.arc(ccX, axisY, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(220,220,200,0.6)';
  ctx.textBaseline = 'bottom';
  ctx.fillText('C', ccX, axisY - 6);

  // ── Compute image size for bracket placement ───────────────────────
  let realImgH = 0;
  if (!isAtFocus && isFinite(m)) {
    realImgH = Math.abs(m) * H_OBJ_CM * SCALE;
  }
  const bracketY = axisY + Math.max(isVirtual ? 22 : realImgH + 15, 30);

  // ── Object distance label with bracket ─────────────────────────────
  ctx.font      = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#ddd';

  const oVal   = Math.round(o * 10) / 10;
  const oStr   = (oVal % 1 === 0) ? oVal.toFixed(0) : oVal.toFixed(1);
  const oLabel = 'o = ' + oStr + ' cm';
  const midX   = (objX + mirrorX) / 2;

  ctx.fillText(oLabel, midX, bracketY);

  // Bracket ticks
  ctx.strokeStyle = 'rgba(220,220,220,0.4)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(objX, axisY + 5); ctx.lineTo(objX, bracketY + 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mirrorX, axisY + 5); ctx.lineTo(mirrorX, bracketY + 6);
  ctx.stroke();

  const tw = ctx.measureText(oLabel).width / 2 + 5;
  ctx.beginPath();
  ctx.moveTo(objX, bracketY + 5); ctx.lineTo(midX - tw, bracketY + 5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(midX + tw, bracketY + 5); ctx.lineTo(mirrorX, bracketY + 5);
  ctx.stroke();

  // ── Image info label ───────────────────────────────────────────────
  ctx.font = '11px Arial';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'center';

  if (isAtFocus) {
    ctx.fillStyle = 'rgba(255,180,100,0.7)';
    ctx.fillText('At focus \u2014 no image (rays are parallel)', W / 2, bracketY + 18);
  } else if (isFinite(i)) {
    const iVal = Math.round(Math.abs(i) * 10) / 10;
    const iStr = (iVal % 1 === 0) ? iVal.toFixed(0) : iVal.toFixed(1);
    const typeStr = isVirtual ? 'virtual' : 'real';
    const orientStr = isVirtual ? 'upright' : 'inverted';
    const absM = Math.abs(m);
    const mVal = Math.round(absM * 100) / 100;
    const mStr = mVal.toFixed(2);
    const sizeStr = absM > 1.01 ? 'enlarged' : absM < 0.99 ? 'reduced' : 'same size';

    const iLabel = 'i = ' + iStr + ' cm  \u00b7  ' + typeStr + ', ' + orientStr + ', ' + sizeStr + '  (|m| = ' + mStr + ')';

    ctx.fillStyle = isVirtual ? 'rgba(180,255,200,0.7)' : 'rgba(180,200,255,0.7)';
    ctx.fillText(iLabel, W / 2, bracketY + 18);
  }

  // ── Drag hint ──────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(200,200,200,0.30)';
  ctx.font      = '10px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('\u2190 drag the cone \u2192', objX, axisY - hObj - 8);

  ctx.restore();
}

// ── Hit testing ──────────────────────────────────────────────────────
function hitCone(px, py) {
  const objX = cmToX(objDist);
  const hObj = H_OBJ_CM * SCALE;
  return Math.abs(px - objX) < hObj * 0.5 + 15
      && py > axisY - hObj - 20
      && py < axisY + 20;
}

// ── Main render ──────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  const o = objDist;
  const i = imageDistance(o);
  const m = magnification(o);
  const hObj = H_OBJ_CM * SCALE;
  const objX = cmToX(o);

  const isVirtual = o < F_CM;
  const isAtFocus = Math.abs(o - F_CM) < 0.3;

  drawOpticalAxis();

  // Draw rays (all cases handled inside drawRays)
  if (o > 1) {
    drawRays();
  }

  // Draw image cone
  if (!isAtFocus && isFinite(m) && Math.abs(m) > 0.01) {
    const absM = Math.abs(m);
    const hImg = absM * H_OBJ_CM * SCALE;
    const maxImgH = Math.min(hImg, H * 0.7);

    if (isVirtual) {
      // Virtual image: behind mirror, upright, shown with lower alpha
      const absI = Math.abs(i);
      const imgX = mirrorX + absI * SCALE;
      if (imgX < W + 150 && maxImgH < H * 0.9) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(mirrorX + 4, 0, W - mirrorX, H);
        ctx.clip();
        drawConeAt(imgX, axisY, maxImgH, false, 0.5);
        ctx.restore();
      }
    } else if (i > 0 && i < 150) {
      // Real image: in front of mirror, inverted
      const imgX = cmToX(i);
      const cappedH = Math.min(maxImgH, H - axisY - 15);
      drawConeAt(imgX, axisY, cappedH, true, 0.75);
    }
  }

  drawMirror();
  drawConeAt(objX, axisY, hObj, false, 1.0);
  drawLabels();

  requestAnimationFrame(draw);
}

// ── Input ────────────────────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function onDown(e) {
  const p = getPos(e);
  if (hitCone(p.x, p.y)) {
    dragging = true;
    dragStartMouseX  = p.x;
    dragStartObjDist = objDist;
    canvas.style.cursor = 'grabbing';
  }
}

function onMove(e) {
  const p = getPos(e);
  if (dragging) {
    const dx   = p.x - dragStartMouseX;
    const newD = dragStartObjDist - dx / SCALE;
    objDist = Math.max(MIN_O, Math.min(MAX_O, newD));
  } else {
    canvas.style.cursor = hitCone(p.x, p.y) ? 'grab' : 'default';
  }
}

function onUp() {
  dragging = false;
  canvas.style.cursor = 'default';
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp();    }, { passive: false });

draw();

// Report height for iframe embedding
window.addEventListener('load', () => {
  window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
});
</script>
</body>
