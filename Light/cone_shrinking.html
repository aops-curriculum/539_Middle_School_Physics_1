<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concave Mirror – Draggable Cone</title>
  <style>
    body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: Arial, sans-serif; }
    canvas { display: block; touch-action: none; user-select: none; cursor: default; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Physics constants (cm) ───────────────────────────────────────────
const F_CM     = 12;        // focal length
const H_OBJ_CM = 12;       // object cone height in cm
const MIN_O    = F_CM + 6;   // must be beyond f for real image
const MAX_O    = 60;        // max drag distance

// ── State ────────────────────────────────────────────────────────────
let objDist = 36;           // current object distance in cm
let dragging = false;
let dragStartMouseX = 0;
let dragStartObjDist = 0;

// ── Layout (recomputed on resize) ────────────────────────────────────
let W, H, SCALE, mirrorX, axisY;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;

  // Scale: fit MAX_O cm into ~70% of screen width
  SCALE   = (W * 0.70) / MAX_O;
  mirrorX = W - 60;
  axisY   = H * 0.45;
}

// ── Optics ───────────────────────────────────────────────────────────
function imageDistance(o) { return (o * F_CM) / (o - F_CM); }
function magnification(o) { return -imageDistance(o) / o; }

// cm from mirror → canvas x
function cmToX(d) { return mirrorX - d * SCALE; }

// ── Drawing helpers ──────────────────────────────────────────────────
function arrowHead(x, y, angle) {
  const L = 10, A = Math.PI / 6;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - L * Math.cos(angle - A), y - L * Math.sin(angle - A));
  ctx.moveTo(x, y);
  ctx.lineTo(x - L * Math.cos(angle + A), y - L * Math.sin(angle + A));
  ctx.stroke();
}

function drawOpticalAxis() {
  ctx.save();
  ctx.strokeStyle = 'rgba(180,180,160,0.35)';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(0, axisY);
  ctx.lineTo(W, axisY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawMirror() {
  const R_CM   = 2 * F_CM;
  const mirrorR  = R_CM * SCALE;
  const mirrorCX = mirrorX - mirrorR;

  // Mirror only needs to be tall enough for the object rays + margin
  const maxHPx = H_OBJ_CM * SCALE * 2.5;
  const halfAngle = (Math.asin(Math.min(maxHPx / mirrorR, 0.55)) + 0.04) * 2;

  // Reflecting surface
  ctx.save();
  ctx.beginPath();
  ctx.arc(mirrorCX, axisY, mirrorR, -halfAngle, halfAngle);
  const grd = ctx.createLinearGradient(mirrorX - 6, 0, mirrorX + 6, 0);
  grd.addColorStop(0, '#888');
  grd.addColorStop(0.4, '#fff');
  grd.addColorStop(0.7, '#ccc');
  grd.addColorStop(1, '#666');
  ctx.strokeStyle = grd;
  ctx.lineWidth   = 5;
  ctx.stroke();

  // Hatching on back
  const N = 16;
  ctx.strokeStyle = '#556';
  ctx.lineWidth   = 1;
  for (let k = 0; k <= N; k++) {
    const a  = -halfAngle + 2 * halfAngle * k / N;
    const sx = mirrorCX + mirrorR * Math.cos(a);
    const sy = axisY    + mirrorR * Math.sin(a);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + Math.cos(a) * 8, sy + Math.sin(a) * 8);
    ctx.stroke();
  }
  ctx.restore();
}

// ── Ice-cream cone ───────────────────────────────────────────────────
function drawConeAt(tipX, tipY, h, inverted, alpha) {
  const dir = inverted ? 1 : -1;
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;

  const cW  = h * 0.24;
  const cH  = h * 0.40;
  const coneTopY = tipY + dir * cH;

  // Cone triangle
  ctx.fillStyle   = '#C68642';
  ctx.strokeStyle = '#A0522D';
  ctx.lineWidth   = Math.max(1, h * 0.015);
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - cW, coneTopY);
  ctx.lineTo(tipX + cW, coneTopY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Waffle lines
  if (h > 28) {
    ctx.strokeStyle = 'rgba(120,60,10,0.35)';
    ctx.lineWidth   = 0.7;
    for (let j = 1; j < 4; j++) {
      const fy = tipY + dir * cH * j / 4;
      const hw = cW * j / 4;
      ctx.beginPath();
      ctx.moveTo(tipX - hw, fy);
      ctx.lineTo(tipX + hw, fy);
      ctx.stroke();
    }
  }

  // Bottom scoop (vanilla)
  const s1Y = tipY + dir * h * 0.52;
  const s1R = h * 0.22;
  ctx.fillStyle   = '#FFF8DC';
  ctx.strokeStyle = '#D4C07A';
  ctx.lineWidth   = Math.max(1, h * 0.012);
  ctx.beginPath();
  ctx.arc(tipX, s1Y, s1R, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Top scoop (strawberry)
  const s2Y = tipY + dir * h * 0.76;
  const s2R = h * 0.19;
  ctx.fillStyle   = '#FFB6C1';
  ctx.strokeStyle = '#E07088';
  ctx.lineWidth   = Math.max(1, h * 0.012);
  ctx.beginPath();
  ctx.arc(tipX, s2Y, s2R, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Highlight on top scoop
  if (h > 25) {
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.arc(tipX - s2R * 0.38, s2Y - dir * s2R * 0.38, s2R * 0.36, 0, Math.PI * 2);
    ctx.fill();
  }

  // Cherry
  const cR = Math.max(2.5, h * 0.07);
  const cY = tipY + dir * h;
  ctx.fillStyle   = '#CC0022';
  ctx.strokeStyle = '#880011';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.arc(tipX, cY, cR, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Cherry stem
  if (h > 20) {
    ctx.strokeStyle = '#228833';
    ctx.lineWidth   = 1.2;
    ctx.beginPath();
    ctx.moveTo(tipX, cY - dir * cR);
    ctx.quadraticCurveTo(tipX + cR * 2, cY - dir * cR * 3, tipX + cR * 1.3, cY - dir * cR * 5);
    ctx.stroke();
  }

  ctx.restore();
}

// ── Ray-circle intersection helper ───────────────────────────────────
// Returns the intersection point of a ray from P in direction D
// with a circle centered at C with radius R (rightmost intersection).
function rayMirrorHit(px, py, dx, dy, cx, cy, r) {
  const ax = px - cx, ay = py - cy;
  const A = dx * dx + dy * dy;
  const B = 2 * (ax * dx + ay * dy);
  const C = ax * ax + ay * ay - r * r;
  const disc = B * B - 4 * A * C;
  if (disc < 0) return null;
  const sq = Math.sqrt(disc);
  const t1 = (-B - sq) / (2 * A);
  const t2 = (-B + sq) / (2 * A);
  // We want the intersection where t > 0 and x is rightmost (closest to mirror vertex)
  const pick = t2 > 0 ? t2 : t1;
  if (pick <= 0) return null;
  return { x: px + pick * dx, y: py + pick * dy };
}

// ── Rays ─────────────────────────────────────────────────────────────
// Ray 1 (gold):  object top → through F → mirror  ⟹  reflects horizontally
// Ray 2 (cyan):  object top → vertex     ⟹  reflects at equal angle below axis
//
// Both reflected rays meet at the image top.
function drawRays() {
  const o = objDist;
  const i = imageDistance(o);
  const m = magnification(o);
  const hObj = H_OBJ_CM * SCALE;
  const hImg = Math.abs(m) * H_OBJ_CM * SCALE;

  const objX    = cmToX(o);
  const imgX    = cmToX(i);
  const objTopY = axisY - hObj;
  const imgTopY = axisY + hImg;
  const focusX  = cmToX(F_CM);

  const R_CM   = 2 * F_CM;
  const mirrorR  = R_CM * SCALE;
  const mirrorCX = mirrorX - mirrorR;

  const maxRayY = H - 20;

  // ── Ray 1 (gold): through focus to mirror, reflects horizontally ──
  // Direction from object top toward focus
  const dir1x = focusX - objX;
  const dir1y = axisY  - objTopY;

  // Find where ray hits the curved mirror surface
  const hit1 = rayMirrorHit(objX, objTopY, dir1x, dir1y, mirrorCX, axisY, mirrorR);

  if (hit1 && hit1.y < maxRayY) {
    ctx.save();
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth   = 2;

    // Incoming: object top → mirror surface
    ctx.beginPath();
    ctx.moveTo(objX, objTopY);
    ctx.lineTo(hit1.x, hit1.y);
    ctx.stroke();
    const a1 = Math.atan2(hit1.y - objTopY, hit1.x - objX);
    arrowHead((objX + hit1.x) / 2, (objTopY + hit1.y) / 2, a1);

    // Reflected: horizontal from hit point to the left
    const ray1EndX = Math.max(imgX - 30, 20);
    ctx.beginPath();
    ctx.moveTo(hit1.x, hit1.y);
    ctx.lineTo(ray1EndX, hit1.y);
    ctx.stroke();
    const ar1x = Math.min(Math.max((hit1.x + ray1EndX) / 2, 30), hit1.x - 30);
    arrowHead(ar1x, hit1.y, Math.PI);

    ctx.restore();
  }

  // ── Ray 2 (cyan): to vertex, reflects symmetrically ───────────────
  ctx.save();
  ctx.strokeStyle = '#00BFFF';
  ctx.lineWidth   = 2;

  // Incoming: object top → vertex (vertex is at mirrorX, axisY)
  ctx.beginPath();
  ctx.moveTo(objX, objTopY);
  ctx.lineTo(mirrorX, axisY);
  ctx.stroke();
  const a2 = Math.atan2(axisY - objTopY, mirrorX - objX);
  arrowHead((objX + mirrorX) / 2, (objTopY + axisY) / 2, a2);

  // Reflected: vertex → image top (extend a bit past, clamp to canvas)
  const slope2 = (imgTopY - axisY) / (imgX - mirrorX);
  let ray2EndX = Math.max(imgX - 30, 20);
  let ray2EndY = axisY + slope2 * (ray2EndX - mirrorX);
  // Clamp vertically
  if (ray2EndY > maxRayY) {
    ray2EndY = maxRayY;
    ray2EndX = mirrorX + (ray2EndY - axisY) / slope2;
  }
  ctx.beginPath();
  ctx.moveTo(mirrorX, axisY);
  ctx.lineTo(ray2EndX, ray2EndY);
  ctx.stroke();
  const ra2 = Math.atan2(ray2EndY - axisY, ray2EndX - mirrorX);
  const ar2x = Math.min(Math.max((mirrorX + ray2EndX) / 2, 30), mirrorX - 40);
  arrowHead(ar2x, axisY + slope2 * (ar2x - mirrorX), ra2);

  ctx.restore();
}

// ── Labels ───────────────────────────────────────────────────────────
function drawLabels() {
  const o    = objDist;
  const i    = imageDistance(o);
  const m    = magnification(o);
  const objX = cmToX(o);
  const hObj = H_OBJ_CM * SCALE;
  const hImg = Math.abs(m) * H_OBJ_CM * SCALE;

  ctx.save();

  // ── Focus dot and label ────────────────────────────────────────────
  const focusX = cmToX(F_CM);
  ctx.fillStyle = 'rgba(255,200,50,0.7)';
  ctx.beginPath();
  ctx.arc(focusX, axisY, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(220,220,200,0.6)';
  ctx.font = '13px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('F', focusX, axisY - 8);

  // ── Center of curvature ────────────────────────────────────────────
  const ccX = cmToX(2 * F_CM);
  ctx.fillStyle = 'rgba(200,150,50,0.5)';
  ctx.beginPath();
  ctx.arc(ccX, axisY, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(220,220,200,0.6)';
  ctx.textBaseline = 'bottom';
  ctx.fillText('C', ccX, axisY - 8);

  // ── Object distance label with bracket ─────────────────────────────
  // Place bracket well below the image cone so it doesn't overlap
  const bracketY = axisY + Math.max(hImg + 20, 40);

  ctx.font      = '16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#ddd';

  const oVal   = Math.round(o * 10) / 10;
  const oStr   = (oVal % 1 === 0) ? oVal.toFixed(0) : oVal.toFixed(1);
  const oLabel = 'o = ' + oStr + ' cm';
  const midX   = (objX + mirrorX) / 2;

  ctx.fillText(oLabel, midX, bracketY);

  // Bracket ticks
  ctx.strokeStyle = 'rgba(220,220,220,0.4)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(objX, axisY + 6); ctx.lineTo(objX, bracketY + 8);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mirrorX, axisY + 6); ctx.lineTo(mirrorX, bracketY + 8);
  ctx.stroke();

  // Horizontal lines with gap for text
  const tw = ctx.measureText(oLabel).width / 2 + 6;
  ctx.beginPath();
  ctx.moveTo(objX, bracketY + 6); ctx.lineTo(midX - tw, bracketY + 6);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(midX + tw, bracketY + 6); ctx.lineTo(mirrorX, bracketY + 6);
  ctx.stroke();

  // ── Image distance label ───────────────────────────────────────────
  if (i > 0 && i < 150) {
    const imgX   = cmToX(i);
    const iVal   = Math.round(i * 10) / 10;
    const iStr   = (iVal % 1 === 0) ? iVal.toFixed(0) : iVal.toFixed(1);
    const iLabel = 'i = ' + iStr + ' cm';

    ctx.fillStyle    = 'rgba(180,200,255,0.7)';
    ctx.font         = '14px Arial';
    ctx.textBaseline = 'top';
    ctx.textAlign    = 'center';

    const iMidX   = Math.min((imgX + mirrorX) / 2, W - 70);
    const iLabelY = bracketY + 24;
    ctx.fillText(iLabel, iMidX, iLabelY);
  }

  // ── Drag hint ──────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(200,200,200,0.30)';
  ctx.font      = '13px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('← drag the cone →', objX, axisY - hObj - 10);

  ctx.restore();
}

// ── Hit testing ──────────────────────────────────────────────────────
function hitCone(px, py) {
  const objX = cmToX(objDist);
  const hObj = H_OBJ_CM * SCALE;
  return Math.abs(px - objX) < hObj * 0.5 + 20
      && py > axisY - hObj - 25
      && py < axisY + 25;
}

// ── Main render ──────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  const o    = objDist;
  const i    = imageDistance(o);
  const m    = magnification(o);
  const hObj = H_OBJ_CM * SCALE;
  const hImg = Math.abs(m) * H_OBJ_CM * SCALE;
  const objX = cmToX(o);
  const imgX = cmToX(i);

  drawOpticalAxis();

  // Draw rays + image only when real image forms and fits reasonably
  if (o > F_CM && i > 0 && i < 150) {
    drawRays();
    // Cap image cone height so it doesn't go off canvas
    const maxImgH = H - axisY - 20;
    const drawImgH = Math.min(hImg, maxImgH);
    drawConeAt(imgX, axisY, drawImgH, true, 0.75);
  }

  drawMirror();
  drawConeAt(objX, axisY, hObj, false, 1.0);
  drawLabels();

  requestAnimationFrame(draw);
}

// ── Input ────────────────────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function onDown(e) {
  const p = getPos(e);
  if (hitCone(p.x, p.y)) {
    dragging = true;
    dragStartMouseX  = p.x;
    dragStartObjDist = objDist;
    canvas.style.cursor = 'grabbing';
  }
}

function onMove(e) {
  const p = getPos(e);
  if (dragging) {
    const dx   = p.x - dragStartMouseX;
    const newD = dragStartObjDist - dx / SCALE;
    objDist = Math.max(MIN_O, Math.min(MAX_O, newD));
  } else {
    canvas.style.cursor = hitCone(p.x, p.y) ? 'grab' : 'default';
  }
}

function onUp() {
  dragging = false;
  canvas.style.cursor = 'default';
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp();    }, { passive: false });

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
