<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="eigennode-aspect" content="6/5">
<title>Refraction Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: Arial, sans-serif;
    user-select: none;
}
#wrap {
    position: relative;
    aspect-ratio: 6 / 5;
    height: min(100%, 83.333vw);   /* (5/6)*100 */
    width: auto;
}
canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: pointer;
}
canvas.over-ray { cursor: pointer; }
</style>
</head>
<body>
<div id="wrap">
    <canvas id="canvas" width="600" height="500"></canvas>
</div>

<script>
'use strict';

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = 600, H = 500;   // logical design grid (matches eigennode-aspect 6/5)
function fit() {
    const dpr = window.devicePixelRatio || 1;
    const cw = canvas.clientWidth, ch = canvas.clientHeight;
    if (!cw || !ch) return;
    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    draw();
}

const N_GLASS = 1.5;
const showNormal = new URLSearchParams(location.search).get('showNormal') === 'true';

// ── Game state ───────────────────────────────────────────────────────────
let streak  = 0;
let phase   = 'guess';   // 'guess' | 'feedback' | 'reveal'
let problem = null;
let feedback = null;     // { correctWasA, chosenA, lawText, ok }
let revealT0 = 0;
let rafId    = null;

// ── Refraction law statements (varied wordings, shown only on misses) ───
const LAW_TEXTS = [
    "Light bends toward the normal when entering a denser material " +
        "(like glass), and away from the normal when leaving it.",
    "Going from air into glass, light slows down and bends closer to " +
        "the normal. Going the other way, it speeds up and bends away.",
    "Light bends toward the normal when it enters a slower material, " +
        "and away from the normal when it enters a faster one.",
    "When a light ray enters a material where it travels slower, it " +
        "tilts closer to the normal line. When it enters a faster one, " +
        "it tilts farther from the normal.",
    "The denser material (bigger index of refraction) always carries " +
        "the ray closer to the normal. Air-to-glass bends in; " +
        "glass-to-air bends out.",
    "Bigger n means the light bends in toward the normal. Smaller n " +
        "means it bends out away from the normal.",
];

// ── Build a new problem ──────────────────────────────────────────────────
function newProblem() {
    // Interface angle (from horizontal). Keep modest so layout stays good.
    const interfaceAngleDeg = (Math.random() * 50 - 25); // -25..+25
    const intA = interfaceAngleDeg * Math.PI / 180;

    // Tangent (along interface) and normal (perpendicular).
    // Tangent points "rightward-ish", normal points "upward-ish".
    const tangent = { x: Math.cos(intA), y: Math.sin(intA) };
    const normal  = { x: -Math.sin(intA), y: Math.cos(intA) };

    // Interface center, pulled up a bit so the bottom action bar doesn't
    // cover ray endpoints.
    const cx = W / 2, cy = 218;

    // Extend the interface all the way across the canvas (intersect the
    // infinite line through (cx, cy) with direction tangent against the
    // left/right canvas edges). Interface tilt is limited to ±25° so the
    // intersections always fall within y∈[0, H].
    const tA = -cx / tangent.x;          // parameter at x = 0
    const tB = (W - cx) / tangent.x;     // parameter at x = W
    const pA = { x: cx + tA * tangent.x, y: cy + tA * tangent.y };
    const pB = { x: cx + tB * tangent.x, y: cy + tB * tangent.y };

    // Hit point sits in the central portion of the interface, away from
    // the canvas edges.
    const halfLen = 280;
    const hitFrac = 0.30 + Math.random() * 0.40;
    const t = (hitFrac - 0.5) * 2 * halfLen;
    const hit = { x: cx + t * tangent.x, y: cy + t * tangent.y };

    // Which side of the normal is "air"?
    // airSign = +1 means air is on the +normal side (the "upper" side).
    const airSign = Math.random() < 0.5 ? +1 : -1;

    // Which side is the light coming from? true = air side, false = glass side
    const lightFromAir = Math.random() < 0.5;

    // Angle of incidence: keep < ~40° so no TIR even from glass→air
    // (critical angle for n=1.5 is ~41.8°)
    const thetaIDeg = 18 + Math.random() * 20; // 18..38
    const thetaI = thetaIDeg * Math.PI / 180;

    // Which side of the normal (along the tangent) does the incident ray
    // come from? +1 = +tangent side, -1 = -tangent side
    const tangentSign = Math.random() < 0.5 ? +1 : -1;

    // ── Compute incident ray direction (from source TO hit point) ──────
    // Source is on the incoming side of the interface.
    // incomingSign = +1 if light starts on +normal side (air side if airSign=+1)
    const incomingSign = lightFromAir ? airSign : -airSign;

    // Direction from source to hit point:
    //   d_in = tangentSign·sin(θi)·tangent  −  incomingSign·cos(θi)·normal
    // (the −cos(θi)·normal·incomingSign part means we move INTO the
    //  interface from whichever side we started on)
    const inDir = {
        x: tangentSign * Math.sin(thetaI) * tangent.x
                - incomingSign * Math.cos(thetaI) * normal.x,
        y: tangentSign * Math.sin(thetaI) * tangent.y
                - incomingSign * Math.cos(thetaI) * normal.y,
    };

    // Source point: walk back from hit along −inDir
    const RAY_LEN = 195;
    const src = {
        x: hit.x - RAY_LEN * inDir.x,
        y: hit.y - RAY_LEN * inDir.y,
    };

    // ── Compute the two candidate refracted angles ─────────────────────
    // Correct refraction: n_from · sin θi = n_to · sin θr
    const nFrom = lightFromAir ? 1.0      : N_GLASS;
    const nTo   = lightFromAir ? N_GLASS  : 1.0;
    const thetaR_correct = Math.asin(nFrom / nTo * Math.sin(thetaI));
    // Swapped (the "trap" answer): pretend air and glass were swapped
    const thetaR_wrong   = Math.asin(nTo / nFrom * Math.sin(thetaI));

    // Refracted rays continue on the FAR side of the interface from source.
    // outgoingSign = sign of normal-component for the exit direction.
    const outgoingSign = -incomingSign;

    function refractedRay(thetaR) {
        const d = {
            x: tangentSign * Math.sin(thetaR) * tangent.x
                    + outgoingSign * Math.cos(thetaR) * normal.x,
            y: tangentSign * Math.sin(thetaR) * tangent.y
                    + outgoingSign * Math.cos(thetaR) * normal.y,
        };
        return {
            dir: d,
            end: { x: hit.x + RAY_LEN * d.x, y: hit.y + RAY_LEN * d.y },
            theta: thetaR,
        };
    }

    const rayCorrect = refractedRay(thetaR_correct);
    const rayWrong   = refractedRay(thetaR_wrong);

    // Randomize which is "A" and which is "B" for click detection
    const correctIsA = Math.random() < 0.5;
    const rayA = correctIsA ? rayCorrect : rayWrong;
    const rayB = correctIsA ? rayWrong   : rayCorrect;

    return {
        intA, tangent, normal, pA, pB, hit,
        airSign, lightFromAir, tangentSign, incomingSign, outgoingSign,
        thetaI, thetaR_correct, thetaR_wrong,
        src, inDir,
        rayA, rayB, rayCorrect, rayWrong,
        correctIsA,
    };
}

// ── Drawing primitives ───────────────────────────────────────────────────
function arrowHead(x1, y1, x2, y2, color) {
    const ang = Math.atan2(y2 - y1, x2 - x1), h = 12, s = Math.PI / 6;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - h * Math.cos(ang - s), y2 - h * Math.sin(ang - s));
    ctx.lineTo(x2 - h * Math.cos(ang + s), y2 - h * Math.sin(ang + s));
    ctx.closePath(); ctx.fill();
}

function midArrow(p1, p2, color) {
    const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
    const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x), h = 12, s = Math.PI / 6;
    const tipX = mx + h * 0.5 * Math.cos(ang);
    const tipY = my + h * 0.5 * Math.sin(ang);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - h * Math.cos(ang - s), tipY - h * Math.sin(ang - s));
    ctx.lineTo(tipX - h * Math.cos(ang + s), tipY - h * Math.sin(ang + s));
    ctx.closePath(); ctx.fill();
}

// ── Background tinted by side (air vs glass) ─────────────────────────────
function drawBackground(p) {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Fill each half-plane with a faint tint to distinguish air / glass.
    // air on +normal side if airSign=+1, else on -normal side.
    const n = p.normal;
    const t = p.tangent;
    const cx = (p.pA.x + p.pB.x) / 2;
    const cy = (p.pA.y + p.pB.y) / 2;
    const FAR = 1200;

    function fillSide(sign, color) {
        // Polygon: a strip on one side of the interface, extended FAR along
        // BOTH the tangent (well beyond the canvas edges) and the normal,
        // so the parallelogram always covers the full canvas on its side.
        // (Without the tangent extension, a tilted normal would clip the
        // canvas corners.)
        ctx.fillStyle = color;
        ctx.beginPath();
        const exA = { x: p.pA.x - FAR * t.x, y: p.pA.y - FAR * t.y };
        const exB = { x: p.pB.x + FAR * t.x, y: p.pB.y + FAR * t.y };
        ctx.moveTo(exA.x, exA.y);
        ctx.lineTo(exA.x + sign * FAR * n.x, exA.y + sign * FAR * n.y);
        ctx.lineTo(exB.x + sign * FAR * n.x, exB.y + sign * FAR * n.y);
        ctx.lineTo(exB.x, exB.y);
        ctx.closePath();
        ctx.fill();
    }

    fillSide(+p.airSign, 'rgba(120, 170, 220, 0.10)');   // air tint (cool/light)
    fillSide(-p.airSign, 'rgba(80, 130, 200, 0.30)');    // glass tint (denser blue)
}

// ── Interface line + air / glass labels ──────────────────────────────────
function drawInterface(p) {
    // The interface itself
    ctx.strokeStyle = 'rgba(200, 220, 255, 0.85)';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p.pA.x, p.pA.y);
    ctx.lineTo(p.pB.x, p.pB.y);
    ctx.stroke();
    ctx.lineCap = 'butt';

    // Labels: place "air" on +airSign side, "glass" on -airSign side.
    // Each label sits in the corner of its half-plane that is farthest from
    // its own ray (incident on the source side, refracted on the other),
    // so it overlaps the angle markers as little as possible.
    const PERP = 68;   // perpendicular distance from the interface
    const TANG = 88;   // offset along the interface (away from the rays)

    // Tangent-side sign for the air label:
    //   if lightFromAir → source is at −tangentSign on the air side,
    //                     so put the label at +tangentSign
    //   else            → refracted ray ends at +tangentSign on the air side,
    //                     so put the label at −tangentSign
    const airT = (p.lightFromAir ? +1 : -1) * p.tangentSign;

    const airPos = {
        x: p.hit.x + p.airSign * PERP * p.normal.x
                + airT * TANG * p.tangent.x,
        y: p.hit.y + p.airSign * PERP * p.normal.y
                + airT * TANG * p.tangent.y,
    };
    const glassPos = {
        x: p.hit.x - p.airSign * PERP * p.normal.x
                - airT * TANG * p.tangent.x,
        y: p.hit.y - p.airSign * PERP * p.normal.y
                - airT * TANG * p.tangent.y,
    };

    ctx.font = 'bold italic 18px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(180, 220, 255, 0.85)';
    ctx.fillText('air', airPos.x, airPos.y);
    ctx.fillStyle = 'rgba(140, 190, 240, 0.95)';
    ctx.fillText('glass', glassPos.x, glassPos.y);
    ctx.textBaseline = 'alphabetic';
}

// ── Incident ray ─────────────────────────────────────────────────────────
function drawIncident(p) {
    ctx.save();
    ctx.shadowColor = '#ffe566';
    ctx.shadowBlur = 9;
    ctx.strokeStyle = '#ffe566';
    ctx.lineWidth = 2.8;
    ctx.beginPath();
    ctx.moveTo(p.src.x, p.src.y);
    ctx.lineTo(p.hit.x, p.hit.y);
    ctx.stroke();
    ctx.shadowBlur = 0;
    arrowHead(p.src.x, p.src.y, p.hit.x, p.hit.y, '#ffe566');
    ctx.restore();

    // Hit-point dot
    ctx.save();
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 6;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(p.hit.x, p.hit.y, 4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

// ── Two dashed candidate rays (same colour — no A/B labels) ──────────────
function drawCandidates(p) {
    const CAND_COLOR = 'rgba(220, 230, 255, 0.85)';
    const drawOne = (ray) => {
        ctx.save();
        ctx.strokeStyle = CAND_COLOR;
        ctx.lineWidth = 2.2;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.moveTo(p.hit.x, p.hit.y);
        ctx.lineTo(ray.end.x, ray.end.y);
        ctx.stroke();
        ctx.setLineDash([]);
        arrowHead(p.hit.x, p.hit.y, ray.end.x, ray.end.y, CAND_COLOR);
        ctx.restore();
    };
    drawOne(p.rayA);
    drawOne(p.rayB);
}

// ── Normal line (guess phase when ?showNormal=true) ─────────────────────
function drawNormalLine(p) {
    const nLen = 90;
    ctx.save();
    ctx.strokeStyle = 'rgba(160, 190, 255, 0.6)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 5]);
    ctx.beginPath();
    ctx.moveTo(p.hit.x - nLen * p.normal.x, p.hit.y - nLen * p.normal.y);
    ctx.lineTo(p.hit.x + nLen * p.normal.x, p.hit.y + nLen * p.normal.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    const lx = p.hit.x + (nLen + 14) * p.normal.x * p.incomingSign;
    const ly = p.hit.y + (nLen + 14) * p.normal.y * p.incomingSign;
    ctx.fillStyle = 'rgba(180, 210, 255, 0.85)';
    ctx.font = 'italic 13px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('normal', lx, ly);
    ctx.textBaseline = 'alphabetic';
}

// ── Unrefracted-path reference line ──────────────────────────────────────
function drawUnrefracted(p) {
    const endX = 2 * p.hit.x - p.src.x;
    const endY = 2 * p.hit.y - p.src.y;
    ctx.save();
    ctx.strokeStyle = 'rgba(255, 90, 90, 0.85)';
    ctx.lineWidth = 2;
    ctx.setLineDash([2, 5]);
    ctx.beginPath();
    ctx.moveTo(p.hit.x, p.hit.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
}

// ── Normal + angle labels (shown during feedback) ────────────────────────
function drawNormalAndAngles(p) {
    drawNormalLine(p);

    // Angle arcs at the hit point.
    // Angle of incidence: between normal (incoming side) and incident ray (from source).
    // The incident ray, viewed from hit, points back toward source.
    const arcR = 38;

    // Vector from hit to source (incoming ray direction backwards):
    const toSrc = {
        x: p.src.x - p.hit.x, y: p.src.y - p.hit.y,
    };
    // Normal vector on the incoming side:
    const nIn = {
        x: p.incomingSign * p.normal.x, y: p.incomingSign * p.normal.y,
    };
    // Normal on the outgoing side:
    const nOut = {
        x: p.outgoingSign * p.normal.x, y: p.outgoingSign * p.normal.y,
    };
    // Correct refracted ray direction (from hit):
    const toRef = {
        x: p.rayCorrect.end.x - p.hit.x, y: p.rayCorrect.end.y - p.hit.y,
    };

    const angToSrc  = Math.atan2(toSrc.y,  toSrc.x);
    const angNormIn = Math.atan2(nIn.y,    nIn.x);
    const angRef    = Math.atan2(toRef.y,  toRef.x);
    const angNormOut= Math.atan2(nOut.y,   nOut.x);

    // Helper to draw arc in the SHORT direction between two angles
    function arc(a1, a2, color) {
        let diff = a2 - a1;
        while (diff > Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.hit.x, p.hit.y, arcR, a1, a1 + diff, diff < 0);
        ctx.stroke();
        return a1 + diff / 2;
    }

    // Incidence arc (orange)
    const midI = arc(angNormIn, angToSrc, 'rgba(255, 178, 50, 0.95)');
    // Refraction arc (cyan)
    const midR = arc(angNormOut, angRef, 'rgba(100, 220, 255, 0.95)');

    // Angle labels
    const lblR = arcR + 18;
    ctx.fillStyle = 'rgba(255, 200, 80, 1)';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(
        Math.round(p.thetaI * 180 / Math.PI) + '°',
        p.hit.x + lblR * Math.cos(midI),
        p.hit.y + lblR * Math.sin(midI)
    );
    ctx.fillStyle = 'rgba(140, 230, 255, 1)';
    ctx.fillText(
        Math.round(p.thetaR_correct * 180 / Math.PI) + '°',
        p.hit.x + lblR * Math.cos(midR),
        p.hit.y + lblR * Math.sin(midR)
    );

    // θᵢ and θᵣ small letter labels just outside the angle labels
    const lblR2 = arcR + 38;
    ctx.fillStyle = 'rgba(255, 200, 80, 0.85)';
    ctx.font = 'italic 13px Arial';
    ctx.fillText('θᵢ',
        p.hit.x + lblR2 * Math.cos(midI),
        p.hit.y + lblR2 * Math.sin(midI));
    ctx.fillStyle = 'rgba(140, 230, 255, 0.85)';
    ctx.fillText('θᵣ',
        p.hit.x + lblR2 * Math.cos(midR),
        p.hit.y + lblR2 * Math.sin(midR));
    ctx.textBaseline = 'alphabetic';
}

// ── Bottom action / feedback bar (with streak counter on the right) ──────
function drawActionBar() {
    // Bar across the bottom of the canvas
    const by = H - 56;
    ctx.save();
    ctx.fillStyle = 'rgba(15, 20, 40, 0.72)';
    ctx.fillRect(0, by, W, H - by);
    ctx.strokeStyle = 'rgba(120, 150, 200, 0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, by); ctx.lineTo(W, by); ctx.stroke();

    // ── Streak section (right side of the bar) ────────────────────────
    const STREAK_W = 158;
    const streakX  = W - STREAK_W;             // left edge of streak section
    const streakCx = streakX + STREAK_W / 2;   // centre of streak section

    // subtle divider between text and streak
    ctx.strokeStyle = 'rgba(120, 150, 200, 0.22)';
    ctx.beginPath();
    ctx.moveTo(streakX, by + 8); ctx.lineTo(streakX, H - 8);
    ctx.stroke();

    ctx.fillStyle = '#cce0ff';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Streak: ' + streak + '/10', streakCx, by + 16);

    const pipR = 4, pipGap = 13, pipY = by + 40;
    const pip0X = streakCx - 4.5 * pipGap;
    for (let i = 0; i < 10; i++) {
        const px = pip0X + i * pipGap;
        ctx.beginPath();
        ctx.arc(px, pipY, pipR, 0, Math.PI * 2);
        ctx.fillStyle = i < streak ? '#44ff88' : '#2a2a4e';
        ctx.fill();
        ctx.strokeStyle = i < streak ? '#44ff88' : '#445';
        ctx.lineWidth = 1.2;
        ctx.stroke();
    }

    // ── Instruction / feedback section (left of streak) ───────────────
    const textCx = streakX / 2;   // centred in the space remaining

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (phase === 'guess') {
        ctx.fillStyle = '#cce0ff';
        ctx.font = 'bold 13px Arial';
        ctx.fillText('Click the dashed ray showing how the light continues.',
            textCx, by + 18);
        ctx.fillStyle = '#9bb';
        ctx.font = '11px Arial';
        ctx.fillText('Glass has refractive index n = 1.5 (air is n = 1).',
            textCx, by + 38);
    } else if (phase === 'feedback') {
        if (feedback.ok) {
            ctx.fillStyle = '#44ff88';
            ctx.font = 'bold 15px Arial';
            ctx.fillText('Correct!', textCx, by + 18);
            ctx.fillStyle = '#9bb';
            ctx.font = '11px Arial';
            ctx.fillText('Click anywhere to continue.', textCx, by + 40);
        } else {
            ctx.fillStyle = '#ff7080';
            ctx.font = 'bold 13px Arial';
            ctx.fillText('Not quite — streak reset.', textCx, by + 14);
            // Law-of-refraction reminder (wrapped to fit)
            wrapText(feedback.lawText, textCx, by + 36,
                streakX - 16, 13, '#ffd2a0');
        }
    }
    ctx.restore();
    ctx.textBaseline = 'alphabetic';
}

// Simple word-wrap helper for short captions
function wrapText(text, cx, cy, maxW, lineH, color) {
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    ctx.font = '12px Arial';
    for (const w of words) {
        const test = cur ? cur + ' ' + w : w;
        if (ctx.measureText(test).width > maxW && cur) {
            lines.push(cur); cur = w;
        } else {
            cur = test;
        }
    }
    if (cur) lines.push(cur);
    // Center the block vertically around cy
    const totalH = lines.length * lineH;
    let yStart = cy - totalH / 2 + lineH / 2;
    ctx.fillStyle = color || '#cce0ff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], cx, yStart + i * lineH);
    }
}

// ── Feedback overlay (highlights correct + chosen) ───────────────────────
function drawFeedbackRays(p) {
    // Draw correct ray solid green
    ctx.save();
    ctx.strokeStyle = '#44ff88';
    ctx.lineWidth = 3.2;
    ctx.shadowColor = '#44ff88';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(p.hit.x, p.hit.y);
    ctx.lineTo(p.rayCorrect.end.x, p.rayCorrect.end.y);
    ctx.stroke();
    ctx.shadowBlur = 0;
    arrowHead(p.hit.x, p.hit.y, p.rayCorrect.end.x, p.rayCorrect.end.y, '#44ff88');
    ctx.restore();

    // If user picked wrong, also outline their pick in red (dashed)
    const chosenRay = feedback.chosenA ? problem.rayA : problem.rayB;
    if (!feedback.ok) {
        ctx.save();
        ctx.strokeStyle = '#ff5566';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([7, 5]);
        ctx.beginPath();
        ctx.moveTo(p.hit.x, p.hit.y);
        ctx.lineTo(chosenRay.end.x, chosenRay.end.y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        // 'WRONG' marker at the end of the chosen ray
        ctx.save();
        ctx.fillStyle = 'rgba(255, 90, 100, 0.95)';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('your pick',
            chosenRay.end.x, chosenRay.end.y - 14);
        ctx.textBaseline = 'alphabetic';
        ctx.restore();
    }
}

// ── Master draw ──────────────────────────────────────────────────────────
function draw() {
    if (!problem) return;
    drawBackground(problem);
    drawInterface(problem);
    drawIncident(problem);

    if (phase === 'guess') {
        if (showNormal) { drawNormalLine(problem); drawUnrefracted(problem); }
        drawCandidates(problem);
    } else if (phase === 'feedback') {
        drawNormalAndAngles(problem);
        if (showNormal) drawUnrefracted(problem);
        drawFeedbackRays(problem);
    }

    drawActionBar();
}

// ── Click handling ───────────────────────────────────────────────────────
// Distance from point P to segment AB
function distPointSegment(P, A, B) {
    const ABx = B.x - A.x, ABy = B.y - A.y;
    const lenSq = ABx * ABx + ABy * ABy;
    if (lenSq < 1e-6) return Math.hypot(P.x - A.x, P.y - A.y);
    let t = ((P.x - A.x) * ABx + (P.y - A.y) * ABy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    const qx = A.x + t * ABx, qy = A.y + t * ABy;
    return Math.hypot(P.x - qx, P.y - qy);
}

function getEventPos(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = W / rect.width;
    const sy = H / rect.height;
    const t = e.touches ? e.touches[0] : e;
    return {
        x: (t.clientX - rect.left) * sx,
        y: (t.clientY - rect.top)  * sy,
    };
}

function onClick(e) {
    if (phase === 'reveal') return;
    e.preventDefault();
    const pt = getEventPos(e);

    if (phase === 'feedback') {
        newRound();
        return;
    }

    // Phase: guess
    const dA = distPointSegment(pt, problem.hit, problem.rayA.end);
    const dB = distPointSegment(pt, problem.hit, problem.rayB.end);

    // Require the click be reasonably close to one of the rays.
    if (Math.min(dA, dB) > 40) return;

    const chosenA = dA < dB;
    const correctChoice = (chosenA && problem.correctIsA)
                       || (!chosenA && !problem.correctIsA);

    const lawText = LAW_TEXTS[Math.floor(Math.random() * LAW_TEXTS.length)];
    feedback = { chosenA, ok: correctChoice, lawText };
    phase = 'feedback';

    if (correctChoice) {
        streak = Math.min(streak + 1, 10);
        if (streak >= 10) {
            phase = 'reveal';
            revealT0 = performance.now();
            startReveal();
            draw();          // draw final feedback frame underneath
            return;
        }
    } else {
        streak = 0;
    }
    draw();
}

canvas.addEventListener('mousedown', onClick);
canvas.addEventListener('touchstart', onClick, { passive: false });

// Move cursor styling when hovering over a candidate ray
canvas.addEventListener('mousemove', (e) => {
    if (phase !== 'guess' || !problem) {
        canvas.style.cursor = phase === 'feedback' ? 'pointer' : 'default';
        return;
    }
    const pt = getEventPos(e);
    const dA = distPointSegment(pt, problem.hit, problem.rayA.end);
    const dB = distPointSegment(pt, problem.hit, problem.rayB.end);
    canvas.style.cursor = Math.min(dA, dB) < 24 ? 'pointer' : 'crosshair';
});

// ── Round / reset ────────────────────────────────────────────────────────
function newRound() {
    problem  = newProblem();
    feedback = null;
    phase    = 'guess';
    draw();
}

// ── Password reveal animation ────────────────────────────────────────────
function startReveal() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(revealFrame);
}

function revealFrame(now) {
    const elapsed = (now - revealT0) / 1000;
    drawRevealOverlay(elapsed);
    if (elapsed < 5.6) {
        rafId = requestAnimationFrame(revealFrame);
    } else {
        rafId = null;
        // Keep the final frame; clicking will start a fresh game
        canvas.addEventListener('mousedown', restartHandler, { once: true });
        canvas.addEventListener('touchstart', restartHandler,
            { once: true, passive: false });
    }
}

function restartHandler(e) {
    e.preventDefault();
    streak = 0;
    newRound();
}

function drawRevealOverlay(t) {
    // Fade out the game scene and present the reveal full-screen.
    draw();  // baseline scene
    ctx.save();
    // Fade overlay grows in over the first 0.6s
    const veil = Math.min(1, t / 0.6) * 0.78;
    ctx.fillStyle = `rgba(8, 12, 28, ${veil})`;
    ctx.fillRect(0, 0, W, H);

    // Title appears at t > 0.4
    if (t > 0.4) {
        const a = Math.min(1, (t - 0.4) / 0.5);
        ctx.globalAlpha = a;
        ctx.fillStyle = '#ffe566';
        ctx.font = 'bold 26px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('10 in a row!', W / 2, 70);
        ctx.fillStyle = '#cce0ff';
        ctx.font = '14px Arial';
        ctx.fillText('The secret password is hidden in the diagram below…',
            W / 2, 100);
    }

    // Stage timings
    const stage1 = 0.7;   // tiny password appears
    const stage2 = 1.4;   // magnifying glass enters and travels to text
    const stage4 = 4.0;   // explanation appears

    // Tiny-password position
    const tpx = W / 2, tpy = 240;

    // Font that clearly distinguishes capital I from lowercase l:
    // Georgia is a serif font — I has serifs, l is a tall vertical stroke.
    const PW_FONT_FAMILY = 'Georgia, "Times New Roman", serif';
    const PW_TEXT       = 'Ibn Sahl';
    const PW_COLOR      = '#ffe566';   // SAME colour for small and large
    const SMALL_SIZE    = 11;
    const LARGE_SIZE    = 32;

    // Magnifying glass: lens is wide enough that the full large word fits
    // comfortably inside with margin. "Ibn Sahl" at 32px ≈ 115 px wide.
    const MAG_R         = 92;
    const TRAVEL_DUR    = 2.0;

    // Per-character centre x-positions for the small and large word.
    // Both words are centred at tpx, so each character's small position
    // sits roughly under its large position.
    function pwCharXs(fontSize) {
        ctx.font = 'bold ' + fontSize + 'px ' + PW_FONT_FAMILY;
        const widths = [];
        let totalW = 0;
        for (const ch of PW_TEXT) {
            const w = ctx.measureText(ch).width;
            widths.push(w);
            totalW += w;
        }
        const xs = [];
        let x = tpx - totalW / 2;
        for (let i = 0; i < PW_TEXT.length; i++) {
            xs.push(x + widths[i] / 2);
            x += widths[i];
        }
        return xs;
    }
    const smallXs = pwCharXs(SMALL_SIZE);
    const largeXs = pwCharXs(LARGE_SIZE);

    // Magnifier x position (null = not on canvas yet)
    let mx = null;
    if (t > stage2) {
        const localT = Math.min(1, (t - stage2) / TRAVEL_DUR);
        const e = localT < 0.5
            ? 2 * localT * localT
            : 1 - Math.pow(-2 * localT + 2, 2) / 2;
        const startX = -MAG_R - 20;
        const endX   = tpx;                         // ends centred on the word
        mx = startX + (endX - startX) * e;
    }

    // A letter "pops" to its large version when the magnifier has moved far
    // enough that the letter is comfortably inside the right half of the lens.
    // Using an offset of MAG_R*0.45 makes the reveal feel like the lens is
    // sliding over each letter (rather than its leading edge merely touching).
    function isLarge(i) {
        return mx !== null && (mx + MAG_R * 0.45) >= smallXs[i];
    }

    // Show the tiny password starting at stage1.  Each character is drawn
    // either small (at its small position) or large (at its large position,
    // never both); once it has flipped to large, it stays large.
    if (t > stage1) {
        const a = Math.min(1, (t - stage1) / 0.5);
        ctx.globalAlpha = a;
        ctx.fillStyle = PW_COLOR;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

        // Small (not-yet-revealed) letters
        ctx.font = 'bold ' + SMALL_SIZE + 'px ' + PW_FONT_FAMILY;
        for (let i = 0; i < PW_TEXT.length; i++) {
            if (!isLarge(i)) ctx.fillText(PW_TEXT[i], smallXs[i], tpy);
        }
        // Large (revealed) letters
        ctx.font = 'bold ' + LARGE_SIZE + 'px ' + PW_FONT_FAMILY;
        for (let i = 0; i < PW_TEXT.length; i++) {
            if (isLarge(i)) ctx.fillText(PW_TEXT[i], largeXs[i], tpy);
        }
    }

    // Magnifying glass overlay (drawn on top so the lens tint is visible
    // over the letters underneath it).
    if (mx !== null) {
        ctx.globalAlpha = 1;
        // handle
        ctx.strokeStyle = '#a07040';
        ctx.lineWidth = 9;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(mx + MAG_R * 0.7, tpy + MAG_R * 0.7);
        ctx.lineTo(mx + MAG_R * 1.6, tpy + MAG_R * 1.6);
        ctx.stroke();
        ctx.lineCap = 'butt';

        // lens
        ctx.beginPath();
        ctx.arc(mx, tpy, MAG_R, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(180, 220, 255, 0.08)';
        ctx.fill();
        ctx.strokeStyle = '#9aa8c0';
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    // Explanation text appears at stage4
    if (t > stage4) {
        const a = Math.min(1, (t - stage4) / 0.8);
        ctx.globalAlpha = a;
        const expl =
            'Ibn Sahl was a 10th-century Persian mathematician who was the ' +
            'first to write down the exact mathematical law of refraction, ' +
            'in his treatise on burning lenses around 984 CE.';
        wrapText(expl, W / 2, 380, W - 80, 19, '#cce0ff');

        // Restart hint
        ctx.fillStyle = '#9bb';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Click to play again.', W / 2, H - 30);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
}

// ── Init ─────────────────────────────────────────────────────────────────
newRound();
new ResizeObserver(fit).observe(canvas);
fit();
</script>

<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
