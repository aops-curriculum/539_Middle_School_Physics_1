<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror Shortest Path</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      max-width: 584px;
      margin: 0 auto;
      padding: 0;
      user-select: none;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas.grabbing { cursor: grabbing; }
  </style>
</head>
<body>
  <canvas id="canvas" width="584" height="430"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = 584, H = 430;

    // Scale: 1 cm = 16 px
    const SCALE = 16;

    // Mirror: horizontal line near bottom
    const MIR_Y  = 390;
    const MIR_X1 = 45;
    const MIR_X2 = 555;

    // Draggable points
    let A = { x: 90,  y: 95  };  // light source
    let B = { x: 510, y: 130 };  // observer
    let Cx = 290;                 // C slides along mirror
    const C = () => ({ x: Cx, y: MIR_Y });

    let dragging = null; // null | 'A' | 'B' | 'C'

    // Hit-areas for the C arrow buttons (updated each draw)
    let leftArrowRect  = null;
    let rightArrowRect = null;

    function isInRect(p, r) {
      return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
    }

    // Move C so the *displayed* angle of incidence changes by delta degrees (±0.1).
    // Snaps to the optimal reflection point whenever the step would cross it, so
    // the user can always reach a state where both displayed angles are equal.
    function moveCByAngleDelta(delta) {
      const AH = MIR_Y - A.y;                                     // vertical A-to-mirror dist
      const currentRad = Math.atan2(Math.abs(A.x - Cx), AH);
      const currentDeg = parseFloat((currentRad * 180 / Math.PI).toFixed(1));
      const targetDeg  = currentDeg + delta;

      let newCx;
      if (targetDeg <= 0) {
        newCx = A.x;                                               // clamp at 0°
      } else {
        const horizDist = AH * Math.tan(targetDeg * Math.PI / 180);
        // Keep C on the same side of A; if exactly at A.x default to right
        newCx = (Cx >= A.x) ? A.x + horizDist : A.x - horizDist;
      }

      // If the step would cross the optimal reflection point (where angleI == angleR),
      // snap to it so the user can always reach displayed equality.
      const optX = optimalCx();
      if ((Cx < optX && newCx > optX) || (Cx > optX && newCx < optX)) {
        newCx = optX;
      }

      Cx = Math.max(MIR_X1 + 6, Math.min(MIR_X2 - 6, newCx));
      draw();
    }

    // ── helpers ──────────────────────────────────────────────────────────────

    function dist2(ax, ay, bx, by) {
      return Math.sqrt((bx - ax) ** 2 + (by - ay) ** 2);
    }

    function toCm(px) { return (px / SCALE).toFixed(4); }

    // Arrowhead at (x2,y2) pointing away from (x1,y1)
    function arrowHead(x1, y1, x2, y2, color, size = 13) {
      const a = Math.atan2(y2 - y1, x2 - x1);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - size * Math.cos(a - Math.PI / 6), y2 - size * Math.sin(a - Math.PI / 6));
      ctx.lineTo(x2 - size * Math.cos(a + Math.PI / 6), y2 - size * Math.sin(a + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    // Label midway along a segment, offset perpendicular (always toward "up")
    function segLabel(x1, y1, x2, y2, text, color, offset = 20) {
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.sqrt(dx * dx + dy * dy);
      // CCW perpendicular
      let px = -dy / len, py = dx / len;
      // Ensure it points upward in canvas (py < 0)
      if (py > 0) { px = -px; py = -py; }
      ctx.fillStyle = color;
      ctx.font = 'bold 13px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, mx + px * offset, my + py * offset);
    }

    // Optimal reflection point obeying law of reflection (reflect A across mirror,
    // draw line to B, find x where it crosses MIR_Y).
    function optimalCx() {
      const Ay2 = 2 * MIR_Y - A.y;          // A reflected across mirror
      const t   = (MIR_Y - Ay2) / (B.y - Ay2);
      return A.x + t * (B.x - A.x);
    }

    // ── light bulb ───────────────────────────────────────────────────────────

    function drawBulb(x, y, r) {
      // Glow
      const g = ctx.createRadialGradient(x, y, 2, x, y, r * 3);
      g.addColorStop(0, 'rgba(255,230,50,0.45)');
      g.addColorStop(1, 'rgba(255,230,50,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r * 3, 0, Math.PI * 2);
      ctx.fill();

      // Globe
      ctx.fillStyle = '#FFE032';
      ctx.strokeStyle = '#B8860B';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y - r * 0.25, r, Math.PI, 0);
      ctx.bezierCurveTo(x + r, y + r * 0.85, x + r * 0.6, y + r * 1.3, x + r * 0.45, y + r * 1.6);
      ctx.lineTo(x - r * 0.45, y + r * 1.6);
      ctx.bezierCurveTo(x - r * 0.6, y + r * 1.3, x - r, y + r * 0.85, x - r, y - r * 0.25);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Base stripes
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#999' : '#777';
        ctx.fillRect(x - r * 0.45, y + r * 1.6 + i * 4, r * 0.9, 4);
      }
    }

    // ── eye ─────────────────────────────────────────────────────────────────

    function drawEye(x, y) {
      ctx.fillStyle = 'white';
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(x, y, 13, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Iris
      ctx.fillStyle = '#3a7bd5';
      ctx.beginPath();
      ctx.arc(x, y, 5.5, 0, Math.PI * 2);
      ctx.fill();
      // Pupil
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── main draw ────────────────────────────────────────────────────────────

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Background
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, W, H);

      const c = C();

      // ── Mirror ──
      // Shiny silver bar
      ctx.strokeStyle = '#C8C8C8';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(MIR_X1, MIR_Y);
      ctx.lineTo(MIR_X2, MIR_Y);
      ctx.stroke();

      // Hatch marks below mirror
      ctx.strokeStyle = '#777';
      ctx.lineWidth = 1.5;
      for (let x = MIR_X1 + 5; x <= MIR_X2; x += 14) {
        ctx.beginPath();
        ctx.moveTo(x, MIR_Y);
        ctx.lineTo(x - 9, MIR_Y + 13);
        ctx.stroke();
      }

      ctx.fillStyle = '#aaa';
      ctx.font = '13px Arial';
      ctx.textAlign = 'right';
      ctx.fillText('Mirror', MIR_X2 - 6, MIR_Y - 10);

      // ── Normal at C (dashed) ──
      ctx.setLineDash([6, 5]);
      ctx.strokeStyle = 'rgba(160,160,160,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(c.x, MIR_Y + 35);
      ctx.lineTo(c.x, MIR_Y - 100);
      ctx.stroke();
      ctx.setLineDash([]);

      // "Normal" label
      ctx.fillStyle = 'rgba(160,160,160,0.65)';
      ctx.font = '11px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Normal', c.x + 5, MIR_Y - 88);

      // ── Light rays A→C and C→B ──
      const RAY = '#FFD700';

      ctx.strokeStyle = RAY;
      ctx.lineWidth = 2.5;

      // A → C
      ctx.beginPath();
      ctx.moveTo(A.x, A.y);
      ctx.lineTo(c.x, c.y);
      ctx.stroke();
      arrowHead(A.x, A.y, c.x, c.y, RAY);

      // C → B
      ctx.beginPath();
      ctx.moveTo(c.x, c.y);
      ctx.lineTo(B.x, B.y);
      ctx.stroke();
      arrowHead(c.x, c.y, B.x, B.y, RAY);

      // ── Angle arcs ──
      // Angles from the vertical normal
      const angleI = Math.atan2(Math.abs(A.x - c.x), Math.abs(A.y - c.y)); // incidence
      const angleR = Math.atan2(Math.abs(B.x - c.x), Math.abs(B.y - c.y)); // reflection
      const angleI_deg = (angleI * 180 / Math.PI).toFixed(1);
      const angleR_deg = (angleR * 180 / Math.PI).toFixed(1);

      // Canvas angles for arc drawing
      const dirToA   = Math.atan2(A.y - c.y, A.x - c.x); // toward A from C (upper-left region)
      const dirToB   = Math.atan2(B.y - c.y, B.x - c.x); // toward B from C (upper-right region)
      const upNormal = -Math.PI / 2;                       // straight up

      const ARC_R = 48;

      // Always draw the short arc by going clockwise from the smaller angle to the larger.
      // This works whether A/B are left or right of C.
      const iStart = Math.min(dirToA, upNormal);
      const iEnd   = Math.max(dirToA, upNormal);
      const rStart = Math.min(upNormal, dirToB);
      const rEnd   = Math.max(upNormal, dirToB);

      // Incidence arc
      ctx.beginPath();
      ctx.arc(c.x, c.y, ARC_R, iStart, iEnd, false);
      ctx.strokeStyle = '#FF6B6B';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Reflection arc
      ctx.beginPath();
      ctx.arc(c.x, c.y, ARC_R, rStart, rEnd, false);
      ctx.strokeStyle = '#4FC3F7';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Angle labels on arcs
      const midI = (iStart + iEnd) / 2;
      const midR = (rStart + rEnd) / 2;
      const LABEL_R = ARC_R + 18;

      ctx.font = 'bold 13px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      ctx.fillStyle = '#FF6B6B';
      ctx.fillText(angleI_deg + '°', c.x + LABEL_R * Math.cos(midI), c.y + LABEL_R * Math.sin(midI));

      ctx.fillStyle = '#4FC3F7';
      ctx.fillText(angleR_deg + '°', c.x + LABEL_R * Math.cos(midR), c.y + LABEL_R * Math.sin(midR));

      // ── Segment length labels ──
      const dAC = dist2(A.x, A.y, c.x, c.y);
      const dCB = dist2(c.x, c.y, B.x, B.y);
      const acCm = toCm(dAC);
      const cbCm = toCm(dCB);
      const totCm = ((dAC + dCB) / SCALE).toFixed(4);

      segLabel(A.x, A.y, c.x, c.y, 'AC = ' + acCm + ' cm', RAY, 22);
      segLabel(c.x, c.y, B.x, B.y, 'CB = ' + cbCm + ' cm', RAY, 22);

      // ── Point labels ──
      ctx.font = 'bold 17px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      ctx.fillStyle = '#fff';
      ctx.fillText('A', A.x, A.y - 48);

      ctx.fillStyle = '#fff';
      ctx.fillText('B', B.x + 22, B.y - 5);

      // C label with flanking arrow buttons
      const cLabelX = c.x;
      const cLabelY = c.y + 28;
      const ARROW_OFF = 17;   // horizontal offset from C centre to arrow centre
      const ARROW_HIT = 11;   // half-size of clickable square

      ctx.font = 'bold 13px Arial';
      ctx.fillStyle = 'rgba(220,220,220,0.85)';
      ctx.fillText('◀', cLabelX - ARROW_OFF, cLabelY);
      ctx.fillText('▶', cLabelX + ARROW_OFF, cLabelY);

      ctx.font = 'bold 17px Arial';
      ctx.fillStyle = '#fff';
      ctx.fillText('C', cLabelX, cLabelY);

      // Persist hit-areas for pointer/click detection
      leftArrowRect  = { x: cLabelX - ARROW_OFF - ARROW_HIT, y: cLabelY - ARROW_HIT,
                         w: ARROW_HIT * 2,                    h: ARROW_HIT * 2 };
      rightArrowRect = { x: cLabelX + ARROW_OFF - ARROW_HIT, y: cLabelY - ARROW_HIT,
                         w: ARROW_HIT * 2,                    h: ARROW_HIT * 2 };

      // ── Draw objects ──
      drawBulb(A.x, A.y, 16);
      drawEye(B.x, B.y);

      // ── Optimal reflection point (red dot) ──
      const optX = optimalCx();
      ctx.fillStyle = '#ff3333';
      ctx.strokeStyle = '#ff9999';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(optX, MIR_Y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // C dot (drawn on top so it stays visible)
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(c.x, c.y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // ── Total length (centered, near top) ──
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Total length (AC + CB): ' + totCm + ' cm', W / 2, 95);

      // ── Scale bar (above mirror, right side) ──
      const SB_CM   = 5;
      const SB_PX   = SB_CM * SCALE;
      const SB_X    = MIR_X2 - SB_PX - 20;
      const SB_Y    = MIR_Y - 32;

      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(SB_X, SB_Y);
      ctx.lineTo(SB_X + SB_PX, SB_Y);
      ctx.stroke();

      // End ticks
      [SB_X, SB_X + SB_PX].forEach(tx => {
        ctx.beginPath();
        ctx.moveTo(tx, SB_Y - 4);
        ctx.lineTo(tx, SB_Y + 4);
        ctx.stroke();
      });

      ctx.fillStyle = '#aaa';
      ctx.font = '11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(SB_CM + ' cm', SB_X + SB_PX / 2, SB_Y - 8);
    }

    // ── pointer helpers ──────────────────────────────────────────────────────

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: src.clientX - r.left, y: src.clientY - r.top };
    }

    const HIT = 18; // hit-test radius in px

    function tryStartDrag(p) {
      // Arrow buttons take priority — act immediately, no drag
      if (leftArrowRect  && isInRect(p, leftArrowRect))  { moveCByAngleDelta(-0.1); return; }
      if (rightArrowRect && isInRect(p, rightArrowRect)) { moveCByAngleDelta(+0.1); return; }

      const c = C();
      // Check A and B first (slightly smaller hitbox so C on mirror takes priority
      // only when near mirror level — order: C, A, B)
      if (dist2(p.x, p.y, c.x, c.y) < HIT) {
        dragging = 'C';
      } else if (dist2(p.x, p.y, A.x, A.y) < HIT + 4) {
        dragging = 'A';
      } else if (dist2(p.x, p.y, B.x, B.y) < HIT + 4) {
        dragging = 'B';
      }
      if (dragging) canvas.classList.add('grabbing');
    }

    function moveDrag(p) {
      if (!dragging) return;
      const MARGIN = 20; // keep A/B this many px above mirror
      if (dragging === 'C') {
        Cx = Math.max(MIR_X1 + 6, Math.min(MIR_X2 - 6, p.x));
      } else if (dragging === 'A') {
        A.x = Math.max(8, Math.min(W - 8, p.x));
        A.y = Math.max(20, Math.min(MIR_Y - MARGIN, p.y));
      } else if (dragging === 'B') {
        B.x = Math.max(8, Math.min(W - 8, p.x));
        B.y = Math.max(20, Math.min(MIR_Y - MARGIN, p.y));
      }
      draw();
    }

    function endDrag() {
      dragging = null;
      canvas.classList.remove('grabbing');
    }

    // ── mouse events ─────────────────────────────────────────────────────────

    canvas.addEventListener('mousedown',  e => tryStartDrag(getPos(e)));
    canvas.addEventListener('mousemove', e => {
      const p = getPos(e);
      if (!dragging) {
        const onArrow = (leftArrowRect  && isInRect(p, leftArrowRect)) ||
                        (rightArrowRect && isInRect(p, rightArrowRect));
        canvas.style.cursor = onArrow ? 'pointer' : 'grab';
      }
      moveDrag(p);
    });
    canvas.addEventListener('mouseup',    endDrag);
    canvas.addEventListener('mouseleave', endDrag);

    // ── touch events ─────────────────────────────────────────────────────────

    canvas.addEventListener('touchstart', e => { e.preventDefault(); tryStartDrag(getPos(e)); }, { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); moveDrag(getPos(e)); },     { passive: false });
    canvas.addEventListener('touchend',   e => { e.preventDefault(); endDrag(); },               { passive: false });

    // ── initial draw ─────────────────────────────────────────────────────────
    draw();
  </script>
<script>
// EigenNode auto-height v2
(function() {
  function measure() {
    var b = document.body, h = document.documentElement;
    if (!b) return 0;
    var max = Math.max(b.scrollHeight||0, b.offsetHeight||0, (h&&h.scrollHeight)||0, (h&&h.offsetHeight)||0);
    // If body is sized to viewport (height:100vh), scrollHeight just echoes
    // the iframe's height. Recover real content extent from children's bbox.
    var minTop = 0, maxBot = 0, br = b.getBoundingClientRect();
    for (var i = 0; i < b.children.length; i++) {
      var r = b.children[i].getBoundingClientRect();
      var top = r.top - br.top, bot = top + r.height;
      if (top < minTop) minTop = top;
      if (bot > maxBot) maxBot = bot;
    }
    var span = maxBot - minTop;
    if (span > max) max = span;
    return Math.ceil(max);
  }
  var last = 0;
  function report() {
    var h = measure();
    if (h > 0 && Math.abs(h - last) >= 2) {
      last = h;
      window.parent.postMessage({ type: 'resize', height: h }, '*');
    }
  }
  window.addEventListener('load', report);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(report);
  if (window.ResizeObserver && document.body) new ResizeObserver(report).observe(document.body);
})();
</script>
</body>
</html>
