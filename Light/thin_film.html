<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="eigennode-aspect" content="3/2">
<title>Thin-Film Interference (soap film)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0a0a1a;
    font-family: Arial, sans-serif;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Keep the natural 3:2 aspect ratio no matter the container shape.
     Inside the EigenNode iframe (sized to 3:2) it fills exactly; in a raw
     browser window it letterboxes, but the bars use the same background as
     the scene so they are invisible. */
  canvas {
    display: block;
    aspect-ratio: 3 / 2;
    height: min(100%, calc(100vw * 2 / 3));
    width: auto;
    background: #0a0a1a;
  }
  /* Overlaid slider panel (only shown when a slider param is on) */
  #panel {
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    display: none;
    gap: 18px;
    align-items: center;
    background: rgba(10, 16, 30, 0.85);
    border: 1px solid #2a3f5f;
    border-radius: 8px;
    padding: 8px 16px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.5);
  }
  #panel .ctl { display: flex; align-items: center; gap: 8px; color: #cfe0f0; font-size: 13px; }
  #panel input[type=range] { width: 150px; cursor: pointer; }
  #panel .val { color: #8fd0ff; font-weight: bold; min-width: 62px; text-align: right; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel"></div>

<script>
// ── Query parameters ─────────────────────────────────────────────────────
const Q    = new URLSearchParams(location.search);
const num  = (k, d) => Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d;
const bool = (k, d) => Q.has(k) ? Q.get(k) !== '0' : d;

const SAME_WAVELENGTH = bool('same', false);   // draw all three colors with one wavelength
const SAME_LAMBDA     = 532;                    // the common wavelength used in "same" mode (nm)
const MARK_T          = bool('markt', false);   // draw thickness arrow labeled t
const MARK_LAMBDA     = bool('marklambda', false); // draw wavelength arrow labeled lambda
const SHOW_RED        = bool('red',  true);
const SHOW_GREEN      = bool('green', true);
const SHOW_BLUE       = bool('blue', true);
const SHOW_INCIDENT   = bool('incident', true); // draw the incoming wave
const SHOW_R1         = bool('r1', true);       // front-surface reflection
const SHOW_T1         = bool('t1', true);       // transmitted into film
const SHOW_R2         = bool('r2', true);       // reflection off back surface
const SHOW_T2         = bool('t2', true);       // transmitted all the way through
const SHOW_T3         = bool('t3', true);       // back-reflection transmitted back out the front
const PHI_SLIDER      = bool('phislider', false);
const T_SLIDER        = bool('tslider', false);
const SHOW_COLOR      = bool('showcolor', true);
const SPECTRUM        = bool('spectrum', false); // compute reflected color from full sunlight spectrum
const DOT             = bool('dot', false);     // draw r1 dotted
const DASH            = bool('dash', false);    // draw r2 and t3 dashed
const ANIMATE         = bool('animate', true);
const SPEED           = num('speed', 0.03);     // animation phase step (rad/frame)

// Line-dash patterns for the styled beams
const DOT_DASH  = [2, 4];
const DASH_DASH = [9, 6];

// Live, adjustable quantities
let tnm    = num('thickness', 450);             // film thickness (nm)
let phiDeg = num('phi', 0);                      // incident phase at the front surface (deg)

// ── Physical constants ───────────────────────────────────────────────────
const N_FILM = 1.33;    // refractive index of soap film
const N_AIR  = 1.0;     // refractive index of surrounding air
const LAM_RED = 660, LAM_GREEN = 532, LAM_BLUE = 400;  // nm

// ── Fixed logical design grid (matches eigennode-aspect 3/2) ─────────────
const DESIGN_W = 900, DESIGN_H = 600;
const W = DESIGN_W, H = DESIGN_H;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function fit() {
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  if (!cw || !ch) return;
  canvas.width  = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  ctx.setTransform(canvas.width / DESIGN_W, 0, 0, canvas.height / DESIGN_H, 0, 0);
  draw();
}

// ── Scene geometry (logical px) ──────────────────────────────────────────
const S       = 0.085;          // px per nm — SAME scale for wavelength AND film thickness,
                                // so the drawn waves and the drawn thickness agree physically.
const X_START = 130;            // left edge where the incident waves begin
const FRONT   = 600;            // front (left) surface of the film
const X_END   = 880;            // right edge for the transmitted beam
const EYE_X   = 70, EYE_Y = 300;
const FILM_TOP = 96, FILM_BOT = 504;
const BAND_Y  = { red: 150, green: 300, blue: 450 };
const AMP     = 12;             // wave amplitude (px)
const OFF     = 30;            // vertical track offset for reflected / return beams

// ── Sub/greek glyphs ─────────────────────────────────────────────────────
const R1='r₁', T1='t₁', R2='r₂', T2='t₂', T3='t₃', PHI='φ';

// ── Animation phase ──────────────────────────────────────────────────────
let tau = 0;

// ── Small drawing helpers ────────────────────────────────────────────────
function arrowHead(x, y, ang, color, size) {
  size = size || 8;
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - size * Math.cos(ang - Math.PI / 6), y - size * Math.sin(ang - Math.PI / 6));
  ctx.lineTo(x - size * Math.cos(ang + Math.PI / 6), y - size * Math.sin(ang + Math.PI / 6));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Draw a sine wave from xA..xB (xA<xB) around baseline baseY.
// dispFn(x) returns the transverse displacement; arrow shows travel direction.
// dash (optional) is a setLineDash pattern for dotted/dashed beams.
function wave(xA, xB, baseY, dispFn, color, arrowX, arrowAng, dash) {
  if (xB - xA < 1) return;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash(dash || []);
  ctx.beginPath();
  let first = true;
  for (let x = xA; x <= xB + 0.001; x += 2) {
    const y = baseY - dispFn(x);
    if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  if (arrowX !== null) arrowHead(arrowX, baseY, arrowAng, color, 9);
}

function text(str, x, y, color, font, align) {
  ctx.fillStyle = color;
  ctx.font = font || '13px Arial, sans-serif';
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(str, x, y);
}

// ── Scene elements ───────────────────────────────────────────────────────
function drawFilm(BACK) {
  // Air | film | air shading
  ctx.fillStyle = 'rgba(150, 200, 255, 0.13)';
  ctx.fillRect(FRONT, FILM_TOP, BACK - FRONT, FILM_BOT - FILM_TOP);
  // The two reflecting surfaces
  ctx.strokeStyle = 'rgba(180, 220, 255, 0.55)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(FRONT, FILM_TOP); ctx.lineTo(FRONT, FILM_BOT);
  ctx.moveTo(BACK,  FILM_TOP); ctx.lineTo(BACK,  FILM_BOT);
  ctx.stroke();

  // Region labels
  text('air, n = 1', (X_START + FRONT) / 2, 520, '#8fa3b8', '13px Arial', 'center');
  text('soap film, n = 1.33', (FRONT + BACK) / 2, 520, '#bcd4ee', 'bold 13px Arial', 'center');
  text('air, n = 1', (BACK + X_END) / 2, 520, '#8fa3b8', '13px Arial', 'center');
}

function drawEye() {
  ctx.save();
  ctx.strokeStyle = '#cfd8e2';
  ctx.fillStyle = 'rgba(200,210,225,0.18)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(EYE_X - 18, EYE_Y);
  ctx.quadraticCurveTo(EYE_X, EYE_Y - 14, EYE_X + 18, EYE_Y);
  ctx.quadraticCurveTo(EYE_X, EYE_Y + 14, EYE_X - 18, EYE_Y);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(EYE_X + 2, EYE_Y, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#3a4a60';
  ctx.fill();
  ctx.restore();
  text('observer', EYE_X, EYE_Y + 34, '#9fb2c6', 'bold 13px Arial', 'center');
}

function drawThicknessMarker(BACK) {
  const y = 548;
  ctx.strokeStyle = '#d8e2ee';
  ctx.lineWidth = 2;
  ctx.beginPath();
  // guide ticks up to the film
  ctx.setLineDash([4, 4]);
  ctx.moveTo(FRONT, y - 6); ctx.lineTo(FRONT, FILM_BOT);
  ctx.moveTo(BACK,  y - 6); ctx.lineTo(BACK,  FILM_BOT);
  ctx.stroke();
  ctx.setLineDash([]);
  // double-headed horizontal arrow
  ctx.beginPath();
  ctx.moveTo(FRONT, y); ctx.lineTo(BACK, y);
  ctx.stroke();
  arrowHead(FRONT, y, Math.PI, '#d8e2ee', 8);
  arrowHead(BACK, y, 0, '#d8e2ee', 8);
  text('t', (FRONT + BACK) / 2, y - 8, '#ffffff', 'italic bold 17px Georgia, serif', 'center');
}

function drawWavelengthMarker() {
  // One period of the incident green wave, anchored to its actual crest
  // positions (same k/psi as the incident beam in drawColorBeams) so the
  // arrow rides along the real wave instead of floating in empty space.
  const yc      = BAND_Y.green;
  const lamDraw = SAME_WAVELENGTH ? SAME_LAMBDA : LAM_GREEN;
  const k       = 2 * Math.PI / (lamDraw * S);
  const psi     = (phiDeg * Math.PI / 180) - tau;
  const lamPx   = lamDraw * S;
  const anchor  = X_START + 130; // clear of the "incident" label

  // crest condition: k*(x-FRONT)+psi = 2*pi*m  =>  x = FRONT - psi/k + m*lamPx
  let x0 = FRONT - psi / k;
  x0 -= Math.floor((x0 - anchor) / lamPx) * lamPx; // nearest crest at/after `anchor`
  const x1 = x0 + lamPx;
  const y  = yc - AMP; // ride along the wave's crest line

  ctx.strokeStyle = '#d8e2ee';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y); ctx.lineTo(x1, y);
  ctx.stroke();
  arrowHead(x0, y, Math.PI, '#d8e2ee', 8);
  arrowHead(x1, y, 0, '#d8e2ee', 8);
  text('λ', (x0 + x1) / 2, y - 8, '#ffffff', 'italic bold 17px Georgia, serif', 'center');
}

// Reflected-color channel intensity: 0 at destructive, 1 at constructive.
// intensity = cos^2(Delta/2) = sin^2(2*pi*n*t/lambda).
function channel(lam) {
  const s = Math.sin(2 * Math.PI * N_FILM * tnm / lam);
  return Math.round(255 * s * s);
}

// ── Spectral reflected-color engine (used when ?spectrum=1) ──────────────
// Take white sunlight (CIE Illuminant D65), apply the thin film's wavelength-
// dependent reflectance R(lambda)=sin^2(2*pi*n*t/lambda) across the visible
// band, integrate the reflected spectrum against the CIE 1931 color-matching
// functions to get XYZ, then convert to sRGB — the standard spectrum->RGB path.

// CIE 1931 2° color-matching functions: multi-lobe Gaussian fit of
// Wyman, Sloan & Shirley (2013). Coefficients are inverse widths (1/nm).
function _pg(l, mu, i1, i2) { const t = (l - mu) * (l < mu ? i1 : i2); return Math.exp(-0.5 * t * t); }
function cieX(l) { return 0.362*_pg(l,442.0,0.0624,0.0374) + 1.056*_pg(l,599.8,0.0264,0.0323) - 0.065*_pg(l,501.1,0.0490,0.0382); }
function cieY(l) { return 0.821*_pg(l,568.8,0.0213,0.0247) + 0.286*_pg(l,530.9,0.0613,0.0322); }
function cieZ(l) { return 1.217*_pg(l,437.0,0.0845,0.0278) + 0.681*_pg(l,459.0,0.0385,0.0725); }

// CIE Standard Illuminant D65 relative spectral power, 380..780 nm at 10 nm.
const D65 = [49.98,54.65,82.75,91.49,93.43,86.68,104.87,117.01,117.81,114.86,
             115.92,108.81,109.35,107.80,104.79,107.69,104.41,104.05,100.00,96.33,
             95.79,88.69,90.01,89.60,87.70,83.29,83.70,80.03,80.21,82.28,
             78.28,69.72,71.61,74.35,61.60,69.89,75.09,63.59,46.42,66.81,63.38];
const D65_START = 380, D65_STEP = 10;

function _srgbGamma(c) { return c <= 0.0031308 ? 12.92 * c : 1.055 * Math.pow(c, 1 / 2.4) - 0.055; }

// Reflected color (0-255 rgb) of the soap film under D65 sunlight, thickness t nm.
function spectralColor(t) {
  let X = 0, Y = 0, Z = 0, norm = 0;
  for (let i = 0; i < D65.length; i++) {
    const lam = D65_START + i * D65_STEP;
    const S = D65[i];
    const s = Math.sin(2 * Math.PI * N_FILM * t / lam);
    const R = s * s;                         // thin-film reflectance at this wavelength
    const x = cieX(lam), y = cieY(lam), z = cieZ(lam);
    X += S * R * x; Y += S * R * y; Z += S * R * z;
    norm += S * y;                           // so a perfect mirror (R=1) maps to white
  }
  X /= norm; Y /= norm; Z /= norm;
  // XYZ (D65) -> linear sRGB
  let r =  3.2406 * X - 1.5372 * Y - 0.4986 * Z;
  let g = -0.9689 * X + 1.8758 * Y + 0.0415 * Z;
  let b =  0.0557 * X - 0.2040 * Y + 1.0570 * Z;
  r = Math.max(0, r); g = Math.max(0, g); b = Math.max(0, b);
  const mx = Math.max(r, g, b, 1);           // scale down out-of-gamut, preserving hue
  r /= mx; g /= mx; b /= mx;
  return {
    R: Math.round(255 * _srgbGamma(r)),
    G: Math.round(255 * _srgbGamma(g)),
    B: Math.round(255 * _srgbGamma(b)),
  };
}

function drawColorSwatch() {
  let R, G, B;
  if (SPECTRUM) {
    const c = spectralColor(tnm); R = c.R; G = c.G; B = c.B;
  } else {
    const useR = SAME_WAVELENGTH ? SAME_LAMBDA : LAM_RED;
    const useG = SAME_WAVELENGTH ? SAME_LAMBDA : LAM_GREEN;
    const useB = SAME_WAVELENGTH ? SAME_LAMBDA : LAM_BLUE;
    R = channel(useR); G = channel(useG); B = channel(useB);
  }
  const sx = 706, sy = 14, sw = 150, sh = 48;
  text(SPECTRUM ? 'reflected color (sunlight)' : 'reflected color',
       sx + sw / 2, sy - 3, '#9fb2c6', 'bold 12px Arial', 'center');
  // dark backdrop so pure black reads as "no reflection"
  ctx.fillStyle = '#20242e';
  ctx.fillRect(sx, sy, sw, sh);
  ctx.fillStyle = 'rgb(' + R + ',' + G + ',' + B + ')';
  ctx.fillRect(sx, sy, sw, sh);
  ctx.strokeStyle = '#5a7088';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(sx, sy, sw, sh);
  text('rgb(' + R + ', ' + G + ', ' + B + ')', sx + sw / 2, sy + sh + 15,
       '#7f94a8', '11px monospace', 'center');
}

// ── One color's beams ────────────────────────────────────────────────────
function drawColorBeams(lamDraw, stroke, yc, BACK) {
  const k   = 2 * Math.PI / (lamDraw * S);   // air wavenumber (rad/px)
  const kf  = N_FILM * k;                     // film wavenumber (rad/px)
  const d   = BACK - FRONT;                   // film width (px)
  const kfd = kf * d;                         // one-pass phase across the film
  const psi = (phiDeg * Math.PI / 180) - tau; // common incident phase at the front surface

  // Incident (→) — the light source
  if (SHOW_INCIDENT)
    wave(X_START, FRONT, yc,
         x => AMP * Math.cos(k * (x - FRONT) + psi),
         stroke, FRONT - 4, 0);

  // t1: transmitted into the film (→), wavelength compressed by n
  if (SHOW_T1 && d > 0.5)
    wave(FRONT, BACK, yc,
         x => AMP * Math.cos(kf * (x - FRONT) + psi),
         stroke, BACK - 4, 0);

  // t2: transmitted all the way through (→)
  if (SHOW_T2)
    wave(BACK, X_END, yc,
         x => AMP * Math.cos(k * (x - BACK) + kfd + psi),
         stroke, X_END - 6, 0);

  // r1: front-surface reflection (←) — low→high index, so +pi phase flip
  if (SHOW_R1)
    wave(X_START, FRONT, yc - OFF,
         x => AMP * Math.cos(-k * (x - FRONT) + psi + Math.PI),
         stroke, X_START + 4, Math.PI, DOT ? DOT_DASH : null);

  // r2: reflection off the back surface (←), inside film — high→low, no flip
  if (SHOW_R2 && d > 0.5)
    wave(FRONT, BACK, yc + OFF,
         x => AMP * Math.cos(-kf * (x - BACK) + kfd + psi),
         stroke, FRONT + 4, Math.PI, DASH ? DASH_DASH : null);

  // t3: back-reflection transmitted out the front, heading to the observer (←)
  if (SHOW_T3)
    wave(X_START, FRONT, yc + OFF,
         x => AMP * Math.cos(-k * (x - FRONT) + 2 * kfd + psi),
         stroke, X_START + 4, Math.PI, DASH ? DASH_DASH : null);
}

// ── Beam labels (drawn once, on the middle band, in neutral gray) ────────
// Each label only appears when its beam is turned on, so the legend matches
// what is actually drawn.
function drawBeamLabels(BACK) {
  const g = '#8fa3b8';
  const f = 'bold 12px Arial';
  const midFilm = (FRONT + BACK) / 2;
  if (SHOW_INCIDENT) text('incident', X_START + 46, BAND_Y.green - 16, g, f, 'left');
  if (SHOW_R1) text(R1, FRONT - 78, BAND_Y.green - OFF - 6, g, f, 'left');
  if (SHOW_T3) text(T3, X_START + 46, BAND_Y.green + OFF + 18, g, f, 'left');
  if (SHOW_T2) text(T2, BACK + 26, BAND_Y.green - 16, g, f, 'left');
  if (SHOW_T1) text(T1, midFilm, BAND_Y.green - OFF - 8, g, f, 'center');
  if (SHOW_R2) text(R2, midFilm, BAND_Y.green + OFF + 22, g, f, 'center');
}

// ── Master draw ──────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  const BACK = Math.min(FRONT + tnm * S, X_END - 40);

  // Titles / readouts
  text('Thin-film interference — soap film', 14, 24, '#dbe6f2', 'bold 15px Arial', 'left');
  text('film thickness  t = ' + Math.round(tnm) + ' nm', 14, 44, '#8fd0ff', '13px Arial', 'left');
  if (SAME_WAVELENGTH)
    text('(all colors drawn at one wavelength: ' + SAME_LAMBDA + ' nm)', 14, 62, '#c8a24d', '12px Arial', 'left');

  drawFilm(BACK);

  const colors = [
    { on: SHOW_RED,   stroke: '#ff5252', lam: LAM_RED   },
    { on: SHOW_GREEN, stroke: '#46d65a', lam: LAM_GREEN },
    { on: SHOW_BLUE,  stroke: '#5b8dff', lam: LAM_BLUE  },
  ];
  const yByIndex = [BAND_Y.red, BAND_Y.green, BAND_Y.blue];

  colors.forEach((c, i) => {
    if (!c.on) return;
    const lamDraw = SAME_WAVELENGTH ? SAME_LAMBDA : c.lam;
    drawColorBeams(lamDraw, c.stroke, yByIndex[i], BACK);
  });

  drawBeamLabels(BACK);
  drawEye();
  if (MARK_T)      drawThicknessMarker(BACK);
  if (MARK_LAMBDA) drawWavelengthMarker();
  if (SHOW_COLOR)  drawColorSwatch();

  // Teaching hint (top, so it never collides with the overlaid slider panel)
  text('Compare ' + R1 + ' and ' + T3 + ': where their crests line up that color reflects brightly; where they oppose, it cancels.',
       14, 84, '#63788c', '12px Arial', 'left');
}

// ── Animation loop (advances phase only when animate is on) ───────────────
function loop() {
  if (ANIMATE) { tau += SPEED; draw(); }
  requestAnimationFrame(loop);
}

// ── Slider panel (overlaid; only if a slider param is on) ─────────────────
function buildPanel() {
  const panel = document.getElementById('panel');
  let any = false;

  function addSlider(label, min, max, step, value, unit, onInput) {
    any = true;
    const ctl = document.createElement('div');
    ctl.className = 'ctl';
    const lab = document.createElement('span');
    lab.innerHTML = label;
    const inp = document.createElement('input');
    inp.type = 'range'; inp.min = min; inp.max = max; inp.step = step; inp.value = value;
    const val = document.createElement('span');
    val.className = 'val';
    const fmt = v => (unit === '°' ? Math.round(v) + '°' : Math.round(v) + ' ' + unit);
    val.textContent = fmt(value);
    inp.addEventListener('input', () => { val.textContent = fmt(+inp.value); onInput(+inp.value); if (!ANIMATE) draw(); });
    ctl.appendChild(lab); ctl.appendChild(inp); ctl.appendChild(val);
    panel.appendChild(ctl);
  }

  if (T_SLIDER)
    addSlider('Thickness&nbsp;<i>t</i>', 0, 1200, 5, tnm, 'nm', v => { tnm = v; });
  if (PHI_SLIDER)
    addSlider('Incident phase&nbsp;' + PHI, 0, 360, 1, phiDeg, '°', v => { phiDeg = v; });

  if (any) panel.style.display = 'flex';
}

buildPanel();
new ResizeObserver(fit).observe(canvas);
fit();
loop();
</script>

<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var SCROLL_KEY = 'cheatPanelScroll:' + location.pathname;
  var _scrollEl = null;
  function saveScroll() {
    if (_scrollEl) { try { sessionStorage.setItem(SCROLL_KEY, String(_scrollEl.scrollTop)); } catch (e) {} }
  }
  function go(url) { saveScroll(); location.href = url; }

  var CHEAT_DEFS = [
    {name:'same',      type:'toggle',  default:0, desc:'Draw all 3 colors at one wavelength (pedagogical, not physical)'},
    {name:'red',       type:'toggle',  default:1, desc:'Show red light (660 nm)'},
    {name:'green',     type:'toggle',  default:1, desc:'Show green light (532 nm)'},
    {name:'blue',      type:'toggle',  default:1, desc:'Show blue light (400 nm)'},
    {name:'incident',  type:'toggle',  default:1, desc:'Show the incoming (incident) wave'},
    {name:'r1',        type:'toggle',  default:1, desc:'Show r1 (reflection off front surface)'},
    {name:'t1',        type:'toggle',  default:1, desc:'Show t1 (transmitted into the film)'},
    {name:'r2',        type:'toggle',  default:1, desc:'Show r2 (reflection off back surface)'},
    {name:'t2',        type:'toggle',  default:1, desc:'Show t2 (transmitted through the film)'},
    {name:'t3',        type:'toggle',  default:1, desc:'Show t3 (back-reflection exiting the front)'},
    {name:'dot',       type:'toggle',  default:0, desc:'Draw the r1 reflection dotted'},
    {name:'dash',      type:'toggle',  default:0, desc:'Draw r2 and t3 dashed'},
    {name:'showcolor', type:'toggle',  default:1, desc:'Show reflected-color swatch'},
    {name:'spectrum',  type:'toggle',  default:0, desc:'Compute reflected color from full sunlight spectrum (D65 -> CIE -> sRGB)'},
    {name:'markt',     type:'toggle',  default:0, desc:'Draw a thickness arrow labeled t'},
    {name:'marklambda',type:'toggle',  default:0, desc:'Draw a wavelength arrow labeled lambda'},
    {name:'tslider',   type:'toggle',  default:0, desc:'Show a slider to adjust film thickness'},
    {name:'phislider', type:'toggle',  default:0, desc:'Show a slider to adjust incident phase'},
    {name:'thickness', type:'number',  min:0,  max:1200, step:5, default:450, desc:'Film thickness (nm)'},
    {name:'phi',       type:'number',  min:0,  max:360,  step:1, default:0,   desc:'Incident phase at front surface (deg)'},
    {name:'animate',   type:'toggle',  default:1, desc:'Animate the traveling waves'},
    {name:'speed',     type:'number',  min:0,  max:0.2,  step:0.005, default:0.03, desc:'Animation speed (rad/frame)'},
    {name:'zoom',      type:'toggle',  default:0, desc:'Enable zoom/pan controls'},
  ];

  var EMBED_KEYS = ['cheat'];
  function buildCleanUrl(ov) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function(k) { p.delete(k); });
    for (var k in ov) { var v=ov[k]; if(v===null||v==='') p.delete(k); else p.set(k,v); }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }
  function buildCheatUrl(ov) {
    var b = buildCleanUrl(ov);
    return b + (b.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }
  function getEff(d) {
    var r = _cpQ.get(d.name);
    return r !== null ? r : (d['default'] !== undefined ? String(d['default']) : '');
  }
  function isTruthy(v) { return v!=='0'&&v!=='false'&&v!=='no'&&v!=='off'&&v!==''; }

  function makeControl(d) {
    var eff = getEff(d);
    if (d.type === 'toggle') {
      var on = isTruthy(eff), btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:'+(on?'#1b3d1b':'#3d1b1b')+';color:'+(on?'#6dca80':'#e07070')+
        ';border:1px solid '+(on?'#2a7a3a':'#8a2a2a')+';border-radius:3px;padding:3px 10px;'+
        'cursor:pointer;font-size:12px;min-width:70px';
      btn.onclick = function() { var u={}; u[d.name]=on?'0':'1'; go(buildCheatUrl(u)); };
      return btn;
    }
    if (d.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
        'border-radius:3px;padding:3px 8px;font-size:12px;cursor:pointer';
      d.values.forEach(function(v) {
        var o = document.createElement('option'); o.value=v; o.textContent=v;
        if (eff===String(v)) o.selected=true; sel.appendChild(o);
      });
      sel.onchange = function() { var u={}; u[d.name]=sel.value; go(buildCheatUrl(u)); };
      return sel;
    }
    var inp = document.createElement('input');
    inp.type = d.type==='number' ? 'number' : 'text'; inp.value = eff;
    if (d.min!==undefined) inp.min=String(d.min);
    if (d.max!==undefined) inp.max=String(d.max);
    if (d.step!==undefined) inp.step=String(d.step);
    inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
      'border-radius:3px;padding:3px 6px;width:'+(d.type==='number'?'90':'220')+'px;font-size:12px';
    inp.onchange = function() { var u={}; u[d.name]=inp.value; go(buildCheatUrl(u)); };
    return inp;
  }

  function typeLabel(d) {
    if (d.type==='toggle') return '0|1';
    if (d.type==='select') return d.values.join('|');
    if (d.type==='number'&&d.min!==undefined&&d.max!==undefined) return d.min+'–'+d.max;
    return d.type;
  }

  function render() {
    var panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;'+
      'background:rgba(12,18,32,0.97);color:#c8d8e8;'+
      'font-family:"Segoe UI",system-ui,monospace;font-size:13px;'+
      'border-top:2px solid #3a7bd5;z-index:2147483647;max-height:48vh;'+
      'display:flex;flex-direction:column;'+
      'box-sizing:border-box;box-shadow:0 -4px 24px rgba(0,0,0,0.6)';

    var bubble = document.createElement('button');
    bubble.style.cssText = 'position:fixed;bottom:8px;right:12px;'+
      'background:rgba(12,18,32,0.95);color:#7ab8f5;border:1px solid #3a7bd5;'+
      'border-radius:4px;padding:4px 12px;font-size:12px;'+
      'font-family:"Segoe UI",system-ui,monospace;cursor:pointer;'+
      'z-index:2147483647;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.5);user-select:none';
    bubble.textContent = '🔑 Cheat Panel';
    bubble.onclick = function() { bubble.style.display='none'; panel.style.display='flex'; };
    document.body.appendChild(bubble);

    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-weight:bold;color:#7ab8f5;'+
      'display:flex;align-items:center;justify-content:space-between;'+
      'flex-shrink:0;padding:10px 16px 8px;box-sizing:border-box';
    var hspan = document.createElement('span');
    hspan.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var btns = document.createElement('div');
    btns.style.cssText = 'display:flex;align-items:center;gap:2px';
    var minbtn = document.createElement('button');
    minbtn.textContent = '−';
    minbtn.title = 'Minimize (restore without reloading)';
    minbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    minbtn.onclick = function() { panel.style.display='none'; bubble.style.display=''; };
    var xbtn = document.createElement('button');
    xbtn.textContent = '×'; xbtn.title = 'Close (reload to restore)';
    xbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    xbtn.onclick = function() { panel.remove(); bubble.remove(); };
    btns.appendChild(minbtn); btns.appendChild(xbtn);
    hdr.appendChild(hspan); hdr.appendChild(btns); panel.appendChild(hdr);

    var body = document.createElement('div');
    _scrollEl = body;
    body.style.cssText = 'overflow-y:auto;flex:1 1 auto;min-height:0;'+
      'padding:0 16px 14px;box-sizing:border-box';

    var tbl = document.createElement('table');
    tbl.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var hrow = tbl.createTHead().insertRow();
    ['Parameter','Type/Values','Control','Description'].forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;'+
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;'+
        'position:sticky;top:0;background:rgba(12,18,32,0.97);z-index:1';
      hrow.appendChild(th);
    });
    var tbody = tbl.createTBody();
    CHEAT_DEFS.forEach(function(d) {
      var row = tbody.insertRow(), isSet = _cpQ.has(d.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;'+
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;'+
        'color:'+(isSet?'#a8d4ff':'#7fa8d0')+';white-space:nowrap;font-family:monospace';
      nc.textContent = d.name;
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;font-family:monospace';
      tc.textContent = typeLabel(d);
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(d));
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (d.desc||'')+(d['default']!==undefined?' (default: '+d['default']+')':'');
    });
    body.appendChild(tbl);

    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;'+
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var ulbl = document.createElement('span');
    ulbl.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;'+
      'letter-spacing:.06em;white-space:nowrap;flex-shrink:0';
    ulbl.textContent = 'Embed URL:';
    var ulink = document.createElement('a');
    ulink.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;'+
      'font-family:monospace;text-decoration:none';
    ulink.href = buildCleanUrl({}); ulink.textContent = buildCleanUrl({});
    ulink.onclick = function(e) { e.preventDefault(); go(buildCheatUrl({})); };
    var cpybtn = document.createElement('button');
    cpybtn.textContent = 'copy';
    cpybtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;'+
      'border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;'+
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    cpybtn.onclick = function() {
      navigator.clipboard && navigator.clipboard.writeText(buildCleanUrl({}));
      cpybtn.textContent = '✓ copied';
      setTimeout(function() { cpybtn.textContent = 'copy'; }, 1500);
    };
    urlBox.appendChild(ulbl); urlBox.appendChild(ulink); urlBox.appendChild(cpybtn);
    body.appendChild(urlBox);
    panel.appendChild(body);
    document.body.appendChild(panel);

    try {
      var savedScroll = sessionStorage.getItem(SCROLL_KEY);
      if (savedScroll !== null) body.scrollTop = parseFloat(savedScroll) || 0;
    } catch (e) {}
  }
  render();
})();
</script>

<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize'));
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
