<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mario Mirror Rotation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }

#controls {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.82);
    color: #fff;
    padding: 18px 20px;
    border-radius: 10px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    min-width: 250px;
    z-index: 100;
    user-select: none;
}

.control-group { margin-bottom: 13px; }
.control-group:last-child { margin-bottom: 0; }
.control-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    color: #bbb;
    font-size: 13px;
}

.btn-group { display: flex; gap: 5px; }
.btn-group button {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid #555;
    background: #333;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
}
.btn-group button:hover { background: #444; }
.btn-group button.active {
    background: #c0392b;
    border-color: #c0392b;
    font-weight: 600;
}

input[type="range"] {
    width: 100%;
    accent-color: #c0392b;
    margin-top: 2px;
}

.check-group { display: flex; flex-direction: column; gap: 6px; }
.check-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: normal;
    color: #ddd;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 0;
}
.check-group input[type="checkbox"] {
    accent-color: #c0392b;
    width: 15px;
    height: 15px;
    cursor: pointer;
}

.slider-val {
    text-align: center;
    color: #999;
    font-size: 12px;
    margin-top: 2px;
}

#info {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.82);
    color: #fff;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 15px;
    text-align: center;
}
#info .num { color: #f1c40f; font-weight: bold; font-size: 22px; }
</style>
</head>
<body>

<div id="controls">
    <div class="control-group">
        <label>Mirror Type</label>
        <div class="btn-group" id="angleBtns">
            <button data-angle="180">180&deg;</button>
            <button data-angle="90" class="active">90&deg;</button>
            <button data-angle="60">60&deg;</button>
            <button data-angle="corner">Corner</button>
        </div>
    </div>
    <div class="control-group">
        <label>Rotate Mirrors</label>
        <input type="range" id="mirrorRot" min="0" max="360" value="0" step="1">
        <div class="slider-val" id="mirrorRotVal">0&deg;</div>
    </div>
    <div class="control-group">
        <label>Rotate Mario</label>
        <input type="range" id="marioRot" min="0" max="360" value="0" step="1">
        <div class="slider-val" id="marioRotVal">0&deg;</div>
    </div>
    <div class="control-group">
        <label>View</label>
        <div class="btn-group" id="viewBtns">
            <button data-view="third" class="active">Third Person</button>
            <button data-view="first">Mario's Eyes</button>
        </div>
    </div>
    <div class="control-group">
        <label>Show</label>
        <div class="check-group">
            <label><input type="checkbox" id="showMario" checked> Mario</label>
            <label><input type="checkbox" id="showMirrors" checked> Mirrors</label>
        </div>
    </div>
</div>

<div id="info">
    Reflections visible: <span class="num" id="numRef">3</span>
    &nbsp;|&nbsp; Mirror: <span class="num" id="angLabel">90&deg;</span>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============ SCENE SETUP ============ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6EB5FF);
scene.fog = new THREE.Fog(0x6EB5FF, 18, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Cameras
const cam3 = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
cam3.position.set(1, 3, 6);
const cam1 = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.05, 100);
let activeCam = cam3;
let viewMode = 'third';

const orbit = new OrbitControls(cam3, renderer.domElement);
orbit.target.set(0, 0.5, 0);
orbit.enableDamping = true;
orbit.dampingFactor = 0.07;
orbit.update();

// Prevent OrbitControls from capturing events on the UI panel
document.getElementById('controls').addEventListener('pointerdown', e => e.stopPropagation());
document.getElementById('controls').addEventListener('pointermove', e => e.stopPropagation());

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(4, 8, 3);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x556633, 0.3));

/* ============ MIRRORS ============ */
const MW = 2.5, MH = 2.4;
const CS = 2.0;   // corner reflector panel size

const mirrorMat = new THREE.MeshPhysicalMaterial({
    color: 0xc8ddf8, metalness: 0.92, roughness: 0.05,
    transparent: true, opacity: 0.35, side: THREE.DoubleSide,
});
const frameMat = new THREE.MeshStandardMaterial({ color: 0x2c2c2c, metalness: 0.7, roughness: 0.35 });

/* ============ MIRROR GROUP ============ */
const mirrorGroup = new THREE.Group();
scene.add(mirrorGroup);

const hinge = new THREE.Mesh(
    new THREE.CylinderGeometry(0.035, 0.035, 2.6, 12),
    new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.85, roughness: 0.18 })
);
mirrorGroup.add(hinge);

/* ============ HINGED MIRROR PANELS ============ */
function createHingedPanel() {
    const grp = new THREE.Group();
    const surf = new THREE.Mesh(new THREE.PlaneGeometry(MW, MH), mirrorMat);
    surf.position.set(MW / 2, 0, 0);
    grp.add(surf);
    const ft = 0.035;
    const topBot = new THREE.BoxGeometry(MW + ft * 2, ft, ft);
    [-MH / 2, MH / 2].forEach(y => {
        const f = new THREE.Mesh(topBot, frameMat);
        f.position.set(MW / 2, y, 0);
        grp.add(f);
    });
    const sideGeo = new THREE.BoxGeometry(ft, MH, ft);
    [0, MW].forEach(x => {
        const f = new THREE.Mesh(sideGeo, frameMat);
        f.position.set(x, 0, 0);
        grp.add(f);
    });
    return grp;
}

const mirror1 = createHingedPanel();
const mirror2 = createHingedPanel();
mirrorGroup.add(mirror1);
mirrorGroup.add(mirror2);

/* ============ CORNER REFLECTOR PANELS ============ */
function createCornerPanel(w, h) {
    const grp = new THREE.Group();
    const surf = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mirrorMat.clone());
    grp.add(surf);
    const ft = 0.035;
    const topBot = new THREE.BoxGeometry(w + ft * 2, ft, ft);
    [-h / 2, h / 2].forEach(y => {
        const f = new THREE.Mesh(topBot, frameMat);
        f.position.set(0, y, 0);
        grp.add(f);
    });
    const sideGeo = new THREE.BoxGeometry(ft, h, ft);
    [-w / 2, w / 2].forEach(x => {
        const f = new THREE.Mesh(sideGeo, frameMat);
        f.position.set(x, 0, 0);
        grp.add(f);
    });
    return grp;
}

// Panel A: yz-plane (x=0), faces +x, extends in y and z
const cornerA = createCornerPanel(CS, CS);
cornerA.rotation.y = Math.PI / 2;
cornerA.position.set(0, CS / 2, CS / 2);
mirrorGroup.add(cornerA);

// Panel B: xz-plane (y=0), faces +y, extends in x and z
const cornerB = createCornerPanel(CS, CS);
cornerB.rotation.x = -Math.PI / 2;
cornerB.position.set(CS / 2, 0, CS / 2);
mirrorGroup.add(cornerB);

// Panel C: xy-plane (z=0), faces +z, extends in x and y
const cornerC = createCornerPanel(CS, CS);
cornerC.position.set(CS / 2, CS / 2, 0);
mirrorGroup.add(cornerC);

/* ============ CREATE MARIO ============ */
function createMario(isReflection) {
    const g = new THREE.Group();
    const S = THREE.DoubleSide;
    const mat = (c) => new THREE.MeshStandardMaterial({ color: c, side: S });
    const skin = mat(0xFFB27F);
    const red = mat(0xE20000);
    const blue = mat(0x1111BB);
    const brown = mat(0x6B3A2A);
    const darkBrown = mat(0x3D2314);
    const white = mat(0xFFFFFF);
    const black = mat(0x111111);
    const gold = mat(0xFFD700);
    const yellow = mat(0xFFD700);

    if (isReflection) {
        [skin, red, blue, brown, darkBrown, white, black, gold, yellow].forEach(m => {
            m.transparent = true;
            m.opacity = 0.72;
        });
    }

    // Shoes
    const shoeG = new THREE.BoxGeometry(0.14, 0.1, 0.22);
    [-1, 1].forEach(s => {
        const shoe = new THREE.Mesh(shoeG, brown);
        shoe.position.set(s * 0.1, 0.05, 0.02);
        g.add(shoe);
    });

    // Legs
    const legG = new THREE.CylinderGeometry(0.06, 0.065, 0.33, 8);
    [-1, 1].forEach(s => {
        const leg = new THREE.Mesh(legG, blue);
        leg.position.set(s * 0.1, 0.27, 0);
        g.add(leg);
    });

    // Body (overalls)
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.19, 0.17, 0.32, 10), blue);
    body.position.y = 0.60;
    g.add(body);

    // Shirt
    const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.19, 0.18, 10), red);
    shirt.position.y = 0.83;
    g.add(shirt);

    // Overall straps
    [-1, 1].forEach(s => {
        const strap = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.22, 0.04), blue);
        strap.position.set(s * 0.08, 0.82, -0.14);
        g.add(strap);
        const btn = new THREE.Mesh(new THREE.SphereGeometry(0.022, 6, 6), gold);
        btn.position.set(s * 0.08, 0.76, -0.17);
        g.add(btn);
    });

    // RIGHT arm: down at side
    {
        const armG = new THREE.CylinderGeometry(0.05, 0.045, 0.3, 8);
        const arm = new THREE.Mesh(armG, red);
        arm.position.set(0.26, 0.74, 0);
        arm.rotation.z = 0.25;
        g.add(arm);
        const hand = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), white);
        hand.position.set(0.3, 0.57, 0);
        g.add(hand);
    }

    // LEFT arm: pointing up (mirror of right arm)
    {
        const armG = new THREE.CylinderGeometry(0.05, 0.045, 0.3, 8);
        const arm = new THREE.Mesh(armG, red);
        arm.position.set(-0.26, 1.03, 0);
        arm.rotation.z = -0.25;
        g.add(arm);
        const hand = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), white);
        hand.position.set(-0.3, 1.18, 0);
        g.add(hand);
    }

    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.175, 14, 10), skin);
    head.position.set(0, 1.1, 0);
    g.add(head);

    // Ears
    [-1, 1].forEach(s => {
        const ear = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), skin);
        ear.position.set(s * 0.17, 1.08, 0);
        g.add(ear);
    });

    // Cap
    const capTop = new THREE.Mesh(
        new THREE.SphereGeometry(0.185, 14, 8, 0, Math.PI * 2, 0, Math.PI * 0.45), red
    );
    capTop.position.set(0, 1.14, 0);
    g.add(capTop);

    const brimShape = new THREE.Shape();
    brimShape.absarc(0, 0, 0.20, 0, Math.PI, false);
    const brimGeo = new THREE.ExtrudeGeometry(brimShape, { depth: 0.025, bevelEnabled: false });
    const brim = new THREE.Mesh(brimGeo, red);
    brim.rotation.x = -Math.PI / 2 + 0.12;
    brim.position.set(0, 1.16, -0.13);
    g.add(brim);

    const badge = new THREE.Mesh(new THREE.CircleGeometry(0.06, 12), white);
    badge.position.set(0, 1.22, -0.16);
    badge.lookAt(0, 1.22 + 0.3, -0.16 - 1);
    g.add(badge);

    // Nose
    const nose = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), skin);
    nose.position.set(0, 1.05, -0.18);
    g.add(nose);

    // Mustache
    const mustache = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.035, 0.05), darkBrown);
    mustache.position.set(0, 1.01, -0.16);
    g.add(mustache);
    [-1, 1].forEach(s => {
        const curl = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 6), darkBrown);
        curl.position.set(s * 0.1, 1.01, -0.14);
        g.add(curl);
    });

    // Eyes
    [-1, 1].forEach(s => {
        const eyeW = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), white);
        eyeW.position.set(s * 0.065, 1.12, -0.15);
        g.add(eyeW);
        const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.022, 6, 6), new THREE.MeshStandardMaterial({
            color: 0x2244aa, side: S,
            transparent: isReflection, opacity: isReflection ? 0.72 : 1.0
        }));
        pupil.position.set(s * 0.065, 1.12, -0.185);
        g.add(pupil);
    });

    // Side-burns / hair
    [-1, 1].forEach(s => {
        const hair = new THREE.Mesh(new THREE.SphereGeometry(0.055, 6, 6), darkBrown);
        hair.position.set(s * 0.16, 1.03, -0.04);
        g.add(hair);
    });

    return g;
}

/* ============ MARIO ============ */
const MARIO_DIST = 1.8;
const mario = createMario(false);
scene.add(mario);

let reflectionClones = [];

/* ============ STATE ============ */
let mirrorAngle = 90;
let mirrorType = 'hinged';   // 'hinged' or 'corner'
let mirrorTilt = 0;
let marioRotation = 0;       // degrees, rotation around bisector axis
let showMario = true;
let showMirrors = true;

/* ============ 3D REFLECTION MATH ============ */

// Build a 4x4 reflection matrix for a plane with unit normal n passing through point p.
function makeReflectionMatrix(n, p) {
    const d = n.dot(p);
    const nx = n.x, ny = n.y, nz = n.z;
    const m = new THREE.Matrix4();
    m.set(
        1 - 2*nx*nx,  -2*nx*ny,     -2*nx*nz,     2*nx*d,
        -2*nx*ny,     1 - 2*ny*ny,  -2*ny*nz,     2*ny*d,
        -2*nx*nz,     -2*ny*nz,     1 - 2*nz*nz,  2*nz*d,
        0,            0,            0,             1
    );
    return m;
}

// Orient obj so its local -Z points from obj.position toward target, with a stable up vector.
function faceTarget(obj, target) {
    const forward = new THREE.Vector3().subVectors(target, obj.position).normalize();
    const zAxis = forward.clone().negate();     // local +Z = away from target
    let up = new THREE.Vector3(0, 1, 0);
    // If forward is nearly parallel to up, pick a different up
    if (Math.abs(forward.dot(up)) > 0.99) up.set(1, 0, 0);
    const xAxis = new THREE.Vector3().crossVectors(up, zAxis).normalize();
    const yAxis = new THREE.Vector3().crossVectors(zAxis, xAxis);
    const rotMat = new THREE.Matrix4().makeBasis(xAxis, yAxis, zAxis);
    obj.quaternion.setFromRotationMatrix(rotMat);
}

/* ============ UPDATE ============ */
function updateScene() {
    const tiltRad = THREE.MathUtils.degToRad(mirrorTilt);
    const marioRotRad = THREE.MathUtils.degToRad(marioRotation);

    // --- Remove old clones ---
    for (const c of reflectionClones) {
        c.traverse(ch => { if (ch.geometry) ch.geometry.dispose(); });
        scene.remove(c);
    }
    reflectionClones = [];

    const isCorner = mirrorType === 'corner';

    // --- Show/hide mirror parts ---
    mirror1.visible = !isCorner;
    mirror2.visible = !isCorner;
    hinge.visible = !isCorner;
    cornerA.visible = isCorner;
    cornerB.visible = isCorner;
    cornerC.visible = isCorner;

    // World-space origin for reflection planes
    const origin = mirrorGroup.position;

    if (isCorner) {
        // --- CORNER REFLECTOR ---
        mirrorGroup.position.set(0, 0, 0);
        mirrorGroup.quaternion.setFromAxisAngle(new THREE.Vector3(0, 0, 1), tiltRad);

        // Mario looks into the corner along the (1,1,1) diagonal
        const s = MARIO_DIST / Math.sqrt(3);
        mario.position.set(s, s - 0.65, s);
        faceTarget(mario, new THREE.Vector3(0, s - 0.65, 0));

        // Apply Mario rotation around the bisector axis = (1,1,1) normalized
        const bisector = new THREE.Vector3(1, 1, 1).normalize();
        const marioSpinQ = new THREE.Quaternion().setFromAxisAngle(bisector, marioRotRad);
        mario.quaternion.premultiply(marioSpinQ);

        // Three mutually perpendicular mirror planes through origin
        // In group-local: normals are (1,0,0), (0,1,0), (0,0,1)
        // Transform to world:
        const norms = [
            new THREE.Vector3(1, 0, 0).applyQuaternion(mirrorGroup.quaternion),
            new THREE.Vector3(0, 1, 0).applyQuaternion(mirrorGroup.quaternion),
            new THREE.Vector3(0, 0, 1).applyQuaternion(mirrorGroup.quaternion),
        ];
        const refMats = norms.map(n => makeReflectionMatrix(n, origin));

        // Mario's world-space basis vectors
        const mQ = mario.quaternion;
        const mRight = new THREE.Vector3(1, 0, 0).applyQuaternion(mQ);
        const mUp    = new THREE.Vector3(0, 1, 0).applyQuaternion(mQ);
        const mFwd   = new THREE.Vector3(0, 0, 1).applyQuaternion(mQ);

        // All 7 images: every non-empty subset of {0,1,2}
        const images = [];
        for (let mask = 1; mask < 8; mask++) {
            let cumMat = new THREE.Matrix4();
            let depth = 0;
            for (let j = 0; j < 3; j++) {
                if (mask & (1 << j)) {
                    cumMat = refMats[j].clone().multiply(cumMat);
                    depth++;
                }
            }
            const pos = mario.position.clone().applyMatrix4(cumMat);
            const rRight = mRight.clone().transformDirection(cumMat);
            const rUp    = mUp.clone().transformDirection(cumMat);
            const rFwd   = mFwd.clone().transformDirection(cumMat);
            images.push({ pos, right: rRight, up: rUp, fwd: rFwd, depth });
        }

        // Place clones
        for (const img of images) {
            const clone = createMario(true);
            clone.position.copy(img.pos);
            const isOdd = img.depth % 2 === 1;
            const right = isOdd ? img.right.clone().negate() : img.right;
            const rotMat = new THREE.Matrix4().makeBasis(right, img.up, img.fwd);
            clone.quaternion.setFromRotationMatrix(rotMat);
            if (isOdd) clone.scale.x = -1;
            scene.add(clone);
            reflectionClones.push(clone);
        }

        // Info bar
        document.getElementById('numRef').textContent = '7';
        document.getElementById('angLabel').textContent = 'Corner';

    } else {
        // --- HINGED MIRRORS ---
        const thetaRad = THREE.MathUtils.degToRad(mirrorAngle);

        mirrorGroup.position.set(0, 0, 0);

        // Mirror orientations inside group
        mirror1.rotation.y = -(Math.PI + thetaRad) / 2;
        mirror2.rotation.y =  (thetaRad - Math.PI) / 2;

        // Apply tilt
        mirrorGroup.quaternion.setFromAxisAngle(new THREE.Vector3(0, 0, 1), tiltRad);

        // Mario on bisector (+Z), facing the hinge
        mario.position.set(0, -0.65, MARIO_DIST);
        faceTarget(mario, new THREE.Vector3(0, -0.65, 0));

        // Apply Mario rotation around the bisector axis (world Z)
        const marioSpinQ = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(0, 0, 1), marioRotRad
        );
        mario.quaternion.premultiply(marioSpinQ);

        // Mirror plane normals in group-local, transformed to world
        const n1World = new THREE.Vector3( Math.cos(thetaRad / 2), 0, Math.sin(thetaRad / 2))
            .applyQuaternion(mirrorGroup.quaternion);
        const n2World = new THREE.Vector3(-Math.cos(thetaRad / 2), 0, Math.sin(thetaRad / 2))
            .applyQuaternion(mirrorGroup.quaternion);

        const refMat1 = makeReflectionMatrix(n1World, origin);
        const refMat2 = makeReflectionMatrix(n2World, origin);

        const maxImages = Math.round(2 * Math.PI / thetaRad) - 1;

        // Mario's world-space basis vectors
        const mQ = mario.quaternion;
        const mRight = new THREE.Vector3(1, 0, 0).applyQuaternion(mQ);
        const mUp    = new THREE.Vector3(0, 1, 0).applyQuaternion(mQ);
        const mFwd   = new THREE.Vector3(0, 0, 1).applyQuaternion(mQ);

        const images = [];
        function isDup(pos) {
            return images.some(im => im.pos.distanceTo(pos) < 0.01)
                || mario.position.distanceTo(pos) < 0.01;
        }

        // Two chains: one starting with mirror 1, one starting with mirror 2
        for (let startMirror = 0; startMirror < 2; startMirror++) {
            let cumMat = new THREE.Matrix4();
            let depth = 0;
            for (let i = 0; i < maxImages + 2 && images.length < maxImages; i++) {
                const mat = (i + startMirror) % 2 === 0 ? refMat1 : refMat2;
                cumMat = mat.clone().multiply(cumMat);
                depth++;
                const pos = mario.position.clone().applyMatrix4(cumMat);
                if (!isDup(pos)) {
                    const rRight = mRight.clone().transformDirection(cumMat);
                    const rUp    = mUp.clone().transformDirection(cumMat);
                    const rFwd   = mFwd.clone().transformDirection(cumMat);
                    images.push({ pos, right: rRight, up: rUp, fwd: rFwd, depth });
                }
            }
        }

        // Place clones
        for (const img of images.slice(0, maxImages)) {
            const clone = createMario(true);
            clone.position.copy(img.pos);
            const isOdd = img.depth % 2 === 1;
            const right = isOdd ? img.right.clone().negate() : img.right;
            const rotMat = new THREE.Matrix4().makeBasis(right, img.up, img.fwd);
            clone.quaternion.setFromRotationMatrix(rotMat);
            if (isOdd) clone.scale.x = -1;
            scene.add(clone);
            reflectionClones.push(clone);
        }

        // Info bar
        const numImages = Math.round(360 / mirrorAngle) - 1;
        document.getElementById('numRef').textContent = numImages;
        document.getElementById('angLabel').textContent = mirrorAngle + '\u00B0';
    }

    // --- First-person camera ---
    if (viewMode === 'first') {
        const eyeLocal = new THREE.Vector3(0, 1.12, 0);
        eyeLocal.applyQuaternion(mario.quaternion);
        cam1.position.copy(mario.position).add(eyeLocal);
        const lookDir = new THREE.Vector3(0, 0, -1).applyQuaternion(mario.quaternion);
        cam1.lookAt(cam1.position.clone().add(lookDir));
        mario.visible = false;
    } else {
        mario.visible = showMario;
    }
    reflectionClones.forEach(c => { c.visible = showMario; });
    mirrorGroup.visible = showMirrors;

    document.getElementById('marioRotVal').textContent = marioRotation + '\u00B0';
    document.getElementById('mirrorRotVal').textContent = mirrorTilt + '\u00B0';
}

/* ============ CONTROLS ============ */
document.querySelectorAll('#angleBtns button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#angleBtns button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const val = btn.dataset.angle;
        if (val === 'corner') {
            mirrorType = 'corner';
        } else {
            mirrorType = 'hinged';
            mirrorAngle = parseInt(val);
        }
        updateScene();
    });
});
document.getElementById('mirrorRot').addEventListener('input', e => {
    mirrorTilt = parseInt(e.target.value);
    updateScene();
});
document.getElementById('marioRot').addEventListener('input', e => {
    marioRotation = parseInt(e.target.value);
    updateScene();
});
document.querySelectorAll('#viewBtns button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#viewBtns button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        viewMode = btn.dataset.view;
        activeCam = viewMode === 'third' ? cam3 : cam1;
        orbit.enabled = viewMode === 'third';
        updateScene();
    });
});
document.getElementById('showMario').addEventListener('change', e => {
    showMario = e.target.checked;
    updateScene();
});
document.getElementById('showMirrors').addEventListener('change', e => {
    showMirrors = e.target.checked;
    updateScene();
});

/* ============ RENDER LOOP ============ */
function animate() {
    requestAnimationFrame(animate);
    if (viewMode === 'third') orbit.update();
    renderer.render(scene, activeCam);
}

window.addEventListener('resize', () => {
    cam3.aspect = innerWidth / innerHeight;
    cam3.updateProjectionMatrix();
    cam1.aspect = innerWidth / innerHeight;
    cam1.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

updateScene();
animate();
</script>
</body>
</html>
