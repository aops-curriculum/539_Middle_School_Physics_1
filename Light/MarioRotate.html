<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mario Mirror Rotation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }

#controls {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.82);
    color: #fff;
    padding: 18px 20px;
    border-radius: 10px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    min-width: 250px;
    z-index: 100;
    user-select: none;
}

.control-group { margin-bottom: 13px; }
.control-group:last-child { margin-bottom: 0; }
.control-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    color: #bbb;
    font-size: 13px;
}

.btn-group { display: flex; gap: 5px; }
.btn-group button {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid #555;
    background: #333;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
}
.btn-group button:hover { background: #444; }
.btn-group button.active {
    background: #c0392b;
    border-color: #c0392b;
    font-weight: 600;
}

input[type="range"] {
    width: 100%;
    accent-color: #c0392b;
    margin-top: 2px;
}

.slider-val {
    text-align: center;
    color: #999;
    font-size: 12px;
    margin-top: 2px;
}

#info {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.82);
    color: #fff;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 15px;
    text-align: center;
}
#info .num { color: #f1c40f; font-weight: bold; font-size: 22px; }
</style>
</head>
<body>

<div id="controls">
    <div class="control-group">
        <label>Mirror Angle</label>
        <div class="btn-group" id="angleBtns">
            <button data-angle="180">180°</button>
            <button data-angle="90" class="active">90°</button>
            <button data-angle="60">60°</button>
        </div>
    </div>
    <div class="control-group">
        <label>Rotate Mirrors (tilt)</label>
        <input type="range" id="mirrorRot" min="0" max="360" value="0" step="1">
        <div class="slider-val" id="mirrorRotVal">0°</div>
    </div>
    <div class="control-group">
        <label>Mario Position (within sector)</label>
        <input type="range" id="marioPos" min="10" max="90" value="50" step="1">
        <div class="slider-val" id="marioPosVal">50%</div>
    </div>
    <div class="control-group">
        <label>View</label>
        <div class="btn-group" id="viewBtns">
            <button data-view="third" class="active">Third Person</button>
            <button data-view="first">Mario's Eyes</button>
        </div>
    </div>
</div>

<div id="info">
    Reflections visible: <span class="num" id="numRef">3</span>
    &nbsp;|&nbsp; Mirror angle: <span class="num" id="angLabel">90°</span>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============ SCENE SETUP ============ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6EB5FF);
scene.fog = new THREE.Fog(0x6EB5FF, 18, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Cameras
const cam3 = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
cam3.position.set(1, 5, 6);
const cam1 = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.05, 100);
let activeCam = cam3;
let viewMode = 'third';

const orbit = new OrbitControls(cam3, renderer.domElement);
orbit.target.set(0, 0.8, 0);
orbit.enableDamping = true;
orbit.dampingFactor = 0.07;
orbit.maxPolarAngle = Math.PI / 2 + 0.15;
orbit.update();

// Prevent OrbitControls from capturing events on the UI panel
document.getElementById('controls').addEventListener('pointerdown', e => e.stopPropagation());
document.getElementById('controls').addEventListener('pointermove', e => e.stopPropagation());

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(4, 8, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 25;
sun.shadow.camera.left = -6;
sun.shadow.camera.right = 6;
sun.shadow.camera.top = 6;
sun.shadow.camera.bottom = -6;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x556633, 0.3));

/* ============ FLOOR ============ */
const floorCanvas = document.createElement('canvas');
floorCanvas.width = floorCanvas.height = 512;
const fctx = floorCanvas.getContext('2d');
const sq = 32;
for (let i = 0; i < 512 / sq; i++)
    for (let j = 0; j < 512 / sq; j++) {
        fctx.fillStyle = (i + j) % 2 === 0 ? '#b5b5b5' : '#9a9a9a';
        fctx.fillRect(i * sq, j * sq, sq, sq);
    }
const floorTex = new THREE.CanvasTexture(floorCanvas);
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(5, 5);
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(24, 24),
    new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.85 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

/* ============ MIRRORS ============ */
const MW = 2.5, MH = 2.4;

/* ============ MIRROR GROUP (hinge + both panels) ============ */
const mirrorGroup = new THREE.Group();
mirrorGroup.position.y = MH / 2;   // pivot at mirror center height
scene.add(mirrorGroup);

const hinge = new THREE.Mesh(
    new THREE.CylinderGeometry(0.035, 0.035, 2.6, 12),
    new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.85, roughness: 0.18 })
);
// Hinge stays at group-local y=0 (which is world MH/2)
hinge.position.y = 0;
mirrorGroup.add(hinge);

/* ============ CREATE MARIO ============ */
function createMario(isReflection) {
    const g = new THREE.Group();
    const S = THREE.DoubleSide;
    const mat = (c) => new THREE.MeshStandardMaterial({ color: c, side: S });
    const skin = mat(0xFFB27F);
    const red = mat(0xE20000);
    const blue = mat(0x1111BB);
    const brown = mat(0x6B3A2A);
    const darkBrown = mat(0x3D2314);
    const white = mat(0xFFFFFF);
    const black = mat(0x111111);
    const gold = mat(0xFFD700);
    const yellow = mat(0xFFD700);

    if (isReflection) {
        [skin, red, blue, brown, darkBrown, white, black, gold, yellow].forEach(m => {
            m.transparent = true;
            m.opacity = 0.72;
        });
    }

    // Shoes
    const shoeG = new THREE.BoxGeometry(0.14, 0.1, 0.22);
    [-1, 1].forEach(s => {
        const shoe = new THREE.Mesh(shoeG, brown);
        shoe.position.set(s * 0.1, 0.05, 0.02);
        shoe.castShadow = true;
        g.add(shoe);
    });

    // Legs
    const legG = new THREE.CylinderGeometry(0.06, 0.065, 0.33, 8);
    [-1, 1].forEach(s => {
        const leg = new THREE.Mesh(legG, blue);
        leg.position.set(s * 0.1, 0.27, 0);
        leg.castShadow = true;
        g.add(leg);
    });

    // Body (overalls)
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.19, 0.17, 0.32, 10), blue);
    body.position.y = 0.60;
    body.castShadow = true;
    g.add(body);

    // Shirt
    const shirt = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.19, 0.18, 10), red);
    shirt.position.y = 0.83;
    shirt.castShadow = true;
    g.add(shirt);

    // Overall straps
    [-1, 1].forEach(s => {
        const strap = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.22, 0.04), blue);
        strap.position.set(s * 0.08, 0.82, -0.14);
        g.add(strap);
        const btn = new THREE.Mesh(new THREE.SphereGeometry(0.022, 6, 6), gold);
        btn.position.set(s * 0.08, 0.76, -0.17);
        g.add(btn);
    });

    // RIGHT arm: down at side (s = 1 = Mario's right = +x in local space)
    {
        const armG = new THREE.CylinderGeometry(0.05, 0.045, 0.3, 8);
        const arm = new THREE.Mesh(armG, red);
        arm.position.set(0.26, 0.74, 0);
        arm.rotation.z = 0.25;
        arm.castShadow = true;
        g.add(arm);
        const hand = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), white);
        hand.position.set(0.3, 0.57, 0);
        g.add(hand);
    }

    // LEFT arm: raised up high waving (s = -1 = Mario's left = -x in local space)
    {
        const armG = new THREE.CylinderGeometry(0.05, 0.045, 0.3, 8);
        const arm = new THREE.Mesh(armG, red);
        // Arm raised: rotated so it points up and slightly out
        arm.position.set(-0.26, 1.0, 0);
        arm.rotation.z = -1.2;  // tilted up
        arm.castShadow = true;
        g.add(arm);
        // Hand at end of raised arm
        const hand = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), white);
        hand.position.set(-0.42, 1.18, 0);
        g.add(hand);

        // Star in raised hand to make it extra visible
        const star = new THREE.Mesh(
            new THREE.OctahedronGeometry(0.06, 0),
            yellow
        );
        star.position.set(-0.42, 1.30, 0);
        star.rotation.z = Math.PI / 4;
        g.add(star);
    }

    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.175, 14, 10), skin);
    head.position.set(0, 1.1, 0);
    head.castShadow = true;
    g.add(head);

    // Ears
    [-1, 1].forEach(s => {
        const ear = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), skin);
        ear.position.set(s * 0.17, 1.08, 0);
        g.add(ear);
    });

    // Cap
    const capTop = new THREE.Mesh(
        new THREE.SphereGeometry(0.185, 14, 8, 0, Math.PI * 2, 0, Math.PI * 0.45),
        red
    );
    capTop.position.set(0, 1.14, 0);
    g.add(capTop);

    // Brim — facing -z (forward)
    const brimShape = new THREE.Shape();
    brimShape.absarc(0, 0, 0.20, 0, Math.PI, false);
    const brimGeo = new THREE.ExtrudeGeometry(brimShape, { depth: 0.025, bevelEnabled: false });
    const brim = new THREE.Mesh(brimGeo, red);
    brim.rotation.x = -Math.PI / 2 + 0.12;
    brim.position.set(0, 1.16, -0.13);
    g.add(brim);

    // Cap badge (white circle)
    const badge = new THREE.Mesh(new THREE.CircleGeometry(0.06, 12), white);
    badge.position.set(0, 1.22, -0.16);
    badge.lookAt(0, 1.22 + 0.3, -0.16 - 1);
    g.add(badge);

    // Nose
    const nose = new THREE.Mesh(new THREE.SphereGeometry(0.055, 8, 8), skin);
    nose.position.set(0, 1.05, -0.18);
    g.add(nose);

    // Mustache
    const mustache = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.035, 0.05), darkBrown);
    mustache.position.set(0, 1.01, -0.16);
    g.add(mustache);
    // Mustache side curls
    [-1, 1].forEach(s => {
        const curl = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 6), darkBrown);
        curl.position.set(s * 0.1, 1.01, -0.14);
        g.add(curl);
    });

    // Eyes
    [-1, 1].forEach(s => {
        const eyeW = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), white);
        eyeW.position.set(s * 0.065, 1.12, -0.15);
        g.add(eyeW);
        const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.022, 6, 6), new THREE.MeshStandardMaterial({
            color: 0x2244aa, side: S,
            transparent: isReflection, opacity: isReflection ? 0.72 : 1.0
        }));
        pupil.position.set(s * 0.065, 1.12, -0.185);
        g.add(pupil);
    });

    // Side-burns / hair
    [-1, 1].forEach(s => {
        const hair = new THREE.Mesh(new THREE.SphereGeometry(0.055, 6, 6), darkBrown);
        hair.position.set(s * 0.16, 1.03, -0.04);
        g.add(hair);
    });

    return g;
}

const mirrorMat = new THREE.MeshPhysicalMaterial({
    color: 0xc8ddf8,
    metalness: 0.92,
    roughness: 0.05,
    transparent: true,
    opacity: 0.35,
    side: THREE.DoubleSide,
});
const frameMat = new THREE.MeshStandardMaterial({ color: 0x2c2c2c, metalness: 0.7, roughness: 0.35 });

function createMirrorPanel() {
    const grp = new THREE.Group();
    const surf = new THREE.Mesh(new THREE.PlaneGeometry(MW, MH), mirrorMat);
    surf.position.set(MW / 2, 0, 0);   // centered on y=0 in group-local
    grp.add(surf);
    const ft = 0.035;
    const topBot = new THREE.BoxGeometry(MW + ft * 2, ft, ft);
    [-MH / 2, MH / 2].forEach(y => {
        const f = new THREE.Mesh(topBot, frameMat);
        f.position.set(MW / 2, y, 0);
        grp.add(f);
    });
    const sideGeo = new THREE.BoxGeometry(ft, MH, ft);
    [0, MW].forEach(x => {
        const f = new THREE.Mesh(sideGeo, frameMat);
        f.position.set(x, 0, 0);
        grp.add(f);
    });
    return grp;
}

const mirror1 = createMirrorPanel();
const mirror2 = createMirrorPanel();
mirrorGroup.add(mirror1);
mirrorGroup.add(mirror2);

// Sector shading on floor
const sectorMesh = new THREE.Mesh(
    new THREE.RingGeometry(0.15, 3.2, 64, 1, 0, Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0xffff88, transparent: true, opacity: 0.10, side: THREE.DoubleSide })
);
sectorMesh.rotation.x = -Math.PI / 2;
sectorMesh.position.y = 0.005;
scene.add(sectorMesh);

/* ============ MARIO ============ */
const MARIO_DIST = 1.8;
const mario = createMario(false);
scene.add(mario);

let reflectionClones = [];

/* ============ STATE ============ */
let mirrorAngle = 90;
let mirrorTilt = 0;       // rotation around bisector axis (degrees)
let marioPosPercent = 50;

/* ============ 3D REFLECTION MATH ============ */
// Reflect point across plane through origin with given normal
function reflectPoint(p, n) {
    const d = p.dot(n);
    return p.clone().sub(n.clone().multiplyScalar(2 * d));
}

// Reflect a direction vector across a plane with given normal
function reflectDir(v, n) {
    const d = v.dot(n);
    return v.clone().sub(n.clone().multiplyScalar(2 * d));
}

function computeReflections3D(marioLocalPos, marioLocalFacing, thetaRad) {
    const n = Math.round(2 * Math.PI / thetaRad);
    const maxImages = n - 1;

    // Mirror plane normals (inward-facing) in group-local frame
    const n1 = new THREE.Vector3( Math.cos(thetaRad / 2), 0, Math.sin(thetaRad / 2));
    const n2 = new THREE.Vector3(-Math.cos(thetaRad / 2), 0, Math.sin(thetaRad / 2));

    const images = [];
    function isDup(pos) {
        return images.some(im => im.position.distanceTo(pos) < 0.01)
            || marioLocalPos.distanceTo(pos) < 0.01;
    }

    // Chain 1: start reflecting across Mirror 1, then alternate
    let p = marioLocalPos.clone();
    let facing = marioLocalFacing.clone();
    let parity = 1;   // +1 = even reflections, -1 = odd (mirrored)
    for (let i = 0; i < maxImages + 2 && images.length < maxImages; i++) {
        const normal = i % 2 === 0 ? n1 : n2;
        p = reflectPoint(p, normal);
        facing = reflectDir(facing, normal);
        parity *= -1;
        if (!isDup(p)) images.push({ position: p.clone(), facing: facing.clone(), parity });
    }
    // Chain 2: start reflecting across Mirror 2, then alternate
    p = marioLocalPos.clone();
    facing = marioLocalFacing.clone();
    parity = 1;
    for (let i = 0; i < maxImages + 2 && images.length < maxImages; i++) {
        const normal = i % 2 === 0 ? n2 : n1;
        p = reflectPoint(p, normal);
        facing = reflectDir(facing, normal);
        parity *= -1;
        if (!isDup(p)) images.push({ position: p.clone(), facing: facing.clone(), parity });
    }
    return images.slice(0, maxImages);
}

/* ============ Helper: make a character face the origin ============ */
// Object3D.lookAt for non-cameras makes +z face the target,
// so the model's -z face ends up pointing AWAY. Use manual rotation instead.
function faceOrigin(obj) {
    const p = obj.position;
    // rotation.y = α  →  local -z maps to (-sinα, 0, -cosα)
    // We want -z to point from p toward origin = direction (-px, 0, -pz)
    // So sinα = px/r, cosα = pz/r  →  α = atan2(px, pz)
    obj.rotation.y = Math.atan2(p.x, p.z);
}

/* ============ UPDATE ============ */
function updateScene() {
    const thetaRad = THREE.MathUtils.degToRad(mirrorAngle);
    const tiltRad = THREE.MathUtils.degToRad(mirrorTilt);

    // --- Mirror base config inside group (bisector = +Z, hinge = Y) ---
    // PlaneGeometry faces +Z, extends along +X from origin.
    // After rotation.y = ry, +X maps to (cos ry, 0, -sin ry).
    // Mirror 1 extends at angle -theta/2 from +Z:
    mirror1.rotation.y = -(Math.PI + thetaRad) / 2;
    // Mirror 2 extends at angle +theta/2 from +Z:
    mirror2.rotation.y =  (thetaRad - Math.PI) / 2;

    // --- Apply tilt: rotate group around local Z (the bisector / surface normal) ---
    mirrorGroup.quaternion.setFromAxisAngle(new THREE.Vector3(0, 0, 1), tiltRad);

    // --- Mario position (independent of mirror tilt) ---
    // phi = angle within sector measured from Mirror 1 edge
    const phi = thetaRad * marioPosPercent / 100;
    // Sector spans -theta/2 to +theta/2 from +Z.
    // Mario's angle from +Z = phi - theta/2
    const localAngle = phi - thetaRad / 2;
    // Place Mario directly in world space on the floor
    mario.position.set(
        MARIO_DIST * Math.sin(localAngle),
        0,
        MARIO_DIST * Math.cos(localAngle)
    );
    faceOrigin(mario);

    // Mario's facing direction in world XZ (points toward hinge)
    const marioWorldFacing = new THREE.Vector3(
        -Math.sin(localAngle), 0, -Math.cos(localAngle)
    ).normalize();

    // Transform Mario into mirror-group-local frame for reflection math
    const invQ = mirrorGroup.quaternion.clone().invert();
    const marioGroupLocal = mario.position.clone()
        .sub(mirrorGroup.position).applyQuaternion(invQ);
    const marioGroupLocalFacing = marioWorldFacing.clone().applyQuaternion(invQ);

    // --- Sector shading (XZ-plane projection, approximate) ---
    sectorMesh.geometry.dispose();
    sectorMesh.geometry = new THREE.RingGeometry(
        0.15, 3.2, 64, 1,
        Math.PI / 2 - thetaRad / 2,   // thetaStart from +X (90° = +Z)
        thetaRad
    );
    sectorMesh.rotation.set(-Math.PI / 2, 0, 0);

    // --- Remove old clones ---
    for (const c of reflectionClones) {
        c.traverse(ch => { if (ch.geometry) ch.geometry.dispose(); });
        scene.remove(c);
    }
    reflectionClones = [];

    // --- Compute and place reflections ---
    const marioLocalXZ = new THREE.Vector3(marioGroupLocal.x, 0, marioGroupLocal.z);
    const images = computeReflections3D(marioLocalXZ, marioGroupLocalFacing, thetaRad);
    for (const img of images) {
        const clone = createMario(true);
        // Position: reflect was computed in group-local XZ; add back Y offset, transform to world
        const localPos = new THREE.Vector3(img.position.x, marioGroupLocal.y, img.position.z);
        const worldPos = localPos.clone().applyQuaternion(mirrorGroup.quaternion)
            .add(mirrorGroup.position);
        clone.position.copy(worldPos);

        // Orientation: build group-local facing quaternion, then compose with group tilt.
        // In group-local space the clone faces along img.facing with up=(0,1,0).
        const localRotY = Math.atan2(-img.facing.x, -img.facing.z);
        const localQ = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(0, 1, 0), localRotY
        );
        // World orientation = groupQ * localQ  (applies local rot first, then tilt)
        clone.quaternion.copy(mirrorGroup.quaternion).multiply(localQ);

        // Odd number of reflections = mirror image: flip the local x-axis
        if (img.parity < 0) {
            clone.scale.x = -1;
        }

        scene.add(clone);
        reflectionClones.push(clone);
    }

    // --- First-person camera ---
    if (viewMode === 'first') {
        const eyeOffset = new THREE.Vector3(0, 1.12, 0);
        cam1.position.copy(mario.position).add(eyeOffset);
        // Camera.lookAt correctly makes -z face target
        cam1.lookAt(new THREE.Vector3(0, 1.12, 0));
        mario.visible = false;
    } else {
        mario.visible = true;
    }

    // --- Info bar ---
    const numImages = Math.round(360 / mirrorAngle) - 1;
    document.getElementById('numRef').textContent = numImages;
    document.getElementById('angLabel').textContent = mirrorAngle + '°';
    const phiDeg = (mirrorAngle * marioPosPercent / 100).toFixed(0);
    document.getElementById('marioPosVal').textContent = phiDeg + '° from mirror 1';
    document.getElementById('mirrorRotVal').textContent = mirrorTilt + '°';
}

/* ============ CONTROLS ============ */
document.querySelectorAll('#angleBtns button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#angleBtns button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mirrorAngle = parseInt(btn.dataset.angle);
        updateScene();
    });
});
document.getElementById('mirrorRot').addEventListener('input', e => {
    mirrorTilt = parseInt(e.target.value);
    updateScene();
});
document.getElementById('marioPos').addEventListener('input', e => {
    marioPosPercent = parseInt(e.target.value);
    updateScene();
});
document.querySelectorAll('#viewBtns button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#viewBtns button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        viewMode = btn.dataset.view;
        activeCam = viewMode === 'third' ? cam3 : cam1;
        orbit.enabled = viewMode === 'third';
        updateScene();
    });
});

/* ============ RENDER LOOP ============ */
function animate() {
    requestAnimationFrame(animate);
    if (viewMode === 'third') orbit.update();
    renderer.render(scene, activeCam);
}

window.addEventListener('resize', () => {
    cam3.aspect = innerWidth / innerHeight;
    cam3.updateProjectionMatrix();
    cam1.aspect = innerWidth / innerHeight;
    cam1.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

updateScene();
animate();
</script>
</body>
</html>
