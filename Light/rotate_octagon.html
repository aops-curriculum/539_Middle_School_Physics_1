<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelson Speed of Light Experiment</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0a1a;
        font-family: Arial, sans-serif;
        user-select: none;
        color: #e0e0e0;
        overflow: hidden;
    }
    #container {
        position: relative;
        width: 600px;
        height: 420px;
    }
    canvas {
        background: #0a0a1a;
        display: block;
    }
    /* ── Overlay controls ─────────────────────── */
    .rot-ctrl {
        position: absolute;
        left: 350px;
        top: 20px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        width: 170px;
    }
    .rot-label-row {
        display: flex;
        align-items: baseline;
        gap: 4px;
    }
    .rot-label {
        font-size: 10px;
        color: #667;
    }
    .rot-val {
        font-family: 'Consolas',monospace;
        font-size: 11px;
        color: #4fc3f7;
    }
    .rot-row {
        display: flex;
        align-items: center;
        gap: 3px;
    }
    .rot-row input[type=range] {
        width: 140px;
        accent-color: #4fc3f7;
        height: 14px;
    }
    .fine-btn {
        width: 20px; height: 18px;
        background: rgba(42,42,74,0.85);
        border: 1px solid #445;
        border-radius: 2px;
        color: #889;
        font-size: 9px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin-left: 2px;
    }
    .fine-btn:hover { background: #4a4a6a; color: #fff; }
    /* Reset button */
    .reset-btn {
        position: absolute;
        right: 8px;
        top: 8px;
        padding: 4px 10px;
        background: rgba(76,175,80,0.8);
        border: none;
        border-radius: 3px;
        color: white;
        font-size: 11px;
        font-weight: bold;
        cursor: pointer;
    }
    .reset-btn:hover { background: rgba(76,175,80,1); }
</style>
</head>
<body>
<div id="container">
    <canvas id="sim" width="600" height="420"></canvas>
    <div class="rot-ctrl">
        <div class="rot-label-row">
            <span class="rot-label">Rotation</span>
            <span class="rot-val" id="rotVal">0.0&deg;</span>
            <button class="fine-btn" id="fineDown">&#9660;</button>
            <button class="fine-btn" id="fineUp">&#9650;</button>
        </div>
        <div class="rot-row">
            <input type="range" id="rotSlider" min="0" max="45" step="1" value="0">
        </div>
    </div>
    <button class="reset-btn" id="pauseBtn" style="right:65px;">Pause</button>
    <button class="reset-btn" id="resetBtn">Reset</button>
</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const W = 600, H = 420;
const DEG = Math.PI / 180;
const EYE_GLOW_DUR = 0.2;
const speedScale = 0.0002;

// ── Layout ─────────────────────────────────────────────
const OCT_CX = 125, OCT_CY = 340, OCT_R = 22;
const INRADIUS = OCT_R * Math.cos(Math.PI / 8);

const FACE0_MID_X = OCT_CX + INRADIUS * Math.cos(45 * DEG);
const FACE0_MID_Y = OCT_CY + INRADIUS * Math.sin(45 * DEG);
const FACE6_MID_X = OCT_CX + INRADIUS * Math.cos(315 * DEG);
const FACE6_MID_Y = OCT_CY + INRADIUS * Math.sin(315 * DEG);

const SOURCE = { x: FACE0_MID_X, y: 390 };
const PHOTON_DIR = { x: 0, y: -1 };

const MIRROR_X = 530;
const MIRROR_H = 10;
const MIRROR_TILT = 0.5 * Math.atan((FACE0_MID_Y - FACE6_MID_Y) / (MIRROR_X - FACE0_MID_X));
const MN = { x: -Math.cos(MIRROR_TILT), y: -Math.sin(MIRROR_TILT) };

const MIRROR_CY = FACE0_MID_Y;
const MIRROR_TOP = MIRROR_CY - MIRROR_H / 2;
const MIRROR_BOT = MIRROR_CY + MIRROR_H / 2;
// Physical constants
const DIST_KM = 35.4;
const C_LIGHT_KM = 299792;
const OUT_DIST = MIRROR_X - FACE0_MID_X;
const RET_DIST = Math.hypot(MIRROR_X - FACE6_MID_X, FACE0_MID_Y - FACE6_MID_Y);
const STATIC_RT = OUT_DIST + RET_DIST;
const M_PER_PX = DIST_KM * 1000 / OUT_DIST;

function getSimSpeed() {
    return C_LIGHT_KM * 1000 * speedScale / M_PER_PX;
}

// Observer
const _rd = { x: 1 - 2*MN.x*MN.x, y: -2*MN.x*MN.y };
const _n6 = { x: Math.cos(315*DEG), y: Math.sin(315*DEG) };
const _dn6 = _rd.x*_n6.x + _rd.y*_n6.y;
const _od = { x: _rd.x - 2*_dn6*_n6.x, y: _rd.y - 2*_dn6*_n6.y };
const OBS_Y = 55;
const OBS_X = FACE6_MID_X + _od.x * (OBS_Y - FACE6_MID_Y) / _od.y;
const OBSERVER = { x: OBS_X, y: OBS_Y };
const OBS_RADIUS = 6;

// ── State ──────────────────────────────────────────────
let discreteAngleDeg = 0, fineAngleDeg = 0;
let photons = [], eyeGlow = 0, simTime = 0, photonAccum = 0, prevTS = null;
let paused = false;

function octAngle() { return (discreteAngleDeg + fineAngleDeg) * DEG; }

// ── Vector helpers ─────────────────────────────────────
function v(x,y){return{x,y}}
function vadd(a,b){return v(a.x+b.x,a.y+b.y)}
function vsub(a,b){return v(a.x-b.x,a.y-b.y)}
function vsc(a,s){return v(a.x*s,a.y*s)}
function vdot(a,b){return a.x*b.x+a.y*b.y}
function vlen(a){return Math.hypot(a.x,a.y)}
function vnorm(a){const l=vlen(a);return l<1e-12?v(0,0):v(a.x/l,a.y/l)}
function vrefl(d,n){return vsub(d,vsc(n,2*vdot(d,n)))}
function vcross(a,b){return a.x*b.y-a.y*b.x}

// ── Octagon ────────────────────────────────────────────
function octVerts(ang) {
    const vs = [];
    for (let k = 0; k < 8; k++) {
        const a = ang + k * Math.PI / 4;
        vs.push(v(OCT_CX + OCT_R * Math.cos(a), OCT_CY + OCT_R * Math.sin(a)));
    }
    return vs;
}
function faceN(vs, i) {
    const mid = vsc(vadd(vs[i], vs[(i+1)%8]), 0.5);
    return vnorm(vsub(mid, v(OCT_CX, OCT_CY)));
}

// ── Ray intersections ──────────────────────────────────
function raySeg(o, d, p1, p2) {
    const s = vsub(p2, p1);
    const den = d.x * s.y - d.y * s.x;
    if (Math.abs(den) < 1e-10) return null;
    const t = ((p1.x-o.x)*s.y - (p1.y-o.y)*s.x) / den;
    const u = ((p1.x-o.x)*d.y - (p1.y-o.y)*d.x) / den;
    if (t > 0.05 && u >= -0.001 && u <= 1.001)
        return { t, pt: vadd(o, vsc(d, t)) };
    return null;
}
function rayOct(o, d, vs) {
    let best = null;
    for (let i = 0; i < 8; i++) {
        const h = raySeg(o, d, vs[i], vs[(i+1)%8]);
        if (h && (!best || h.t < best.t)) best = {...h, face: i};
    }
    return best;
}
function rayMirror(o, d) {
    if (Math.abs(d.x) < 1e-10) return null;
    const t = (MIRROR_X - o.x) / d.x;
    if (t < 0.01) return null;
    const y = o.y + t * d.y;
    if (y >= MIRROR_TOP && y <= MIRROR_BOT)
        return { t, pt: v(MIRROR_X, y) };
    return null;
}
function toEdge(o, d) {
    let tm = 1e9;
    if (d.x > 1e-10) tm = Math.min(tm, (W-o.x)/d.x);
    if (d.x < -1e-10) tm = Math.min(tm, -o.x/d.x);
    if (d.y > 1e-10) tm = Math.min(tm, (H-o.y)/d.y);
    if (d.y < -1e-10) tm = Math.min(tm, -o.y/d.y);
    return vadd(o, vsc(d, Math.max(Math.min(tm, 2000), 1)));
}

// ── Photon path computation ────────────────────────────
function computePath(spawn) {
    const simSpd = getSimSpeed();
    const segs = [];
    const dir0 = PHOTON_DIR;

    const vs0 = octVerts(octAngle());
    const h0 = rayOct(SOURCE, dir0, vs0);
    if (!h0) {
        const edge = toEdge(SOURCE, dir0);
        segs.push({s:SOURCE, e:edge, dur:vlen(vsub(edge,SOURCE))/simSpd});
        return segs;
    }
    const leg1Dur = h0.t / simSpd;
    const hPt = h0.pt, hF = h0.face;
    const n1 = faceN(vs0, hF);
    segs.push({s:SOURCE, e:hPt, dur:leg1Dur});

    if (vdot(dir0, n1) >= 0) {
        const edge = toEdge(hPt, dir0);
        segs.push({s:hPt, e:edge, dur:vlen(vsub(edge,hPt))/simSpd});
        return segs;
    }

    const r1 = vrefl(dir0, n1);

    const mH = rayMirror(hPt, r1);
    if (!mH) {
        const edge = toEdge(hPt, r1);
        segs.push({s:hPt, e:edge, dur:vlen(vsub(edge,hPt))/simSpd});
        return segs;
    }
    const leg2Dur = mH.t / simSpd;
    segs.push({s:hPt, e:mH.pt, dur:leg2Dur});

    const r2 = vrefl(r1, MN);
    const vsR = octVerts(octAngle());
    const hR = rayOct(mH.pt, r2, vsR);
    if (!hR) {
        const edge = toEdge(mH.pt, r2);
        segs.push({s:mH.pt, e:edge, dur:vlen(vsub(edge,mH.pt))/simSpd});
        return segs;
    }
    const leg3Dur = hR.t / simSpd;
    const rPt = hR.pt, rF = hR.face;
    segs.push({s:mH.pt, e:rPt, dur:leg3Dur});

    const n3 = faceN(vsR, rF);
    const r3 = vrefl(r2, n3);

    const toObs = vsub(OBSERVER, rPt);
    const along = vdot(toObs, r3);
    if (along > 0) {
        const perp = Math.abs(vcross(toObs, r3));
        if (perp < OBS_RADIUS) {
            segs.push({s:rPt, e:vadd(rPt,vsc(r3,along)), dur:along/simSpd, eye:true});
            return segs;
        }
    }
    const edge = toEdge(rPt, r3);
    segs.push({s:rPt, e:edge, dur:vlen(vsub(edge,rPt))/simSpd});
    return segs;
}

// ── Photon tracking ────────────────────────────────────
function pPos(p, now) {
    let el = now - p.t0;
    for (const seg of p.segs) {
        if (el <= seg.dur + 0.0003) {
            const f = Math.max(0, Math.min(1, seg.dur > 0 ? el / seg.dur : 1));
            return {x:seg.s.x+f*(seg.e.x-seg.s.x), y:seg.s.y+f*(seg.e.y-seg.s.y), ok:true};
        }
        el -= seg.dur;
    }
    return {ok:false};
}
function tDur(p) { let t=0; for (const s of p.segs) t+=s.dur; return t; }
function hitsEye(p) { return p.segs.length>0 && p.segs[p.segs.length-1].eye; }

// ── Drawing ────────────────────────────────────────────
function drawOctagon(ang) {
    const vs = octVerts(ang);
    ctx.beginPath();
    ctx.moveTo(vs[0].x, vs[0].y);
    for (let i=1;i<8;i++) ctx.lineTo(vs[i].x, vs[i].y);
    ctx.closePath();
    ctx.fillStyle = 'rgba(100,160,220,0.18)';
    ctx.fill();
    ctx.strokeStyle = '#6ab0e8';
    ctx.lineWidth = 2;
    ctx.stroke();
}
function drawMirror() {
    ctx.save();
    ctx.translate(MIRROR_X, MIRROR_CY);
    ctx.rotate(MIRROR_TILT);
    ctx.fillStyle = '#b0b8c8';
    ctx.fillRect(-3, -MIRROR_H/2, 6, MIRROR_H);
    ctx.strokeStyle = '#d0d8e0';
    ctx.lineWidth = 1;
    ctx.strokeRect(-3, -MIRROR_H/2, 6, MIRROR_H);
    ctx.restore();
}
function drawSource() {
    const {x,y} = SOURCE;
    const g = ctx.createRadialGradient(x,y,2,x,y,14);
    g.addColorStop(0,'rgba(255,230,150,0.9)');
    g.addColorStop(0.5,'rgba(255,200,80,0.3)');
    g.addColorStop(1,'rgba(255,200,80,0)');
    ctx.fillStyle = g; ctx.fillRect(x-16,y-16,32,32);
    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle='#ffe090'; ctx.fill();
}
function drawEye(gf) {
    const {x,y} = OBSERVER;
    if (gf > 0.01) {
        const g2 = ctx.createRadialGradient(x,y,0,x,y,30);
        g2.addColorStop(0,`rgba(140,255,200,${0.5*gf})`);
        g2.addColorStop(0.5,`rgba(140,255,200,${0.15*gf})`);
        g2.addColorStop(1,'rgba(140,255,200,0)');
        ctx.fillStyle = g2; ctx.fillRect(x-32,y-32,64,64);
        const g = ctx.createRadialGradient(x,y,1,x,y,12);
        g.addColorStop(0,`rgba(220,255,240,${0.9*gf})`);
        g.addColorStop(1,'rgba(180,255,220,0)');
        ctx.fillStyle = g; ctx.fillRect(x-14,y-14,28,28);
    }
    ctx.beginPath(); ctx.ellipse(x,y,6,4,0,0,Math.PI*2);
    ctx.fillStyle = gf>0.01 ? `rgba(220,255,240,${0.4+0.6*gf})` : 'rgba(200,210,220,0.25)';
    ctx.fill();
    ctx.strokeStyle = gf>0.01 ? `rgba(150,255,200,${0.5+0.5*gf})` : '#556';
    ctx.lineWidth = 1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2);
    ctx.fillStyle = gf>0.01 ? `rgba(100,255,180,${0.6+0.4*gf})` : '#445';
    ctx.fill();
}
function drawLabels() {
    ctx.font = 'bold 12px Arial,sans-serif';
    ctx.fillStyle = '#778899';
    ctx.textAlign = 'center';
    ctx.fillText('Mt. Wilson', OCT_CX, OCT_CY + OCT_R + 16);
    ctx.fillText('Mirror', MIRROR_X, MIRROR_TOP - 8);
    ctx.fillText('Mt. San Antonio', MIRROR_X, MIRROR_BOT + 16);
    ctx.fillText('Light source', SOURCE.x, SOURCE.y + 20);
    ctx.fillText('Observer', OBSERVER.x, OBSERVER.y - 18);
}
function drawScaleBar() {
    const barKm = 10;
    const barPx = barKm * 1000 / M_PER_PX;
    const x0 = 200, y0 = H - 18;
    ctx.strokeStyle = '#778899';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x0, y0 - 4); ctx.lineTo(x0, y0 + 4);
    ctx.moveTo(x0, y0); ctx.lineTo(x0 + barPx, y0);
    ctx.moveTo(x0 + barPx, y0 - 4); ctx.lineTo(x0 + barPx, y0 + 4);
    ctx.stroke();
    ctx.font = '11px Arial,sans-serif';
    ctx.fillStyle = '#778899';
    ctx.textAlign = 'center';
    ctx.fillText(barKm + ' km', x0 + barPx / 2, y0 - 7);
    // Slow-motion label
    ctx.textAlign = 'right';
    ctx.fillStyle = '#6a8899';
    ctx.fillText('Slow-motion: 1/5,000', W - 10, y0);
}
function drawPhotons(now) {
    for (const p of photons) {
        const pos = pPos(p, now);
        if (!pos.ok) continue;
        ctx.beginPath(); ctx.arc(pos.x,pos.y,1.8,0,Math.PI*2);
        ctx.fillStyle='#fffde0'; ctx.fill();
        const g = ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,4);
        g.addColorStop(0,'rgba(255,253,220,0.45)');
        g.addColorStop(1,'rgba(255,253,220,0)');
        ctx.fillStyle = g; ctx.fillRect(pos.x-5,pos.y-5,10,10);
    }
}

// ── Simulation loop ────────────────────────────────────
function update(dt) {
    simTime += dt;
    photonAccum += 5 * dt;
    const nNew = Math.floor(photonAccum);
    photonAccum -= nNew;
    for (let i = 0; i < nNew; i++) {
        photons.push({t0: simTime, segs: computePath(simTime)});
    }
    const alive = [];
    for (const p of photons) {
        const td = tDur(p), age = simTime - p.t0;
        if (hitsEye(p) && age >= td && age - dt < td) eyeGlow = EYE_GLOW_DUR;
        if (age < td + 0.05) alive.push(p);
    }
    photons = alive;
    eyeGlow = Math.max(0, eyeGlow - dt);
}
function draw() {
    ctx.clearRect(0, 0, W, H);
    drawMirror();
    drawOctagon(octAngle());
    drawSource();
    drawEye(eyeGlow / EYE_GLOW_DUR);
    drawPhotons(simTime);
    drawLabels();
    drawScaleBar();
}
function loop(ts) {
    if (prevTS === null) prevTS = ts;
    const dt = Math.min((ts - prevTS) / 1000, 0.05);
    prevTS = ts;
    if (!paused) update(dt); draw();
    requestAnimationFrame(loop);
}

// ── Controls ───────────────────────────────────────────
const rotSlider = document.getElementById('rotSlider');
const rotValEl = document.getElementById('rotVal');
function updateRotDisplay() {
    const total = discreteAngleDeg + fineAngleDeg;
    rotValEl.innerHTML = total.toFixed(1) + '&deg;';
}
rotSlider.addEventListener('input', () => {
    discreteAngleDeg = parseFloat(rotSlider.value);
    updateRotDisplay();
});
document.getElementById('fineUp').addEventListener('click', () => {
    fineAngleDeg = Math.round((fineAngleDeg + 0.1) * 10) / 10;
    updateRotDisplay();
});
document.getElementById('fineDown').addEventListener('click', () => {
    fineAngleDeg = Math.round((fineAngleDeg - 0.1) * 10) / 10;
    updateRotDisplay();
});
document.getElementById('pauseBtn').addEventListener('click', () => {
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
});

document.getElementById('resetBtn').addEventListener('click', () => {
    discreteAngleDeg=0; fineAngleDeg=0;
    rotSlider.value=0; updateRotDisplay();
    photons=[]; eyeGlow=0; simTime=0; photonAccum=0; prevTS=null;
});

requestAnimationFrame(loop);
</script>
</body>
</html>
