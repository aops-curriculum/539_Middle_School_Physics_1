<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depth Perception</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12121f;
            overflow: hidden;
            user-select: none;
        }
        canvas {
            display: block;
            width: 464px;
            height: 416px;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="580" height="520"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // DPR fix for sharp rendering on high-DPI screens
        const dpr = window.devicePixelRatio || 1;
        const logW = canvas.width, logH = canvas.height;
        canvas.width = logW * dpr; canvas.height = logH * dpr;
        canvas.style.width = logW + 'px'; canvas.style.height = logH + 'px';
        ctx.scale(dpr, dpr);

        // Layout constants
        const W = logW;
        const H = logH;
        const eyeY = 80;
        const eyeSep = 165;
        const leftEyeX = W / 2 - eyeSep / 2;
        const rightEyeX = W / 2 + eyeSep / 2;
        const blueDotY = 250;
        const redDotY = 420;
        const dotX = W / 2;

        // Reset button rect (canvas coords)
        const btnRect = { x: W - 88, y: 8, w: 78, h: 26 };

        // State
        let arrows = [];
        let startPoint = null;
        let mousePos = null;
        let isDragging = false;
        let dragMoved = false;
        let statusText = '';
        const DRAG_THRESHOLD = 5;

        function drawRoundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function drawEye(cx, cy, radius) {
            ctx.beginPath();
            ctx.ellipse(cx, cy, radius * 1.5, radius, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#f0f0f0';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = '#4a7a5a';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.28, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(cx - radius * 0.15, cy - radius * 0.15, radius * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fill();
        }

        function drawDot(x, y, color, radius) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawArrow(x1, y1, x2, y2, color, lineWidth) {
            const headLen = 14;
            const angle = Math.atan2(y2 - y1, x2 - x1);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawUI() {
            // Instructions / status at top left
            const instrText = statusText || 'Click to start an arrow, click again to finish.';
            ctx.font = '13px Segoe UI, Tahoma, Geneva, Verdana, sans-serif';
            ctx.fillStyle = '#aaa';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(instrText, 10, 21);

            // Reset button at top right
            drawRoundRect(btnRect.x, btnRect.y, btnRect.w, btnRect.h, 4);
            ctx.fillStyle = '#3a3a5c';
            ctx.fill();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.fillStyle = '#eee';
            ctx.font = '13px Segoe UI, Tahoma, Geneva, Verdana, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Reset', btnRect.x + btnRect.w / 2, btnRect.y + btnRect.h / 2);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            drawUI();

            drawEye(leftEyeX, eyeY, 22);
            drawEye(rightEyeX, eyeY, 22);

            drawDot(dotX, blueDotY, '#4488ff', 10);
            drawDot(dotX, redDotY, '#ff4444', 10);

            for (const arrow of arrows) {
                drawArrow(arrow.x1, arrow.y1, arrow.x2, arrow.y2, '#ffcc44', 2);
            }

            if (startPoint && mousePos) {
                drawArrow(startPoint.x, startPoint.y, mousePos.x, mousePos.y, 'rgba(255,204,68,0.5)', 2);
            }
        }

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (W / rect.width),
                y: (e.clientY - rect.top) * (H / rect.height)
            };
        }

        function isInBtn(pos) {
            return pos.x >= btnRect.x && pos.x <= btnRect.x + btnRect.w &&
                   pos.y >= btnRect.y && pos.y <= btnRect.y + btnRect.h;
        }

        function reset() {
            arrows = [];
            startPoint = null;
            mousePos = null;
            statusText = '';
            draw();
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getCanvasPos(e);
            if (isInBtn(pos)) return;
            if (!startPoint) {
                startPoint = { x: pos.x, y: pos.y };
                isDragging = true;
                dragMoved = false;
                statusText = 'Click again to place the arrowhead.';
                draw();
            } else {
                arrows.push({ x1: startPoint.x, y1: startPoint.y, x2: pos.x, y2: pos.y });
                startPoint = null;
                mousePos = null;
                isDragging = false;
                dragMoved = false;
                statusText = '';
                draw();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (startPoint) {
                const pos = getCanvasPos(e);
                mousePos = pos;
                if (isDragging && !dragMoved) {
                    const dx = pos.x - startPoint.x;
                    const dy = pos.y - startPoint.y;
                    if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) {
                        dragMoved = true;
                    }
                }
                draw();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            const pos = getCanvasPos(e);
            if (isInBtn(pos)) {
                reset();
                return;
            }
            if (isDragging && dragMoved && startPoint) {
                arrows.push({ x1: startPoint.x, y1: startPoint.y, x2: pos.x, y2: pos.y });
                startPoint = null;
                mousePos = null;
                statusText = '';
                draw();
            }
            isDragging = false;
            dragMoved = false;
        });

        draw();
    </script>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
</body>
</html>
