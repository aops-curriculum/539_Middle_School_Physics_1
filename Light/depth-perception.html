<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="eigennode-aspect" content="29/26">
    <title>Depth Perception</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            position: relative;
            background: #12121f;
            user-select: none;
        }
        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="580" height="520"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const W = 580, H = 520;   // logical design grid (matches eigennode-aspect 29/26)
        function fit() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.clientWidth, ch = canvas.clientHeight;
            if (!cw || !ch) return;
            canvas.width = Math.round(cw * dpr);
            canvas.height = Math.round(ch * dpr);
            ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
            draw();
        }

        // Layout constants
        const eyeY = 80;
        const eyeSep = 165;
        const leftEyeX = W / 2 - eyeSep / 2;
        const rightEyeX = W / 2 + eyeSep / 2;
        const blueDotY = 250;
        const redDotY = 420;
        const dotX = W / 2;

        // Reset button rect (canvas coords)
        const btnRect = { x: W - 88, y: 8, w: 78, h: 26 };

        // State
        let arrows = [];
        let startPoint = null;
        let mousePos = null;
        let isDragging = false;
        let dragMoved = false;
        let statusText = '';
        const DRAG_THRESHOLD = 5;

        function drawRoundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function drawEye(cx, cy, radius) {
            ctx.beginPath();
            ctx.ellipse(cx, cy, radius * 1.5, radius, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#f0f0f0';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = '#4a7a5a';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.28, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(cx - radius * 0.15, cy - radius * 0.15, radius * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fill();
        }

        function drawDot(x, y, color, radius) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawArrow(x1, y1, x2, y2, color, lineWidth) {
            const headLen = 14;
            const angle = Math.atan2(y2 - y1, x2 - x1);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawUI() {
            // Instructions / status at top left
            const instrText = statusText || 'Click to start an arrow, click again to finish.';
            ctx.font = '13px Segoe UI, Tahoma, Geneva, Verdana, sans-serif';
            ctx.fillStyle = '#aaa';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(instrText, 10, 21);

            // Reset button at top right
            drawRoundRect(btnRect.x, btnRect.y, btnRect.w, btnRect.h, 4);
            ctx.fillStyle = '#3a3a5c';
            ctx.fill();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.fillStyle = '#eee';
            ctx.font = '13px Segoe UI, Tahoma, Geneva, Verdana, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Reset', btnRect.x + btnRect.w / 2, btnRect.y + btnRect.h / 2);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            drawUI();

            drawEye(leftEyeX, eyeY, 22);
            drawEye(rightEyeX, eyeY, 22);

            drawDot(dotX, blueDotY, '#4488ff', 10);
            drawDot(dotX, redDotY, '#ff4444', 10);

            for (const arrow of arrows) {
                drawArrow(arrow.x1, arrow.y1, arrow.x2, arrow.y2, '#ffcc44', 2);
            }

            if (startPoint && mousePos) {
                drawArrow(startPoint.x, startPoint.y, mousePos.x, mousePos.y, 'rgba(255,204,68,0.5)', 2);
            }
        }

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (W / rect.width),
                y: (e.clientY - rect.top) * (H / rect.height)
            };
        }

        function isInBtn(pos) {
            return pos.x >= btnRect.x && pos.x <= btnRect.x + btnRect.w &&
                   pos.y >= btnRect.y && pos.y <= btnRect.y + btnRect.h;
        }

        function reset() {
            arrows = [];
            startPoint = null;
            mousePos = null;
            statusText = '';
            draw();
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getCanvasPos(e);
            if (isInBtn(pos)) return;
            if (!startPoint) {
                startPoint = { x: pos.x, y: pos.y };
                isDragging = true;
                dragMoved = false;
                statusText = 'Click again to place the arrowhead.';
                draw();
            } else {
                arrows.push({ x1: startPoint.x, y1: startPoint.y, x2: pos.x, y2: pos.y });
                startPoint = null;
                mousePos = null;
                isDragging = false;
                dragMoved = false;
                statusText = '';
                draw();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (startPoint) {
                const pos = getCanvasPos(e);
                mousePos = pos;
                if (isDragging && !dragMoved) {
                    const dx = pos.x - startPoint.x;
                    const dy = pos.y - startPoint.y;
                    if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) {
                        dragMoved = true;
                    }
                }
                draw();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            const pos = getCanvasPos(e);
            if (isInBtn(pos)) {
                reset();
                return;
            }
            if (isDragging && dragMoved && startPoint) {
                arrows.push({ x1: startPoint.x, y1: startPoint.y, x2: pos.x, y2: pos.y });
                startPoint = null;
                mousePos = null;
                statusText = '';
                draw();
            }
            isDragging = false;
            dragMoved = false;
        });

        new ResizeObserver(fit).observe(canvas);
        fit();
    </script>
<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
