<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Mixing Game</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      background-color: white;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useCallback } = React;

    function Slider({ value, setValue, color }) {
      const trackRef = React.useRef(null);
      const [isDragging, setIsDragging] = useState(false);

      const updateValue = useCallback((clientX) => {
        const track = trackRef.current;
        if (!track) return;
        const rect = track.getBoundingClientRect();
        const x = clientX - rect.left;
        const pct = Math.max(0, Math.min(1, x / rect.width));
        setValue(Math.round(pct * 10) * 10);
      }, [setValue]);

      useEffect(() => {
        if (!isDragging) return;

        const handlePointerMove = (e) => {
          e.preventDefault();
          updateValue(e.clientX);
        };

        const handlePointerUp = () => {
          setIsDragging(false);
        };

        window.addEventListener('pointermove', handlePointerMove);
        window.addEventListener('pointerup', handlePointerUp);

        return () => {
          window.removeEventListener('pointermove', handlePointerMove);
          window.removeEventListener('pointerup', handlePointerUp);
        };
      }, [isDragging, updateValue]);

      const handlePointerDown = (e) => {
        e.preventDefault();
        setIsDragging(true);
        updateValue(e.clientX);
      };

      return React.createElement('div', { className: 'flex items-center gap-2' },
        React.createElement('button', {
          onClick: () => setValue(Math.max(0, value - 10)),
          className: 'w-6 h-6 rounded bg-gray-300 hover:bg-gray-400 font-bold text-sm select-none'
        }, '−'),
        React.createElement('div', {
          ref: trackRef,
          onPointerDown: handlePointerDown,
          className: 'relative w-32 h-4 bg-gray-300 rounded select-none cursor-pointer',
          style: { touchAction: 'none' }
        },
          React.createElement('div', {
            className: 'absolute top-0 left-0 h-full rounded pointer-events-none',
            style: { width: `${value}%`, backgroundColor: color }
          }),
          React.createElement('div', {
            className: 'absolute top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full border-2 border-gray-600 shadow pointer-events-none',
            style: { left: `calc(${value}% - 8px)` }
          })
        ),
        React.createElement('button', {
          onClick: () => setValue(Math.min(100, value + 10)),
          className: 'w-6 h-6 rounded bg-gray-300 hover:bg-gray-400 font-bold text-sm select-none'
        }, '+'),
        React.createElement('span', { className: 'w-10 text-xs font-mono text-right' }, `${value}%`)
      );
    }

    function ColorMixingGame() {
      const targetColors = [
        { r: 100, g: 0, b: 0 },
        { r: 100, g: 100, b: 100 },
        { r: 100, g: 100, b: 0 },
        { r: 100, g: 50, b: 0 },
        { r: 0, g: 0, b: 0 },
        { r: 50, g: 50, b: 50 },
        { r: 40, g: 20, b: 10 },
        { r: 100, g: 70, b: 70 },
      ];

      const [red, setRed] = useState(50);
      const [green, setGreen] = useState(50);
      const [blue, setBlue] = useState(50);
      const [round, setRound] = useState(0);

      const targetColor = targetColors[round];

      const toRgb = (p) => Math.round(p * 2.55);
      const userColor = `rgb(${toRgb(red)}, ${toRgb(green)}, ${toRgb(blue)})`;
      const targetRgb = `rgb(${toRgb(targetColor.r)}, ${toRgb(targetColor.g)}, ${toRgb(targetColor.b)})`;

      return React.createElement('div', { 
        className: 'w-[600px] bg-white flex flex-col items-center p-4'
      },
        React.createElement('div', { className: 'flex items-center gap-8' },
          // Level selector
          React.createElement('div', { className: 'flex flex-col items-center gap-1' },
            React.createElement('label', { className: 'text-xs text-gray-500' }, 'Level'),
            React.createElement('select', {
              value: round,
              onChange: (e) => {
                const newRound = parseInt(e.target.value);
                setRound(newRound);
                setRed(50);
                setGreen(50);
                setBlue(50);
              },
              className: 'px-2 py-1 text-lg font-bold text-gray-600 bg-white border border-gray-300 rounded cursor-pointer hover:border-gray-400'
            },
              targetColors.map((_, i) =>
                React.createElement('option', { key: i, value: i }, `${i + 1}/${targetColors.length}`)
              )
            )
          ),
          // Circle SVG
          React.createElement('svg', { width: 180, height: 180, viewBox: '0 0 180 180' },
            React.createElement('path', { d: 'M 90 10 A 80 80 0 0 0 90 170 L 90 90 Z', fill: targetRgb, stroke: '#374151', strokeWidth: 2 }),
            React.createElement('path', { d: 'M 90 10 A 80 80 0 0 1 90 170 L 90 90 Z', fill: userColor, stroke: '#374151', strokeWidth: 2 }),
            React.createElement('line', { x1: 90, y1: 10, x2: 90, y2: 170, stroke: '#374151', strokeWidth: 2 }),
            React.createElement('rect', { x: 18, y: 82, width: 45, height: 18, rx: 3, fill: 'white', fillOpacity: 0.85 }),
            React.createElement('rect', { x: 118, y: 82, width: 40, height: 18, rx: 3, fill: 'white', fillOpacity: 0.85 }),
            React.createElement('text', { x: 40, y: 94, textAnchor: 'middle', fontSize: 12, fill: '#374151', fontWeight: 600 }, 'Target'),
            React.createElement('text', { x: 138, y: 94, textAnchor: 'middle', fontSize: 12, fill: '#374151', fontWeight: 600 }, 'Yours')
          ),
          // Sliders
          React.createElement('div', { className: 'flex flex-col gap-3' },
            React.createElement('div', { className: 'flex items-center gap-2' },
              React.createElement('span', { className: 'w-4 font-bold text-sm', style: { color: '#ef4444' } }, 'R'),
              React.createElement(Slider, { value: red, setValue: setRed, color: '#ef4444' })
            ),
            React.createElement('div', { className: 'flex items-center gap-2' },
              React.createElement('span', { className: 'w-4 font-bold text-sm', style: { color: '#22c55e' } }, 'G'),
              React.createElement(Slider, { value: green, setValue: setGreen, color: '#22c55e' })
            ),
            React.createElement('div', { className: 'flex items-center gap-2' },
              React.createElement('span', { className: 'w-4 font-bold text-sm', style: { color: '#3b82f6' } }, 'B'),
              React.createElement(Slider, { value: blue, setValue: setBlue, color: '#3b82f6' })
            )
          )
        ),
        // Next button
        React.createElement('button', {
          onClick: () => {
            if (round < targetColors.length - 1) {
              setRound(round + 1);
              setRed(50);
              setGreen(50);
              setBlue(50);
            }
          },
          disabled: round >= targetColors.length - 1,
          className: 'mt-6 px-6 py-2 bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-400 text-white font-bold rounded text-sm'
        }, 'Next')
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ColorMixingGame));
  </script>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
</body>
</html>
