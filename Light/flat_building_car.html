<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Reflection off Glass Skyscraper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #87CEEB;
  font-family: Arial, sans-serif;
  max-width: 400px;
  margin: 0 auto;
  user-select: none;
  -webkit-user-select: none;
}
.slider-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 6px 16px 8px;
}
.slider-container label {
  font-size: 13px;
  color: #555;
  white-space: nowrap;
}
.slider-container input[type="range"] {
  width: 220px;
  accent-color: #f9a825;
}
canvas {
  display: block;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: default;
}
</style>
</head>
<body>
<div class="slider-container">
  <label>Sun angle:</label>
  <input type="range" id="angleSlider" min="10" max="80" value="35">
</div>
<div class="slider-container" id="curveContainer" style="display:none">
  <label>Curvature:</label>
  <input type="range" id="curveSlider" min="0" max="100" value="40">
</div>
<canvas id="canvas" width="348" height="400"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('angleSlider');
const W = 435;
const H = 500;
const dpr = window.devicePixelRatio || 1;
canvas.width = 348 * dpr; canvas.height = 400 * dpr;
canvas.style.width = '348px'; canvas.style.height = '400px';

const GROUND_Y = 440;
const NUM_RAYS = 25;
const MAX_BOUNCES = 6;
const RAY_MAX_LEN = 1500;

// Building definition — the front face we see
const bldgLeft = 360;
const bldgRight = 510;
const bldgTop = 60;
const bldgBottom = GROUND_Y;

// Windows on the left side of the building (purely visual)
const windowProtrusion = 8;
const windowRows = 13;
const windowH = (bldgBottom - bldgTop) / windowRows;

function getWindows() {
  const wins = [];
  for (let r = 0; r < windowRows; r++) {
    const wy = bldgTop + r * windowH;
    wins.push({
      x: bldgLeft - windowProtrusion,
      y: wy,
      w: windowProtrusion,
      h: windowH
    });
  }
  return wins;
}

const windows = getWindows();

// Reflective surface: the left side of the building is one vertical glass surface
const allSurfaces = [
  { x1: bldgLeft, y1: bldgTop, x2: bldgLeft, y2: bldgBottom, nx: -1, ny: 0, type: 'glass' },
  { x1: bldgLeft, y1: bldgTop, x2: bldgRight, y2: bldgTop, nx: 0, ny: -1, type: 'wall' },
];

// URL params: ?mirrorType=flat|convex (default flat)
const _qs = new URLSearchParams(location.search);
const _convex = _qs.get('mirrorType') === 'convex';

// Convex curve helpers (active when ?mirrorType=convex)
const maxBow = 80;
function getCurveX(y, bow) {
  const midY = (bldgTop + bldgBottom) / 2;
  const halfH = (bldgBottom - bldgTop) / 2;
  const t = (y - midY) / halfH;
  return bldgLeft - bow * (1 - t * t);
}
function getCurveDxDy(y, bow) {
  const midY = (bldgTop + bldgBottom) / 2;
  const halfH = (bldgBottom - bldgTop) / 2;
  const t = (y - midY) / halfH;
  return 2 * bow * t / halfH;
}
function getCurveNormal(y, bow) {
  const dxdy = getCurveDxDy(y, bow);
  const len = Math.sqrt(1 + dxdy * dxdy);
  return { nx: -1 / len, ny: dxdy / len };
}
function getCurveSurfaces(bow) {
  const segments = 40;
  const surfaces = [];
  for (let i = 0; i < segments; i++) {
    const y1 = bldgTop + (bldgBottom - bldgTop) * i / segments;
    const y2 = bldgTop + (bldgBottom - bldgTop) * (i + 1) / segments;
    const x1 = getCurveX(y1, bow);
    const x2 = getCurveX(y2, bow);
    const yMid = (y1 + y2) / 2;
    const n = getCurveNormal(yMid, bow);
    surfaces.push({ x1, y1, x2, y2, nx: n.nx, ny: n.ny, type: 'glass' });
  }
  const roofLeftX = getCurveX(bldgTop, bow);
  surfaces.push({ x1: roofLeftX, y1: bldgTop, x2: bldgRight, y2: bldgTop, nx: 0, ny: -1, type: 'wall' });
  return surfaces;
}

// Active surface list — updated in draw() before ray tracing
let _activeSurfaces = allSurfaces;
const curveSlider = document.getElementById('curveSlider');
if (_convex) {
  document.getElementById('curveContainer').style.display = '';
  curveSlider.addEventListener('input', draw);
}

// Car body definition
const carX = 80;
const carY = GROUND_Y;
const carW = 120;
const carH = 30;
const carBodyRect = { x: carX, y: carY - 15, w: 60, h: 15 };
const cabinX = carX + 30;
const cabinY = carY - carH - 18;
const cabinW = 55;
const cabinH = 18;
const carCabinRect = { x: carX + 15, y: carY - 24, w: 28, h: 9 };

function raySegmentIntersect(ox, oy, dx, dy, x1, y1, x2, y2) {
  const ex = x2 - x1;
  const ey = y2 - y1;
  const denom = dx * ey - dy * ex;
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((x1 - ox) * ey - (y1 - oy) * ex) / denom;
  const u = ((x1 - ox) * dy - (y1 - oy) * dx) / denom;
  if (t > 0.01 && u >= 0 && u <= 1) {
    return { t, x: ox + dx * t, y: oy + dy * t, u };
  }
  return null;
}

function rayRectIntersect(ox, oy, dx, dy, rect) {
  const sides = [
    { x1: rect.x, y1: rect.y, x2: rect.x + rect.w, y2: rect.y, nx: 0, ny: -1 },
    { x1: rect.x, y1: rect.y + rect.h, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 0, ny: 1 },
    { x1: rect.x, y1: rect.y, x2: rect.x, y2: rect.y + rect.h, nx: -1, ny: 0 },
    { x1: rect.x + rect.w, y1: rect.y, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 1, ny: 0 },
  ];
  let best = null;
  for (const s of sides) {
    const hit = raySegmentIntersect(ox, oy, dx, dy, s.x1, s.y1, s.x2, s.y2);
    if (hit && (!best || hit.t < best.t)) {
      best = { t: hit.t, x: hit.x, y: hit.y, nx: s.nx, ny: s.ny };
    }
  }
  return best;
}

function traceRay(ox, oy, dx, dy) {
  let segments = [];
  let cx = ox, cy = oy;
  let rdx = dx, rdy = dy;

  for (let bounce = 0; bounce <= MAX_BOUNCES; bounce++) {
    let closest = null;
    let hitType = null;

    // Check all building/window surfaces
    for (const surf of _activeSurfaces) {
      const hit = raySegmentIntersect(cx, cy, rdx, rdy, surf.x1, surf.y1, surf.x2, surf.y2);
      if (hit && (!closest || hit.t < closest.t)) {
        closest = { t: hit.t, x: hit.x, y: hit.y, nx: surf.nx, ny: surf.ny };
        hitType = surf.type;
      }
    }

    // Check ground
    if (rdy > 0) {
      const tg = (GROUND_Y - cy) / rdy;
      if (tg > 0.01 && (!closest || tg < closest.t)) {
        closest = { t: tg, x: cx + rdx * tg, y: GROUND_Y, nx: 0, ny: -1 };
        hitType = 'ground';
      }
    }

    // Check car body
    const carBodyHit = rayRectIntersect(cx, cy, rdx, rdy, carBodyRect);
    if (carBodyHit && (!closest || carBodyHit.t < closest.t)) {
      closest = carBodyHit;
      hitType = 'car';
    }
    const carCabinHit = rayRectIntersect(cx, cy, rdx, rdy, carCabinRect);
    if (carCabinHit && (!closest || carCabinHit.t < closest.t)) {
      closest = carCabinHit;
      hitType = 'car';
    }

    if (!closest) {
      const endX = cx + rdx * RAY_MAX_LEN;
      const endY = cy + rdy * RAY_MAX_LEN;
      segments.push({ x1: cx, y1: cy, x2: endX, y2: endY, reflected: bounce > 0 });
      break;
    }

    segments.push({ x1: cx, y1: cy, x2: closest.x, y2: closest.y, reflected: bounce > 0 });

    if (hitType === 'glass') {
      // Reflect off glass
      const dot = rdx * closest.nx + rdy * closest.ny;
      rdx = rdx - 2 * dot * closest.nx;
      rdy = rdy - 2 * dot * closest.ny;
      cx = closest.x;
      cy = closest.y;
    } else {
      break;
    }
  }
  return segments;
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#4A90D9');
  grad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawGround() {
  ctx.fillStyle = '#555';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  ctx.setLineDash([20, 15]);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 30);
  ctx.lineTo(W, GROUND_Y + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#888';
  ctx.fillRect(bldgLeft - 25, GROUND_Y, bldgRight - bldgLeft + 50, 8);
}

function drawBuilding() {
  // Main front face — plain, featureless
  ctx.fillStyle = '#8a8a8a';
  ctx.fillRect(bldgLeft, bldgTop, bldgRight - bldgLeft, bldgBottom - bldgTop);

  // Subtle vertical lines for paneling
  ctx.strokeStyle = '#7a7a7a';
  ctx.lineWidth = 1;
  const panelCount = 6;
  const panelW = (bldgRight - bldgLeft) / panelCount;
  for (let i = 1; i < panelCount; i++) {
    const px = bldgLeft + i * panelW;
    ctx.beginPath();
    ctx.moveTo(px, bldgTop);
    ctx.lineTo(px, bldgBottom);
    ctx.stroke();
  }

  // Protruding windows on the left side
  for (const win of windows) {
    // Window frame/structure
    ctx.fillStyle = '#606060';
    ctx.fillRect(win.x, win.y, win.w, win.h);

    // Glass face (left-facing)
    const glassGrad = ctx.createLinearGradient(win.x, win.y, win.x + win.w, win.y);
    glassGrad.addColorStop(0, '#7ec8e3');
    glassGrad.addColorStop(1, '#5ba3c9');
    ctx.fillStyle = glassGrad;
    ctx.fillRect(win.x, win.y + 1, win.w - 1, win.h - 2);

    // Highlight on glass
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(win.x, win.y + 1, 2, win.h - 2);

    // Outline
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(win.x, win.y, win.w, win.h);
  }

  // Building outline
  ctx.strokeStyle = '#456';
  ctx.lineWidth = 2;
  ctx.strokeRect(bldgLeft - windowProtrusion, bldgTop, bldgRight - bldgLeft + windowProtrusion, bldgBottom - bldgTop);

  // Roof accent
  ctx.fillStyle = '#456';
  ctx.fillRect(bldgLeft - windowProtrusion, bldgTop, bldgRight - bldgLeft + windowProtrusion, 4);
}

function drawConvexBuilding(bow) {
  const curveSteps = 60;
  const windowRows = 13;
  const windowH = (bldgBottom - bldgTop) / windowRows;
  const windowProtrusion = 8;

  ctx.fillStyle = '#8a8a8a';
  ctx.beginPath();
  for (let i = 0; i <= curveSteps; i++) {
    const y = bldgTop + (bldgBottom - bldgTop) * i / curveSteps;
    const x = getCurveX(y, bow);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.lineTo(bldgRight, bldgBottom);
  ctx.lineTo(bldgRight, bldgTop);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#7a7a7a';
  ctx.lineWidth = 1;
  const panelCount = 6;
  const minLeft = getCurveX((bldgTop + bldgBottom) / 2, bow);
  for (let i = 1; i < panelCount; i++) {
    const px = minLeft + i * (bldgRight - minLeft) / panelCount;
    ctx.beginPath();
    let started = false;
    for (let j = 0; j <= curveSteps; j++) {
      const y = bldgTop + (bldgBottom - bldgTop) * j / curveSteps;
      const edgeX = getCurveX(y, bow);
      if (px >= edgeX && !started) { ctx.moveTo(px, y); started = true; }
      if (px < edgeX && started) { ctx.lineTo(px, y); started = false; }
    }
    if (started) ctx.lineTo(px, bldgBottom);
    ctx.stroke();
  }

  for (let r = 0; r < windowRows; r++) {
    const yTop = bldgTop + r * windowH;
    const yBot = yTop + windowH;
    const yCen = (yTop + yBot) / 2;
    const edgeX = getCurveX(yCen, bow);
    const dxdy = getCurveDxDy(yCen, bow);
    const tanLen = Math.sqrt(dxdy * dxdy + 1);
    const tx = dxdy / tanLen, ty = 1 / tanLen;
    const nx = -ty, ny = tx;
    const halfH = windowH / 2;
    const corners = [
      { x: edgeX + nx * windowProtrusion - tx * halfH, y: yCen + ny * windowProtrusion - ty * halfH },
      { x: edgeX - tx * halfH, y: yCen - ty * halfH },
      { x: edgeX + tx * halfH, y: yCen + ty * halfH },
      { x: edgeX + nx * windowProtrusion + tx * halfH, y: yCen + ny * windowProtrusion + ty * halfH },
    ];
    ctx.fillStyle = '#606060';
    ctx.beginPath();
    ctx.moveTo(corners[0].x - nx, corners[0].y - ny);
    ctx.lineTo(corners[1].x + nx, corners[1].y + ny);
    ctx.lineTo(corners[2].x + nx, corners[2].y + ny);
    ctx.lineTo(corners[3].x - nx, corners[3].y - ny);
    ctx.closePath();
    ctx.fill();
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    ctx.lineTo(corners[1].x, corners[1].y);
    ctx.lineTo(corners[2].x, corners[2].y);
    ctx.lineTo(corners[3].x, corners[3].y);
    ctx.closePath();
    ctx.clip();
    const gx1 = edgeX + nx * windowProtrusion, gy1 = yCen + ny * windowProtrusion;
    const glassGrad = ctx.createLinearGradient(gx1, gy1, edgeX, yCen);
    glassGrad.addColorStop(0, '#7ec8e3');
    glassGrad.addColorStop(1, '#5ba3c9');
    ctx.fillStyle = glassGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    ctx.lineTo(corners[3].x, corners[3].y);
    ctx.stroke();
    ctx.restore();
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    corners.forEach((c, i) => i === 0 ? ctx.moveTo(c.x, c.y) : ctx.lineTo(c.x, c.y));
    ctx.closePath();
    ctx.stroke();
  }

  ctx.strokeStyle = '#456';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const topLeftX = getCurveX(bldgTop, bow);
  ctx.moveTo(topLeftX, bldgTop);
  ctx.lineTo(bldgRight, bldgTop);
  ctx.lineTo(bldgRight, bldgBottom);
  ctx.lineTo(getCurveX(bldgBottom, bow), bldgBottom);
  for (let i = curveSteps; i >= 0; i--) {
    const y = bldgTop + (bldgBottom - bldgTop) * i / curveSteps;
    ctx.lineTo(getCurveX(y, bow), y);
  }
  ctx.stroke();
  ctx.fillStyle = '#456';
  ctx.fillRect(topLeftX, bldgTop, bldgRight - topLeftX, 4);
}

function drawCar() {
  ctx.save();
  ctx.translate(carX, carY);
  ctx.scale(0.5, 0.5);
  ctx.translate(-carX, -carY);

  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(carX + carW / 2, GROUND_Y + 2, carW / 2 + 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(carX, carY);
  ctx.lineTo(carX, carY - carH);
  ctx.lineTo(carX + 10, carY - carH - 5);
  ctx.lineTo(carX + carW - 10, carY - carH - 5);
  ctx.lineTo(carX + carW, carY - carH);
  ctx.lineTo(carX + carW, carY);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath();
  ctx.moveTo(cabinX, cabinY + cabinH);
  ctx.lineTo(cabinX + 8, cabinY);
  ctx.lineTo(cabinX + cabinW - 8, cabinY);
  ctx.lineTo(cabinX + cabinW, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(100, 150, 200, 0.3)';
  ctx.beginPath();
  ctx.moveTo(cabinX + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(100, 150, 200, 0.25)';
  ctx.beginPath();
  ctx.moveTo(cabinX + cabinW / 2 + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + cabinW / 2 + 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ff6';
  ctx.beginPath();
  ctx.ellipse(carX + carW, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e33';
  ctx.beginPath();
  ctx.ellipse(carX, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(carX + 5, carY - carH / 2);
  ctx.lineTo(carX + carW - 5, carY - carH / 2);
  ctx.stroke();

  ctx.restore();
}

function getRayStarts(dx, dy) {
  const perpX = -dy;
  const perpY = dx;
  const spacing = 28;
  const ps = [0, W * perpX, H * perpY, W * perpX + H * perpY];
  const pMin = Math.min(...ps) - spacing;
  const pMax = Math.max(...ps) + spacing;
  const starts = [];
  for (let p = Math.ceil(pMin / spacing) * spacing; p <= pMax; p += spacing) {
    let ex, ey;
    if (dy > 1e-10) {
      const x = -p / dy;
      if (x >= -1 && x <= W + 1) { ex = x; ey = 0; }
    }
    if (ex === undefined && dx > 1e-10) {
      const y = p / dx;
      if (y >= -1 && y <= H + 1) { ex = 0; ey = y; }
    }
    if (ex === undefined) continue;
    starts.push([ex - dx * 5, ey - dy * 5]);
  }
  return starts;
}

function drawRays(angleDeg) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  const allTraced = [];
  for (const [sx, sy] of getRayStarts(dx, dy)) {
    allTraced.push(traceRay(sx, sy, dx, dy));
  }

  // Draw incoming (unreflected) rays
  ctx.lineWidth = 1.5;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 235, 59, 0.55)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }

  // Draw reflected rays (brighter)
  ctx.lineWidth = 2;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (!seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 245, 100, 0.8)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }
}

function findCanvasEntry(ox, oy, dx, dy) {
  // Find the smallest t>0 where the ray enters the canvas region
  const margin = 20;
  const tVals = [];
  if (Math.abs(dx) > 1e-10) {
    tVals.push((-margin - ox) / dx);
    tVals.push((W + margin - ox) / dx);
  }
  if (Math.abs(dy) > 1e-10) {
    tVals.push((-margin - oy) / dy);
    tVals.push((H + margin - oy) / dy);
  }
  let best = null;
  for (const t of tVals) {
    if (t < 0) continue;
    const px = ox + dx * t;
    const py = oy + dy * t;
    if (px >= -margin && px <= W + margin && py >= -margin && py <= H + margin) {
      if (best === null || t < best) best = t;
    }
  }
  return best;
}

// Glow spot on ground/car where reflected light hits
function drawGlowSpots(angleDeg) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  for (const [sx, sy] of getRayStarts(dx, dy)) {
    const segs = traceRay(sx, sy, dx, dy);

    // Find terminal point of reflected rays
    for (let s = 0; s < segs.length; s++) {
      const seg = segs[s];
      if (seg.reflected && s === segs.length - 1) {
        // Draw a small glow at the endpoint
        const gx = seg.x2;
        const gy = seg.y2;
        if (gx > -10 && gx < W + 10 && gy > -10 && gy < H + 10) {
          const glow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 12);
          glow.addColorStop(0, 'rgba(255, 255, 180, 0.5)');
          glow.addColorStop(1, 'rgba(255, 255, 180, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(gx, gy, 12, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
}

function draw() {
  const angleDeg = parseFloat(slider.value);
  const bow = _convex ? maxBow * parseFloat(curveSlider.value) / 100 : 0;
  _activeSurfaces = _convex ? getCurveSurfaces(bow) : allSurfaces;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.setTransform(0.8 * dpr, 0, 0, 0.8 * dpr, 0, 0);
  drawSky();
  drawGround();
  drawGlowSpots(angleDeg);
  drawRays(angleDeg);
  if (_convex) drawConvexBuilding(bow); else drawBuilding();
  drawCar();

  // Angle label
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(angleDeg + '° from horizontal', W - 12, H - 10);
  ctx.textAlign = 'left';
}

slider.addEventListener('input', draw);

draw();

window.addEventListener('load', () => {
  window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
});
</script>

// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>




<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "mirrorType",
        "type": "select",
        "values": [
            "flat",
            "convex"
        ],
        "default": "flat",
        "desc": "Mirror type on the car"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
];

  var EMBED_KEYS = ['cheat'];

  // Build clean URL (no embed/cheat params) with optional overrides
  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) {
      var v = overrides[k];
      if (v === null || v === '') p.delete(k);
      else p.set(k, v);
    }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null; // set after render

  function updateUrlDisplay(overrides) {
    if (!urlLinkEl) return;
    var u = buildCleanUrl(overrides || {});
    urlLinkEl.href = u;
    urlLinkEl.textContent = u;
  }

  // Resolve the effective current value of a param (may differ from raw URL string)
  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    if (raw === null) return def['default'] !== undefined ? String(def['default']) : '';
    return raw;
  }

  function isTruthy(v) {
    return v !== '0' && v !== 'false' && v !== 'no' && v !== 'off' && v !== '';
  }

  function makeControl(def) {
    var effective = getEffective(def);

    if (def.type === 'toggle') {
      var on = isTruthy(effective);
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' +
        (on ? '#6dca80' : '#e07070') + ';border:1px solid ' +
        (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;' +
        'cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () {
        var updates = {};
        updates[def.name] = on ? '0' : '1';
        window.location.href = buildCheatUrl(updates);
      });
      return btn;
    }

    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (effective === String(v)) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        var updates = {}; updates[def.name] = sel.value;
        window.location.href = buildCheatUrl(updates);
      });
      return sel;
    }

    if (def.type === 'number') {
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.value = effective;
      if (def.min !== undefined) inp.min = String(def.min);
      if (def.max !== undefined) inp.max = String(def.max);
      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
      inp.addEventListener('change', function () {
        var updates = {}; updates[def.name] = inp.value;
        window.location.href = buildCheatUrl(updates);
      });
      return inp;
    }

    // text
    var inp2 = document.createElement('input');
    inp2.type = 'text';
    inp2.value = effective;
    inp2.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
      'border-radius:3px;padding:3px 6px;width:220px;font-size:12px;font-family:inherit';
    inp2.addEventListener('change', function () {
      var updates = {}; updates[def.name] = inp2.value;
      window.location.href = buildCheatUrl(updates);
    });
    return inp2;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      var s = 'number';
      if (def.min !== undefined && def.max !== undefined) s = def.min + '–' + def.max;
      else if (def.min !== undefined) s = '≥' + def.min;
      else if (def.max !== undefined) s = '≤' + def.max;
      return s;
    }
    return 'text';
  }

  function render() {
    // Panel container (fixed at bottom)
    var panel = document.createElement('div');
    panel.id = 'cheat-panel';
    panel.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(12,18,32,0.97)',
      'color:#c8d8e8',
      'font-family:"Segoe UI",system-ui,monospace',
      'font-size:13px',
      'border-top:2px solid #3a7bd5',
      'z-index:2147483647',
      'max-height:48vh',
      'overflow-y:auto',
      'padding:10px 16px 14px',
      'box-sizing:border-box',
      'box-shadow:0 -4px 24px rgba(0,0,0,0.6)'
    ].join(';');

    // Title bar
    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;' +
      'display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.title = 'Close cheat panel (reload to restore)';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;' +
      'cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText);
    title.appendChild(closeBtn);
    panel.appendChild(title);

    // Table
    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead();
    var hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;' +
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' +
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');

      // Name cell
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;' +
        'color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace';
      nc.textContent = def.name;

      // Type cell
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;' +
        'max-width:200px;font-family:monospace';
      tc.textContent = typeLabel(def);

      // Control cell
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(def));

      // Desc cell
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (def.desc || '') + (def['default'] !== undefined
        ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    // URL display
    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;' +
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;' +
      'letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;' +
      'font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = buildCheatUrl({});
    });
    var copyBtn = document.createElement('button');
    copyBtn.textContent = 'copy';
    copyBtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;' +
      'border-radius:3px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;' +
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    copyBtn.addEventListener('click', function () {
      var url = urlLinkEl ? urlLinkEl.href : buildCleanUrl({});
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = 'copied!';
        copyBtn.style.color = '#6dca80';
        setTimeout(function () { copyBtn.textContent = 'copy'; copyBtn.style.color = '#7ab8f5'; }, 1500);
      }).catch(function () {
        copyBtn.textContent = 'failed';
        setTimeout(function () { copyBtn.textContent = 'copy'; }, 1500);
      });
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel);
    urlBox.appendChild(urlLinkEl);
    urlBox.appendChild(copyBtn);
    panel.appendChild(urlBox);

    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
