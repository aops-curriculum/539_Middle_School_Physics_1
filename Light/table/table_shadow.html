<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="eigennode-aspect" content="389/700">
    <title>Photo with Adjustable Lines and Intersection</title>
    <style>
        html, body { width: 100%; height: 100%; }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* The iframe is sized to the photo's aspect (389/700), so the photo fills
           it with no distortion and the overlay canvas tracks it exactly. */
        #container {
            position: relative;
            width: 100%;
            height: 100%;
            line-height: 0;
        }

        #photoCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #overlayCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            z-index: 20;
        }

        #controls {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.65);
            padding: 8px 16px;
            border-radius: 8px;
            z-index: 25;
            text-align: center;
            width: max-content;
            max-width: 90%;
        }
        
        #info {
            font-size: 13px;
            color: #333;
            line-height: 1.4;
            margin: 0;
        }
        
        #loadingMessage {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
        }
        
        .line-handle {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="loadingMessage">Loading photo...</div>
        <img id="photoCanvas" style="display: none;">
        <canvas id="overlayCanvas"></canvas>
        <div id="controls">
            <div id="info">
                Click and drag lines horizontally to move them • 
                Click and drag the circular handles to adjust slope
            </div>
        </div>
    </div>

    <script>
        const PHOTO_URL = '01_script_table_shadow_side_view_white_scaled.jpg';
        
        const photoImg = document.getElementById('photoCanvas');
        const canvas = document.getElementById('overlayCanvas');
        const ctx = canvas.getContext('2d');
        const loadingMessage = document.getElementById('loadingMessage');
        let logW, logH;
        
        // Two lines with position and angle - starting nearly vertical
        let lines = [
            { x: 0, angle: -Math.PI/2 + 0.1, color: 'red', isDragging: false, handleDragging: false },
            { x: 0, angle: -Math.PI/2 - 0.1, color: 'red', isDragging: false, handleDragging: false }
        ];
        
        let draggedLineIndex = -1;
        let dragOffset = { x: 0, y: 0 };
        const handleRadius = 10;

        // fit(): backing store = overlay's rendered size * dpr (crisp); the
        // photo's logical logW x logH coordinate grid is mapped onto it. The
        // container's aspect equals the photo's, so the mapping never distorts.
        function fit() {
            if (!logW || !logH) return;
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.clientWidth, ch = canvas.clientHeight;
            if (!cw || !ch) return;
            canvas.width = Math.round(cw * dpr);
            canvas.height = Math.round(ch * dpr);
            ctx.setTransform(canvas.width / logW, 0, 0, canvas.height / logH, 0, 0);
            draw();
        }

        // Load the photo
        photoImg.onload = function() {
            loadingMessage.style.display = 'none';
            photoImg.style.display = 'block';

            // Logical coordinate system = the photo's native pixels.
            logW = photoImg.naturalWidth;
            logH = photoImg.naturalHeight;

            // Set initial line positions
            lines[0].x = logW * 0.35;
            lines[1].x = logW * 0.65;

            new ResizeObserver(fit).observe(canvas);
            fit();
        };
        
        photoImg.onerror = function() {
            loadingMessage.innerHTML = 'Failed to load photo. Please ensure the file "01_script_table_shadow_side_view_white.jpg" is in the same folder as this HTML file.';
        };
        
        // Start loading the photo
        photoImg.src = PHOTO_URL;

        function calculateIntersection(line1, line2) {
            const centerY = logH / 2;
            
            // Get line 1 parameters (point and direction)
            const x1 = line1.x;
            const y1 = centerY;
            const dx1 = Math.cos(line1.angle);
            const dy1 = Math.sin(line1.angle);
            
            // Get line 2 parameters (point and direction)
            const x2 = line2.x;
            const y2 = centerY;
            const dx2 = Math.cos(line2.angle);
            const dy2 = Math.sin(line2.angle);
            
            // Solve for intersection using parametric equations
            // Line 1: (x1 + t*dx1, y1 + t*dy1)
            // Line 2: (x2 + s*dx2, y2 + s*dy2)
            
            const denominator = dx1 * dy2 - dy1 * dx2;
            
            // Check if lines are parallel
            if (Math.abs(denominator) < 0.001) {
                return null;
            }
            
            // Calculate parameter t for line 1
            const t = ((x2 - x1) * dy2 - (y2 - y1) * dx2) / denominator;
            
            // Calculate intersection point
            const intersectionX = x1 + t * dx1;
            const intersectionY = y1 + t * dy1;
            
            // Check if intersection is within canvas bounds
            if (intersectionX < 0 || intersectionX > logW ||
                intersectionY < 0 || intersectionY > logH) {
                return null;
            }
            
            return { x: intersectionX, y: intersectionY };
        }
        
        function pixelToCm(pixelX, pixelY) {
            // Assuming image is 700 pixels tall = 334 cm
            // And 389 pixels wide = 186 cm
            // But use actual canvas dimensions with the same aspect ratio
            
            const assumedHeight = 700;
            const assumedWidth = 389;
            const heightCm = 334;
            const widthCm = 186;
            
            // Scale factors based on actual canvas size
            const scaleX = logW / assumedWidth;
            const scaleY = logH / assumedHeight;

            // Convert to cm
            const cmX = (pixelX / logW) * widthCm;
            // Flip Y coordinate since (0,0) should be bottom-left in cm
            const cmY = ((logH - pixelY) / logH) * heightCm;
            
            return { x: Math.round(cmX), y: Math.round(cmY) };
        }

        function draw() {
            // Clear overlay canvas
            ctx.clearRect(0, 0, logW, logH);
            
            // Draw each line
            lines.forEach((line, index) => {
                drawLine(line, index);
            });
            
            // Calculate and draw intersection
            const intersection = calculateIntersection(lines[0], lines[1]);
            if (intersection) {
                // Draw intersection point
                ctx.fillStyle = 'blue';
                ctx.beginPath();
                ctx.arc(intersection.x, intersection.y, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // Convert to cm coordinates
                const cmCoords = pixelToCm(intersection.x, intersection.y);
                
                // Draw coordinates text
                ctx.fillStyle = 'blue';
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3;
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                
                const text = `(${cmCoords.x}cm, ${cmCoords.y}cm)`;
                
                // Add white outline for better visibility
                ctx.strokeText(text, intersection.x, intersection.y - 10);
                ctx.fillText(text, intersection.x, intersection.y - 10);
            }
        }
        
        function drawLine(line, index) {
            ctx.save();
            
            // Calculate line endpoints based on angle
            const centerY = logH / 2;
            const lineLength = Math.sqrt(logW * logW + logH * logH);
            
            // Calculate endpoints
            const dx = Math.cos(line.angle) * lineLength / 2;
            const dy = Math.sin(line.angle) * lineLength / 2;
            
            const x1 = line.x - dx;
            const y1 = centerY - dy;
            const x2 = line.x + dx;
            const y2 = centerY + dy;
            
            // Draw the line
            ctx.strokeStyle = line.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            
            // Draw handle at the top endpoint for angle adjustment
            const handleX = line.x + Math.cos(line.angle) * 100;
            const handleY = centerY + Math.sin(line.angle) * 100;
            
            ctx.fillStyle = 'white';
            ctx.strokeStyle = line.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(handleX, handleY, handleRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Add line number in the handle
            ctx.fillStyle = line.color;
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText((index + 1).toString(), handleX, handleY);
            
            ctx.restore();
        }
        
        // Helper function to get mouse position relative to canvas
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (logW / rect.width),
                y: (e.clientY - rect.top) * (logH / rect.height)
            };
        }
        
        // Check if point is near a line
        function isPointNearLine(point, line) {
            const centerY = logH / 2;
            const lineLength = Math.sqrt(logW * logW + logH * logH);
            
            // Calculate endpoints
            const dx = Math.cos(line.angle) * lineLength / 2;
            const dy = Math.sin(line.angle) * lineLength / 2;
            
            const x1 = line.x - dx;
            const y1 = centerY - dy;
            const x2 = line.x + dx;
            const y2 = centerY + dy;
            
            // Calculate distance from point to line
            const A = point.x - x1;
            const B = point.y - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            
            if (lenSq !== 0) {
                param = dot / lenSq;
            }
            
            let xx, yy;
            
            if (param < 0) {
                xx = x1;
                yy = y1;
            } else if (param > 1) {
                xx = x2;
                yy = y2;
            } else {
                xx = x1 + param * C;
                yy = y1 + param * D;
            }
            
            const dx2 = point.x - xx;
            const dy2 = point.y - yy;
            const distance = Math.sqrt(dx2 * dx2 + dy2 * dy2);
            
            return distance < 10; // 10 pixel tolerance
        }
        
        // Check if point is in handle
        function isPointInHandle(point, line) {
            const centerY = logH / 2;
            const handleX = line.x + Math.cos(line.angle) * 100;
            const handleY = centerY + Math.sin(line.angle) * 100;
            
            const dx = point.x - handleX;
            const dy = point.y - handleY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            return distance <= handleRadius;
        }

        // Mouse event handlers
        canvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);
            
            // Check handles first (they have priority)
            for (let i = 0; i < lines.length; i++) {
                if (isPointInHandle(pos, lines[i])) {
                    draggedLineIndex = i;
                    lines[i].handleDragging = true;
                    return;
                }
            }
            
            // Then check lines
            for (let i = 0; i < lines.length; i++) {
                if (isPointNearLine(pos, lines[i])) {
                    draggedLineIndex = i;
                    lines[i].isDragging = true;
                    dragOffset.x = pos.x - lines[i].x;
                    return;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            
            if (draggedLineIndex >= 0) {
                const line = lines[draggedLineIndex];
                
                if (line.isDragging) {
                    // Move line horizontally
                    line.x = pos.x - dragOffset.x;

                    // Keep line within canvas bounds
                    line.x = Math.max(0, Math.min(logW, line.x));

                    draw();
                } else if (line.handleDragging) {
                    // Adjust angle based on handle position
                    const centerY = logH / 2;
                    const dx = pos.x - line.x;
                    const dy = pos.y - centerY;
                    line.angle = Math.atan2(dy, dx);
                    
                    draw();
                }
            }
            
            // Update cursor
            let overHandle = false;
            let overLine = false;
            
            for (let i = 0; i < lines.length; i++) {
                if (isPointInHandle(pos, lines[i])) {
                    overHandle = true;
                    break;
                }
                if (isPointNearLine(pos, lines[i])) {
                    overLine = true;
                }
            }
            
            if (overHandle) {
                canvas.style.cursor = 'grab';
            } else if (overLine) {
                canvas.style.cursor = 'ew-resize';
            } else {
                canvas.style.cursor = 'default';
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (draggedLineIndex >= 0) {
                lines[draggedLineIndex].isDragging = false;
                lines[draggedLineIndex].handleDragging = false;
                draggedLineIndex = -1;
            }
        });

        // Touch events for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const pos = {
                x: (touch.clientX - rect.left) * (logW / rect.width),
                y: (touch.clientY - rect.top) * (logH / rect.height)
            };
            
            // Check handles first
            for (let i = 0; i < lines.length; i++) {
                if (isPointInHandle(pos, lines[i])) {
                    draggedLineIndex = i;
                    lines[i].handleDragging = true;
                    return;
                }
            }
            
            // Then check lines
            for (let i = 0; i < lines.length; i++) {
                if (isPointNearLine(pos, lines[i])) {
                    draggedLineIndex = i;
                    lines[i].isDragging = true;
                    dragOffset.x = pos.x - lines[i].x;
                    return;
                }
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const pos = {
                x: (touch.clientX - rect.left) * (logW / rect.width),
                y: (touch.clientY - rect.top) * (logH / rect.height)
            };

            if (draggedLineIndex >= 0) {
                const line = lines[draggedLineIndex];

                if (line.isDragging) {
                    line.x = pos.x - dragOffset.x;
                    line.x = Math.max(0, Math.min(logW, line.x));
                    draw();
                } else if (line.handleDragging) {
                    const centerY = logH / 2;
                    const dx = pos.x - line.x;
                    const dy = pos.y - centerY;
                    line.angle = Math.atan2(dy, dx);
                    draw();
                }
            }
        });

        canvas.addEventListener('touchend', () => {
            if (draggedLineIndex >= 0) {
                lines[draggedLineIndex].isDragging = false;
                lines[draggedLineIndex].handleDragging = false;
                draggedLineIndex = -1;
            }
        });

        // Handle window resize (ResizeObserver on the canvas already covers
        // iframe resizes; this is a belt-and-suspenders fallback).
        window.addEventListener('resize', () => {
            if (photoImg.complete && photoImg.naturalHeight !== 0) {
                fit();
            }
        });
    </script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
