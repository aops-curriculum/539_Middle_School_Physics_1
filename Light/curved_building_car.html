<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Reflection off Concave Glass Skyscraper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #87CEEB;
  font-family: Arial, sans-serif;
  max-width: 400px;
  margin: 0 auto;
  user-select: none;
  -webkit-user-select: none;
}
.slider-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 6px 16px 4px;
}
.slider-container label {
  font-size: 13px;
  color: #555;
  white-space: nowrap;
}
.slider-container input[type="range"] {
  width: 180px;
  accent-color: #f9a825;
}
canvas {
  display: block;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: default;
}
</style>
</head>
<body>
<div class="slider-container">
  <label>Sun angle:</label>
  <input type="range" id="angleSlider" min="10" max="80" value="35">
</div>
<div class="slider-container">
  <label>Curvature:</label>
  <input type="range" id="curvatureSlider" min="0" max="100" value="30">
</div>
<canvas id="canvas" width="348" height="400"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const angleSlider = document.getElementById('angleSlider');
const curvatureSlider = document.getElementById('curvatureSlider');
const W = 435;
const H = 500;

const GROUND_Y = 440;
const MAX_BOUNCES = 8;
const RAY_MAX_LEN = 1500;

// Building definition
const bldgLeft = 360;
const bldgRight = 510;
const bldgTop = 60;
const bldgBottom = GROUND_Y;
const bldgH = bldgBottom - bldgTop;
const bldgMidY = (bldgTop + bldgBottom) / 2;

// Max concavity depth (how far the middle of the face bows inward)
const MAX_DEPTH = 80;

// Number of arc segments for discretization
const ARC_SEGMENTS = 60;

// Car body definition
const carX = 80;
const carY = GROUND_Y;
const carW = 120;
const carH = 30;
const carBodyRect = { x: carX, y: carY - 15, w: 60, h: 15 };
const cabinX = carX + 30;
const cabinY = carY - carH - 18;
const cabinW = 55;
const cabinH = 18;
const carCabinRect = { x: carX + 15, y: carY - 24, w: 28, h: 9 };

// Compute concave arc geometry given a depth parameter
// depth = how far the middle of the left face recedes to the right (into the building)
// Top and bottom endpoints stay at (bldgLeft, bldgTop) and (bldgLeft, bldgBottom)
// Midpoint of the arc is at (bldgLeft + depth, bldgMidY)
function getArcGeometry(depth) {
  if (depth < 0.5) {
    return {
      flat: true,
      segments: [{ x1: bldgLeft, y1: bldgTop, x2: bldgLeft, y2: bldgBottom }],
      points: [{ x: bldgLeft, y: bldgTop }, { x: bldgLeft, y: bldgBottom }],
      cx: -Infinity, cy: bldgMidY, R: Infinity
    };
  }

  const halfH = bldgH / 2;
  // Radius from sagitta formula: R = (halfH² + depth²) / (2 * depth)
  const R = (halfH * halfH + depth * depth) / (2 * depth);
  // Center of circle is to the right of the surface
  const cxArc = bldgLeft + R;
  const cyArc = bldgMidY;

  // Angles at top and bottom of arc
  const angTop = Math.atan2(bldgTop - cyArc, bldgLeft - cxArc);
  const angBot = Math.atan2(bldgBottom - cyArc, bldgLeft - cxArc);

  const points = [];
  for (let i = 0; i <= ARC_SEGMENTS; i++) {
    const t = i / ARC_SEGMENTS;
    const ang = angTop + t * (angBot - angTop);
    points.push({
      x: cxArc + R * Math.cos(ang),
      y: cyArc + R * Math.sin(ang)
    });
  }

  const segments = [];
  for (let i = 0; i < points.length - 1; i++) {
    segments.push({
      x1: points[i].x, y1: points[i].y,
      x2: points[i + 1].x, y2: points[i + 1].y
    });
  }

  return { flat: false, segments, points, cx: cxArc, cy: cyArc, R };
}

function raySegmentIntersect(ox, oy, dx, dy, x1, y1, x2, y2) {
  const ex = x2 - x1;
  const ey = y2 - y1;
  const denom = dx * ey - dy * ex;
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((x1 - ox) * ey - (y1 - oy) * ex) / denom;
  const u = ((x1 - ox) * dy - (y1 - oy) * dx) / denom;
  if (t > 0.01 && u >= 0 && u <= 1) {
    return { t, x: ox + dx * t, y: oy + dy * t, u };
  }
  return null;
}

// Analytical ray-circle intersection for the concave arc
function rayArcIntersect(ox, oy, dx, dy, arc) {
  if (arc.flat) {
    const seg = arc.segments[0];
    const hit = raySegmentIntersect(ox, oy, dx, dy, seg.x1, seg.y1, seg.x2, seg.y2);
    if (hit) {
      return { t: hit.t, x: hit.x, y: hit.y, nx: -1, ny: 0 };
    }
    return null;
  }

  const { cx: cxA, cy: cyA, R } = arc;
  const ocx = ox - cxA;
  const ocy = oy - cyA;
  const a = dx * dx + dy * dy;
  const b = 2 * (ocx * dx + ocy * dy);
  const c = ocx * ocx + ocy * ocy - R * R;
  const disc = b * b - 4 * a * c;
  if (disc < 0) return null;

  const sqrtDisc = Math.sqrt(disc);
  const t1 = (-b - sqrtDisc) / (2 * a);
  const t2 = (-b + sqrtDisc) / (2 * a);

  let best = null;
  for (const t of [t1, t2]) {
    if (t < 0.01) continue;
    const hx = ox + dx * t;
    const hy = oy + dy * t;

    // Hit must be within the arc's y-range
    if (hy < bldgTop - 0.5 || hy > bldgBottom + 0.5) continue;

    // Hit must be on the left side of the circle center (the concave face)
    if (hx > cxA) continue;

    if (!best || t < best.t) {
      // Normal points outward from circle center (toward the scene, to the left)
      const nx = (hx - cxA) / R;
      const ny = (hy - cyA) / R;
      best = { t, x: hx, y: hy, nx, ny };
    }
  }

  return best;
}

function rayRectIntersect(ox, oy, dx, dy, rect) {
  const sides = [
    { x1: rect.x, y1: rect.y, x2: rect.x + rect.w, y2: rect.y, nx: 0, ny: -1 },
    { x1: rect.x, y1: rect.y + rect.h, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 0, ny: 1 },
    { x1: rect.x, y1: rect.y, x2: rect.x, y2: rect.y + rect.h, nx: -1, ny: 0 },
    { x1: rect.x + rect.w, y1: rect.y, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 1, ny: 0 },
  ];
  let best = null;
  for (const s of sides) {
    const hit = raySegmentIntersect(ox, oy, dx, dy, s.x1, s.y1, s.x2, s.y2);
    if (hit && (!best || hit.t < best.t)) {
      best = { t: hit.t, x: hit.x, y: hit.y, nx: s.nx, ny: s.ny };
    }
  }
  return best;
}

function traceRay(ox, oy, dx, dy, arc) {
  let segments = [];
  let cx = ox, cy = oy;
  let rdx = dx, rdy = dy;

  for (let bounce = 0; bounce <= MAX_BOUNCES; bounce++) {
    let closest = null;
    let hitType = null;

    // Check concave building face (arc)
    const arcHit = rayArcIntersect(cx, cy, rdx, rdy, arc);
    if (arcHit) {
      closest = arcHit;
      hitType = 'glass';
    }

    // Check roof
    const roofHit = raySegmentIntersect(cx, cy, rdx, rdy, bldgLeft - MAX_DEPTH, bldgTop, bldgRight, bldgTop);
    if (roofHit && (!closest || roofHit.t < closest.t)) {
      closest = { t: roofHit.t, x: roofHit.x, y: roofHit.y, nx: 0, ny: -1 };
      hitType = 'wall';
    }

    // Check ground
    if (rdy > 0) {
      const tg = (GROUND_Y - cy) / rdy;
      if (tg > 0.01 && (!closest || tg < closest.t)) {
        closest = { t: tg, x: cx + rdx * tg, y: GROUND_Y, nx: 0, ny: -1 };
        hitType = 'ground';
      }
    }

    // Check car body
    const carBodyHit = rayRectIntersect(cx, cy, rdx, rdy, carBodyRect);
    if (carBodyHit && (!closest || carBodyHit.t < closest.t)) {
      closest = carBodyHit;
      hitType = 'car';
    }
    const carCabinHit = rayRectIntersect(cx, cy, rdx, rdy, carCabinRect);
    if (carCabinHit && (!closest || carCabinHit.t < closest.t)) {
      closest = carCabinHit;
      hitType = 'car';
    }

    if (!closest) {
      const endX = cx + rdx * RAY_MAX_LEN;
      const endY = cy + rdy * RAY_MAX_LEN;
      segments.push({ x1: cx, y1: cy, x2: endX, y2: endY, reflected: bounce > 0 });
      break;
    }

    segments.push({ x1: cx, y1: cy, x2: closest.x, y2: closest.y, reflected: bounce > 0 });

    if (hitType === 'glass') {
      // Reflect using surface normal (law of reflection)
      const dot = rdx * closest.nx + rdy * closest.ny;
      rdx = rdx - 2 * dot * closest.nx;
      rdy = rdy - 2 * dot * closest.ny;
      cx = closest.x;
      cy = closest.y;
    } else {
      break;
    }
  }
  return segments;
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#4A90D9');
  grad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawGround() {
  ctx.fillStyle = '#555';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  ctx.setLineDash([20, 15]);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 30);
  ctx.lineTo(W, GROUND_Y + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#888';
  ctx.fillRect(bldgLeft - MAX_DEPTH - 25, GROUND_Y, bldgRight - bldgLeft + MAX_DEPTH + 50, 8);
}

function drawBuilding(arc) {
  // Main front face (flat portion)
  ctx.fillStyle = '#8a8a8a';
  ctx.fillRect(bldgLeft, bldgTop, bldgRight - bldgLeft, bldgBottom - bldgTop);

  // Vertical panel lines
  ctx.strokeStyle = '#7a7a7a';
  ctx.lineWidth = 1;
  const panelCount = 6;
  const panelW = (bldgRight - bldgLeft) / panelCount;
  for (let i = 1; i < panelCount; i++) {
    const px = bldgLeft + i * panelW;
    ctx.beginPath();
    ctx.moveTo(px, bldgTop);
    ctx.lineTo(px, bldgBottom);
    ctx.stroke();
  }

  // Draw the concave face
  if (arc.flat) {
    ctx.strokeStyle = '#5ba3c9';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(bldgLeft, bldgTop);
    ctx.lineTo(bldgLeft, bldgBottom);
    ctx.stroke();
  } else {
    const pts = arc.points;

    // Fill concave region between arc and bldgLeft
    ctx.fillStyle = '#707070';
    ctx.beginPath();
    ctx.moveTo(bldgLeft, bldgTop);
    for (const p of pts) {
      ctx.lineTo(p.x, p.y);
    }
    ctx.lineTo(bldgLeft, bldgBottom);
    ctx.closePath();
    ctx.fill();

    // Glass surface strips along the arc
    for (let i = 0; i < pts.length - 1; i++) {
      if (i % 4 < 2) {
        ctx.strokeStyle = '#7ec8e3';
      } else {
        ctx.strokeStyle = '#5ba3c9';
      }
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[i + 1].x, pts[i + 1].y);
      ctx.stroke();
    }

    // Specular highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.stroke();

    // Horizontal mullion lines
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 0.5;
    const mullionCount = 15;
    for (let i = 1; i < mullionCount; i++) {
      const idx = Math.round(i * (pts.length - 1) / mullionCount);
      const p = pts[idx];
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(bldgLeft, p.y);
      ctx.stroke();
    }
  }

  // Building outline
  ctx.strokeStyle = '#456';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bldgLeft, bldgTop);
  ctx.lineTo(bldgRight, bldgTop);
  ctx.lineTo(bldgRight, bldgBottom);
  ctx.lineTo(bldgLeft, bldgBottom);
  if (!arc.flat) {
    for (let i = arc.points.length - 1; i >= 0; i--) {
      ctx.lineTo(arc.points[i].x, arc.points[i].y);
    }
  } else {
    ctx.lineTo(bldgLeft, bldgTop);
  }
  ctx.closePath();
  ctx.stroke();

  // Roof accent
  ctx.fillStyle = '#456';
  const leftMost = arc.flat ? bldgLeft : Math.min(bldgLeft, ...arc.points.map(p => p.x));
  ctx.fillRect(leftMost, bldgTop, bldgRight - leftMost, 4);
}

function drawCar() {
  ctx.save();
  ctx.translate(carX, carY);
  ctx.scale(0.5, 0.5);
  ctx.translate(-carX, -carY);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(carX + carW / 2, GROUND_Y + 2, carW / 2 + 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Car body — black
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(carX, carY);
  ctx.lineTo(carX, carY - carH);
  ctx.lineTo(carX + 10, carY - carH - 5);
  ctx.lineTo(carX + carW - 10, carY - carH - 5);
  ctx.lineTo(carX + carW, carY - carH);
  ctx.lineTo(carX + carW, carY);
  ctx.closePath();
  ctx.fill();

  // Cabin — dark
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(cabinX, cabinY + cabinH);
  ctx.lineTo(cabinX + 8, cabinY);
  ctx.lineTo(cabinX + cabinW - 8, cabinY);
  ctx.lineTo(cabinX + cabinW, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(100, 150, 200, 0.3)';
  ctx.beginPath();
  ctx.moveTo(cabinX + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  // Rear window
  ctx.fillStyle = 'rgba(100, 150, 200, 0.25)';
  ctx.beginPath();
  ctx.moveTo(cabinX + cabinW / 2 + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + cabinW / 2 + 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();

  // Hubcaps
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();

  // Headlight
  ctx.fillStyle = '#ff6';
  ctx.beginPath();
  ctx.ellipse(carX + carW, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Taillight
  ctx.fillStyle = '#e33';
  ctx.beginPath();
  ctx.ellipse(carX, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body accent line
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(carX + 5, carY - carH / 2);
  ctx.lineTo(carX + carW - 5, carY - carH / 2);
  ctx.stroke();

  ctx.restore();
}

function getRayStarts(dx, dy) {
  const perpX = -dy;
  const perpY = dx;
  const spacing = 28;
  const ps = [0, W * perpX, H * perpY, W * perpX + H * perpY];
  const pMin = Math.min(...ps) - spacing;
  const pMax = Math.max(...ps) + spacing;
  const starts = [];
  for (let p = Math.ceil(pMin / spacing) * spacing; p <= pMax; p += spacing) {
    let ex, ey;
    if (dy > 1e-10) {
      const x = -p / dy;
      if (x >= -1 && x <= W + 1) { ex = x; ey = 0; }
    }
    if (ex === undefined && dx > 1e-10) {
      const y = p / dx;
      if (y >= -1 && y <= H + 1) { ex = 0; ey = y; }
    }
    if (ex === undefined) continue;
    starts.push([ex - dx * 5, ey - dy * 5]);
  }
  return starts;
}

function drawRays(angleDeg, arc) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  const allTraced = [];
  for (const [sx, sy] of getRayStarts(dx, dy)) {
    allTraced.push(traceRay(sx, sy, dx, dy, arc));
  }

  // Incoming (unreflected) rays
  ctx.lineWidth = 1.5;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 235, 59, 0.55)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }

  // Reflected rays (brighter)
  ctx.lineWidth = 2;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (!seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 245, 100, 0.8)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }
}

function drawGlowSpots(angleDeg, arc) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  for (const [sx, sy] of getRayStarts(dx, dy)) {
    const segs = traceRay(sx, sy, dx, dy, arc);
    for (let s = 0; s < segs.length; s++) {
      const seg = segs[s];
      if (seg.reflected && s === segs.length - 1) {
        const gx = seg.x2;
        const gy = seg.y2;
        if (gx > -10 && gx < W + 10 && gy > -10 && gy < H + 10) {
          const glow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 14);
          glow.addColorStop(0, 'rgba(255, 255, 180, 0.6)');
          glow.addColorStop(1, 'rgba(255, 255, 180, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(gx, gy, 14, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
}

function draw() {
  const angleDeg = parseFloat(angleSlider.value);
  const curvature = parseFloat(curvatureSlider.value);
  const depth = (curvature / 100) * MAX_DEPTH;
  const arc = getArcGeometry(depth);

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, 348, 400);
  ctx.setTransform(0.8, 0, 0, 0.8, 0, 0);
  drawSky();
  drawGround();
  drawGlowSpots(angleDeg, arc);
  drawRays(angleDeg, arc);
  drawBuilding(arc);
  drawCar();

  // Angle label
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(angleDeg + '° from horizontal', W - 12, H - 10);
  ctx.textAlign = 'left';
}

angleSlider.addEventListener('input', draw);
curvatureSlider.addEventListener('input', draw);

draw();

window.addEventListener('load', () => {
  window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
});
</script>
</body>
</html>
