<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Reflection off Concave Glass Skyscraper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #87CEEB;
  font-family: Arial, sans-serif;
  max-width: 400px;
  margin: 0 auto;
  user-select: none;
  -webkit-user-select: none;
}
.slider-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 6px 16px 4px;
}
.slider-container label {
  font-size: 13px;
  color: #555;
  white-space: nowrap;
}
.slider-container input[type="range"] {
  width: 180px;
  accent-color: #f9a825;
}
canvas {
  display: block;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: default;
}
</style>
</head>
<body>
<div class="slider-container">
  <label>Sun angle:</label>
  <input type="range" id="angleSlider" min="10" max="80" value="35">
</div>
<div class="slider-container">
  <label>Curvature:</label>
  <input type="range" id="curveSlider" min="0" max="100" value="40">
</div>
<canvas id="canvas" width="348" height="400"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const angleSlider = document.getElementById('angleSlider');
const curveSlider = document.getElementById('curveSlider');
const W = 435;
const H = 500;

const GROUND_Y = 440;
const MAX_BOUNCES = 6;
const RAY_MAX_LEN = 1500;

// Building definition
const bldgBaseLeft = 360;
const bldgRight = 510;
const bldgTop = 60;
const bldgBottom = GROUND_Y;

// Window layout
const windowRows = 13;
const windowH = 20;
const windowGapY = (bldgBottom - bldgTop - windowRows * windowH) / (windowRows + 1);
const windowProtrusion = 8;

// Car body definition
const carX = 80;
const carY = GROUND_Y;
const carW = 120;
const carH = 30;
const carBodyRect = { x: carX, y: carY - 15, w: 60, h: 15 };
const cabinX = carX + 30;
const cabinY = carY - carH - 18;
const cabinW = 55;
const cabinH = 18;
const carCabinRect = { x: carX + 15, y: carY - 24, w: 28, h: 9 };

// Compute the concave curve. The building's left face bows inward (to the right)
// forming a concave mirror facing left. curveFrac 0 = flat, 1 = max curve.
// We use a circular arc. The midpoint of the left edge moves right by maxBow * curveFrac.
// Each window row gets an x-offset and a surface angle from the tangent of the arc.

function getCurvedWindows(curveFrac) {
  const maxBow = 80; // max inward bow at center in pixels
  const bow = maxBow * curveFrac;
  const bldgH = bldgBottom - bldgTop;
  const midY = (bldgTop + bldgBottom) / 2;

  const wins = [];
  const halfH = bldgH / 2;

  for (let r = 0; r < windowRows; r++) {
    const wy = bldgTop + windowGapY + r * (windowH + windowGapY);
    const wCenterY = wy + windowH / 2;

    // Normalized position along building height: -1 at top, +1 at bottom
    const t = (wCenterY - midY) / halfH;

    // Parabolic inward offset: max at center (t=0), zero at edges (t=±1)
    const inward = bow * (1 - t * t);

    // The x position of this window's left face
    const wx = bldgBaseLeft + inward - windowProtrusion;

    // Surface normal angle: derivative of parabola x = bow*(1 - t^2) => dx/dt = -2*bow*t
    // In pixel coords: dx/dy = dx/dt * dt/dy = -2*bow*t / halfH
    // Normal to the curve points left and slightly up/down
    const dxdy = -2 * bow * t / halfH;
    // Tangent direction along surface is (dxdy, 1) normalized (going down the wall)
    // Normal pointing left (outward from building) is (-1, dxdy) normalized
    const nLen = Math.sqrt(1 + dxdy * dxdy);
    const nx = -1 / nLen;
    const ny = dxdy / nLen;

    wins.push({
      x: wx,
      y: wy,
      w: windowProtrusion,
      h: windowH,
      inward: inward,
      nx: nx,
      ny: ny
    });
  }
  return wins;
}

function getWindowSurfaces(wins) {
  const surfaces = [];
  for (const win of wins) {
    // Left face — the glass, with curved normal
    surfaces.push({
      x1: win.x, y1: win.y,
      x2: win.x, y2: win.y + win.h,
      nx: win.nx, ny: win.ny, type: 'glass'
    });
    // Top face (horizontal, normal pointing up)
    surfaces.push({
      x1: win.x, y1: win.y,
      x2: win.x + win.w, y2: win.y,
      nx: 0, ny: -1, type: 'glass'
    });
    // Bottom face (horizontal, normal pointing down)
    surfaces.push({
      x1: win.x, y1: win.y + win.h,
      x2: win.x + win.w, y2: win.y + win.h,
      nx: 0, ny: 1, type: 'glass'
    });
  }
  // Main left wall of building (behind the windows)
  surfaces.push({
    x1: bldgBaseLeft, y1: bldgTop,
    x2: bldgBaseLeft, y2: bldgBottom,
    nx: -1, ny: 0, type: 'wall'
  });
  // Roof
  surfaces.push({
    x1: bldgBaseLeft - windowProtrusion, y1: bldgTop,
    x2: bldgRight, y2: bldgTop,
    nx: 0, ny: -1, type: 'wall'
  });
  return surfaces;
}

function raySegmentIntersect(ox, oy, dx, dy, x1, y1, x2, y2) {
  const ex = x2 - x1;
  const ey = y2 - y1;
  const denom = dx * ey - dy * ex;
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((x1 - ox) * ey - (y1 - oy) * ex) / denom;
  const u = ((x1 - ox) * dy - (y1 - oy) * dx) / denom;
  if (t > 0.01 && u >= 0 && u <= 1) {
    return { t, x: ox + dx * t, y: oy + dy * t, u };
  }
  return null;
}

function rayRectIntersect(ox, oy, dx, dy, rect) {
  const sides = [
    { x1: rect.x, y1: rect.y, x2: rect.x + rect.w, y2: rect.y, nx: 0, ny: -1 },
    { x1: rect.x, y1: rect.y + rect.h, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 0, ny: 1 },
    { x1: rect.x, y1: rect.y, x2: rect.x, y2: rect.y + rect.h, nx: -1, ny: 0 },
    { x1: rect.x + rect.w, y1: rect.y, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 1, ny: 0 },
  ];
  let best = null;
  for (const s of sides) {
    const hit = raySegmentIntersect(ox, oy, dx, dy, s.x1, s.y1, s.x2, s.y2);
    if (hit && (!best || hit.t < best.t)) {
      best = { t: hit.t, x: hit.x, y: hit.y, nx: s.nx, ny: s.ny };
    }
  }
  return best;
}

function traceRay(ox, oy, dx, dy, allSurfaces) {
  let segments = [];
  let cx = ox, cy = oy;
  let rdx = dx, rdy = dy;

  for (let bounce = 0; bounce <= MAX_BOUNCES; bounce++) {
    let closest = null;
    let hitType = null;
    let hitNx = 0, hitNy = 0;

    // Check all building/window surfaces
    for (const surf of allSurfaces) {
      const hit = raySegmentIntersect(cx, cy, rdx, rdy, surf.x1, surf.y1, surf.x2, surf.y2);
      if (hit && (!closest || hit.t < closest.t)) {
        closest = { t: hit.t, x: hit.x, y: hit.y };
        hitNx = surf.nx;
        hitNy = surf.ny;
        hitType = surf.type;
      }
    }

    // Check ground
    if (rdy > 0) {
      const tg = (GROUND_Y - cy) / rdy;
      if (tg > 0.01 && (!closest || tg < closest.t)) {
        closest = { t: tg, x: cx + rdx * tg, y: GROUND_Y };
        hitNx = 0; hitNy = -1;
        hitType = 'ground';
      }
    }

    // Check car body
    const carBodyHit = rayRectIntersect(cx, cy, rdx, rdy, carBodyRect);
    if (carBodyHit && (!closest || carBodyHit.t < closest.t)) {
      closest = carBodyHit;
      hitNx = carBodyHit.nx; hitNy = carBodyHit.ny;
      hitType = 'car';
    }
    const carCabinHit = rayRectIntersect(cx, cy, rdx, rdy, carCabinRect);
    if (carCabinHit && (!closest || carCabinHit.t < closest.t)) {
      closest = carCabinHit;
      hitNx = carCabinHit.nx; hitNy = carCabinHit.ny;
      hitType = 'car';
    }

    if (!closest) {
      const endX = cx + rdx * RAY_MAX_LEN;
      const endY = cy + rdy * RAY_MAX_LEN;
      segments.push({ x1: cx, y1: cy, x2: endX, y2: endY, reflected: bounce > 0 });
      break;
    }

    segments.push({ x1: cx, y1: cy, x2: closest.x, y2: closest.y, reflected: bounce > 0 });

    if (hitType === 'glass') {
      // Reflect off glass using the surface normal
      const dot = rdx * hitNx + rdy * hitNy;
      rdx = rdx - 2 * dot * hitNx;
      rdy = rdy - 2 * dot * hitNy;
      cx = closest.x;
      cy = closest.y;
    } else {
      break;
    }
  }
  return segments;
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#4A90D9');
  grad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawGround() {
  ctx.fillStyle = '#555';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  ctx.setLineDash([20, 15]);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 30);
  ctx.lineTo(W, GROUND_Y + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#888';
  ctx.fillRect(bldgBaseLeft - 25, GROUND_Y, bldgRight - bldgBaseLeft + 50, 8);
}

function drawBuilding(wins) {
  // Main building body
  ctx.fillStyle = '#8a8a8a';
  ctx.fillRect(bldgBaseLeft, bldgTop, bldgRight - bldgBaseLeft, bldgBottom - bldgTop);

  // Draw the concave left wall fill — area between curved windows and bldgBaseLeft
  if (wins.length > 0) {
    ctx.fillStyle = '#7a7a7a';
    ctx.beginPath();
    // Start at top-left of building
    ctx.moveTo(bldgBaseLeft, bldgTop);
    // Go along the curved window line
    for (let i = 0; i < wins.length; i++) {
      const w = wins[i];
      if (i === 0) {
        ctx.lineTo(w.x, w.y);
      }
      ctx.lineTo(w.x, w.y);
      ctx.lineTo(w.x, w.y + w.h);
    }
    const lastW = wins[wins.length - 1];
    ctx.lineTo(bldgBaseLeft, lastW.y + lastW.h);
    ctx.lineTo(bldgBaseLeft, bldgTop);
    ctx.closePath();
    ctx.fill();
  }

  // Subtle vertical lines for paneling on the flat part
  ctx.strokeStyle = '#7a7a7a';
  ctx.lineWidth = 1;
  const panelCount = 6;
  const panelW = (bldgRight - bldgBaseLeft) / panelCount;
  for (let i = 1; i < panelCount; i++) {
    const px = bldgBaseLeft + i * panelW;
    ctx.beginPath();
    ctx.moveTo(px, bldgTop);
    ctx.lineTo(px, bldgBottom);
    ctx.stroke();
  }

  // Draw the concave wall surface between windows
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  if (wins.length > 0) {
    ctx.moveTo(bldgBaseLeft, bldgTop);
    ctx.lineTo(wins[0].x, wins[0].y);
    for (let i = 0; i < wins.length; i++) {
      const w = wins[i];
      ctx.lineTo(w.x, w.y);
      ctx.lineTo(w.x, w.y + w.h);
      if (i < wins.length - 1) {
        ctx.lineTo(wins[i + 1].x, wins[i + 1].y);
      }
    }
    const lastW = wins[wins.length - 1];
    ctx.lineTo(bldgBaseLeft, lastW.y + lastW.h);
    ctx.lineTo(bldgBaseLeft, bldgBottom);
  }
  ctx.stroke();

  // Windows
  for (const win of wins) {
    // Window frame
    ctx.fillStyle = '#606060';
    ctx.fillRect(win.x, win.y, win.w, win.h);

    // Glass face
    const glassGrad = ctx.createLinearGradient(win.x, win.y, win.x + win.w, win.y);
    glassGrad.addColorStop(0, '#7ec8e3');
    glassGrad.addColorStop(1, '#5ba3c9');
    ctx.fillStyle = glassGrad;
    ctx.fillRect(win.x, win.y + 1, win.w - 1, win.h - 2);

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(win.x, win.y + 1, 2, win.h - 2);

    // Draw the normal direction as a tiny tick for visual feedback
    const wcx = win.x;
    const wcy = win.y + win.h / 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(wcx, wcy);
    ctx.lineTo(wcx + win.nx * 10, wcy + win.ny * 10);
    ctx.stroke();

    // Outline
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(win.x, win.y, win.w, win.h);
  }

  // Building outline
  ctx.strokeStyle = '#456';
  ctx.lineWidth = 2;
  ctx.strokeRect(bldgBaseLeft, bldgTop, bldgRight - bldgBaseLeft, bldgBottom - bldgTop);

  // Roof accent
  ctx.fillStyle = '#456';
  ctx.fillRect(bldgBaseLeft, bldgTop, bldgRight - bldgBaseLeft, 4);
}

function drawCar() {
  ctx.save();
  ctx.translate(carX, carY);
  ctx.scale(0.5, 0.5);
  ctx.translate(-carX, -carY);

  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(carX + carW / 2, GROUND_Y + 2, carW / 2 + 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(carX, carY);
  ctx.lineTo(carX, carY - carH);
  ctx.lineTo(carX + 10, carY - carH - 5);
  ctx.lineTo(carX + carW - 10, carY - carH - 5);
  ctx.lineTo(carX + carW, carY - carH);
  ctx.lineTo(carX + carW, carY);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath();
  ctx.moveTo(cabinX, cabinY + cabinH);
  ctx.lineTo(cabinX + 8, cabinY);
  ctx.lineTo(cabinX + cabinW - 8, cabinY);
  ctx.lineTo(cabinX + cabinW, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(100, 150, 200, 0.3)';
  ctx.beginPath();
  ctx.moveTo(cabinX + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(100, 150, 200, 0.25)';
  ctx.beginPath();
  ctx.moveTo(cabinX + cabinW / 2 + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + cabinW / 2 + 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ff6';
  ctx.beginPath();
  ctx.ellipse(carX + carW, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e33';
  ctx.beginPath();
  ctx.ellipse(carX, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(carX + 5, carY - carH / 2);
  ctx.lineTo(carX + carW - 5, carY - carH / 2);
  ctx.stroke();

  ctx.restore();
}

function getRayStarts(dx, dy) {
  const perpX = -dy;
  const perpY = dx;
  const spacing = 28;
  const ps = [0, W * perpX, H * perpY, W * perpX + H * perpY];
  const pMin = Math.min(...ps) - spacing;
  const pMax = Math.max(...ps) + spacing;
  const starts = [];
  for (let p = Math.ceil(pMin / spacing) * spacing; p <= pMax; p += spacing) {
    let ex, ey;
    if (dy > 1e-10) {
      const x = -p / dy;
      if (x >= -1 && x <= W + 1) { ex = x; ey = 0; }
    }
    if (ex === undefined && dx > 1e-10) {
      const y = p / dx;
      if (y >= -1 && y <= H + 1) { ex = 0; ey = y; }
    }
    if (ex === undefined) continue;
    starts.push([ex - dx * 5, ey - dy * 5]);
  }
  return starts;
}

function drawRays(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  const allTraced = [];
  for (const [sx, sy] of getRayStarts(dx, dy)) {
    allTraced.push(traceRay(sx, sy, dx, dy, allSurfaces));
  }

  // Draw incoming (unreflected) rays
  ctx.lineWidth = 1.5;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 235, 59, 0.55)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }

  // Draw reflected rays (brighter)
  ctx.lineWidth = 2;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (!seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 245, 100, 0.8)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }
}

function drawGlowSpots(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  for (const [sx, sy] of getRayStarts(dx, dy)) {
    const segs = traceRay(sx, sy, dx, dy, allSurfaces);

    for (let s = 0; s < segs.length; s++) {
      const seg = segs[s];
      if (seg.reflected && s === segs.length - 1) {
        const gx = seg.x2;
        const gy = seg.y2;
        if (gx > -10 && gx < W + 10 && gy > -10 && gy < H + 10) {
          const glow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 12);
          glow.addColorStop(0, 'rgba(255, 255, 180, 0.5)');
          glow.addColorStop(1, 'rgba(255, 255, 180, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(gx, gy, 12, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
}

function draw() {
  const angleDeg = parseFloat(angleSlider.value);
  const curveFrac = parseFloat(curveSlider.value) / 100;

  const wins = getCurvedWindows(curveFrac);
  const allSurfaces = getWindowSurfaces(wins);

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, 348, 400);
  ctx.setTransform(0.8, 0, 0, 0.8, 0, 0);
  drawSky();
  drawGround();
  drawGlowSpots(angleDeg, allSurfaces);
  drawRays(angleDeg, allSurfaces);
  drawBuilding(wins);
  drawCar();

  // Angle label
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(angleDeg + '° from horizontal', W - 12, H - 10);
  ctx.textAlign = 'left';
}

angleSlider.addEventListener('input', draw);
curveSlider.addEventListener('input', draw);

draw();

window.addEventListener('load', () => {
  window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
});
</script>
</body>
</html>
