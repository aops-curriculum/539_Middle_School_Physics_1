<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Reflection off Concave Glass Skyscraper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #87CEEB;
  font-family: Arial, sans-serif;
  max-width: 400px;
  margin: 0 auto;
  user-select: none;
  -webkit-user-select: none;
}
.slider-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 6px 16px 4px;
}
.slider-container label {
  font-size: 13px;
  color: #555;
  white-space: nowrap;
}
.slider-container input[type="range"] {
  width: 180px;
  accent-color: #f9a825;
}
canvas {
  display: block;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: default;
}
</style>
</head>
<body>
<div class="slider-container">
  <label>Sun angle:</label>
  <input type="range" id="angleSlider" min="10" max="80" value="35">
</div>
<div class="slider-container">
  <label>Curvature:</label>
  <input type="range" id="curveSlider" min="0" max="100" value="40">
</div>
<canvas id="canvas" width="348" height="400"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const angleSlider = document.getElementById('angleSlider');
const curveSlider = document.getElementById('curveSlider');
const W = 435;
const H = 500;

const GROUND_Y = 440;
const MAX_BOUNCES = 6;
const RAY_MAX_LEN = 1500;

// Building definition
const bldgBaseLeft = 360;
const bldgRight = 510;
const bldgTop = 60;
const bldgBottom = GROUND_Y;

// Window layout
const windowRows = 13;
const windowH = 20;
const windowGapY = (bldgBottom - bldgTop - windowRows * windowH) / (windowRows + 1);
const windowProtrusion = 8;

// Car body definition
const carX = 80;
const carY = GROUND_Y;
const carW = 120;
const carH = 30;
const carBodyRect = { x: carX, y: carY - 15, w: 60, h: 15 };
const cabinX = carX + 30;
const cabinY = carY - carH - 18;
const cabinW = 55;
const cabinH = 18;
const carCabinRect = { x: carX + 15, y: carY - 24, w: 28, h: 9 };

// Get the x-offset of the curved left edge at a given y position
function getCurveX(y, bow) {
  const bldgH = bldgBottom - bldgTop;
  const midY = (bldgTop + bldgBottom) / 2;
  const halfH = bldgH / 2;
  const t = (y - midY) / halfH;
  return bow * (1 - t * t);
}

// Get the slope dx/dy of the curve at a given y position
function getCurveSlope(y, bow) {
  const bldgH = bldgBottom - bldgTop;
  const midY = (bldgTop + bldgBottom) / 2;
  const halfH = bldgH / 2;
  const t = (y - midY) / halfH;
  return -2 * bow * t / halfH;
}

function getCurvedWindows(curveFrac) {
  const maxBow = 80;
  const bow = maxBow * curveFrac;

  const wins = [];

  for (let r = 0; r < windowRows; r++) {
    const wy = bldgTop + windowGapY + r * (windowH + windowGapY);
    const wCenterY = wy + windowH / 2;

    // Inward offset at window center
    const inward = getCurveX(wCenterY, bow);

    // The x position of the curved building edge at this y
    const edgeX = bldgBaseLeft + inward;

    // Slope of curve at this point: dx/dy
    const dxdy = getCurveSlope(wCenterY, bow);

    // Tangent direction along surface (going downward along wall): (dxdy, 1) normalized
    const tanLen = Math.sqrt(dxdy * dxdy + 1);
    const tx = dxdy / tanLen;
    const ty = 1 / tanLen;

    // Normal pointing outward (to the left): (-ty, tx) = (-1/tanLen, dxdy/tanLen)
    const nx = -ty;
    const ny = tx;

    // Angle of the tangent from vertical (rotation angle for the window)
    // tanAngle is the angle to rotate the window so it's tangent to the curve
    const tanAngle = Math.atan2(dxdy, 1);

    // The window is centered on the curve edge, tilted along the tangent
    // Window center point on the building edge
    const wcx = edgeX;
    const wcy = wCenterY;

    // Four corners of the tilted window (protruding outward from the edge)
    // In the window's local frame: width goes along the normal (outward), height along the tangent
    const halfH = windowH / 2;
    const proto = windowProtrusion;

    // Top-left (outer-top): go along -tangent by halfH, then along -normal by proto
    // Top-right (inner-top): go along -tangent by halfH
    // Bottom-left (outer-bottom): go along +tangent by halfH, then along -normal by proto
    // Bottom-right (inner-bottom): go along +tangent by halfH

    // Corners: the window face is on the outside (facing left/outward)
    // The window rectangle: along tangent = windowH, along outward normal = windowProtrusion
    const corners = [
      { x: wcx - nx * proto - tx * halfH, y: wcy - ny * proto - ty * halfH }, // outer top
      { x: wcx - tx * halfH,              y: wcy - ty * halfH },              // inner top
      { x: wcx + tx * halfH,              y: wcy + ty * halfH },              // inner bottom
      { x: wcx - nx * proto + tx * halfH, y: wcy - ny * proto + ty * halfH }, // outer bottom
    ];

    wins.push({
      edgeX: edgeX,
      centerX: wcx,
      centerY: wcy,
      inward: inward,
      nx: nx,
      ny: ny,
      tx: tx,
      ty: ty,
      angle: tanAngle,
      corners: corners,
      halfH: halfH,
      proto: proto
    });
  }
  return wins;
}

function getWindowSurfaces(wins) {
  const surfaces = [];
  for (const win of wins) {
    const c = win.corners;
    // Outer face (glass) — from outer-top to outer-bottom
    surfaces.push({
      x1: c[0].x, y1: c[0].y,
      x2: c[3].x, y2: c[3].y,
      nx: win.nx, ny: win.ny, type: 'glass'
    });
    // Top face — from outer-top to inner-top
    surfaces.push({
      x1: c[0].x, y1: c[0].y,
      x2: c[1].x, y2: c[1].y,
      nx: -win.tx, ny: -win.ty, type: 'glass'
    });
    // Bottom face — from inner-bottom to outer-bottom
    surfaces.push({
      x1: c[2].x, y1: c[2].y,
      x2: c[3].x, y2: c[3].y,
      nx: win.tx, ny: win.ty, type: 'glass'
    });
  }
  // Main left wall of building (behind the windows) — use the curved edge segments
  // Approximate with segments between window positions
  if (wins.length > 0) {
    // Wall from top of building to first window
    surfaces.push({
      x1: bldgBaseLeft + getCurveX(bldgTop, wins[0].inward > 0 ? wins[0].inward / (1 - Math.pow((bldgTop - (bldgTop + bldgBottom) / 2) / ((bldgBottom - bldgTop) / 2), 2) || 1) : 0), y1: bldgTop,
      x2: bldgBaseLeft, y2: bldgTop,
      nx: 0, ny: -1, type: 'wall'
    });
  }
  // Simplified: main wall behind windows
  surfaces.push({
    x1: bldgBaseLeft, y1: bldgTop,
    x2: bldgBaseLeft, y2: bldgBottom,
    nx: -1, ny: 0, type: 'wall'
  });
  // Roof
  surfaces.push({
    x1: bldgBaseLeft - windowProtrusion, y1: bldgTop,
    x2: bldgRight, y2: bldgTop,
    nx: 0, ny: -1, type: 'wall'
  });
  return surfaces;
}

function raySegmentIntersect(ox, oy, dx, dy, x1, y1, x2, y2) {
  const ex = x2 - x1;
  const ey = y2 - y1;
  const denom = dx * ey - dy * ex;
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((x1 - ox) * ey - (y1 - oy) * ex) / denom;
  const u = ((x1 - ox) * dy - (y1 - oy) * dx) / denom;
  if (t > 0.01 && u >= 0 && u <= 1) {
    return { t, x: ox + dx * t, y: oy + dy * t, u };
  }
  return null;
}

function rayRectIntersect(ox, oy, dx, dy, rect) {
  const sides = [
    { x1: rect.x, y1: rect.y, x2: rect.x + rect.w, y2: rect.y, nx: 0, ny: -1 },
    { x1: rect.x, y1: rect.y + rect.h, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 0, ny: 1 },
    { x1: rect.x, y1: rect.y, x2: rect.x, y2: rect.y + rect.h, nx: -1, ny: 0 },
    { x1: rect.x + rect.w, y1: rect.y, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 1, ny: 0 },
  ];
  let best = null;
  for (const s of sides) {
    const hit = raySegmentIntersect(ox, oy, dx, dy, s.x1, s.y1, s.x2, s.y2);
    if (hit && (!best || hit.t < best.t)) {
      best = { t: hit.t, x: hit.x, y: hit.y, nx: s.nx, ny: s.ny };
    }
  }
  return best;
}

function traceRay(ox, oy, dx, dy, allSurfaces) {
  let segments = [];
  let cx = ox, cy = oy;
  let rdx = dx, rdy = dy;

  for (let bounce = 0; bounce <= MAX_BOUNCES; bounce++) {
    let closest = null;
    let hitType = null;
    let hitNx = 0, hitNy = 0;

    for (const surf of allSurfaces) {
      const hit = raySegmentIntersect(cx, cy, rdx, rdy, surf.x1, surf.y1, surf.x2, surf.y2);
      if (hit && (!closest || hit.t < closest.t)) {
        closest = { t: hit.t, x: hit.x, y: hit.y };
        hitNx = surf.nx;
        hitNy = surf.ny;
        hitType = surf.type;
      }
    }

    if (rdy > 0) {
      const tg = (GROUND_Y - cy) / rdy;
      if (tg > 0.01 && (!closest || tg < closest.t)) {
        closest = { t: tg, x: cx + rdx * tg, y: GROUND_Y };
        hitNx = 0; hitNy = -1;
        hitType = 'ground';
      }
    }

    const carBodyHit = rayRectIntersect(cx, cy, rdx, rdy, carBodyRect);
    if (carBodyHit && (!closest || carBodyHit.t < closest.t)) {
      closest = carBodyHit;
      hitNx = carBodyHit.nx; hitNy = carBodyHit.ny;
      hitType = 'car';
    }
    const carCabinHit = rayRectIntersect(cx, cy, rdx, rdy, carCabinRect);
    if (carCabinHit && (!closest || carCabinHit.t < closest.t)) {
      closest = carCabinHit;
      hitNx = carCabinHit.nx; hitNy = carCabinHit.ny;
      hitType = 'car';
    }

    if (!closest) {
      const endX = cx + rdx * RAY_MAX_LEN;
      const endY = cy + rdy * RAY_MAX_LEN;
      segments.push({ x1: cx, y1: cy, x2: endX, y2: endY, reflected: bounce > 0 });
      break;
    }

    segments.push({ x1: cx, y1: cy, x2: closest.x, y2: closest.y, reflected: bounce > 0 });

    if (hitType === 'glass') {
      const dot = rdx * hitNx + rdy * hitNy;
      rdx = rdx - 2 * dot * hitNx;
      rdy = rdy - 2 * dot * hitNy;
      cx = closest.x;
      cy = closest.y;
    } else {
      break;
    }
  }
  return segments;
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#4A90D9');
  grad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawGround() {
  ctx.fillStyle = '#555';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  ctx.setLineDash([20, 15]);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 30);
  ctx.lineTo(W, GROUND_Y + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#888';
  ctx.fillRect(bldgBaseLeft - 25, GROUND_Y, bldgRight - bldgBaseLeft + 50, 8);
}

function drawBuilding(wins, bow) {
  // Main building body (right portion, always rectangular)
  ctx.fillStyle = '#8a8a8a';
  ctx.fillRect(bldgBaseLeft, bldgTop, bldgRight - bldgBaseLeft, bldgBottom - bldgTop);

  // Draw the curved left wall area
  // Build a path from top to bottom along the curve, then back along bldgBaseLeft
  const curveSteps = 60;
  ctx.fillStyle = '#7a7a7a';
  ctx.beginPath();
  ctx.moveTo(bldgBaseLeft, bldgTop);
  for (let i = 0; i <= curveSteps; i++) {
    const y = bldgTop + (bldgBottom - bldgTop) * i / curveSteps;
    const offset = getCurveX(y, bow);
    ctx.lineTo(bldgBaseLeft + offset - windowProtrusion, y);
  }
  ctx.lineTo(bldgBaseLeft, bldgBottom);
  ctx.lineTo(bldgBaseLeft, bldgTop);
  ctx.closePath();
  ctx.fill();

  // Subtle vertical lines for paneling on the flat part
  ctx.strokeStyle = '#7a7a7a';
  ctx.lineWidth = 1;
  const panelCount = 6;
  const panelW = (bldgRight - bldgBaseLeft) / panelCount;
  for (let i = 1; i < panelCount; i++) {
    const px = bldgBaseLeft + i * panelW;
    ctx.beginPath();
    ctx.moveTo(px, bldgTop);
    ctx.lineTo(px, bldgBottom);
    ctx.stroke();
  }

  // Draw the curved wall edge
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= curveSteps; i++) {
    const y = bldgTop + (bldgBottom - bldgTop) * i / curveSteps;
    const offset = getCurveX(y, bow);
    const x = bldgBaseLeft + offset - windowProtrusion;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Draw wall segments between windows along the curve
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1.5;
  // Segments between consecutive windows (along the curve, between window gaps)
  for (let i = 0; i < wins.length - 1; i++) {
    const w1 = wins[i];
    const w2 = wins[i + 1];
    // Draw curve segment from bottom of window i to top of window i+1
    const y1 = w1.centerY + w1.halfH * w1.ty;
    const y2 = w2.centerY - w2.halfH * w2.ty;
    ctx.beginPath();
    const steps = 8;
    for (let s = 0; s <= steps; s++) {
      const y = y1 + (y2 - y1) * s / steps;
      const offset = getCurveX(y, bow);
      const x = bldgBaseLeft + offset - windowProtrusion;
      if (s === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Windows — draw tilted
  for (const win of wins) {
    const c = win.corners;

    // Window frame (slightly larger)
    ctx.fillStyle = '#606060';
    ctx.beginPath();
    ctx.moveTo(c[0].x - win.nx * 1, c[0].y - win.ny * 1);
    ctx.lineTo(c[1].x + win.nx * 1, c[1].y + win.ny * 1);
    ctx.lineTo(c[2].x + win.nx * 1, c[2].y + win.ny * 1);
    ctx.lineTo(c[3].x - win.nx * 1, c[3].y - win.ny * 1);
    ctx.closePath();
    ctx.fill();

    // Glass face — the outer face of the window
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(c[0].x, c[0].y);
    ctx.lineTo(c[1].x, c[1].y);
    ctx.lineTo(c[2].x, c[2].y);
    ctx.lineTo(c[3].x, c[3].y);
    ctx.closePath();
    ctx.clip();

    // Glass gradient along the normal direction (outward to inward)
    const gx1 = win.centerX - win.nx * win.proto;
    const gy1 = win.centerY - win.ny * win.proto;
    const gx2 = win.centerX;
    const gy2 = win.centerY;
    const glassGrad = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
    glassGrad.addColorStop(0, '#7ec8e3');
    glassGrad.addColorStop(1, '#5ba3c9');
    ctx.fillStyle = glassGrad;
    ctx.fill();

    // Highlight along outer edge
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(c[0].x, c[0].y);
    ctx.lineTo(c[3].x, c[3].y);
    ctx.stroke();

    ctx.restore();

    // Window outline
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(c[0].x, c[0].y);
    ctx.lineTo(c[1].x, c[1].y);
    ctx.lineTo(c[2].x, c[2].y);
    ctx.lineTo(c[3].x, c[3].y);
    ctx.closePath();
    ctx.stroke();

    // Normal tick
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(win.centerX - win.nx * win.proto, win.centerY - win.ny * win.proto);
    ctx.lineTo(win.centerX - win.nx * win.proto + win.nx * 10, win.centerY - win.ny * win.proto + win.ny * 10);
    ctx.stroke();
  }

  // Building outline — right side and bottom are straight, left follows curve
  ctx.strokeStyle = '#456';
  ctx.lineWidth = 2;
  // Right side + top + bottom
  ctx.beginPath();
  ctx.moveTo(bldgBaseLeft, bldgBottom);
  ctx.lineTo(bldgRight, bldgBottom);
  ctx.lineTo(bldgRight, bldgTop);
  ctx.lineTo(bldgBaseLeft, bldgTop);
  ctx.stroke();

  // Roof accent
  ctx.fillStyle = '#456';
  ctx.fillRect(bldgBaseLeft, bldgTop, bldgRight - bldgBaseLeft, 4);
  // Extend roof accent to cover curved part
  if (bow > 0) {
    const roofOffset = getCurveX(bldgTop, bow);
    ctx.fillRect(bldgBaseLeft + roofOffset - windowProtrusion, bldgTop, bldgBaseLeft - (bldgBaseLeft + roofOffset - windowProtrusion), 4);
  }
}

function drawCar() {
  ctx.save();
  ctx.translate(carX, carY);
  ctx.scale(0.5, 0.5);
  ctx.translate(-carX, -carY);

  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(carX + carW / 2, GROUND_Y + 2, carW / 2 + 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(carX, carY);
  ctx.lineTo(carX, carY - carH);
  ctx.lineTo(carX + 10, carY - carH - 5);
  ctx.lineTo(carX + carW - 10, carY - carH - 5);
  ctx.lineTo(carX + carW, carY - carH);
  ctx.lineTo(carX + carW, carY);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#2a2a3a';
  ctx.beginPath();
  ctx.moveTo(cabinX, cabinY + cabinH);
  ctx.lineTo(cabinX + 8, cabinY);
  ctx.lineTo(cabinX + cabinW - 8, cabinY);
  ctx.lineTo(cabinX + cabinW, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(100, 150, 200, 0.3)';
  ctx.beginPath();
  ctx.moveTo(cabinX + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(100, 150, 200, 0.25)';
  ctx.beginPath();
  ctx.moveTo(cabinX + cabinW / 2 + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + cabinW / 2 + 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ff6';
  ctx.beginPath();
  ctx.ellipse(carX + carW, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e33';
  ctx.beginPath();
  ctx.ellipse(carX, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(carX + 5, carY - carH / 2);
  ctx.lineTo(carX + carW - 5, carY - carH / 2);
  ctx.stroke();

  ctx.restore();
}

function getRayStarts(dx, dy) {
  const perpX = -dy;
  const perpY = dx;
  const spacing = 28;
  const ps = [0, W * perpX, H * perpY, W * perpX + H * perpY];
  const pMin = Math.min(...ps) - spacing;
  const pMax = Math.max(...ps) + spacing;
  const starts = [];
  for (let p = Math.ceil(pMin / spacing) * spacing; p <= pMax; p += spacing) {
    let ex, ey;
    if (dy > 1e-10) {
      const x = -p / dy;
      if (x >= -1 && x <= W + 1) { ex = x; ey = 0; }
    }
    if (ex === undefined && dx > 1e-10) {
      const y = p / dx;
      if (y >= -1 && y <= H + 1) { ex = 0; ey = y; }
    }
    if (ex === undefined) continue;
    starts.push([ex - dx * 5, ey - dy * 5]);
  }
  return starts;
}

function drawRays(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  const allTraced = [];
  for (const [sx, sy] of getRayStarts(dx, dy)) {
    allTraced.push(traceRay(sx, sy, dx, dy, allSurfaces));
  }

  ctx.lineWidth = 1.5;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 235, 59, 0.55)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }

  ctx.lineWidth = 2;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (!seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 245, 100, 0.8)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }
}

function drawGlowSpots(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  for (const [sx, sy] of getRayStarts(dx, dy)) {
    const segs = traceRay(sx, sy, dx, dy, allSurfaces);

    for (let s = 0; s < segs.length; s++) {
      const seg = segs[s];
      if (seg.reflected && s === segs.length - 1) {
        const gx = seg.x2;
        const gy = seg.y2;
        if (gx > -10 && gx < W + 10 && gy > -10 && gy < H + 10) {
          const glow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 12);
          glow.addColorStop(0, 'rgba(255, 255, 180, 0.5)');
          glow.addColorStop(1, 'rgba(255, 255, 180, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(gx, gy, 12, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
}

function draw() {
  const angleDeg = parseFloat(angleSlider.value);
  const curveFrac = parseFloat(curveSlider.value) / 100;
  const maxBow = 80;
  const bow = maxBow * curveFrac;

  const wins = getCurvedWindows(curveFrac);
  const allSurfaces = getWindowSurfaces(wins);

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, 348, 400);
  ctx.setTransform(0.8, 0, 0, 0.8, 0, 0);
  drawSky();
  drawGround();
  drawGlowSpots(angleDeg, allSurfaces);
  drawRays(angleDeg, allSurfaces);
  drawBuilding(wins, bow);
  drawCar();

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(angleDeg + '° from horizontal', W - 12, H - 10);
  ctx.textAlign = 'left';
}

angleSlider.addEventListener('input', draw);
curveSlider.addEventListener('input', draw);

draw();

window.addEventListener('load', () => {
  window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
});
</script>
