<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Reflection off Concave Glass Skyscraper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #87CEEB;
  font-family: Arial, sans-serif;
  max-width: 400px;
  margin: 0 auto;
  user-select: none;
  -webkit-user-select: none;
}
.slider-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 6px 16px 4px;
}
.slider-container label {
  font-size: 13px;
  color: #555;
  white-space: nowrap;
}
.slider-container input[type="range"] {
  width: 180px;
  accent-color: #f9a825;
}
canvas {
  display: block;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: default;
}
</style>
</head>
<body>
<div class="slider-container">
  <label>Sun angle:</label>
  <input type="range" id="angleSlider" min="10" max="80" value="35">
</div>
<div class="slider-container">
  <label>Curvature:</label>
  <input type="range" id="curveSlider" min="0" max="100" value="40">
</div>
<canvas id="canvas" width="348" height="400"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const angleSlider = document.getElementById('angleSlider');
const curveSlider = document.getElementById('curveSlider');
const W = 435;
const H = 500;

const GROUND_Y = 440;
const MAX_BOUNCES = 6;
const RAY_MAX_LEN = 1500;

// Building definition
const bldgRight = 510;
const bldgTop = 60;
const bldgBottom = GROUND_Y;
const bldgWidth = 150;
const bldgFlatLeft = bldgRight - bldgWidth; // left edge when curvature=0

// Window layout (purely visual)
const windowRows = 13;
const windowH = (bldgBottom - bldgTop) / windowRows;
const windowProtrusion = 8;

const maxBow = 80; // max inward bow in pixels

// Car body definition
const carX = 80;
const carY = GROUND_Y;
const carW = 120;
const carH = 30;
const carBodyRect = { x: carX, y: carY - 15, w: 60, h: 15 };
const cabinX = carX + 30;
const cabinY = carY - carH - 18;
const cabinW = 55;
const cabinH = 18;
const carCabinRect = { x: carX + 15, y: carY - 24, w: 28, h: 9 };

// Melting easter egg state
let meltProgress = 0;
let animFrameId = null;

// Curve: the left edge of the building at height y, given bow amount.
// At top and bottom, the edge is at bldgFlatLeft.
// At the middle, it's bowed inward (to the right) by `bow` pixels.
// x(y) = bldgFlatLeft + bow * (1 - t^2), where t = (y - midY) / halfH
// So at t=0 (middle), x = bldgFlatLeft + bow (rightward = concave inward)
// At t=+/-1 (top/bottom), x = bldgFlatLeft
function getCurveX(y, bow) {
  const midY = (bldgTop + bldgBottom) / 2;
  const halfH = (bldgBottom - bldgTop) / 2;
  const t = (y - midY) / halfH;
  return bldgFlatLeft + bow * (1 - t * t);
}

// Derivative dx/dy of the curve
function getCurveDxDy(y, bow) {
  const midY = (bldgTop + bldgBottom) / 2;
  const halfH = (bldgBottom - bldgTop) / 2;
  const t = (y - midY) / halfH;
  return -2 * bow * t / halfH;
}

// Outward-pointing normal (pointing left, away from building interior) at height y
function getCurveNormal(y, bow) {
  const dxdy = getCurveDxDy(y, bow);
  // Tangent direction (going down along curve): (dxdy, 1)
  // Normal pointing left (outward): rotate tangent -90 deg: (-1, dxdy)
  const len = Math.sqrt(1 + dxdy * dxdy);
  return { nx: -1 / len, ny: dxdy / len };
}

// Build line-segment approximation of the curved left edge for ray intersection
function getCurveSurfaces(bow) {
  const segments = 40;
  const surfaces = [];
  for (let i = 0; i < segments; i++) {
    const y1 = bldgTop + (bldgBottom - bldgTop) * i / segments;
    const y2 = bldgTop + (bldgBottom - bldgTop) * (i + 1) / segments;
    const x1 = getCurveX(y1, bow);
    const x2 = getCurveX(y2, bow);
    const yMid = (y1 + y2) / 2;
    const n = getCurveNormal(yMid, bow);
    surfaces.push({
      x1, y1, x2, y2,
      nx: n.nx, ny: n.ny, type: 'glass'
    });
  }
  // Roof
  const roofLeftX = getCurveX(bldgTop, bow);
  surfaces.push({
    x1: roofLeftX, y1: bldgTop,
    x2: bldgRight, y2: bldgTop,
    nx: 0, ny: -1, type: 'wall'
  });
  return surfaces;
}

function raySegmentIntersect(ox, oy, dx, dy, x1, y1, x2, y2) {
  const ex = x2 - x1;
  const ey = y2 - y1;
  const denom = dx * ey - dy * ex;
  if (Math.abs(denom) < 1e-10) return null;
  const t = ((x1 - ox) * ey - (y1 - oy) * ex) / denom;
  const u = ((x1 - ox) * dy - (y1 - oy) * dx) / denom;
  if (t > 0.01 && u >= 0 && u <= 1) {
    return { t, x: ox + dx * t, y: oy + dy * t, u };
  }
  return null;
}

function rayRectIntersect(ox, oy, dx, dy, rect) {
  const sides = [
    { x1: rect.x, y1: rect.y, x2: rect.x + rect.w, y2: rect.y, nx: 0, ny: -1 },
    { x1: rect.x, y1: rect.y + rect.h, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 0, ny: 1 },
    { x1: rect.x, y1: rect.y, x2: rect.x, y2: rect.y + rect.h, nx: -1, ny: 0 },
    { x1: rect.x + rect.w, y1: rect.y, x2: rect.x + rect.w, y2: rect.y + rect.h, nx: 1, ny: 0 },
  ];
  let best = null;
  for (const s of sides) {
    const hit = raySegmentIntersect(ox, oy, dx, dy, s.x1, s.y1, s.x2, s.y2);
    if (hit && (!best || hit.t < best.t)) {
      best = { t: hit.t, x: hit.x, y: hit.y, nx: s.nx, ny: s.ny };
    }
  }
  return best;
}

function traceRay(ox, oy, dx, dy, allSurfaces) {
  let segments = [];
  let hitCar = false;
  let cx = ox, cy = oy;
  let rdx = dx, rdy = dy;

  for (let bounce = 0; bounce <= MAX_BOUNCES; bounce++) {
    let closest = null;
    let hitType = null;
    let hitNx = 0, hitNy = 0;

    for (const surf of allSurfaces) {
      const hit = raySegmentIntersect(cx, cy, rdx, rdy, surf.x1, surf.y1, surf.x2, surf.y2);
      if (hit && (!closest || hit.t < closest.t)) {
        closest = { t: hit.t, x: hit.x, y: hit.y };
        hitNx = surf.nx;
        hitNy = surf.ny;
        hitType = surf.type;
      }
    }

    if (rdy > 0) {
      const tg = (GROUND_Y - cy) / rdy;
      if (tg > 0.01 && (!closest || tg < closest.t)) {
        closest = { t: tg, x: cx + rdx * tg, y: GROUND_Y };
        hitNx = 0; hitNy = -1;
        hitType = 'ground';
      }
    }

    const carBodyHit = rayRectIntersect(cx, cy, rdx, rdy, carBodyRect);
    if (carBodyHit && (!closest || carBodyHit.t < closest.t)) {
      closest = carBodyHit;
      hitNx = carBodyHit.nx; hitNy = carBodyHit.ny;
      hitType = 'car';
    }
    const carCabinHit = rayRectIntersect(cx, cy, rdx, rdy, carCabinRect);
    if (carCabinHit && (!closest || carCabinHit.t < closest.t)) {
      closest = carCabinHit;
      hitNx = carCabinHit.nx; hitNy = carCabinHit.ny;
      hitType = 'car';
    }

    if (!closest) {
      const endX = cx + rdx * RAY_MAX_LEN;
      const endY = cy + rdy * RAY_MAX_LEN;
      segments.push({ x1: cx, y1: cy, x2: endX, y2: endY, reflected: bounce > 0 });
      break;
    }

    segments.push({ x1: cx, y1: cy, x2: closest.x, y2: closest.y, reflected: bounce > 0 });

    if (hitType === 'glass') {
      const dot = rdx * hitNx + rdy * hitNy;
      rdx = rdx - 2 * dot * hitNx;
      rdy = rdy - 2 * dot * hitNy;
      cx = closest.x;
      cy = closest.y;
    } else {
      if (hitType === 'car' && bounce > 0) hitCar = true;
      break;
    }
  }
  segments.hitCar = hitCar;
  return segments;
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#4A90D9');
  grad.addColorStop(1, '#87CEEB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawGround() {
  ctx.fillStyle = '#555';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  ctx.setLineDash([20, 15]);
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 30);
  ctx.lineTo(W, GROUND_Y + 30);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#888';
  ctx.fillRect(bldgFlatLeft - 25, GROUND_Y, bldgRight - bldgFlatLeft + 50, 8);
}

function drawBuilding(bow) {
  const curveSteps = 60;

  // Fill entire building body: from curved left edge to bldgRight
  ctx.fillStyle = '#8a8a8a';
  ctx.beginPath();
  for (let i = 0; i <= curveSteps; i++) {
    const y = bldgTop + (bldgBottom - bldgTop) * i / curveSteps;
    const x = getCurveX(y, bow);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.lineTo(bldgRight, bldgBottom);
  ctx.lineTo(bldgRight, bldgTop);
  ctx.closePath();
  ctx.fill();

  // Subtle vertical lines for paneling
  ctx.strokeStyle = '#7a7a7a';
  ctx.lineWidth = 1;
  const panelCount = 6;
  // Only draw panel lines that are within the building body
  for (let i = 1; i < panelCount; i++) {
    const px = bldgFlatLeft + i * (bldgRight - bldgFlatLeft) / panelCount;
    ctx.beginPath();
    // Start each line where it enters the building (at the curve or top)
    let started = false;
    for (let j = 0; j <= curveSteps; j++) {
      const y = bldgTop + (bldgBottom - bldgTop) * j / curveSteps;
      const edgeX = getCurveX(y, bow);
      if (px >= edgeX && !started) {
        ctx.moveTo(px, y);
        started = true;
      }
      if (px < edgeX && started) {
        ctx.lineTo(px, y);
        started = false;
      }
    }
    if (started) ctx.lineTo(px, bldgBottom);
    ctx.stroke();
  }

  // Draw windows on the curved edge (purely visual)
  for (let r = 0; r < windowRows; r++) {
    const yTop = bldgTop + r * windowH;
    const yBot = yTop + windowH;
    const yCen = (yTop + yBot) / 2;

    // Get curve info at window center
    const edgeX = getCurveX(yCen, bow);
    const dxdy = getCurveDxDy(yCen, bow);

    // Tangent and normal at this point
    const tanLen = Math.sqrt(dxdy * dxdy + 1);
    const tx = dxdy / tanLen;
    const ty = 1 / tanLen;
    const nx = -ty;
    const ny = tx;

    // Window corners: centered on curve at yCen, extending along tangent by halfH each way,
    // protruding outward along normal by windowProtrusion
    const halfH = windowH / 2;
    const corners = [
      { x: edgeX + nx * windowProtrusion - tx * halfH, y: yCen + ny * windowProtrusion - ty * halfH }, // outer top
      { x: edgeX - tx * halfH, y: yCen - ty * halfH },                                                 // inner top
      { x: edgeX + tx * halfH, y: yCen + ty * halfH },                                                 // inner bottom
      { x: edgeX + nx * windowProtrusion + tx * halfH, y: yCen + ny * windowProtrusion + ty * halfH }, // outer bottom
    ];

    // Window frame
    ctx.fillStyle = '#606060';
    ctx.beginPath();
    ctx.moveTo(corners[0].x - nx, corners[0].y - ny);
    ctx.lineTo(corners[1].x + nx, corners[1].y + ny);
    ctx.lineTo(corners[2].x + nx, corners[2].y + ny);
    ctx.lineTo(corners[3].x - nx, corners[3].y - ny);
    ctx.closePath();
    ctx.fill();

    // Glass face
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    ctx.lineTo(corners[1].x, corners[1].y);
    ctx.lineTo(corners[2].x, corners[2].y);
    ctx.lineTo(corners[3].x, corners[3].y);
    ctx.closePath();
    ctx.clip();

    const gx1 = edgeX + nx * windowProtrusion;
    const gy1 = yCen + ny * windowProtrusion;
    const glassGrad = ctx.createLinearGradient(gx1, gy1, edgeX, yCen);
    glassGrad.addColorStop(0, '#7ec8e3');
    glassGrad.addColorStop(1, '#5ba3c9');
    ctx.fillStyle = glassGrad;
    ctx.fill();

    // Highlight along outer edge
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    ctx.lineTo(corners[3].x, corners[3].y);
    ctx.stroke();

    ctx.restore();

    // Window outline
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    ctx.lineTo(corners[1].x, corners[1].y);
    ctx.lineTo(corners[2].x, corners[2].y);
    ctx.lineTo(corners[3].x, corners[3].y);
    ctx.closePath();
    ctx.stroke();
  }

  // Building outline: curved left edge, straight top/right/bottom
  ctx.strokeStyle = '#456';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const topLeftX = getCurveX(bldgTop, bow);
  ctx.moveTo(topLeftX, bldgTop);
  ctx.lineTo(bldgRight, bldgTop);
  ctx.lineTo(bldgRight, bldgBottom);
  const botLeftX = getCurveX(bldgBottom, bow);
  ctx.lineTo(botLeftX, bldgBottom);
  for (let i = curveSteps; i >= 0; i--) {
    const y = bldgTop + (bldgBottom - bldgTop) * i / curveSteps;
    ctx.lineTo(getCurveX(y, bow), y);
  }
  ctx.stroke();

  // Roof accent
  ctx.fillStyle = '#456';
  ctx.fillRect(topLeftX, bldgTop, bldgRight - topLeftX, 4);
}

function countCarHits(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);
  let count = 0;
  for (const [sx, sy] of getRayStarts(dx, dy)) {
    const segs = traceRay(sx, sy, dx, dy, allSurfaces);
    if (segs.hitCar) count++;
  }
  return count;
}

function drawCar(melt) {
  ctx.save();
  ctx.translate(carX, carY);
  ctx.scale(0.5, 0.5);
  ctx.translate(-carX, -carY);

  // Heat glow behind car
  if (melt > 0.05) {
    const glowSize = 40 + melt * 60;
    const glow = ctx.createRadialGradient(
      carX + carW / 2, carY - carH / 2, 0,
      carX + carW / 2, carY - carH / 2, glowSize
    );
    glow.addColorStop(0, `rgba(255, ${Math.floor(180 - melt * 130)}, 0, ${melt * 0.45})`);
    glow.addColorStop(1, 'rgba(255, 80, 0, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(carX + carW / 2, carY - carH / 2, glowSize, 0, Math.PI * 2);
    ctx.fill();
  }

  // Puddle beneath car
  if (melt > 0.2) {
    const pp = (melt - 0.2) / 0.8;
    ctx.fillStyle = `rgba(30, 8, 3, ${(0.4 + pp * 0.5).toFixed(2)})`;
    ctx.beginPath();
    ctx.ellipse(carX + carW / 2, carY + 3, carW * 0.3 + pp * carW * 0.6, 2 + pp * 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Melt deformation — squish down, spread out
  if (melt > 0) {
    const sy = 1 - melt * 0.82;
    const sx = 1 + melt * 0.5;
    ctx.translate(carX + carW / 2, carY);
    ctx.scale(sx, sy);
    ctx.translate(-(carX + carW / 2), -carY);
  }

  // Color interpolation: body heats from dark to red-orange
  const br = Math.floor(17 + melt * 190);
  const bg = Math.floor(17 + melt * 40);
  const bb = Math.floor(17 - melt * 17);
  const bodyColor = `rgb(${br}, ${bg}, ${bb})`;
  const cr = Math.floor(42 + melt * 170);
  const cg = Math.floor(42 + melt * 20);
  const cb = Math.floor(58 - melt * 58);
  const cabColor = `rgb(${cr}, ${cg}, ${cb})`;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(carX + carW / 2, GROUND_Y + 2, carW / 2 + 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.moveTo(carX, carY);
  ctx.lineTo(carX, carY - carH);
  ctx.lineTo(carX + 10, carY - carH - 5);
  ctx.lineTo(carX + carW - 10, carY - carH - 5);
  ctx.lineTo(carX + carW, carY - carH);
  ctx.lineTo(carX + carW, carY);
  ctx.closePath();
  ctx.fill();

  // Cabin
  ctx.fillStyle = cabColor;
  ctx.beginPath();
  ctx.moveTo(cabinX, cabinY + cabinH);
  ctx.lineTo(cabinX + 8, cabinY);
  ctx.lineTo(cabinX + cabinW - 8, cabinY);
  ctx.lineTo(cabinX + cabinW, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  // Windows (fade out as car melts)
  const wa = Math.max(0, 1 - melt * 2.5);

  ctx.fillStyle = `rgba(100, 150, 200, ${(0.3 * wa).toFixed(3)})`;
  ctx.beginPath();
  ctx.moveTo(cabinX + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW / 2 - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = `rgba(100, 150, 200, ${(0.25 * wa).toFixed(3)})`;
  ctx.beginPath();
  ctx.moveTo(cabinX + cabinW / 2 + 2, cabinY + cabinH);
  ctx.lineTo(cabinX + cabinW / 2 + 2, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 10, cabinY + 2);
  ctx.lineTo(cabinX + cabinW - 2, cabinY + cabinH);
  ctx.closePath();
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.arc(carX + 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + carW - 25, carY, 5, 0, Math.PI * 2);
  ctx.fill();

  // Headlight
  ctx.fillStyle = '#ff6';
  ctx.beginPath();
  ctx.ellipse(carX + carW, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Taillight
  ctx.fillStyle = '#e33';
  ctx.beginPath();
  ctx.ellipse(carX, carY - carH + 8, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body line
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(carX + 5, carY - carH / 2);
  ctx.lineTo(carX + carW - 5, carY - carH / 2);
  ctx.stroke();

  ctx.restore();
}

function getRayStarts(dx, dy) {
  const perpX = -dy;
  const perpY = dx;
  const spacing = 28;
  const ps = [0, W * perpX, H * perpY, W * perpX + H * perpY];
  const pMin = Math.min(...ps) - spacing;
  const pMax = Math.max(...ps) + spacing;
  const starts = [];
  for (let p = Math.ceil(pMin / spacing) * spacing; p <= pMax; p += spacing) {
    let ex, ey;
    if (dy > 1e-10) {
      const x = -p / dy;
      if (x >= -1 && x <= W + 1) { ex = x; ey = 0; }
    }
    if (ex === undefined && dx > 1e-10) {
      const y = p / dx;
      if (y >= -1 && y <= H + 1) { ex = 0; ey = y; }
    }
    if (ex === undefined) continue;
    starts.push([ex - dx * 5, ey - dy * 5]);
  }
  return starts;
}

function drawRays(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  const allTraced = [];
  for (const [sx, sy] of getRayStarts(dx, dy)) {
    allTraced.push(traceRay(sx, sy, dx, dy, allSurfaces));
  }

  ctx.lineWidth = 1.5;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 235, 59, 0.55)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }

  ctx.lineWidth = 2;
  for (const segs of allTraced) {
    for (const seg of segs) {
      if (!seg.reflected) continue;
      ctx.strokeStyle = 'rgba(255, 245, 100, 0.8)';
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
    }
  }
}

function drawGlowSpots(angleDeg, allSurfaces) {
  const angleRad = angleDeg * Math.PI / 180;
  const dx = Math.cos(angleRad);
  const dy = Math.sin(angleRad);

  for (const [sx, sy] of getRayStarts(dx, dy)) {
    const segs = traceRay(sx, sy, dx, dy, allSurfaces);

    for (let s = 0; s < segs.length; s++) {
      const seg = segs[s];
      if (seg.reflected && s === segs.length - 1) {
        const gx = seg.x2;
        const gy = seg.y2;
        if (gx > -10 && gx < W + 10 && gy > -10 && gy < H + 10) {
          const glow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 12);
          glow.addColorStop(0, 'rgba(255, 255, 180, 0.5)');
          glow.addColorStop(1, 'rgba(255, 255, 180, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(gx, gy, 12, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
}

function draw() {
  if (animFrameId) {
    cancelAnimationFrame(animFrameId);
    animFrameId = null;
  }

  const angleDeg = parseFloat(angleSlider.value);
  const curveFrac = parseFloat(curveSlider.value) / 100;
  const bow = maxBow * curveFrac;

  const allSurfaces = getCurveSurfaces(bow);

  // Count reflected rays hitting the car
  const carHits = countCarHits(angleDeg, allSurfaces);
  const shouldMelt = carHits >= 10;

  if (shouldMelt && meltProgress < 1) {
    meltProgress = Math.min(1, meltProgress + 0.025);
  } else if (!shouldMelt && meltProgress > 0) {
    meltProgress = Math.max(0, meltProgress - 0.025);
  }

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, 348, 400);
  ctx.setTransform(0.8, 0, 0, 0.8, 0, 0);
  drawSky();
  drawGround();
  drawGlowSpots(angleDeg, allSurfaces);
  drawRays(angleDeg, allSurfaces);
  drawBuilding(bow);
  drawCar(meltProgress);

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(angleDeg + '° from horizontal', W - 12, H - 10);
  ctx.textAlign = 'left';

  // Continue animating while melt is transitioning
  const needsAnim = (shouldMelt && meltProgress < 1) || (!shouldMelt && meltProgress > 0);
  if (needsAnim) {
    animFrameId = requestAnimationFrame(draw);
  }
}

angleSlider.addEventListener('input', draw);
curveSlider.addEventListener('input', draw);

draw();

window.addEventListener('load', () => {
  window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
});
</script>
</body>
