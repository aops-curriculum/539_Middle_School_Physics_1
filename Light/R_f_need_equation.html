<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concave Mirror – Radius &amp; Focal Length</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  max-width: 600px;
  margin: 0 auto;
  background: #1a1a2e;
  font-family: Arial, sans-serif;
  user-select: none;
  -webkit-user-select: none;
  color: #fff;
  padding: 2px 0 4px 0;
}
.slider-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 2px 0;
}
.slider-label {
  font-size: 14px;
}
.slider-row input[type=range] {
  width: 220px;
  accent-color: #3498db;
  cursor: pointer;
}
.val-box {
  display: inline-block;
  border: 2px solid #fff;
  border-radius: 4px;
  padding: 1px 7px;
  margin: 0 2px;
}
.caption-line {
  text-align: center;
  font-size: 15px;
  margin: 4px 0 2px 0;
  white-space: nowrap;
}
canvas {
  display: block;
  margin: 6px auto 0 auto;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: default;
}
</style>
</head>
<body>

<div class="slider-row">
  <span class="slider-label">Drag to change <i>R</i></span>
  <input type="range" id="rSlider" min="20" max="120" value="60" step="1">
</div>
<div id="caption" class="caption-line"></div>

<canvas id="canvas" width="600" height="260"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 260;
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr; canvas.height = H * dpr;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);
const slider = document.getElementById('rSlider');
const captionEl = document.getElementById('caption');

const SCALE = 2.8;
const SCALE_BAR_CM = 10;

function getR() { return parseFloat(slider.value); }

function updateCaption() {
  const R = getR();
  const f = (R / 2).toFixed(0);
  const Rstr = R.toFixed(0);
  captionEl.innerHTML =
    'Radius of Curvature: <span class="val-box"><i>R</i>&nbsp;=&nbsp;' + Rstr + '&nbsp;cm</span>' +
    '&nbsp;&nbsp;&nbsp;&nbsp;Focal Length: <span class="val-box"><i>f</i>&nbsp;=&nbsp;' + f + '&nbsp;cm</span>';
}

function drawArrowhead(ctx, x, y, angle, len) {
  len = len || 10;
  const a = Math.PI / 6;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - len * Math.cos(angle - a), y - len * Math.sin(angle - a));
  ctx.moveTo(x, y);
  ctx.lineTo(x - len * Math.cos(angle + a), y - len * Math.sin(angle + a));
  ctx.stroke();
}

function draw() {
  const R_cm = getR();
  const f_cm = R_cm / 2;
  const R_px = R_cm * SCALE;
  const f_px = f_cm * SCALE;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  const mirrorVx = W - 80;
  const axisY = H / 2 - 10;
  const Cx = mirrorVx - R_px;
  const Fx = mirrorVx - f_px;

  // --- Optical axis ---
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 6]);
  ctx.beginPath();
  ctx.moveTo(20, axisY);
  ctx.lineTo(W - 20, axisY);
  ctx.stroke();
  ctx.setLineDash([]);

  // --- Dashed circle for the full sphere ---
  ctx.strokeStyle = 'rgba(52,152,219,0.35)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.arc(Cx, axisY, R_px, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // --- Draw concave mirror arc (40 degrees) ---
  const halfAngle = (40 / 2) * Math.PI / 180;
  const arcStart = -halfAngle;
  const arcEnd = halfAngle;
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.arc(Cx, axisY, R_px, arcStart, arcEnd);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(Cx, axisY, R_px - 3, arcStart * 0.7, arcEnd * 0.7);
  ctx.stroke();

  // --- Parallel rays reflecting to focal point ---
  const numRays = 5;
  const maxY = R_px * Math.sin(halfAngle);
  for (let i = 0; i < numRays; i++) {
    const t = (i / (numRays - 1)) * 2 - 1;
    const rayY_offset = t * maxY * 0.9;
    const rayY = axisY + rayY_offset;

    const dy = rayY - axisY;
    const dxSq = R_px * R_px - dy * dy;
    if (dxSq < 0) continue;
    const hitX = Cx + Math.sqrt(dxSq);
    const hitY = rayY;

    const angleAtHit = Math.atan2(hitY - axisY, hitX - Cx);
    if (Math.abs(angleAtHit) > halfAngle) continue;

    ctx.strokeStyle = 'rgba(231,76,60,0.8)';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(20, rayY);
    ctx.lineTo(hitX, hitY);
    ctx.stroke();

    const arrX = hitX - 30;
    drawArrowhead(ctx, arrX, rayY, 0, 10);

    const nx = Cx - hitX;
    const ny = axisY - hitY;
    const nLen = Math.sqrt(nx * nx + ny * ny);
    const nnx = nx / nLen;
    const nny = ny / nLen;

    const dot = 1 * nnx + 0 * nny;
    const rx = 1 - 2 * dot * nnx;
    const ry = 0 - 2 * dot * nny;

    const reflectLen = R_px * 1.2;
    ctx.strokeStyle = 'rgba(231,76,60,0.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(hitX, hitY);
    ctx.lineTo(hitX + rx * reflectLen, hitY + ry * reflectLen);
    ctx.stroke();
  }

  // --- Mark center of curvature C ---
  ctx.fillStyle = '#3498db';
  ctx.beginPath();
  ctx.arc(Cx, axisY, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#3498db';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('C', Cx, axisY + 18);

  // --- Mark focal point F ---
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(Fx, axisY, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('F', Fx, axisY + 18);

  // --- Mark vertex V ---
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.arc(mirrorVx, axisY, 3, 0, Math.PI * 2);
  ctx.fill();

  // --- Dynamic f label (bracket from F to V) ---
  const labelY_f = axisY + 36;
  ctx.strokeStyle = '#e74c3c';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(Fx, labelY_f);
  ctx.lineTo(mirrorVx, labelY_f);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(Fx, labelY_f - 4);
  ctx.lineTo(Fx, labelY_f + 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mirrorVx, labelY_f - 4);
  ctx.lineTo(mirrorVx, labelY_f + 4);
  ctx.stroke();
  ctx.fillStyle = '#e74c3c';
  const fLabel = 'f = ' + f_cm.toFixed(0) + ' cm';
  const fLabelSize = Math.min(14, Math.max(10, f_px * 0.09));
  ctx.font = 'bold ' + fLabelSize.toFixed(0) + 'px Arial';
  ctx.textAlign = 'center';
  const fMidX = (Fx + mirrorVx) / 2;
  if (f_px > 50) {
    ctx.fillText(fLabel, fMidX, labelY_f - 6);
  } else {
    ctx.fillText(fLabel, fMidX, labelY_f + 18);
  }

  // --- Dynamic R label (bracket from C to V) ---
  const labelY_R = axisY + 58;
  ctx.strokeStyle = '#3498db';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(Cx, labelY_R);
  ctx.lineTo(mirrorVx, labelY_R);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(Cx, labelY_R - 4);
  ctx.lineTo(Cx, labelY_R + 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mirrorVx, labelY_R - 4);
  ctx.lineTo(mirrorVx, labelY_R + 4);
  ctx.stroke();
  ctx.fillStyle = '#3498db';
  const rLabel = 'R = ' + R_cm.toFixed(0) + ' cm';
  const rLabelSize = Math.min(14, Math.max(10, R_px * 0.05));
  ctx.font = 'bold ' + rLabelSize.toFixed(0) + 'px Arial';
  ctx.textAlign = 'center';
  const rMidX = (Cx + mirrorVx) / 2;
  if (R_px > 90) {
    ctx.fillText(rLabel, rMidX, labelY_R - 6);
  } else {
    ctx.fillText(rLabel, rMidX, labelY_R + 18);
  }

  // --- Scale bar ---
  const scaleLen = SCALE_BAR_CM * SCALE;
  const scaleX = 30;
  const scaleY = H - 8;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(scaleX, scaleY);
  ctx.lineTo(scaleX + scaleLen, scaleY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(scaleX, scaleY - 5);
  ctx.lineTo(scaleX, scaleY + 5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(scaleX + scaleLen, scaleY - 5);
  ctx.lineTo(scaleX + scaleLen, scaleY + 5);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(SCALE_BAR_CM + ' cm', scaleX + scaleLen / 2, scaleY - 8);
}

function update() {
  updateCaption();
  draw();
}

slider.addEventListener('input', update);
update();

window.addEventListener('load', () => {
  window.parent.postMessage({ type: 'resize', height: document.body.scrollHeight }, '*');
});
</script>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
