<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Demonstration</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
        }
        
        #canvasWrapper {
            position: relative;
            display: inline-block;
        }
        
        canvas {
            background-color: #87CEEB;
            display: block;
        }
        
        #controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        
        #angleSlider {
            width: 200px;
        }
        
        label {
            font-weight: bold;
            color: #333;
        }
        
        #angleValue {
            font-weight: normal;
            color: #666;
            min-width: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvasWrapper">
            <canvas id="shadowCanvas"></canvas>
            <div id="controls">
                <label for="angleSlider">Light Angle:</label>
                <input type="range" id="angleSlider" min="-60" max="60" value="0" step="1">
                <span id="angleValue">0°</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('shadowCanvas');
        const ctx = canvas.getContext('2d');
        const angleSlider = document.getElementById('angleSlider');
        const angleValue = document.getElementById('angleValue');

        let logW, logH;

        // Responsive canvas sizing
        function resizeCanvas() {
            const container = document.getElementById('container');
            const maxWidth = container.clientWidth;
            const maxHeight = container.clientHeight;

            const dpr = window.devicePixelRatio || 1;
            logW = maxWidth;
            logH = maxHeight;
            canvas.width = logW * dpr;
            canvas.height = logH * dpr;
            canvas.style.width = logW + 'px';
            canvas.style.height = logH + 'px';
            ctx.scale(dpr, dpr);

            draw();
        }

        // Table properties (relative to canvas size)
        function getTableProps() {
            const groundY = logH * 0.7;
            return {
                width: logW * 0.2,
                height: logW * 0.015,
                legWidth: logW * 0.02,
                legHeight: logH * 0.15,
                x: logW * 0.5,
                y: groundY // Table bottom touches ground
            };
        }

        function draw() {
            const table = getTableProps();
            const groundY = table.y;
            const angle = parseFloat(angleSlider.value);
            const angleRad = (angle * Math.PI) / 180;
            
            // Clear canvas
            ctx.clearRect(0, 0, logW, logH);

            // Draw ground first (light green)
            ctx.fillStyle = '#5a8c5a';
            ctx.fillRect(0, groundY, logW, logH - groundY);
            
            // Calculate shadow boundaries
            const tableTopY = table.y - table.legHeight - table.height;
            const tableLeftX = table.x - table.width/2;
            const tableRightX = table.x + table.width/2;
            
            // Calculate where edge rays hit the ground
            let shadowLeftX, shadowRightX;
            
            if (angle !== 0) {
                // Calculate based on ray continuation
                const rayDirX = Math.sin(angleRad);
                const rayDirY = Math.cos(angleRad);
                const rayGroundDist = (groundY - tableTopY) / rayDirY;
                
                shadowLeftX = tableLeftX + rayDirX * rayGroundDist;
                shadowRightX = tableRightX + rayDirX * rayGroundDist;
            } else {
                // Light from directly above
                shadowLeftX = tableLeftX;
                shadowRightX = tableRightX;
            }
            
            // Draw shadow (darker green)
            ctx.fillStyle = '#2d5a2d';
            ctx.fillRect(
                shadowLeftX,
                groundY,
                shadowRightX - shadowLeftX,
                logH - groundY
            );
            
            // Draw ground line
            ctx.strokeStyle = '#4a7c4a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(logW, groundY);
            ctx.stroke();
            
            // Draw regular light rays
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 5]);
            
            const raySpacing = 30;
            // Calculate extra rays needed based on angle
            const extraWidth = Math.abs(Math.tan(angleRad)) * logH;
            const totalWidth = logW + extraWidth * 2;
            const numRays = Math.ceil(totalWidth / raySpacing) + 5;
            const startX = -totalWidth/2;
            
            for (let i = 0; i < numRays; i++) {
                const rayX = startX + i * raySpacing;
                const rayStartY = 0;
                const rayStartX = rayX - Math.tan(angleRad) * logH;

                ctx.beginPath();
                ctx.moveTo(rayStartX, rayStartY);

                // Calculate where ray intersects with table or ground
                let endX = rayStartX + Math.sin(angleRad) * logH * 2;
                let endY = rayStartY + Math.cos(angleRad) * logH * 2;
                
                // Check intersection with table top
                const rayAtTableY = rayStartX + (tableTopY - rayStartY) * Math.tan(angleRad);
                
                if (rayAtTableY > tableLeftX && rayAtTableY < tableRightX && endY > tableTopY) {
                    endX = rayAtTableY;
                    endY = tableTopY;
                } else if (endY > groundY) {
                    // Ray hits ground
                    const t = (groundY - rayStartY) / (endY - rayStartY);
                    endX = rayStartX + t * (endX - rayStartX);
                    endY = groundY;
                }
                
                ctx.lineTo(endX, endY);
                ctx.stroke();
            }
            
            // Draw edge-grazing rays (thicker and brighter)
            ctx.strokeStyle = '#FFFF00';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([]);
            
            // Calculate ray direction vector
            const rayDirX = Math.sin(angleRad);
            const rayDirY = Math.cos(angleRad);
            
            // Left edge ray
            ctx.beginPath();
            const leftRayStartY = 0;
            const leftRayStartX = tableLeftX - Math.tan(angleRad) * tableTopY;
            ctx.moveTo(leftRayStartX, leftRayStartY);
            ctx.lineTo(tableLeftX, tableTopY);
            
            // Continue ray from table edge to ground at same angle
            const leftRayGroundDist = (groundY - tableTopY) / rayDirY;
            const leftRayGroundX = tableLeftX + rayDirX * leftRayGroundDist;
            ctx.lineTo(leftRayGroundX, groundY);
            ctx.stroke();
            
            // Right edge ray
            ctx.beginPath();
            const rightRayStartY = 0;
            const rightRayStartX = tableRightX - Math.tan(angleRad) * tableTopY;
            ctx.moveTo(rightRayStartX, rightRayStartY);
            ctx.lineTo(tableRightX, tableTopY);
            
            // Continue ray from table edge to ground at same angle
            const rightRayGroundDist = (groundY - tableTopY) / rayDirY;
            const rightRayGroundX = tableRightX + rayDirX * rightRayGroundDist;
            ctx.lineTo(rightRayGroundX, groundY);
            ctx.stroke();
            
            ctx.setLineDash([]);
            
            // Draw table
            // Table top
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(
                table.x - table.width/2,
                table.y - table.legHeight - table.height,
                table.width,
                table.height
            );
            
            // Table leg
            ctx.fillRect(
                table.x - table.legWidth/2,
                table.y - table.legHeight,
                table.legWidth,
                table.legHeight
            );
            
            // Table edge highlights
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 2;
            ctx.strokeRect(
                table.x - table.width/2,
                table.y - table.legHeight - table.height,
                table.width,
                table.height
            );
            ctx.strokeRect(
                table.x - table.legWidth/2,
                table.y - table.legHeight,
                table.legWidth,
                table.legHeight
            );
        }

        // Event listeners
        angleSlider.addEventListener('input', (e) => {
            angleValue.textContent = `${e.target.value}°`;
            draw();
        });

        window.addEventListener('resize', resizeCanvas);

        // Initial setup
        resizeCanvas();
    </script>
<script>
// EigenNode auto-height v2.3
(function() {
  // 4px buffer for subpixel rounding + parent's >=3px noise threshold.
  // 18px extra when horizontal overflow forces a scrollbar (eats vertical
  // space — common in AoPS classroom where iframe column is < 600px content).
  var BUFFER = 4;
  var H_SCROLLBAR = 18;
  function measure() {
    var b = document.body, h = document.documentElement;
    if (!b) return 0;
    var max = Math.max(b.scrollHeight||0, b.offsetHeight||0, (h&&h.scrollHeight)||0, (h&&h.offsetHeight)||0);
    // If body is sized to viewport (height:100vh), scrollHeight just echoes
    // the iframe's height. Recover real content extent from children's bbox.
    var minTop = 0, maxBot = 0, br = b.getBoundingClientRect();
    for (var i = 0; i < b.children.length; i++) {
      var r = b.children[i].getBoundingClientRect();
      var top = r.top - br.top, bot = top + r.height;
      if (top < minTop) minTop = top;
      if (bot > maxBot) maxBot = bot;
    }
    var span = maxBot - minTop;
    if (span > max) max = span;
    // Check documentElement only — that's the element that owns the iframe's
    // horizontal scrollbar. Body can be narrower than iframe and have its own
    // 1-2px overflow that doesn't actually trigger a scrollbar.
    var hOverflow = h && (h.scrollWidth - h.clientWidth) >= 4;
    return Math.ceil(max) + BUFFER + (hOverflow ? H_SCROLLBAR : 0);
  }
  var last = 0;
  function report() {
    var h = measure();
    if (h > 0 && Math.abs(h - last) >= 2) {
      last = h;
      window.parent.postMessage({ type: 'resize', height: h }, '*');
    }
  }
  window.addEventListener('load', report);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(report);
  if (window.ResizeObserver && document.body) new ResizeObserver(report).observe(document.body);
})();
</script>
</body>
</html>
