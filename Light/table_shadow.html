<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="eigennode-aspect" content="8/5">
    <title>Shadow Demonstration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        #container {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* The wrapper carries the aspect + size cap so the absolute-positioned
           controls track the canvas box exactly. The canvas fills it. */
        #canvasWrapper {
            position: relative;
            aspect-ratio: 800 / 500;
            max-width: 100%;
            max-height: 100%;
        }

        canvas {
            background-color: #87CEEB;
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        
        #angleSlider {
            width: 200px;
        }
        
        label {
            font-weight: bold;
            color: #333;
        }
        
        #angleValue {
            font-weight: normal;
            color: #666;
            min-width: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvasWrapper">
            <canvas id="shadowCanvas" width="800" height="500"></canvas>
            <div id="controls">
                <label for="angleSlider">Light Angle:</label>
                <input type="range" id="angleSlider" min="-60" max="60" value="0" step="1">
                <span id="angleValue">0°</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('shadowCanvas');
        const ctx = canvas.getContext('2d');
        const angleSlider = document.getElementById('angleSlider');
        const angleValue = document.getElementById('angleValue');

        // Logical design size; the drawing code stays untouched and scales to
        // fit via fit()'s base transform + the wrapper's CSS aspect-ratio.
        const W = 800, H = 500;
        let logW = W, logH = H;

        // fit() owns the base transform: backing store = the canvas's rendered
        // size * dpr (crisp), logical W x H mapped onto it. The wrapper keeps
        // the aspect via CSS, so the mapping never distorts.
        function fit() {
            const dpr = window.devicePixelRatio || 1;
            const cw = canvas.clientWidth, ch = canvas.clientHeight;
            if (!cw || !ch) return;
            canvas.width = Math.round(cw * dpr);
            canvas.height = Math.round(ch * dpr);
            ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
            draw();
        }

        // Table properties (relative to canvas size)
        function getTableProps() {
            const groundY = logH * 0.7;
            return {
                width: logW * 0.2,
                height: logW * 0.015,
                legWidth: logW * 0.02,
                legHeight: logH * 0.15,
                x: logW * 0.5,
                y: groundY // Table bottom touches ground
            };
        }

        function draw() {
            const table = getTableProps();
            const groundY = table.y;
            const angle = parseFloat(angleSlider.value);
            const angleRad = (angle * Math.PI) / 180;
            
            // Clear canvas
            ctx.clearRect(0, 0, logW, logH);

            // Draw ground first (light green)
            ctx.fillStyle = '#5a8c5a';
            ctx.fillRect(0, groundY, logW, logH - groundY);
            
            // Calculate shadow boundaries
            const tableTopY = table.y - table.legHeight - table.height;
            const tableLeftX = table.x - table.width/2;
            const tableRightX = table.x + table.width/2;
            
            // Calculate where edge rays hit the ground
            let shadowLeftX, shadowRightX;
            
            if (angle !== 0) {
                // Calculate based on ray continuation
                const rayDirX = Math.sin(angleRad);
                const rayDirY = Math.cos(angleRad);
                const rayGroundDist = (groundY - tableTopY) / rayDirY;
                
                shadowLeftX = tableLeftX + rayDirX * rayGroundDist;
                shadowRightX = tableRightX + rayDirX * rayGroundDist;
            } else {
                // Light from directly above
                shadowLeftX = tableLeftX;
                shadowRightX = tableRightX;
            }
            
            // Draw shadow (darker green)
            ctx.fillStyle = '#2d5a2d';
            ctx.fillRect(
                shadowLeftX,
                groundY,
                shadowRightX - shadowLeftX,
                logH - groundY
            );
            
            // Draw ground line
            ctx.strokeStyle = '#4a7c4a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(logW, groundY);
            ctx.stroke();
            
            // Draw regular light rays
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 5]);
            
            const raySpacing = 30;
            // Calculate extra rays needed based on angle
            const extraWidth = Math.abs(Math.tan(angleRad)) * logH;
            const totalWidth = logW + extraWidth * 2;
            const numRays = Math.ceil(totalWidth / raySpacing) + 5;
            const startX = -totalWidth/2;
            
            for (let i = 0; i < numRays; i++) {
                const rayX = startX + i * raySpacing;
                const rayStartY = 0;
                const rayStartX = rayX - Math.tan(angleRad) * logH;

                ctx.beginPath();
                ctx.moveTo(rayStartX, rayStartY);

                // Calculate where ray intersects with table or ground
                let endX = rayStartX + Math.sin(angleRad) * logH * 2;
                let endY = rayStartY + Math.cos(angleRad) * logH * 2;
                
                // Check intersection with table top
                const rayAtTableY = rayStartX + (tableTopY - rayStartY) * Math.tan(angleRad);
                
                if (rayAtTableY > tableLeftX && rayAtTableY < tableRightX && endY > tableTopY) {
                    endX = rayAtTableY;
                    endY = tableTopY;
                } else if (endY > groundY) {
                    // Ray hits ground
                    const t = (groundY - rayStartY) / (endY - rayStartY);
                    endX = rayStartX + t * (endX - rayStartX);
                    endY = groundY;
                }
                
                ctx.lineTo(endX, endY);
                ctx.stroke();
            }
            
            // Draw edge-grazing rays (thicker and brighter)
            ctx.strokeStyle = '#FFFF00';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([]);
            
            // Calculate ray direction vector
            const rayDirX = Math.sin(angleRad);
            const rayDirY = Math.cos(angleRad);
            
            // Left edge ray
            ctx.beginPath();
            const leftRayStartY = 0;
            const leftRayStartX = tableLeftX - Math.tan(angleRad) * tableTopY;
            ctx.moveTo(leftRayStartX, leftRayStartY);
            ctx.lineTo(tableLeftX, tableTopY);
            
            // Continue ray from table edge to ground at same angle
            const leftRayGroundDist = (groundY - tableTopY) / rayDirY;
            const leftRayGroundX = tableLeftX + rayDirX * leftRayGroundDist;
            ctx.lineTo(leftRayGroundX, groundY);
            ctx.stroke();
            
            // Right edge ray
            ctx.beginPath();
            const rightRayStartY = 0;
            const rightRayStartX = tableRightX - Math.tan(angleRad) * tableTopY;
            ctx.moveTo(rightRayStartX, rightRayStartY);
            ctx.lineTo(tableRightX, tableTopY);
            
            // Continue ray from table edge to ground at same angle
            const rightRayGroundDist = (groundY - tableTopY) / rayDirY;
            const rightRayGroundX = tableRightX + rayDirX * rightRayGroundDist;
            ctx.lineTo(rightRayGroundX, groundY);
            ctx.stroke();
            
            ctx.setLineDash([]);
            
            // Draw table
            // Table top
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(
                table.x - table.width/2,
                table.y - table.legHeight - table.height,
                table.width,
                table.height
            );
            
            // Table leg
            ctx.fillRect(
                table.x - table.legWidth/2,
                table.y - table.legHeight,
                table.legWidth,
                table.legHeight
            );
            
            // Table edge highlights
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 2;
            ctx.strokeRect(
                table.x - table.width/2,
                table.y - table.legHeight - table.height,
                table.width,
                table.height
            );
            ctx.strokeRect(
                table.x - table.legWidth/2,
                table.y - table.legHeight,
                table.legWidth,
                table.legHeight
            );
        }

        // Event listeners
        angleSlider.addEventListener('input', (e) => {
            angleValue.textContent = `${e.target.value}°`;
            draw();
        });

        // Initial setup
        new ResizeObserver(fit).observe(canvas);
        fit();
    </script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
