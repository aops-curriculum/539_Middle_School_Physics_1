<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="eigennode-aspect" content="12/7">
<title>Haibao Mirror Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    position: relative;
    font-family: Arial, sans-serif;
    background: #fff;
  }
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
  }
  #warning {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 1;
    pointer-events: none;
    padding: 8px 12px;
    font-size: 13px;
    color: #b00;
    background: #fff3f3;
    border-top: 1px solid #fcc;
    display: none;
  }
</style>
</head>
<body>
<canvas id="canvas" width="600" height="350"></canvas>
<div id="warning"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const warningEl = document.getElementById('warning');

const CW = 600, CH = 350; // logical design grid (matches eigennode-aspect 12/7)
function fit() {
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  if (!cw || !ch) return;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  ctx.setTransform(canvas.width / CW, 0, 0, canvas.height / CH, 0, 0);
  drawScene();
}

// --- Style constants ---
const BROWN = '#8B4513';
const LABEL_FONT = 'bold 17px Arial';

// --- Coordinate system ---
const SCALE = 6;

// Physical measurements in cm
const STUFFIE_HEIGHT = 56;
const MIRROR_HEIGHT = 17;
const MIRROR_BOTTOM = 28;
const MIRROR_TOP = 45;
const DISTANCE = 50;

// Layout — ground positioned so Haibao's head reaches near the top
const GROUND_Y_PX = 340;
const STUFFIE_TOP_Y = GROUND_Y_PX - STUFFIE_HEIGHT * SCALE; // = 4

const IMG_ASPECT = 0.528;
let imgAspect = IMG_ASPECT;

const ARROW_LEFT_X = 22;
const STUFFIE_CENTER_X = 138;

const MIRROR_X = STUFFIE_CENTER_X + DISTANCE * SCALE;
const ARROW_RIGHT_X = MIRROR_X + 25;

// Convert cm height to canvas y
function cmToY(cm) {
  return GROUND_Y_PX - cm * SCALE;
}

// Convert canvas y to cm height
function yToCm(y) {
  return (GROUND_Y_PX - y) / SCALE;
}

// --- Magnifier ---
const MAG_RADIUS = 50;
const MAG_ZOOM = 3;

// --- UI hit regions (in CSS coords) ---
const RESET_BTN = { x: 525, y: 6, w: 60, h: 24 };

// --- Image loading ---
const stuffieImg = new Image();
let imgLoaded = false;
let transparentCanvas = null;

stuffieImg.onload = () => {
  imgLoaded = true;
  imgAspect = stuffieImg.width / stuffieImg.height;
  makeTransparent();
  drawScene();
};
stuffieImg.onerror = () => {
  if (stuffieImg.src.endsWith('.jpg')) {
    stuffieImg.src = 'haibao.png';
  } else if (stuffieImg.src.endsWith('.png')) {
    stuffieImg.src = 'haibao.jpg';
  } else {
    imgLoaded = false;
    drawScene();
  }
};
stuffieImg.src = 'haibao.jpg';

function makeTransparent() {
  const tc = document.createElement('canvas');
  tc.width = stuffieImg.width;
  tc.height = stuffieImg.height;
  const tctx = tc.getContext('2d');
  tctx.drawImage(stuffieImg, 0, 0);
  const imageData = tctx.getImageData(0, 0, tc.width, tc.height);
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i] > 230 && d[i+1] > 230 && d[i+2] > 230) {
      d[i+3] = 0;
    }
  }
  tctx.putImageData(imageData, 0, 0);
  transparentCanvas = tc;
}

// --- State ---
let state = 'waiting_first';
let firstClick = null;
let secondClick = null;
let mousePos = null;
let dragStart = null;
let isDragging = false;
let suppressClick = false;
const DRAG_THRESHOLD = 10;
let hoveringReset = false;

// --- Drawing ---
function drawScene() {
  ctx.clearRect(0, 0, CW, CH);

  // Ground line - thick
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(10, GROUND_Y_PX);
  ctx.lineTo(530, GROUND_Y_PX);
  ctx.stroke();

  drawStuffie();
  drawMirror();
  drawDimensionArrows();

  // Dashed line through second click
  if (state === 'done' && secondClick) {
    drawDashedLine();
    drawAngleArc();
    drawHeightArrow();
  }

  // Ray arrow
  if (isDragging && dragStart && mousePos) {
    drawArrow(mousePos.x, mousePos.y, dragStart.x, dragStart.y, '#e00', 2.5);
  } else if (state === 'waiting_second' && firstClick && mousePos) {
    drawArrow(mousePos.x, mousePos.y, firstClick.x, firstClick.y, '#e00', 2.5);
  } else if (state === 'done' && firstClick && secondClick) {
    drawArrow(secondClick.x, secondClick.y, firstClick.x, firstClick.y, '#e00', 2.5);
  }

  // --- On-canvas UI elements ---
  drawInstruction();
  drawInfoText();
  drawResetButton();
  drawCursorCrosshair();
  drawMagnifier();
}

function drawInstruction() {
  let text = '';
  if (state === 'waiting_first') {
    text = 'Click the point where your ray ends.';
  } else if (state === 'waiting_second') {
    text = 'Click the point where your ray begins.';
  }
  if (!text) return;

  ctx.font = '14px Arial';
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(text, 200, 14);
  ctx.textBaseline = 'alphabetic';
}

function drawInfoText() {
  if (state !== 'done' || !secondClick) return;

  const heightCm = yToCm(secondClick.y);
  const dx = firstClick.x - secondClick.x;
  const dy = firstClick.y - secondClick.y;
  const angleDeg = Math.abs(Math.atan2(Math.abs(dy), Math.abs(dx))) * 180 / Math.PI;

  const line1 = 'height of normal = ' + heightCm.toFixed(1) + ' cm';
  const line2 = 'angle of reflection = ' + angleDeg.toFixed(1) + '\u00B0';

  ctx.font = '13px monospace';
  ctx.fillStyle = '#333';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(line1, 300, GROUND_Y_PX - 40);
  ctx.fillText(line2, 300, GROUND_Y_PX - 22);
}

function drawResetButton() {
  const b = RESET_BTN;
  ctx.fillStyle = hoveringReset ? '#e0e0e0' : '#fff';
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;

  // Rounded rect
  const r = 4;
  ctx.beginPath();
  ctx.moveTo(b.x + r, b.y);
  ctx.lineTo(b.x + b.w - r, b.y);
  ctx.arcTo(b.x + b.w, b.y, b.x + b.w, b.y + r, r);
  ctx.lineTo(b.x + b.w, b.y + b.h - r);
  ctx.arcTo(b.x + b.w, b.y + b.h, b.x + b.w - r, b.y + b.h, r);
  ctx.lineTo(b.x + r, b.y + b.h);
  ctx.arcTo(b.x, b.y + b.h, b.x, b.y + b.h - r, r);
  ctx.lineTo(b.x, b.y + r);
  ctx.arcTo(b.x, b.y, b.x + r, b.y, r);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.font = '14px Arial';
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Reset', b.x + b.w / 2, b.y + b.h / 2);
  ctx.textBaseline = 'alphabetic';
}

function drawCursorCrosshair() {
  if (!mousePos) return;
  if (state === 'done') return;

  const mx = mousePos.x;
  const my = mousePos.y;

  // Small crosshair at cursor position
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mx - 10, my);
  ctx.lineTo(mx - 3, my);
  ctx.moveTo(mx + 3, my);
  ctx.lineTo(mx + 10, my);
  ctx.moveTo(mx, my - 10);
  ctx.lineTo(mx, my - 3);
  ctx.moveTo(mx, my + 3);
  ctx.lineTo(mx, my + 10);
  ctx.stroke();
}

function drawMagnifier() {
  if (!mousePos) return;
  // Don't show magnifier when done (results displayed)
  if (state === 'done') return;

  const mx = mousePos.x;
  const my = mousePos.y;

  // Position the magnifier circle offset from cursor
  // Place it to the upper-right unless near edge
  let lx = mx + 65;
  let ly = my - 65;
  if (lx + MAG_RADIUS > CW - 5) lx = mx - 65 - MAG_RADIUS;
  if (ly - MAG_RADIUS < 5) ly = my + 65 + MAG_RADIUS;
  if (lx - MAG_RADIUS < 5) lx = MAG_RADIUS + 5;
  if (ly + MAG_RADIUS > CH - 5) ly = CH - 5 - MAG_RADIUS;

  // Draw scene into offscreen canvas for sampling
  const offCanvas = document.createElement('canvas');
  offCanvas.width = CW;
  offCanvas.height = CH;
  const offCtx = offCanvas.getContext('2d');

  // Draw the main canvas scaled down to CSS size
  offCtx.drawImage(canvas, 0, 0, CW, CH);

  // Extract the region around cursor and draw it zoomed
  const srcR = MAG_RADIUS / MAG_ZOOM;
  const srcX = mx - srcR;
  const srcY = my - srcR;
  const srcSize = srcR * 2;
  const destSize = MAG_RADIUS * 2;

  ctx.save();
  ctx.beginPath();
  ctx.arc(lx, ly, MAG_RADIUS, 0, Math.PI * 2);
  ctx.clip();

  ctx.drawImage(offCanvas, srcX, srcY, srcSize, srcSize, lx - MAG_RADIUS, ly - MAG_RADIUS, destSize, destSize);

  ctx.restore();

  // Crosshair in magnifier center — prominent
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 1;
  // Horizontal
  ctx.beginPath();
  ctx.moveTo(lx - 12, ly);
  ctx.lineTo(lx - 4, ly);
  ctx.moveTo(lx + 4, ly);
  ctx.lineTo(lx + 12, ly);
  // Vertical
  ctx.moveTo(lx, ly - 12);
  ctx.lineTo(lx, ly - 4);
  ctx.moveTo(lx, ly + 4);
  ctx.lineTo(lx, ly + 12);
  ctx.stroke();

  // Center dot
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.arc(lx, ly, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Border ring
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(lx, ly, MAG_RADIUS, 0, Math.PI * 2);
  ctx.stroke();

  // Subtle label
  ctx.font = '10px Arial';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'center';
  ctx.fillText(MAG_ZOOM + '\u00d7', lx, ly + MAG_RADIUS + 12);
}

function drawStuffie() {
  const topY = STUFFIE_TOP_Y;
  const heightPx = GROUND_Y_PX - topY;
  if (transparentCanvas) {
    const drawWidth = heightPx * imgAspect;
    const drawX = STUFFIE_CENTER_X - drawWidth / 2;
    ctx.drawImage(transparentCanvas, drawX, topY, drawWidth, heightPx);
  } else {
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    const w = heightPx * IMG_ASPECT;
    ctx.strokeRect(STUFFIE_CENTER_X - w/2, topY, w, heightPx);
    ctx.setLineDash([]);
    ctx.fillStyle = '#999';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Haibao', STUFFIE_CENTER_X, topY + heightPx / 2);
  }
}

function drawMirror() {
  const mirrorTopY = cmToY(MIRROR_TOP);
  const mirrorBottomY = cmToY(MIRROR_BOTTOM);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(MIRROR_X, mirrorTopY);
  ctx.lineTo(MIRROR_X, mirrorBottomY);
  ctx.stroke();
}

function drawDoubleArrow(x, y1, y2, label) {
  const headLen = 7;
  ctx.strokeStyle = BROWN;
  ctx.fillStyle = BROWN;
  ctx.lineWidth = 1.5;

  // Vertical line
  ctx.beginPath();
  ctx.moveTo(x, y1 + headLen);
  ctx.lineTo(x, y2 - headLen);
  ctx.stroke();

  // Top arrowhead
  ctx.beginPath();
  ctx.moveTo(x, y1);
  ctx.lineTo(x - 4, y1 + headLen);
  ctx.lineTo(x + 4, y1 + headLen);
  ctx.closePath();
  ctx.fill();

  // Bottom arrowhead
  ctx.beginPath();
  ctx.moveTo(x, y2);
  ctx.lineTo(x - 4, y2 - headLen);
  ctx.lineTo(x + 4, y2 - headLen);
  ctx.closePath();
  ctx.fill();

  // Label (rotated)
  ctx.save();
  ctx.translate(x, (y1 + y2) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.font = LABEL_FONT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const tw = ctx.measureText(label).width;
  ctx.fillStyle = '#fff';
  ctx.fillRect(-tw/2 - 3, -10, tw + 6, 20);
  ctx.fillStyle = BROWN;
  ctx.fillText(label, 0, 0);
  ctx.restore();
}

function drawDimensionArrows() {
  // Left: stuffie height 56 cm
  const stuffieTopY = cmToY(STUFFIE_HEIGHT);
  drawDoubleArrow(ARROW_LEFT_X, stuffieTopY, GROUND_Y_PX, '56 cm');

  // Tick marks
  ctx.strokeStyle = BROWN;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ARROW_LEFT_X - 5, stuffieTopY);
  ctx.lineTo(ARROW_LEFT_X + 5, stuffieTopY);
  ctx.moveTo(ARROW_LEFT_X - 5, GROUND_Y_PX);
  ctx.lineTo(ARROW_LEFT_X + 5, GROUND_Y_PX);
  ctx.stroke();

  // Right: mirror height 17 cm
  const mirrorTopY = cmToY(MIRROR_TOP);
  const mirrorBottomY = cmToY(MIRROR_BOTTOM);
  drawDoubleArrow(ARROW_RIGHT_X, mirrorTopY, mirrorBottomY, '17 cm');

  // Tick marks
  ctx.beginPath();
  ctx.moveTo(ARROW_RIGHT_X - 5, mirrorTopY);
  ctx.lineTo(ARROW_RIGHT_X + 5, mirrorTopY);
  ctx.moveTo(ARROW_RIGHT_X - 5, mirrorBottomY);
  ctx.lineTo(ARROW_RIGHT_X + 5, mirrorBottomY);
  ctx.stroke();
}

function drawArrow(fromX, fromY, toX, toY, color, width) {
  const headLen = 12;
  const angle = Math.atan2(toY - fromY, toX - fromX);

  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = width;

  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.lineTo(toX, toY);
  ctx.stroke();

  // Arrowhead at (toX, toY)
  ctx.beginPath();
  ctx.moveTo(toX, toY);
  ctx.lineTo(toX - headLen * Math.cos(angle - 0.35), toY - headLen * Math.sin(angle - 0.35));
  ctx.lineTo(toX - headLen * Math.cos(angle + 0.35), toY - headLen * Math.sin(angle + 0.35));
  ctx.closePath();
  ctx.fill();
}

function drawDashedLine() {
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(STUFFIE_CENTER_X, secondClick.y);
  ctx.lineTo(MIRROR_X, secondClick.y);
  ctx.stroke();
  ctx.setLineDash([]);
}

function getAngleInfo() {
  const dx = firstClick.x - secondClick.x;
  const dy = firstClick.y - secondClick.y;
  const rayAngle = Math.atan2(dy, dx);
  const angleDeg = Math.abs(Math.atan2(Math.abs(dy), Math.abs(dx))) * 180 / Math.PI;
  return { rayAngle, angleDeg };
}

function drawAngleArc() {
  const { angleDeg } = getAngleInfo();
  const dx = firstClick.x - secondClick.x;
  const dy = firstClick.y - secondClick.y;

  const arcRadius = 22;

  const rayAngle = Math.atan2(dy, dx);
  const horizAngle = dx < 0 ? Math.PI : 0;

  let diff = rayAngle - horizAngle;
  while (diff > Math.PI) diff -= 2 * Math.PI;
  while (diff <= -Math.PI) diff += 2 * Math.PI;

  const useAntiClockwise = diff < 0;

  ctx.strokeStyle = '#e00';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(secondClick.x, secondClick.y, arcRadius, horizAngle, rayAngle, useAntiClockwise);
  ctx.stroke();

  const labelX = secondClick.x - arcRadius - 24;
  const labelY = secondClick.y - 2;

  ctx.font = LABEL_FONT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const text = angleDeg.toFixed(1) + '\u00B0';
  const tw = ctx.measureText(text).width;
  ctx.fillStyle = '#fff';
  ctx.fillRect(labelX - tw/2 - 3, labelY - 9, tw + 6, 18);
  ctx.fillStyle = '#e00';
  ctx.fillText(text, labelX, labelY);
}

function drawHeightArrow() {
  const heightCm = yToCm(secondClick.y);
  const arrowX = MIRROR_X + 75;
  const topY = secondClick.y;
  const bottomY = GROUND_Y_PX;

  if (bottomY - topY < 10) return;

  const label = heightCm.toFixed(1) + ' cm';

  const headLen = 7;
  ctx.strokeStyle = BROWN;
  ctx.fillStyle = BROWN;
  ctx.lineWidth = 1.5;

  // Vertical line
  ctx.beginPath();
  ctx.moveTo(arrowX, topY + headLen);
  ctx.lineTo(arrowX, bottomY - headLen);
  ctx.stroke();

  // Top arrowhead
  ctx.beginPath();
  ctx.moveTo(arrowX, topY);
  ctx.lineTo(arrowX - 4, topY + headLen);
  ctx.lineTo(arrowX + 4, topY + headLen);
  ctx.closePath();
  ctx.fill();

  // Bottom arrowhead
  ctx.beginPath();
  ctx.moveTo(arrowX, bottomY);
  ctx.lineTo(arrowX - 4, bottomY - headLen);
  ctx.lineTo(arrowX + 4, bottomY - headLen);
  ctx.closePath();
  ctx.fill();

  // Tick marks
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(arrowX - 5, topY);
  ctx.lineTo(arrowX + 5, topY);
  ctx.moveTo(arrowX - 5, bottomY);
  ctx.lineTo(arrowX + 5, bottomY);
  ctx.stroke();

  // Rotated label
  ctx.save();
  ctx.translate(arrowX, (topY + bottomY) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.font = LABEL_FONT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const tw = ctx.measureText(label).width;
  ctx.fillStyle = '#fff';
  ctx.fillRect(-tw/2 - 3, -10, tw + 6, 20);
  ctx.fillStyle = BROWN;
  ctx.fillText(label, 0, 0);
  ctx.restore();
}

// --- Interaction ---
function isInResetBtn(x, y) {
  const b = RESET_BTN;
  return x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h;
}

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * CW / rect.width;
  const cy = (e.clientY - rect.top) * CH / rect.height;

  // Check reset button
  if (isInResetBtn(cx, cy)) {
    reset();
    return;
  }

  if (state !== 'waiting_first') return;
  dragStart = { x: cx, y: cy };
  isDragging = false;
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mousePos = {
    x: (e.clientX - rect.left) * CW / rect.width,
    y: (e.clientY - rect.top) * CH / rect.height
  };

  // Update hover state for reset button
  hoveringReset = isInResetBtn(mousePos.x, mousePos.y);
  canvas.style.cursor = hoveringReset ? 'pointer' : 'crosshair';

  if (dragStart && state === 'waiting_first') {
    const dx = mousePos.x - dragStart.x;
    const dy = mousePos.y - dragStart.y;
    if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) {
      isDragging = true;
    }
    if (isDragging) {
      drawScene();
      return;
    }
  }
  if (state === 'waiting_second' || state === 'waiting_first') {
    drawScene();
  }
});

canvas.addEventListener('mouseleave', () => {
  mousePos = null;
  hoveringReset = false;
  drawScene();
});

canvas.addEventListener('mouseup', (e) => {
  if (isDragging && dragStart && state === 'waiting_first') {
    const rect = canvas.getBoundingClientRect();
    const endX = (e.clientX - rect.left) * CW / rect.width;
    const endY = (e.clientY - rect.top) * CH / rect.height;
    firstClick = { x: dragStart.x, y: dragStart.y };
    secondClick = { x: endX, y: endY };
    state = 'done';
    dragStart = null;
    isDragging = false;
    suppressClick = true;

    checkBackward();
    drawScene();
    return;
  }
  dragStart = null;
  isDragging = false;
});

canvas.addEventListener('click', (e) => {
  if (suppressClick) {
    suppressClick = false;
    return;
  }

  const rect = canvas.getBoundingClientRect();
  const clickX = (e.clientX - rect.left) * CW / rect.width;
  const clickY = (e.clientY - rect.top) * CH / rect.height;

  // Ignore clicks on reset button (handled in mousedown)
  if (isInResetBtn(clickX, clickY)) return;

  if (state === 'waiting_first') {
    firstClick = { x: clickX, y: clickY };
    state = 'waiting_second';
    drawScene();
  } else if (state === 'waiting_second') {
    secondClick = { x: clickX, y: clickY };
    state = 'done';

    checkBackward();
    drawScene();
  }
});

function checkBackward() {
  const tolerance = 10 * SCALE;
  const firstNearMirror = Math.abs(firstClick.x - MIRROR_X) < tolerance;
  const secondNearStuffie = Math.abs(secondClick.x - STUFFIE_CENTER_X) < tolerance;
  if (firstNearMirror && secondNearStuffie) {
    warningEl.style.display = 'block';
    warningEl.textContent = "Click Haibao\u2019s eye first, then the top of the mirror.";
  }
}

function reset() {
  state = 'waiting_first';
  firstClick = null;
  secondClick = null;
  mousePos = null;
  dragStart = null;
  isDragging = false;
  suppressClick = false;
  warningEl.style.display = 'none';
  drawScene();
}

new ResizeObserver(fit).observe(canvas);
fit();
</script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
