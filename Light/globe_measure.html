<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globe Distance Measurer</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0a1a;
        color: #e0e0e0;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    #globe-container {
        position: relative;
        width: 100%;
        flex: 1;
        min-height: 0;
    }
    canvas { display: block; }
    #labels-container {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
    }
    .city-label {
        position: absolute;
        color: #fff;
        font-size: 11px;
        text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.7);
        white-space: nowrap;
        pointer-events: none;
        transition: opacity 0.15s;
        transform: translate(-50%, -130%);
        user-select: none;
    }
    .city-label.hovered {
        color: #00FFFF;
        font-size: 13px;
        font-weight: bold;
        text-shadow: 0 0 6px rgba(0,255,255,0.5), 0 0 4px rgba(0,0,0,0.9);
    }
    .city-label.selected {
        color: #00FF88;
        font-size: 13px;
        font-weight: bold;
        text-shadow: 0 0 6px rgba(0,255,136,0.5), 0 0 4px rgba(0,0,0,0.9);
    }
    .distance-label {
        position: absolute;
        color: #fff;
        font-size: 12px;
        font-weight: bold;
        text-shadow: 0 0 6px rgba(0,0,0,0.95), 0 0 12px rgba(0,0,0,0.8);
        white-space: nowrap;
        pointer-events: none;
        transform: translate(-50%, -50%);
        user-select: none;
        padding: 2px 6px;
        border-radius: 3px;
        background: rgba(0,0,0,0.5);
    }
    #info-panel {
        width: 100%;
        max-width: 700px;
        padding: 10px 20px 16px;
        text-align: center;
        flex-shrink: 0;
    }
    #instructions {
        font-size: 14px;
        color: #88aacc;
        margin-bottom: 6px;
        min-height: 20px;
    }
    #measurements {
        max-height: 140px;
        overflow-y: auto;
        margin-bottom: 8px;
    }
    .measurement-line {
        font-size: 15px;
        padding: 3px 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    #reset-btn {
        background: #cc3333;
        color: #fff;
        border: none;
        padding: 8px 28px;
        font-size: 14px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.2s;
    }
    #reset-btn:hover { background: #ee4444; }
    #loading {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 18px;
        color: #88aacc;
    }
</style>
</head>
<body>
<div id="globe-container">
    <div id="labels-container"></div>
    <div id="loading">Loading globe...</div>
</div>
<div id="info-panel">
    <div id="instructions">Click a city to start measuring a geodesic</div>
    <div id="measurements"></div>
    <button id="reset-btn">Reset All</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const GLOBE_RADIUS = 5;
const MARKER_RADIUS = 0.09;
const GEODESIC_LIFT = 1.003;
const MAX_GEODESICS = 10;
const DEG2RAD = Math.PI / 180;

const GEODESIC_COLORS = [
    '#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#FF8B94',
    '#95E1D3','#F38181','#AA96DA','#FCBAD3','#6C5CE7'
];

const cities = [
    {name:"New York City", country:"USA", lat:40.7128, lon:-74.0060},
    {name:"Los Angeles", country:"USA", lat:34.0522, lon:-118.2437},
    {name:"Chicago", country:"USA", lat:41.8781, lon:-87.6298},
    {name:"Mexico City", country:"Mexico", lat:19.4326, lon:-99.1332},
    {name:"Toronto", country:"Canada", lat:43.6532, lon:-79.3832},
    {name:"S\u00e3o Paulo", country:"Brazil", lat:-23.5505, lon:-46.6333},
    {name:"Buenos Aires", country:"Argentina", lat:-34.6037, lon:-58.3816},
    {name:"Lima", country:"Peru", lat:-12.0464, lon:-77.0428},
    {name:"Bogot\u00e1", country:"Colombia", lat:4.7110, lon:-74.0721},
    {name:"Rio de Janeiro", country:"Brazil", lat:-22.9068, lon:-43.1729},
    {name:"London", country:"UK", lat:51.5074, lon:-0.1278},
    {name:"Paris", country:"France", lat:48.8566, lon:2.3522},
    {name:"Berlin", country:"Germany", lat:52.5200, lon:13.4050},
    {name:"Moscow", country:"Russia", lat:55.7558, lon:37.6173},
    {name:"Rome", country:"Italy", lat:41.9028, lon:12.4964},
    {name:"Istanbul", country:"Turkey", lat:41.0082, lon:28.9784},
    {name:"Cairo", country:"Egypt", lat:30.0444, lon:31.2357},
    {name:"Lagos", country:"Nigeria", lat:6.5244, lon:3.3792},
    {name:"Nairobi", country:"Kenya", lat:-1.2921, lon:36.8219},
    {name:"Johannesburg", country:"South Africa", lat:-26.2041, lon:28.0473},
    {name:"Casablanca", country:"Morocco", lat:33.5731, lon:-7.5898},
    {name:"Tokyo", country:"Japan", lat:35.6762, lon:139.6503},
    {name:"Beijing", country:"China", lat:39.9042, lon:116.4074},
    {name:"Mumbai", country:"India", lat:19.0760, lon:72.8777},
    {name:"Dubai", country:"UAE", lat:25.2048, lon:55.2708},
    {name:"Singapore", country:"Singapore", lat:1.3521, lon:103.8198},
    {name:"Bangkok", country:"Thailand", lat:13.7563, lon:100.5018},
    {name:"Seoul", country:"South Korea", lat:37.5665, lon:126.9780},
    {name:"Shanghai", country:"China", lat:31.2304, lon:121.4737},
    {name:"Sydney", country:"Australia", lat:-33.8688, lon:151.2093},
    {name:"Auckland", country:"New Zealand", lat:-36.8485, lon:174.7633},
];

// --- Three.js setup ---
const container = document.getElementById('globe-container');
const labelsContainer = document.getElementById('labels-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(0, 4, 14);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.insertBefore(renderer.domElement, labelsContainer);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 7;
controls.maxDistance = 30;
controls.enablePan = false;

// Lights
scene.add(new THREE.AmbientLight(0x555566));
const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
sunLight.position.set(5, 3, 8);
scene.add(sunLight);

// Stars
const starGeo = new THREE.BufferGeometry();
const starVerts = new Float32Array(3000);
for (let i = 0; i < 3000; i++) {
    starVerts[i] = (Math.random() - 0.5) * 400;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.3 })));

// --- Coordinate helpers ---
function latLonToVec3(lat, lon, r) {
    const phi = (lon + 180) * DEG2RAD;
    const theta = (90 - lat) * DEG2RAD;
    return new THREE.Vector3(
        -r * Math.cos(phi) * Math.sin(theta),
        r * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta)
    );
}
function vec3ToLatLon(v) {
    const r = v.length();
    const lat = 90 - Math.acos(Math.max(-1, Math.min(1, v.y / r))) / DEG2RAD;
    const lon = Math.atan2(v.z, -v.x) / DEG2RAD - 180;
    return { lat, lon: ((lon + 540) % 360) - 180 };
}

function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * DEG2RAD;
    const dLon = (lon2 - lon1) * DEG2RAD;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*DEG2RAD)*Math.cos(lat2*DEG2RAD)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function greatCirclePoints(lat1, lon1, lat2, lon2, n=100) {
    const p1 = latLonToVec3(lat1, lon1, 1).normalize();
    const p2 = latLonToVec3(lat2, lon2, 1).normalize();
    const d = Math.acos(Math.max(-1, Math.min(1, p1.dot(p2))));
    if (d < 1e-6) return [latLonToVec3(lat1, lon1, GLOBE_RADIUS * GEODESIC_LIFT)];
    const pts = [];
    for (let i = 0; i <= n; i++) {
        const t = i / n;
        const sinD = Math.sin(d);
        const A = Math.sin((1 - t) * d) / sinD;
        const B = Math.sin(t * d) / sinD;
        const pt = new THREE.Vector3(
            A * p1.x + B * p2.x,
            A * p1.y + B * p2.y,
            A * p1.z + B * p2.z
        ).normalize().multiplyScalar(GLOBE_RADIUS * GEODESIC_LIFT);
        pts.push(pt);
    }
    return pts;
}

// --- Globe ---
const textureLoader = new THREE.TextureLoader();
const globeGroup = new THREE.Group();
scene.add(globeGroup);

const sphereGeo = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);

// Try loading texture, fallback to procedural
function createFallbackTexture() {
    const cv = document.createElement('canvas');
    cv.width = 1024; cv.height = 512;
    const ctx = cv.getContext('2d');
    // Ocean gradient
    const grad = ctx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, '#1a3a5c');
    grad.addColorStop(0.3, '#1a5276');
    grad.addColorStop(0.5, '#1a6e8e');
    grad.addColorStop(0.7, '#1a5276');
    grad.addColorStop(1, '#1a3a5c');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1024, 512);
    // Simple continent blobs
    ctx.fillStyle = '#2d6a2e';
    // North America
    ctx.beginPath(); ctx.ellipse(220, 160, 80, 50, -0.3, 0, Math.PI*2); ctx.fill();
    // South America
    ctx.beginPath(); ctx.ellipse(280, 310, 40, 70, 0.2, 0, Math.PI*2); ctx.fill();
    // Europe
    ctx.beginPath(); ctx.ellipse(510, 150, 40, 30, 0, 0, Math.PI*2); ctx.fill();
    // Africa
    ctx.beginPath(); ctx.ellipse(520, 260, 45, 65, 0, 0, Math.PI*2); ctx.fill();
    // Asia
    ctx.beginPath(); ctx.ellipse(650, 160, 100, 50, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(720, 250, 30, 20, 0, 0, Math.PI*2); ctx.fill();
    // Australia
    ctx.beginPath(); ctx.ellipse(780, 340, 40, 25, 0, 0, Math.PI*2); ctx.fill();
    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 512; i += 512/18) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(1024, i); ctx.stroke(); }
    for (let i = 0; i < 1024; i += 1024/36) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke(); }
    const tex = new THREE.CanvasTexture(cv);
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
}

let globe;
function createGlobe(texture) {
    const mat = new THREE.MeshPhongMaterial({
        map: texture,
        bumpScale: 0.02,
        specular: new THREE.Color(0x222244),
        shininess: 15,
    });
    globe = new THREE.Mesh(sphereGeo, mat);
    globeGroup.add(globe);
    document.getElementById('loading').style.display = 'none';
    addAtmosphere();
    addCityMarkers();
}

// Try multiple texture sources
const texUrls = [
    'https://unpkg.com/three-globe@2.33.0/example/img/earth-blue-marble.jpg',
    'https://cdn.jsdelivr.net/npm/three-globe@2.33.0/example/img/earth-blue-marble.jpg',
];
let texLoaded = false;
function tryLoadTexture(idx) {
    if (idx >= texUrls.length) {
        createGlobe(createFallbackTexture());
        return;
    }
    textureLoader.load(texUrls[idx], tex => {
        if (texLoaded) return;
        texLoaded = true;
        tex.colorSpace = THREE.SRGBColorSpace;
        createGlobe(tex);
    }, undefined, () => {
        if (!texLoaded) tryLoadTexture(idx + 1);
    });
}
// Start loading textures and set a timeout for fallback
tryLoadTexture(0);
setTimeout(() => { if (!texLoaded) { texLoaded = true; createGlobe(createFallbackTexture()); } }, 5000);

// Atmosphere
function addAtmosphere() {
    const atmosMat = new THREE.ShaderMaterial({
        vertexShader: `
            varying vec3 vNormal;
            varying vec3 vViewPos;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                vViewPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            varying vec3 vNormal;
            varying vec3 vViewPos;
            void main() {
                vec3 viewDir = normalize(-vViewPos);
                float rim = 1.0 - abs(dot(vNormal, viewDir));
                float intensity = pow(rim, 3.0) * 0.7;
                gl_FragColor = vec4(0.3, 0.6, 1.0, intensity);
            }
        `,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        transparent: true,
        depthWrite: false,
    });
    const atmos = new THREE.Mesh(new THREE.SphereGeometry(GLOBE_RADIUS * 1.06, 48, 48), atmosMat);
    globeGroup.add(atmos);
}

// --- City markers ---
const markerMeshes = [];
const cityLabelDivs = [];
const markerGeo = new THREE.SphereGeometry(MARKER_RADIUS, 12, 12);
const markerMat = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
const markerHoverMat = new THREE.MeshBasicMaterial({ color: 0x00FFFF });
const markerSelectedMat = new THREE.MeshBasicMaterial({ color: 0x00FF88 });

function addCityMarkers() {
    cities.forEach((city, i) => {
        const pos = latLonToVec3(city.lat, city.lon, GLOBE_RADIUS * 1.005);
        const marker = new THREE.Mesh(markerGeo, markerMat.clone());
        marker.position.copy(pos);
        marker.userData = { cityIndex: i };
        globeGroup.add(marker);
        markerMeshes.push(marker);

        // Ring highlight under marker
        const ringGeo = new THREE.RingGeometry(MARKER_RADIUS * 1.5, MARKER_RADIUS * 2.5, 24);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xFFD700, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.copy(pos);
        ring.lookAt(new THREE.Vector3(0, 0, 0));
        globeGroup.add(ring);

        // HTML label
        const div = document.createElement('div');
        div.className = 'city-label';
        div.textContent = city.name;
        labelsContainer.appendChild(div);
        cityLabelDivs.push(div);
    });
}

// --- Interaction state ---
let selectedCityIdx = null;
let hoveredCityIdx = null;
let geodesics = []; // {line, labelDiv, city1, city2, color}
let previewLine = null;
let previewPoints = [];
let mouseNDC = new THREE.Vector2(-999, -999);
let mouseDown = false;
let mouseDownPos = { x: 0, y: 0 };
let dragStartedOnCity = false;
const raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 0.1 };

// Globe surface raycaster
const globeRaycaster = new THREE.Raycaster();

function getHitCity(ndcX, ndcY) {
    raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
    const hits = raycaster.intersectObjects(markerMeshes);
    if (hits.length > 0) return hits[0].object.userData.cityIndex;
    // Fallback: screen-space proximity check (within 18px)
    const camPos = camera.position.clone();
    let bestIdx = null, bestDist = 18;
    const sx = (ndcX * 0.5 + 0.5) * renderer.domElement.clientWidth;
    const sy = (-ndcY * 0.5 + 0.5) * renderer.domElement.clientHeight;
    markerMeshes.forEach((m, i) => {
        const wp = m.getWorldPosition(new THREE.Vector3());
        // Only consider markers facing camera
        if (wp.clone().normalize().dot(camPos.clone().sub(wp).normalize()) < 0) return;
        const proj = wp.clone().project(camera);
        const px = (proj.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
        const py = (-proj.y * 0.5 + 0.5) * renderer.domElement.clientHeight;
        const d = Math.hypot(px - sx, py - sy);
        if (d < bestDist) { bestDist = d; bestIdx = i; }
    });
    return bestIdx;
}

function getGlobeHitLatLon(ndcX, ndcY) {
    globeRaycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
    const hits = globeRaycaster.intersectObject(globe);
    if (hits.length > 0) {
        return vec3ToLatLon(hits[0].point);
    }
    return null;
}

function ndcFromEvent(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    return {
        x: ((e.clientX - rect.left) / rect.width) * 2 - 1,
        y: -((e.clientY - rect.top) / rect.height) * 2 + 1
    };
}

// --- Preview geodesic ---
function updatePreviewLine(points) {
    if (previewLine) {
        globeGroup.remove(previewLine);
        previewLine.geometry.dispose();
        previewLine = null;
    }
    if (!points || points.length < 2) return;
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, depthTest: true });
    previewLine = new THREE.Line(geo, mat);
    globeGroup.add(previewLine);
}

// --- Completed geodesics ---
function addGeodesic(city1Idx, city2Idx) {
    if (geodesics.length >= MAX_GEODESICS) {
        // Remove oldest
        const old = geodesics.shift();
        globeGroup.remove(old.line);
        old.line.geometry.dispose();
        if (old.labelDiv) old.labelDiv.remove();
    }
    const c1 = cities[city1Idx], c2 = cities[city2Idx];
    const color = GEODESIC_COLORS[geodesics.length % GEODESIC_COLORS.length];
    const pts = greatCirclePoints(c1.lat, c1.lon, c2.lat, c2.lon, 120);
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: new THREE.Color(color), linewidth: 2, depthTest: true });
    const line = new THREE.Line(geo, mat);
    globeGroup.add(line);

    const dist = haversineKm(c1.lat, c1.lon, c2.lat, c2.lon);
    const distStr = Math.round(dist).toLocaleString();

    // Midpoint label
    const labelDiv = document.createElement('div');
    labelDiv.className = 'distance-label';
    labelDiv.style.color = color;
    labelDiv.textContent = `${distStr} km`;
    labelsContainer.appendChild(labelDiv);

    // Midpoint 3D position
    const midPt = pts[Math.floor(pts.length / 2)].clone();

    geodesics.push({ line, labelDiv, midPt, city1: city1Idx, city2: city2Idx, color, dist });

    // Add to measurements panel
    const mDiv = document.createElement('div');
    mDiv.className = 'measurement-line';
    mDiv.style.color = color;
    mDiv.textContent = `${c1.name}, ${c1.country} to ${c2.name}, ${c2.country}: ${distStr} km`;
    document.getElementById('measurements').appendChild(mDiv);
    mDiv.scrollIntoView({ behavior: 'smooth' });
}

function resetAll() {
    geodesics.forEach(g => {
        globeGroup.remove(g.line);
        g.line.geometry.dispose();
        if (g.labelDiv) g.labelDiv.remove();
    });
    geodesics = [];
    selectedCityIdx = null;
    updatePreviewLine(null);
    document.getElementById('measurements').innerHTML = '';
    document.getElementById('instructions').textContent = 'Click a city to start measuring a geodesic';
    markerMeshes.forEach(m => { m.material.color.set(0xFFD700); m.scale.setScalar(1); });
}
document.getElementById('reset-btn').addEventListener('click', resetAll);

// --- Mouse events ---
renderer.domElement.addEventListener('mousedown', e => {
    const ndc = ndcFromEvent(e);
    mouseDown = true;
    mouseDownPos = { x: e.clientX, y: e.clientY };
    const cityIdx = getHitCity(ndc.x, ndc.y);
    dragStartedOnCity = cityIdx !== null;
    if (dragStartedOnCity && selectedCityIdx === null) {
        // Start selection on mousedown for drag mode
        selectCity(cityIdx);
        controls.enabled = false;
    }
});

renderer.domElement.addEventListener('mouseup', e => {
    const dx = e.clientX - mouseDownPos.x;
    const dy = e.clientY - mouseDownPos.y;
    const wasDrag = Math.sqrt(dx*dx + dy*dy) > 5;
    const ndc = ndcFromEvent(e);
    const cityIdx = getHitCity(ndc.x, ndc.y);

    if (dragStartedOnCity && !controls.enabled) {
        controls.enabled = true;
        if (wasDrag && cityIdx !== null && cityIdx !== selectedCityIdx && selectedCityIdx !== null) {
            // Drag completed to another city
            completeGeodesic(cityIdx);
        }
        // If drag ended on empty space, keep selection for click mode
    } else if (!wasDrag && cityIdx !== null) {
        // Regular click
        if (selectedCityIdx === null) {
            selectCity(cityIdx);
        } else if (cityIdx !== selectedCityIdx) {
            completeGeodesic(cityIdx);
        } else {
            // Clicked same city, deselect
            deselectCity();
        }
    }
    mouseDown = false;
    dragStartedOnCity = false;
});

renderer.domElement.addEventListener('mousemove', e => {
    const ndc = ndcFromEvent(e);
    mouseNDC.set(ndc.x, ndc.y);
    hoveredCityIdx = getHitCity(ndc.x, ndc.y);
    renderer.domElement.style.cursor = hoveredCityIdx !== null ? 'pointer' : 'grab';
});

function selectCity(idx) {
    selectedCityIdx = idx;
    const c = cities[idx];
    markerMeshes[idx].material.color.set(0x00FF88);
    markerMeshes[idx].scale.setScalar(1.5);
    document.getElementById('instructions').textContent = `Selected: ${c.name}, ${c.country} \u2014 click another city to measure`;
}

function deselectCity() {
    if (selectedCityIdx !== null) {
        markerMeshes[selectedCityIdx].material.color.set(0xFFD700);
        markerMeshes[selectedCityIdx].scale.setScalar(1);
    }
    selectedCityIdx = null;
    updatePreviewLine(null);
    document.getElementById('instructions').textContent = 'Click a city to start measuring a geodesic';
}

function completeGeodesic(cityIdx) {
    addGeodesic(selectedCityIdx, cityIdx);
    markerMeshes[selectedCityIdx].material.color.set(0xFFD700);
    markerMeshes[selectedCityIdx].scale.setScalar(1);
    selectedCityIdx = null;
    updatePreviewLine(null);
    const remaining = MAX_GEODESICS - geodesics.length;
    document.getElementById('instructions').textContent = remaining > 0
        ? `Click a city to start another measurement (${geodesics.length}/${MAX_GEODESICS})`
        : `Maximum ${MAX_GEODESICS} geodesics reached \u2014 oldest will be replaced`;
}

// --- Animation loop ---
function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Update preview geodesic
    if (selectedCityIdx !== null && globe) {
        let targetLL = null;
        if (hoveredCityIdx !== null && hoveredCityIdx !== selectedCityIdx) {
            const hc = cities[hoveredCityIdx];
            targetLL = { lat: hc.lat, lon: hc.lon };
        } else {
            targetLL = getGlobeHitLatLon(mouseNDC.x, mouseNDC.y);
        }
        if (targetLL) {
            const sc = cities[selectedCityIdx];
            const pts = greatCirclePoints(sc.lat, sc.lon, targetLL.lat, targetLL.lon, 80);
            updatePreviewLine(pts);
        } else {
            updatePreviewLine(null);
        }
    }

    // Update city labels and marker highlighting
    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    const camPos = camera.position.clone();

    markerMeshes.forEach((marker, i) => {
        const worldPos = marker.getWorldPosition(new THREE.Vector3());
        const normalDir = worldPos.clone().normalize();
        const toCam = camPos.clone().sub(worldPos).normalize();
        const facing = normalDir.dot(toCam);
        const visible = facing > -0.05;

        // Label positioning
        const div = cityLabelDivs[i];
        if (visible) {
            const projected = worldPos.clone().project(camera);
            const x = (projected.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
            const y = (-projected.y * 0.5 + 0.5) * renderer.domElement.clientHeight;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.opacity = Math.min(1, Math.max(0, (facing + 0.05) * 4));
            div.style.display = '';
        } else {
            div.style.display = 'none';
        }

        // Hover / selected styling
        div.classList.toggle('hovered', i === hoveredCityIdx && i !== selectedCityIdx);
        div.classList.toggle('selected', i === selectedCityIdx);

        if (i === selectedCityIdx) {
            marker.material.color.set(0x00FF88);
            marker.scale.setScalar(1.5);
        } else if (i === hoveredCityIdx) {
            marker.material.color.set(0x00FFFF);
            marker.scale.setScalar(1.3);
        } else {
            marker.material.color.set(0xFFD700);
            marker.scale.setScalar(1);
        }
    });

    // Update geodesic distance labels
    geodesics.forEach(g => {
        const worldPos = g.midPt.clone();
        // Check visibility
        const normalDir = worldPos.clone().normalize();
        const toCam = camPos.clone().sub(worldPos).normalize();
        const facing = normalDir.dot(toCam);
        if (facing > 0) {
            const projected = worldPos.clone().project(camera);
            const x = (projected.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
            const y = (-projected.y * 0.5 + 0.5) * renderer.domElement.clientHeight;
            g.labelDiv.style.left = x + 'px';
            g.labelDiv.style.top = y + 'px';
            g.labelDiv.style.display = '';
            g.labelDiv.style.opacity = Math.min(1, facing * 3);
        } else {
            g.labelDiv.style.display = 'none';
        }
    });

    renderer.render(scene, camera);
}
animate();

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});

// --- Touch support ---
let touchStart = null;
renderer.domElement.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
}, { passive: true });
renderer.domElement.addEventListener('touchend', e => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.sqrt(dx*dx + dy*dy) < 15) {
        // Tap
        const ndc = ndcFromEvent(t);
        const cityIdx = getHitCity(ndc.x, ndc.y);
        if (cityIdx !== null) {
            if (selectedCityIdx === null) selectCity(cityIdx);
            else if (cityIdx !== selectedCityIdx) completeGeodesic(cityIdx);
            else deselectCity();
        }
    }
    touchStart = null;
}, { passive: true });
</script>
</body>
