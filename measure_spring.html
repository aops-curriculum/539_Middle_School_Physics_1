<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Measurement</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8e2d8;font-family:Arial,sans-serif;max-width:600px;margin:0 auto;user-select:none;-webkit-user-select:none}
canvas{display:block;width:600px;height:400px}
.controls{display:flex;gap:22px;justify-content:center;align-items:center;padding:13px 0}
.wt-label{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:bold;color:#333;cursor:pointer}
.wt-label input[type=checkbox]{width:21px;height:21px;cursor:pointer;accent-color:#c0392b;flex-shrink:0}
button{background:#1a6ca8;color:#fff;border:none;border-radius:5px;padding:9px 20px;font-size:15px;font-weight:bold;cursor:pointer;line-height:1}
button:hover{background:#2281c9}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <label class="wt-label"><input type="checkbox" id="wt"> Add weight</label>
  <button id="rst">Reset</button>
</div>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = 600, H = 400;
const DPR = window.devicePixelRatio || 1;
cv.width = W * DPR;
cv.height = H * DPR;
cv.style.width = W + 'px';
cv.style.height = H + 'px';

// Layout constants
const SX = 215;         // spring x center
const CY = 22;          // ceiling bottom y (ceiling is 0..CY)
const SLEN_NAT = 148;   // natural spring length
const SLEN_STR = 218;   // stretched spring length
const COIL_AMP = 25;    // spring coil half-width
const NUM_COILS = 9;
const WW = 63, WH = 75; // weight width/height (25% larger than 50x60)

// Shelf
const SH_Y = 360, SH_X1 = 165, SH_X2 = 575, SH_T = 22;

// Ruler (25% larger: 38px wide, 15px/cm scale, 14px labels)
const RX = 285, RW = 38, CM_PX = 15;
const RY0 = CY, RY1 = SH_Y;

// Animation state
let sLen = SLEN_NAT, tLen = SLEN_NAT;
let wA = 0, tA = 0;

// ---- Drawing helpers ----

function drawBackground() {
  const g = ctx.createLinearGradient(0, CY, 0, H);
  g.addColorStop(0, '#ddd8cc');
  g.addColorStop(1, '#c8c2b4');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawCeiling() {
  // Main slab
  const g = ctx.createLinearGradient(0, 0, 0, CY);
  g.addColorStop(0, '#3e3028');
  g.addColorStop(1, '#726050');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, CY);

  // Hatch texture
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, CY);
  ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.13)';
  ctx.lineWidth = 1;
  for (let x = -CY; x < W + CY; x += 11) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + CY, CY);
    ctx.stroke();
  }
  ctx.restore();

  // Bottom shadow line
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(0, CY - 2, W, 3);

  // Spring attachment bolt
  ctx.beginPath();
  ctx.arc(SX, CY, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#2a2018';
  ctx.fill();
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawShelf() {
  // Brackets
  const bx = [SH_X1, SH_X2];
  const dirs = [-1, 1];
  for (let i = 0; i < 2; i++) {
    const bxv = bx[i], d = dirs[i];
    ctx.fillStyle = '#907050';
    ctx.beginPath();
    ctx.moveTo(bxv, SH_Y);
    ctx.lineTo(bxv + d * 13, SH_Y + SH_T + 16);
    ctx.lineTo(bxv - d * 7, SH_Y + SH_T + 16);
    ctx.lineTo(bxv - d * 7, SH_Y + SH_T);
    ctx.closePath();
    ctx.fill();
  }

  // Shelf surface
  const sg = ctx.createLinearGradient(0, SH_Y, 0, SH_Y + SH_T);
  sg.addColorStop(0, '#cfa060');
  sg.addColorStop(0.35, '#b48040');
  sg.addColorStop(1, '#8a5e28');
  ctx.fillStyle = sg;
  ctx.fillRect(SH_X1, SH_Y, SH_X2 - SH_X1, SH_T);

  // Highlight top edge
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(SH_X1, SH_Y, SH_X2 - SH_X1, 3);

  // Wood grain lines
  ctx.strokeStyle = 'rgba(0,0,0,0.07)';
  ctx.lineWidth = 1;
  for (let y = SH_Y + 6; y < SH_Y + SH_T; y += 5) {
    ctx.beginPath();
    ctx.moveTo(SH_X1, y);
    ctx.lineTo(SH_X2, y);
    ctx.stroke();
  }
}

function drawSpring(len) {
  const steps = NUM_COILS * 20;
  const yStart = CY + 4, yEnd = CY + len - 4;
  const span = yEnd - yStart;

  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  // Dark main wire
  ctx.strokeStyle = '#484848';
  ctx.beginPath();
  ctx.moveTo(SX, CY);
  ctx.lineTo(SX, yStart);
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    ctx.lineTo(SX + Math.sin(t * Math.PI * 2 * NUM_COILS) * COIL_AMP, yStart + t * span);
  }
  ctx.lineTo(SX, CY + len);
  ctx.stroke();

  // Highlight on front-facing parts of coils
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  let drawing = false;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const sx = SX + Math.sin(t * Math.PI * 2 * NUM_COILS) * COIL_AMP;
    const sy = yStart + t * span;
    if (Math.sin(t * Math.PI * 2 * NUM_COILS) > 0.6) {
      if (!drawing) { ctx.moveTo(sx, sy); drawing = true; }
      else ctx.lineTo(sx, sy);
    } else {
      drawing = false;
    }
  }
  ctx.stroke();
}

function drawWeight(yTop, alpha) {
  if (alpha < 0.01) return;
  ctx.globalAlpha = alpha;

  const wx = SX - WW / 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fillRect(wx + 5, yTop + 5, WW, WH);

  // Body gradient
  const wg = ctx.createLinearGradient(wx, 0, wx + WW, 0);
  wg.addColorStop(0, '#787878');
  wg.addColorStop(0.3, '#c4c4c4');
  wg.addColorStop(0.65, '#a8a8a8');
  wg.addColorStop(1, '#585858');
  ctx.fillStyle = wg;
  ctx.fillRect(wx, yTop, WW, WH);

  // Top face highlight
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fillRect(wx, yTop, WW, 5);

  // Bottom shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(wx, yTop + WH - 5, WW, 5);

  // Hook line at top connecting to spring
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(SX, yTop - 4);
  ctx.lineTo(SX, yTop);
  ctx.stroke();

  // Label
  ctx.fillStyle = '#1a1a1a';
  ctx.font = 'bold 15px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('1 kg', SX, yTop + WH / 2);

  ctx.globalAlpha = 1;
}

function drawRuler() {
  const rulerH = RY1 - RY0;
  const maxCm = rulerH / CM_PX;

  // Background
  ctx.fillStyle = '#ffe98c';
  ctx.fillRect(RX, RY0, RW, rulerH);

  // Border
  ctx.strokeStyle = '#c9a820';
  ctx.lineWidth = 1;
  ctx.strokeRect(RX, RY0, RW, rulerH);

  // Tick marks (left edge = toward spring)
  for (let halfCm = 0; halfCm <= Math.ceil(maxCm * 2); halfCm++) {
    const ty = RY0 + (halfCm / 2) * CM_PX;
    if (ty > RY1 + 0.5) break;

    const isFull = halfCm % 2 === 0;
    const is5 = halfCm % 10 === 0;
    const tickLen = is5 ? RW * 0.58 : (isFull ? RW * 0.38 : RW * 0.24);
    const lw = is5 ? 1.5 : 1;

    ctx.strokeStyle = '#666';
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.moveTo(RX, ty);
    ctx.lineTo(RX + tickLen, ty);
    ctx.stroke();

    if (is5 && ty >= RY0 + 2 && ty <= RY1 - 4) {
      ctx.fillStyle = '#2a2a2a';
      ctx.font = 'bold 14px Arial'; // 25% larger than 11px baseline
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(halfCm / 2 + '', RX + tickLen + 3, ty);
    }
  }
}

function drawIndicator(y) {
  const ax = RX - 3;
  const arrowTipX = ax - 14;
  const labelRightX = SX - COIL_AMP - 16; // right edge of label box

  // Dashed line spanning from label to ruler (passes through spring)
  ctx.strokeStyle = 'rgba(192,57,43,0.55)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(arrowTipX, y);
  ctx.lineTo(labelRightX + 2, y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead pointing right at ruler
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(ax, y);
  ctx.lineTo(arrowTipX, y - 7);
  ctx.lineTo(arrowTipX, y + 7);
  ctx.closePath();
  ctx.fill();

  // cm label box to the left of spring
  const cm = (y - CY) / CM_PX;
  const label = cm.toFixed(1) + ' cm';
  ctx.font = 'bold 13px Arial';
  const tw = ctx.measureText(label).width;
  const bx = labelRightX - tw - 2;

  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 1;
  ctx.fillRect(bx, y - 10, tw + 6, 20);
  ctx.strokeRect(bx, y - 10, tw + 6, 20);

  ctx.fillStyle = '#c0392b';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, labelRightX, y);
}

// ---- Main draw ----
function draw() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  drawBackground();
  drawShelf();
  drawRuler();
  drawSpring(sLen);
  drawWeight(CY + sLen, wA);
  drawIndicator(CY + sLen);
  drawCeiling(); // on top so it covers spring attachment area cleanly
}

// ---- Animation loop ----
let lastT = 0;
function loop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.05);
  lastT = t;
  sLen += (tLen - sLen) * Math.min(dt * 9, 1);
  wA += (tA - wA) * Math.min(dt * 9, 1);
  if (Math.abs(tLen - sLen) < 0.3) sLen = tLen;
  if (Math.abs(tA - wA) < 0.005) wA = tA;
  draw();
  requestAnimationFrame(loop);
}

// ---- Controls ----
document.getElementById('wt').addEventListener('change', function() {
  tLen = this.checked ? SLEN_STR : SLEN_NAT;
  tA = this.checked ? 1 : 0;
});

document.getElementById('rst').addEventListener('click', function() {
  document.getElementById('wt').checked = false;
  tLen = SLEN_NAT; tA = 0;
  sLen = SLEN_NAT; wA = 0;
});

requestAnimationFrame(loop);
</script>
<script>
// EigenNode auto-height v2.3
(function(){
  var BUFFER=4,H_SCROLLBAR=18;
  function measure(){
    var b=document.body,h=document.documentElement;
    if(!b)return 0;
    var max=Math.max(b.scrollHeight||0,b.offsetHeight||0,(h&&h.scrollHeight)||0,(h&&h.offsetHeight)||0);
    var minTop=0,maxBot=0,br=b.getBoundingClientRect();
    for(var i=0;i<b.children.length;i++){
      var r=b.children[i].getBoundingClientRect();
      var top=r.top-br.top,bot=top+r.height;
      if(top<minTop)minTop=top;
      if(bot>maxBot)maxBot=bot;
    }
    var span=maxBot-minTop;
    if(span>max)max=span;
    var hOverflow=h&&(h.scrollWidth-h.clientWidth)>=4;
    return Math.ceil(max)+BUFFER+(hOverflow?H_SCROLLBAR:0);
  }
  var last=0;
  function report(){
    var h=measure();
    if(h>0&&Math.abs(h-last)>=2){last=h;window.parent.postMessage({type:'resize',height:h},'*');}
  }
  window.addEventListener('load',report);
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(report);
  if(window.ResizeObserver&&document.body)new ResizeObserver(report).observe(document.body);
})();
</script>
</body>
</html>
